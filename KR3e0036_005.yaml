body:
  text: 醫説卷五宋張杲撰心疾健忘抑情順理燕居暇日何所用心善養形神周防患疾常存謹畏無失調將食飲之間最為急務安危所繫智力可分與其畏病而求醫孰若明理以自求與其有病而治以藥孰若抑情而預治情斯可抑理亦漸明能任理而不任情則所養可謂善養者矣防患却疾之要其在兹乎食治通説心疾韋綬李蟠俱以心疾廢綬常疑遇毒鎖井而飲李益少而疑病心亦心疾也心靈府也為外物所中終身不痊多思慮多疑惑病之本也國史補驚氣入心治驚氣入心絡瘖不能語蜜陀僧研細服一七許茶調服遂愈有人因伐薪山間為狼所逐而得是疾或授以此方亦愈又一軍校採藤於谷逄惡蛇而病其狀正同亦用此藥療之而愈已志神志恍惚韓宗武侍父官洋州得異疾與神物遇頗不省人事神志恍惚或食或不食國醫陳易簡教服蘇合香凡後數月所遇者忽不至類編神氣不寧明州董生患神氣不寧每卧覺身在牀而神離體驚悸多魘通夕不寐許為診視詢諸醫作何證曰心病也許曰是肝經受邪非心病也肝藏魂者也遊魂為變平人肝不受邪故魂宿于肝神靜而得寐今肝經因虛邪氣襲之魂不歸舍是以臥則揚揚若去體肝主怒故小怒輒劇董喜曰前此未之聞雖未服藥已覺沉痾去體矣願求藥法許曰君且持此説與衆醫議所治之方而徐質之閲旬日復至曰醫遍議古今方書無與病相對者許乃為處珍珠丸獨活湯二方以贈服一月而病悉除其方大體以珠母為君龍齒佐之珠入肝經為第一龍齒與肝同類故也龍齒虎睛今人例作鎮心藥而不知龍齒安魂虎睛定魄各言其類也龍能變化故魂遊而不定虎能專靜故魄止而有守當隨其宜而治之載本事方一卷健忘詩治心氣不足健忘詩云桂逺人三四天菖地亦同茯苓加一倍日誦萬言通乃官桂逺志人參巴戟天石菖蒲地骨皮瑣碎録忽不識字松滋令薑愚無他疾忽不識字數年方稍稍復舊筆談治人心昏塞多忘喜誤七月七日取蜘蛛網著衣領中勿令人知不忘本草治惡夢錢丕少卿忽夜多惡夢但就枕便成輒通夕不止後因赴官經漢上與鄧州推官胡用之相遇驛中同宿遂説近日多夢慮非吉兆胡曰昔嘗如此驚怕特甚有道士教戴丹砂初任辰州推官求得靈砂雙箭鏃者戴之不涉旬即驗四五年不復有夢至今祕惜因解髻中一絳紗袋遺之即夕無夢神魂安靜真誥及他道書多載丹砂辟惡豈不信然類編麝枕置麝枕中可絶惡夢物類相感志癲疾素問曰人生而病癲疾者安得知之岐伯曰病名為胎病此得之在母腹中時其母有所大驚氣上而不下精氣並居故令子發為癲疾也御覽又癲狂之疾何以别答曰狂之始發少臥少飢自賢自貴妄笑好樂又癲者精神不守言語錯亂甚則登髙罵詈或至狂走癎者發則仆地嚼舌吐沫手足搐搦或作六畜之聲頃刻則蘇癲者邪入于隂經一曰陽併則狂癲者邪干於心其處方用藥亦皆相類狂凡人患癲狂呌喚打人者皆心經有熱當用鎮心藥兼大黃與之㵼數日然後服安神及風藥但得寧靜即是安樂不可見其瘦弱減食便以溫藥補之病必再作戒之戒之緩緩調飲食可也御覽魘不寤人眠則魂魄外逰為邪鬼所魘屈其精神弱者魘則久不得寤乃至氣絶所以須旁人助喚并以方術治之低聲逺喚即活雞峯方夢隂盛則夢涉大水恐懼陽盛則夢大火燔灼隂陽俱盛則夢相殺毁傷上盛則夢飛下盛則夢墮飽則夢豫飢則夢取肝氣盛則夢怒肺氣盛則夢哭臥而不寐老人臥而不寐少壯寐而不寤何耶少壯者血氣盛肌肉滑氣道通榮衛之行不失於常故晝日精夜不寤也老人血氣衰肌肉不滑榮衛之道澀故晝日不能精夜不得寐也小便如泔一男子小便日數十次如稠米泔色亦白心神恍惚瘦瘁食減以女勞得之服此桑螵蛸𣪚未終劑而愈安神魄定心志治健忘小便數補心氣桑螵蛸逺志菖蒲龍骨人參茯神當歸龜甲醋灸以上各一兩為末每服二錢夜卧人參湯調本草衍義夜魘夜魘之人急取梁上塵內鼻中即醒戒以燈照之鎖碎録暮卧呪道林曰暮臥常以手撫心上呪曰天靈節榮願得長生五臟君侯願其安寧男一七遍女二七遍長生不病修真祕訣桑葉止汗嚴州山寺有一遊僧形體羸瘦飲食甚少每夜就枕遍身出汗逮旦衣服皆透濕如此二十年無復可療唯待盡耳監寺僧曰吾有藥絶驗為汝治之三日宿疾頓愈遂并授以方乃單用桑葉一味乘露採摘控焙乾碾為末二錢空腹溫米飲調或值桑落乾者亦堪用但力不如新者按本草亦載桑葉主止汗其説可證辛志大驚發狂許叔微本事方云軍中有一人犯法褫衣將受刃得釋神失如癡豫與驚氣丸一粒服訖而寐及覺病已失矣江東張提轄妻因避寇失心已數年豫授其方隨愈又黃山沃巡檢妻狂厥踰年更十餘醫而不驗豫授其方去附子加鐵粉亦不終劑而愈鐵粉非但化涎鎮心至如摧抑肝邪特異若多恚怒肝邪大盛鐡粉能制伏之素問言陽厥狂怒治以鐵落斂金制木之意也犯大麥毒齊州有人病狂每歌曰五靈華蓋曉玲瓏天府由來汝府中惆悵此情言不盡一九蘿蔔火吾宫又歌曰踏陽春人間二月雨如塵陽春踏盡秋風起腸斷人間白髮人後遇一道士作法治之乃云夢中見一紅裳少女引入宫殿皆紅紫飾小姑令歌道士曰此正犯大麥毒女則心神小姑脾神也按醫經蘿蔔治麵毒故曰火吾宫即以藥并蘿蔔食之遂愈洞微志夢遺有人夢遺精初有所見後來雖夢中無所見日夜不拘常常遺漏作心氣不足服心氣藥無驗作腎氣虛補腎藥亦無驗醫問患者覺腦冷否應之曰只為腦冷服驅寒藥遂安蓋腦者諸陽之會髓之海腦冷則髓不固是以遺漏也有此疾者先去腦中風冷腦氣沖和兼服益心腎藥無不愈者心脈溢關王叔和脈訣論曰溢關骨痛心煩燥通真子解云心脈盛而溢關則筋緊而骨束是以骨痛師曰筋緊有筋攣疾豈得骨痛所以心脈盛而骨痛者心屬火骨屬腎水心脈溢關則水不勝火煎熬得骨痛非筋緊也醫餘同上瘖黃帝問曰人有重身九月而瘖此為何也岐伯對曰胞之絡脈絶也帝曰何以言之岐伯曰胞絡者繫於腎少隂之脈貫腎繫舌本故不能言帝曰治之奈何岐伯曰無治當十月復人臥血歸於肝人卧血歸于肝肝受血而能視足受血而能步掌受血而能握指受血而能攝血脈脈者血之腑脈實血實脈虛血虛笑歌狂疾開元中有名醫紀朋者觀人顔色談笑知病深淺不待診脈帝聞之召於掖庭中看一宫人每日昃則欲歌啼號若狂疾而足不能履地朋視之曰此必因食飽而大促力頓仆於地而然乃飲以雲母湯令熟寐覺而失所苦問之乃言因大華公主載誕宫中大陳歌吹某乃主謳懼其聲不能清且長喫豚蹄羹飽而當筵歌大曲曲罷覺胸中甚熱戲于砌臺上髙而墜下久而方蘇病狂足不能步也明皇雜録膈噎諸氣氣膈齊王中子諸嬰兒小子病召臣意診切其脈告曰氣膈病病使人煩悶食不下時嘔沫病得之少憂數忔食飲意即為之作下氣湯以飲之一日氣下二日能食三日即病愈所以知小子之病者診其脈心氣也濁躁而經也此絡陽病也脈法云脈來數疾去難而不一者病主在心周身熱脈盛者為重陽重陽者蕩音唐心主故煩悶食不終下則絡脈有過絡脈有過則血上出血上出者死此悲心所生也病得之憂也史記五膈古今論膈氣乃有五種謂憂膈恚膈氣膈寒膈熱膈也夫胸中氣結煩悶飲食不下羸瘦無力此乃憂膈心下實滿食不消化噫輒醋心大小便不利此名恚膈胸脅逆滿咽喉閉塞噫聞食臭此名氣膈心腹脹滿咳逆腸嗚食不生肌此名寒膈五心中熱口舌生瘡骨煩體重唇乾口燥背痛胸痺此名熱膈五噎諸氣婦人多有此疾此病不在外不在內不屬冷不屬熱不是實不是虛所以藥難取效此病緣憂思恚怒動氣傷神氣積于內氣動則諸證悉見氣靜疾候稍平手捫之而不得疾之所在目視之而不知色之所因耳聼之而不知音之所發故針灸服藥皆不獲效此乃神氣間病也頃京師一士人家有此證勸令靜觀內外將一切用心力事委之他人服藥方得見效若不如此恐卒不能安但依此戒兼之灼艾膏肓與四花穴及服此三藥可以必差孫真人云婦人嗜欲多於丈夫感病倍於男子加以慈戀愛憎疾妬憂恚染著堅牢情不自抑所以為病根深療之難差雞峯方同上五噎噎病亦有五種氣噎憂噎食噎勞噎思噎噎者乃噎塞不通心胸不利飲食不下也各隨其證而治之靛治噎疾廣五行記治噎疾永徽中綘州有僧病噎數年臨死遺言令破喉視之得一物似魚而有兩頭遍體悉是肉鱗置鉢中跳躍不止以諸味投鉢中須臾悉化為水時寺中方刈藍作靛試取少靛置鉢中此蟲繞鉢畏避須臾化為水世人以靛治噎疾良方粳治卒噎舂杵頭細粳治卒噎陶隱居云食卒噎不下刮取含之即去亦是舂搗義爾天下事理多有相影響如此也日華子云治卒噎煎湯呷本草病噎吐蛇華他行道見一人病噎嗜食而不得下家人車載欲往就醫他聞其呻吟駐車往視語之曰向來道傍有賣餅家蒜虀大酢從取三升飲之病自當差即如他言立吐蛇一條懸之車邊欲造他他尚未還他家小兒戲門前迎見自相謂曰客車邊有物必是逄我公也疾者前入見他壁北懸此蛇輩以十數御覽食飴主噎吳廷紹為太醫令烈祖因食飴喉中噎國醫皆莫能愈廷紹尚未知名獨謂當進楮實湯一服疾失去羣醫默識之他日取用皆不驗或扣之答曰噎因甘起故以楮實湯治之南唐書百病生於氣百病生於氣怒則氣上喜則氣緩悲則氣消恐則氣下寒則氣收炅則氣泄驚則氣亂勞則氣耗思則氣結九氣不同何病之生天地氣所主天地之數起於上而終於下歲半之前天氣主之歲半之後地氣主之上下交互氣交主之歲紀畢矣氣虛氣逆邪氣盛則實精氣奪則虛氣虛者肺虛也氣逆者足寒也非其時則生當其時則死餘臟皆如此有餘不足神有餘有不足氣有餘有不足血有餘有不足形有餘有不足志有餘有不足凡此十者其氣不等重虛脈虛氣虛尺虛是謂重虛寒熱厥陽氣衰於下則為寒厥隂氣衰於下則為熱厥氣候五日謂之候五候謂之氣六氣謂之時四時謂之歲六氣天氣通於肺地氣通於嗌風氣通於肝雷氣通於心谷氣通於脾雲氣通於腎腸胃為海九竅為水胃氣五臟之本五臟皆稟氣於胃胃者五臟之本臟氣不能自致於手太隂必因胃氣四時五行五臟五氣天有四時五行生長收藏以生寒暑燥濕風人有五臟化五氣以生喜怒憂悲恐故喜怒傷氣寒暑傷形暴怒傷隂暴喜傷陽旦暮平旦人氣生日中陽氣隆日西陽已虛氣門已閉是故暮而收拒無擾筋骨無犯霧露反此二時形乃困薄四時之氣更傷五臟春傷於風邪氣留連乃為洞泄木勝脾土故也夏傷於暑秋為瘧疾秋傷於濕上逆而咳發為痿厥冬傷於寒春必溫病四時之氣更傷五臟五臟所藏心藏神肺藏魄肝藏魂脾藏意腎藏志是為五臟所藏五臟所傷久視傷血久臥傷氣久坐傷肉久立傷骨久行傷筋是為五臟所傷五臟之脈肝脈弦心脈鈎脾脈代肺脈毛腎脈石是為五臟之脈五入酸入肝辛入肺苦入心鹹入腎甘入脾是為五入五惡心惡熱肺惡寒肝惡風脾惡濕腎惡燥是為五惡五液五臟化液心為汗肝為淚肺為涕脾為涎腎為唾是為五液五主心主脈肺主皮肝主筋脾主肉腎主骨是為五主五禁辛走氣氣病無多食辛鹹走血血病無多食鹹苦走骨骨病無多食苦甘走肉肉病無多食甘酸走筋筋病無多食酸是為五禁汗出飲食飽甚汗出於胃驚而奪精汗出於心持重逺行汗出於腎疾走恐懼汗出於肝搖體勞苦汗出於脾體有可己之疾孫思邈居太白山於惟步醫藥無不善盧照鄰有惡疾不可為而問曰髙醫愈疾奈何答曰天有四時五行寒暑迭居和為雨怒為風凝為霜雪張為虹霓天常數也人之四肢五臟一覺一寐吐納往來流為榮衛張為氣色發為音聲人常數也陽用其形隂用其精天人所同也失則蒸生熱痞生寒結為瘤贅陷為癰疽奔則喘乏竭則焦稿發乎面動乎形天地亦然五緯縮贏孛彗飛流其危沴也寒暑不時其蒸否也石立土甬是其贅瘤山崩土陷是其癰疽奔風暴雨是其喘乏川瀆竭涸是其焦稿髙醫導以藥石投以砭劑聖人和以至德輔以人事故體有可己之疾天有可救之災唐書消渴渴服八味丸千金云消渴病所忌者三一飲酒二房室三鹹食及麵能忌此雖不服藥亦自可消渴之人愈與未愈嘗須慮患大癰必於骨節間忽發癰疽而卒豫親見友人邵任道患渴數年果以癰疽而死唐祠部李郎中論消渴者腎虛所致每發則小便甜醫者多不知其疾故古今亦闕而不言洪範言稼穯作甘以物理推之淋餳醋酒作脯法須臾皆即能甜也足明人食之後滋味皆甜流在膀胱若腰腎氣盛是為真火上蒸脾胃變化飲食分流水榖從二隂出精氣入骨髓合榮衛行血脈榮養一身其次已為脂膏其次以為血肉也其餘則為小便故小便色黃血之餘也􅀈氣者五臟之氣鹹潤者則下味也腰腎既虛冷則不能蒸於榖氣則盡下為小便故味甘不變其色清冷則肌膚枯稿也猶如乳母榖氣上泄皆為乳汁消渴病者下泄為小便皆精氣不實於內則小便數溲溺也又肺為五臟華蓋若下有暖氣蒸則肺潤若下冷極則陽氣不能升故肺乾則渴易於否卦乾上坤下陽無隂而不降隂無陽而不升上下不交故成否也譬如釡中有水似火暖之其釜若以板覆則暖氣上騰故板能潤也若無火力水氣則不能上此板則終不能潤也火力者則是腰腎強盛也常須暖補腎氣飲食得火力則潤上而易消亦免乾渴也故張仲景云宜服腎氣八味丸此病與腳氣雖同為腎虛所致其腳氣始發於二三月盛於五六月衰於七八月凡消渴始發於七八月盛於十一月十二月衰於二三月其故何也夫腳氣壅疾也消渴宣疾也春夏陽氣上故壅疾發則宣疾愈秋冬陽氣下故宣疾發則壅疾愈也審此二者疾可理也猶如善為政者寬以濟猛猛以濟寬隨事制度耳仲景云足太陽者膀胱之經也膀胱者腎之腑小便數此為氣盛氣盛則消榖大便硬衰則為消渴也男子消渴飲一斗小便亦得一斗宜八味腎氣丸本事方又眉山有揭頴臣者長七尺健飲啖倜儻人也忽得消渴疾日飲水數斗食常倍而溺數消渴藥服之逾年疾日甚自度必死治棺衾屬其子詢於人蜀有良醫張肱隱之子不記其名為診脈笑曰君幾誤死矣取麝香當門子以酒濡之作十許丸取枳枸子為湯飲之遂愈問其故張生曰消渴消中皆脾衰而腎敗土不能勝水腎亦不上泝乃成此疾今診頴臣脾脈極巨脈熱而腎不衰當由果實與酒過度虛熱在脾故飲食兼人而多飲飲水既多不淂不多溺也非消渴也麝香能敗酒瓜果近輒不結而枳枸亦能勝酒屋外有此木屋中釀酒不熟以其木為屋其下亦不可釀酒故以二物為藥以去酒果之毒宋玉云枳枸來巢以其實如鳥乳故能來巢今俗訛謂之雞矩子亦謂之癩漢指頭蓋取其似也嚼之如牛乳小兒喜食之大全集又昔有仕宧患消渴醫者謂其不過三十日死棄官而歸半途遇一醫人令急遣人致北梨二擔食盡則差仕宧如其言得之才渴即食未及五六十枚而病止仲景治渴提點鑄錢朝奉郎黃沔久病渴極疲瘁豫每見必勸服八味丸初不甚信後纍醫不痊謾服數兩遂安或問渴而以八味丸治之何也對曰漢武帝渴張仲景為處此方蓋渴多是腎之真水不足致然若其勢未至於消但進此劑殊佳且藥性溫平無害也泊宅編浮石止渴交州記曰浮石體虛而輕煮飲止渴苦酒消渴卞蘭苦酒消渴時魏明帝信巫女用水方使人持水賜蘭蘭不肯飲詔問其意蘭言治病自當以方藥何信於此帝為變色而蘭終不服三國志熱中消中富貴人多飲數溺曰熱中多食數溺曰消中多喜曰癲多怒曰狂熱中消中皆富貴人也內經心腹痛心痛心藏神心者身之主也其正經為風邪所乘名真心痛旦發夕死夕發旦死心有包絡脈是心之别脈為風冷所乘亦令心痛然乍輕乍盛不至於死又手少隂心之經其氣逆謂之陽虛隂厥亦令心痛其痛引喉是也其心下急痛名脾心痛腹脹而心痛名胃心痛下重而苦泄寒中為腎心痛又有九種心痛一蟲二疰三風四悸五食六飲七冷八熱九去來此皆邪氣乘於手少隂之絡邪氣摶於正氣邪正相擊故令心痛診其心脈急者為痛引背食不下寸口脈沉緊苦心下寒時痛關上脈緊心下苦痛左手寸脈沉則為隂陽絶者無心脈也苦心下毒痛雞峯方腹痛有數種有人患腹痛其狀不一有風痛熱痛有冷痛有冷積痛有氣積痛有蟲痛有婦人經脈行而先腹痛有小兒瘡疹出而先腹痛者滿腹虛脹服暖藥無效者此風痛也宜服官局胃風湯火杴草丸如附子烏頭之類大便祕結小便赤而喜冷飲食者此熱痛也後生宜四順飲老人宜服大麻仁丸皆局方有塊起而腹痛者皆積也冷積則面無色瘦瘁脈沉伏宜於暖藥中用巴豆如官局積氣丸之類氣積多噫氣宜服嘉禾散調氣散五膈寬中散如茴香丁香木香沉香之類食積則多噫酸口出清水惡心宜服京三稜蓬莪术乾漆之類亦須兼巴豆至於腹中有塊起急以手按之便不見五更心嘈牙關嬌硬惡心而清水出及夢中囓齒此謂之蟲痛宜服官局化蟲丸如史君子之類又有室女婦人月經行先腹痛此特與諸痛不同只可服四物湯小兒身熱足冷耳及尻骨冷及眼澀者皆瘡疹候必先腹痛蓋疹子先自腸胃中出然後發於外宜服葛根升麻湯及綿煎散之類舒王解痛字云宜通而塞則為痛此極有理凡痛須通利臟腑乃能隨其冷熱而須用巴豆大黃牽牛此最要法醫餘大㵼腹痛有人每日早起須大㵼二行或時腹痛或不痛空心服熱藥亦無效後有智者察之令於晚食前更進熱藥遂安如此常服竟無恙蓋暖藥雖平旦空腹至晚藥力已過一夜隂氣何以敵之於晚間再進熱藥則一夜暖藥在腹遂可以勝隂氣凡治冷疾皆如此暑月破腹一曰傷暑二曰傷冷物食瓜果飲水之類三曰夏季心火旺心經熱則小水不利行大腸謂之水榖不分傷暑而㵼者心躁頭痛作渴宜服香薷飲烏金散傷冷物而㵼者腹痛水㵼榖食不化宜服暖藥如附子及理中丸二氣丹正元丹紫蘇丸之類水榖不分者宜服大順散五苓散二藥専分清濁暑月多此疾故人多用之凡㵼不可急以熱藥止之恐成痢同上小腹切痛治腎氣小腹切痛元豐中丞相王邭公小腹痛不止宣差太醫攻治偹至皆不效凡藥至熱如附子硫黃五夜義丸之類用之亦不差駙馬張都尉令取婦人油頭髮燒如灰細研篩過溫酒調二錢即時痛止良方真心痛頭心之病有厥痛有真痛手三陽之脈受風寒則名厥頭痛入連在腦者名真頭痛其五臟氣相干名厥心痛其痛甚但在心手足青者名真心痛其真心痛者旦發夕死夕發旦死脾疼張思順盛夏調官都城苦熱食冰雪過多又飲木瓜漿積冷于中遂感脾疼之疾藥不釋口殊無退證纍歲日齋一道人適一道人曰我受官人供固非所惜但取漢椒二十一粒浸於漿水碗中一宿漉出還以漿水吞之若是而已張如所戒明日椒才下腹即脫然更不復作類編冰煎理中丸泗州楊吉老名醫也徽廟常苦脾疾國醫進藥俱不效遂召吉老診視訖進藥徽廟問何藥吉老對以大理中丸上云朕服之屢矣不驗吉老曰臣所進湯使不同陛下之疾以得冰太過得之今臣以冰煎此藥欲已受病之源果一二服而愈心痛食地黃麵崔元亮海上方治一切心痛無問久新以生地黃一味隨人所食多少搗取汁搜麵作餺飥或作冷淘良久當利出蟲長一尺許頭似壁宫後不復患劉禹錫傳信方貞元十年通事舍人崔抗女患心痛氣垂絶遂作地黃冷淘食之便吐一物可方一寸以來如蝦蟇狀無目足等微似有口蓋為此物所食自此頓愈麵中忌用鹽本事方膀胱氣痛歙縣尉宋茍甫膀胱氣作痛不可忍醫者以剛劑與之痛愈甚溲溺不通三日許學士視其脈曰投熱藥太過適有五花散一兩分為三易其名用連鬚蔥一莖茴香及鹽少許水一盞半煎七分連服之中夜下小便如墨汁一二升臍下寬得睡明日脈已平續用碙砂丸數日愈蓋是疾本因虛得不宜驟進補藥邪之所湊其氣必虛留而不去其病則實故先滌所蓄之邪然後補之本事方砂石淋鄞縣尉耿夢得妻苦砂石淋十三年每溺時器中剝剝有聲痛楚不堪説命採苦杖根俗呼為杜牛膝者淨洗碎之凡一合用水五盞煎耗其四而留其一去滓以麝乳香末少許研調服之一夕愈同上頭垢治淋頭垢主淋閉不通又主噎亦治勞復本草諸瘧瘧名不同病者發寒熱一歲之間長幼相若或染時行變成寒熱名曰疫瘧寒熱日作夢寐不祥多生恐怖名曰鬼瘧宜用禁避厭禳之乍寒乍熱乍有乍無南方多此名曰疸瘧寒熱善飢而不能食食已肢滿腹急㽱痛病以日作名曰胃瘧六腑無瘧唯胃有者蓋飲食肌飽所傷胃氣而成世謂之食瘧飲食不節變成此證有經年不差差後復發逺行久立下至微勞力皆不任名曰勞瘧亦有數年不差百藥不斷結為癥癖在腹脅名曰老瘧亦名母瘧又説文曰瘧寒熱並作也痁熱瘧也疾二日一發又凡人患瘧疾皆因傷暑治之之法當用暑藥素問瘧論有三隂三陽辨其證候各隨經而刺之寒多者用溫藥熱多者用涼藥不易之法也有積者必腹痛當用巴豆藥去其積有熱者當用小柴胡湯有寒者當用朱砂硫黃大蒜之類然瘧疾住後不可服補藥補之必再作驢軸治瘧療瘧無久新發無期者驢尾下軸垢水洗取汁和麵如彈丸二枚作燒餅瘧未發前食一枚至發後食一枚庚志痁疾毛崈甫事母葉夫人極孝葉年六十一歲病痁旬餘憂甚每夕禱于北辰拜且泣妹立母側恍惚間有告者曰何不服五苓散持一帖付之啓視皆紅色妹曰尋常此藥不如是安可服俄若夢覺以語兄兩醫云此病蓋藴熱所致當加朱砂於五苓散以應神言才服罷痁不復作又有宗室以恩添差通判常州郡守不甚加禮遂苦痁疾久而弗愈族人士蘧為鈐轄素善醫往問正聚語痁作而顛撼掖不醒盡室駭懼蘧云無傷也是中心抑鬱隂陽交戰至于隕厥正四將軍飲子證也先令灼艾灸至四百壯了無蘇意於是急製藥以一大附子炮去皮臍四分之訶子四箇炮去核陳皮四箇全者洗淨不去白甘草四兩炙各自切碎為四服用水二盞薑棗各七煎去五之三藥成持飲病者初一杯灌之不納至再稍若吞咽三則倏起坐四服盡頓愈更不復作一時救急如此凡病痁臨發日逐杯併服無不神效類編瘧疾瘧之病候經綸載之詳矣先寒後熱名曰寒瘧先熱後寒名曰溫瘧但熱無寒名曰疸瘧但寒無熱名曰牝瘧是皆發作有時若邪氣中於風府則間日而作邪氣客於頭項則頻日而作氣有虛實邪中異所故有早晚之異然經止論寒溫疸瘧所受之因而不及牝瘧又論溫瘧疸瘧所舍之藏而不及寒瘧意有互見發明處學者究隂陽之盛衰深思以得之大抵風者陽氣也寒者隂氣也先傷於風後傷於寒即先熱後寒先傷於寒後傷於風即先寒後熱隂氣先絶陽氣獨發則但熱無寒陽氣先絶隂氣獨發則但寒無熱以溫瘧得之於冬邪氣藏於骨髓則知寒瘧乃得之於夏邪氣客於皮膚腠理之間矣以疸瘧之氣實而不泄且不及於隂則知牝瘧乃氣虛而泄且不及於陽矣是皆不出於隂陽上下交爭虛實更作也又有挾諸溪毒嵐瘴鬼邪之氣亦寒熱羸瘦延引歲月休作有時久不已變成勞瘧或結為癥瘕者名曰瘧母至於五臟三陽三隂瘧者皆因臟氣偏虛故邪氣乘而舍之其治法合隨其經絡灸刺及所用藥各不同後學宜細詳之類編同上病有不可補者病有不可補者一曰瘧疾二曰狂疾三曰水氣四曰腳氣此四疾治得稍愈切不可服暖藥以峻補之如平平補藥亦須於本病上有益乃可醫餘癥瘕癥瘕癥瘕之狀雖同而不動者為癥其治有法而可推移者名瘕又病輕於癥瘕不動者必死之候其發語聲嘶挹言語而不出此人食結在腹其病寒口中常有水出四肢灑又如瘧飲食不能鬱而又痛此食瘕也遺積瘕齊中尉潘滿如病小腹痛臣意診其脈曰遺積瘕也臣意即謂齊太僕臣饒內史臣繇曰中尉不復自止於內則三十日死後二十餘日溲血死病得之酒且內所以知潘滿如病者臣意切其脈深小弱其卒然合合也是脾氣也右脈氣口至緊小見瘕氣也以次相乘故三十日死三隂俱摶者如法不俱摶者決在急期一摶一代者逆也故其三隂摶溲血如前止史記蟯瘕臨災女子薄吾病甚衆醫皆以為寒熱篤當死臣意診其脈曰蟯大為病腹大上膚黃粗循之戚戚然臣意飲以芫花一撮即出蟯可數升病已三十日如故蟯得之於寒濕寒濕氣鬱篤不發化為蟲臣意所以知薄吾病者切其脈循尺其尺索刺粗而毛美奉髮是蟲氣也其色澤者中藏無邪氣及重病史記蛇瘕隋有患者嘗飢而吞食則下至胸便即吐出醫作噎食膈氣翻胃三候治之無驗有老醫任度視之曰非此三疾蓋因食蛇肉不消而致斯病但揣心腹上有蛇形也病者曰素有大風嘗求蛇肉食風稍愈復患此疾遂以􅉭硝大黃合而治之微泄利則愈醫皆記其驗而知蛇瘕也米瘕乾德中江浙間有慎道恭者肌瘦如勞唯好食米闕之則口中清水出情似憂思食米頓便如常衆醫不辨後遇蜀僧道廣處方以雞屎及白米各半合共炒為末以水一鍾頓調服良久病者吐出如米形遂差病源謂米瘕是也髮瘕徐文伯字德秀篤好醫術宋明帝宫人患腰痛牽心發則氣絶衆醫以為肉瘕文伯視之曰此髮瘕也以油灌之即吐物如髮稍長引之長三尺頭已成蛇又能搖動懸柱上水瀝盡唯餘一髮而已遂愈名醫録同上斛二瘕續搜神記有人能飲茗至一斛二斗忽飲過量數升吐出一物如牛肺以茗澆之容一斛二斗因名曰斛二瘕封演見聞録食髮致疾唐書曰甄權弟立言善醫時有尼明律年六十餘患心腹膨脹身體羸瘦已經二年立言診其脈曰腹內有蟲當是誤食髮為之耳因令服雄黃須臾吐一蛇如人手小指唯無眼燒之猶有髮氣其疾乃愈瘕異苑曰章安有人元嘉中噉鴨肉乃成瘕病胸滿靣赤不得飲食醫令服秫米須臾煩悶吐一鴨雛身喙翅皆已成就唯左腳故綴昔所食肉病遂獲差志怪曰有人得瘕病腹晝夜切痛臨終敇其子曰吾氣絶後可剖視之其子不忍違言剖之得一銅酒鎗容數合許華他聞其病而解之便出巾櫛中藥以投鎗又即消成酒焉太平御覽同上龞癥景成弟長子拱年七歲時脅間忽生腫毒隱隱見皮裏一物頗肖鱉形微覺動其轉掣痛不堪忍德興古城村有外醫曰洪豆腐見之使買鮮蝦為羮以食咸疑以為瘡毒所忌之味醫竟令食之下腹未久痛即止喜曰此真鱉癥也吾求其所好以嘗試之爾乃合一藥如療脾胃者而碾附子末二錢投之數服而消明年病復作但如前補治遂絶根本類編鱉瘕鱉瘕者謂腹中瘕結如鱉狀是也有食鱉觸冷不消而生者亦有食諸雜肉得冷變化而成者皆由脾胃氣虛弱而遇冷則不能尅消所致瘕言假也謂其有形假而推移也昔曾有人共奴俱患鱉瘕奴在前死遂破其腹得一白鱉仍故活有人乘白馬來看鱉白馬遂尿隨落鱉上即縮頭及尋以馬尿灌之即化為水其主曰吾將差矣即服之果如其言得差巢氏病源痃癖夫痃癖之病大同而小異痃者近臍左右成條大者如臂次者如弦之狀癖在兩肋之間有時而痛此皆由隂陽不和經絡痞膈飲食停滯不得宣流邪冷之氣摶結而成也雞峯方京三稜治癥瘕昔人患癥瘕死遺言令開腹取之得病塊乾硬如石文理有五色人謂異物竊取削成刀柄後因以刀刈三稜柄消成水乃知此可療癥瘕也本草諸蟲應聲蟲永州通判􅈦軍員毛景得竒疾每語喉中必有物作聲相應有道人教令學誦本草藥名至藍而默然遂取藍捩汁而飲之少頃吐出肉塊長二寸餘人形悉具劉襄子思為永倅景正被疾踰年親見其愈泊宅編又陳正敏遁齋間覽載楊勔中年得異疾每發言應答腹中有小聲效之數年間其聲寖大有道士見而驚曰此應聲蟲也久不治延及妻子宜讀本草遇蟲不應者當取服之勔如言讀至雷丸蟲忽無聲乃頓服數粒遂愈正敏其後至長沙遇一丐者亦有是疾環而觀之甚衆因教便服雷丸丐者謝曰某貧無他技所以求衣食於人者唯藉此爾以上皆陳所記豫讀唐張鷟朝野僉載云洛州有士人患應聲語即喉中應之以問良醫張文仲張經夜思之乃得一法即取本草令讀之皆應至其所畏即不言仲乃録取藥合和為丸服之應時而止乃知古有是事百衲居士鐵圍山叢話蛔蟲蛔蟲九蟲之數人腹中皆有之小兒失乳而哺早或食甜過多胃虛蟲動令人腹痛惡心口吐清水腹上有青筋火煨史君子與食以殼煎湯送下甚妙然世人多於臨臥服之又無日分多不驗唯是于月初四五間五更服之至日午前蟲盡下可以和胃溫平藥一兩日調理之不可多也凡蟲在人腹中月上旬頭向上中旬橫之下旬頭向下故中下旬用藥即不入蟲口所以不驗也牛馬之生子上旬生者行在母前中旬生者並肩而行下旬生者後隨之貓之食鼠亦然上旬食上段中旬吃中段下旬下段自然之理物皆由之而莫知之醫餘五臟之蟲心蟲曰蛔脾蟲寸白腎蟲如寸截絲縷肝蟲如爛杏肺蟲如蠶皆能殺人惟肺蟲為急肺蟲居肺葉之內蝕人肺系故成瘵疾咯血聲嘶藥所不到治之為難有人説道藏中載諸蟲皆頭向下唯自初一至初五以前頭上行故用藥者多取月朏以前蓋此也如療寸白用良方錫沙蕪荑檳榔者極佳五更服蟲盡下白粥將息藥用石榴根濃汁半升下散三錢丸五枚本事方九蟲之狀九蟲者一曰伏蟲長四分為羣蟲之長二曰白蟲長一寸相生至多其母長至四五寸則殺人三曰肉蟲狀如爛杏令人煩滿四曰肺蟲其狀如蠶令人咳五曰胃蟲狀如蝦蟇令人吐逆嘔噦六曰弱蟲狀如瓜瓣令人多唾七曰赤蟲狀如生肉令人腸鳴八曰蟯蟲至微細狀如菜葉居洞腸間多則為痔漏癰疽諸瘡無所不為九曰蛔蟲長一尺貫心則殺人又有尸蟲與人俱生狀如犬馬尾或如薄筋依脾而居長三寸許大害於人然多因臟寒勞熱而生諸蟲入耳蟲之類能入耳者不獨蜒蚰如壁虱螢火叩頭蟲皂角蟲皆能為害有人患腦痛為蟲所食或教以桃葉為枕一夕蟲自鼻出形如鷹嘴人莫識其名有人蜒蚰入耳遇其極時以頭撞柱至血流不知云癢甚不可忍蜒蚰入耳往往食髓至盡又能滋生凡蟲入耳用生油灌妙遁齋間覽誤吞水蛭吳少師在關外嘗得疾數月間肌肉消瘦每日飲食下咽少時腹如萬蟲攢攻且癢且痛皆以為勞瘵也張鋭是時在成都吳遣驛騎招致鋭到興元既切脈云明日早且忍飢勿啖一物俟鋭來為之計旦而天方劇暑白請選一健卒趨往十里外取行路黃土一銀盂而令厨人旋治麵將午乃得食才放筯取土適至於是溫酒一升投土攪其內出藥百粒進於吳飲之覺腸胃掣痛幾不能忍急登溷鋭密使别坎一穴便掖吳以行須臾暴下如傾穢惡斗許有馬蝗千餘宛轉盤結其半已困死吳亦􅉵甚扶憩竹榻上移時方餐粥一器三日而平始信去年正以夏夜出師中塗渴躁命候兵持馬盂挹澗水甫入口似有物焉未暇吐之則徑入喉矣自此遂得病鋭曰蟲入人肝脾裏勢須滋生常日遇食時則聚丹田間吮咂精血飽則散處四肢茍惟知殺而不掃盡故無益也鋭以是請公枵腹以誘之此蟲喜酒又久不得上味乘飢畢集故一藥能洗空之耳吳大喜厚賂以金帛送之歸庚志又寧國衛承務者唯一子忽得疾羸瘦如削醫以為瘵疾治療無益醫劉大用問其致疾之因曰嘗以六月飲娼家醉臥卓上醒渴求水不得前有菖蒲盆水清潔舉而飲之自是疾作劉默喜密遣僕掘田間淤泥以水沃濯取清汁兩碗置几上令隨意飲衛子素厭疾苦不以穢為嫌一飲而盡俄腸胃間攻轉攪刺久之始定續投以宣藥百粒隨即同泄下水蛭六十餘條便覺襟抱豁然劉曰此蓋盆中所誤吞也蛭入人腹藉膏血滋養蕃育種類每粘著五臟牢不可脫然久去汙渠思其所嗜非以此物致之不能集也然尫羸别以藥調補類編又有人因醉薄暮渴飲道傍田水自此忽患胸腹脹滿遍醫不效人亦莫識其病因幹宿客邸夜半思水飲令僕覔之僕夜捫索見有缸數隻疑店主以此貯水遂取一碗與其主飲便覺胸次豁然再索之忽覺臟腑急於店仄空地大㵼一二行平明視之所㵼乃水蛭無數繼看夜來所飲缸水乃主人刈藍作靛者其病頓愈方思前時渴飲田水不覺誤吞水蛭在腹遂成脹痛之疾乃蛭為害今人耘田為此蟲所齧以靛塗之無不愈也苦寸白蟲趙子山字景髙寓居邵武軍天王寺苦寸白蟲為撓醫者戒云是疾當止酒而以素所耽嗜欲罷不能一宿醉於外舍歸已夜半口乾咽燥倉卒無措飲適廊廡間有甕水月色下照瑩然可掬即酌而飲之其甘如飴連盡數酌乃就寢逮曉蟲出盈席覺心腹頓寬宿疾遂愈一家皆驚異驗其所由蓋寺僕曰織草履浸紅藤根水也庚志又掘石榴東引根皮洗曝搗細不兼他味隔宿虛其腹凌晨溫酒調服妙又蔡定夫戡之子康積苦寸白為孽醫者使之碾檳榔細末取石榴東引根煎湯調服之先炙肥豬肉一大臠置口中咽咀其津膏而勿食云此蟲惟月三日以前頭向上可用藥攻打餘日即頭向下縱有藥皆無益蟲聞肉香咂啖之意故空羣爭赴之覺胸中如萬箭攢攻是其候也然後飲前藥蔡悉如其戒不兩刻腹中雷鳴急登厠蟲下如傾命僕以杖挑撥皆聯綿成串幾長數丈尚蠕蠕能動舉而拋於溪流宿患頓愈姑廣其傳以濟後人庚志誤吞蜈蚣有村店婦人因用火筒吹火不知筒內有蜈蚣藏焉用以吹火蜈蚣驚迸竄入喉中不覺下胸臆婦人求救人無措手適有人在傍云可討小豬一箇切斷喉取血令婦人頓吃之須臾以生油一口灌婦人遂惡心其蜈蚣滚在血中吐出繼以雄黃細研水調服之遂愈蜒蚰及百蟲入耳蜒蚰入耳取驢乳灌耳中當消成水百蟲入耳以桃葉火尉之卷而塞耳中立出本草尸蟲桞子厚罵尸蟲文云人有三尸蟲處之腹中伺隱微失誤輒籍記日庚申幸其人之昏睡出讒於帝以求饗以是人多謪過疾癘夭死而醫經亦云能與鬼靈相通常接引外邪為害其發作之狀或沉沉默默不的知其所苦而無處不惡或腹痛脹急或螺塊踊起或孿引腰脊或精神雜錯變證多端其病大同而小異雞峯方酒蟲齊州士曹席進孑焉正招所親張彬秀才為館舍彬嗜酒每夜必置酒數升於牀隅一夕忘設焉夜半大渴求之不可得忿悶呼躁俄頃嘔吐一物於地旦起視之見牀下塊肉如肝而黃上如蜂窠猶微動取酒沃之唧唧有聲始悟平生酒病根本亟投諸火中後遂不飲丁志醫説卷五
