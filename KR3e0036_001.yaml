body:
  text: 醫説卷一宋張杲撰三皇厯代名醫太昊宓犧氏宓犧氏以木德王風姓也一曰庖犧氏亦曰太昊蛇首人身生有聖德母號華胥都於陳作瑟有三十六絃其理天下也仰則觀象於天俯則觀法於地鳥獸之文與地之宜近取諸身逺取諸物於是造書契以代結繩之政畫八卦以通神明之德以類萬物之情所以六氣六腑五臟五行隂陽水火升降得以有象百病之理得以類推炎黃因斯乃嘗百藥而制九針以拯夭枉矣出帝王世紀炎帝神農氏炎帝神農氏長於薑水因而姓薑人身牛首生有聖德始教天下耕種五穀而食之以省殺生之弊嘗味草木宣藥療疾以救夭傷之命百姓日用而不知著本草四卷至梁陶𢎞景以名醫别録加之為七卷逮於我唐統極英國公李績許孝崇許敬宗等奉詔更復採托去陶氏之乖違辨俗用之紕紊新修為二十卷於今行焉出帝王世紀及本草論序黃帝黃帝有熊氏少典之子姫姓也長於姫水龍顔有聖德生而能言役使百靈可謂天授自然之體也猶不能坐而得道故以地黃元年正月甲子將遊名山以求神仙時方明力牧從焉東到青丘見紫府先生受三皇天文以效萬神至具茨而見大隗君而受神芝圖至蓋上見中皇真人受九茄散方至羅霍見黃蓋童子受金銀方十九首適崆洞而問廣成子受以自然經造峨眉山並會地黃君受以真一經入金谷問導飬而質玄素二女著體診則問對雷公岐伯伯高少俞之論備論經脈傍通問難以為經教制九針著內外術經十八卷陟王屋山玉闕之下清齊三日乃登於玉闕之上入瓊琳臺於金杌之上得玄女九鼎神丹飛香爐火之道乃於茅山採禹餘糧烹之得銅遂還荆山之下鼎湖之上參爐定藥虎豹萬羣為之視火九鼎神丹成有黃龍下迎黃帝上升羣臣後宫從上者七十餘人其小臣不得上乃悉持龍髯拔墮帝弓萬姓仰望帝既上升乃抱其弓與髯而號故後世因名其處為鼎湖其弓名鳥號出帝王世紀太清皇帝九鼎丹經巫彭巫彭初作醫周官曰五穀五藥飬其病五氣五聲五色視其生觀之以九竅之變參之以五臟之動遂有五毒攻之以五藥療之以五氣飬之以五味節之以祛百病出史記及周書巫咸巫咸堯臣也以鴻術為帝堯醫又出世本曰巫咸初作筮出郭璞巫咸山序及世本岐伯岐伯黃帝臣也帝使岐伯嘗味草木典主醫疾經方本草素問之書咸出焉出帝王世紀俞跗俞跗者黃帝臣也善醫術所治病不以湯液醪醴鑱石嬌引案杭毒尉一撥見病之應因五臟之輸乃割皮解肌訣脈結筋搦髓腦楪荒爪幕湔浣腸胃漱滌五臟鍊精易形以去百病焉史記桐君桐君者黃帝時臣也撰藥封四卷及採藥録説其花葉形色論其君臣佐使相須至今傳焉出本草經序論雷公雷公者黃帝時臣也善醫術黃帝燕坐召雷公而問之汝受術誦書者若能覽觀雜學别異比類通合道理務明之可以十全若不能知為世所怨又曰子知醫之道乎誦而頗能解解而未能别别而未能明明而未能彰足以治羣僚不足以治侯王雷公避席再拜曰臣年幼小矇愚以惑不聞臣受業傳之以教請誦脈經上下篇衆多矣至於别異此類由未能以十全又安足以明之云素問伯高少俞伯髙少俞並黃帝時臣未詳其姓輔佐黃帝詳論脈經對揚問難經究盡義理以為經論故人到於今賴之素問馬師皇馬師皇者黃帝時獸醫也善知馬形氣生死之診治之輒愈後有龍下向之垂耳張口師皇曰此龍有病我能已之也乃針其唇及口中以甘草湯飲之而愈又數數有龍出其陂造而治之一旦龍負之而去不知所之也列仙傳秦長桑君長桑君者六國時人不知何許人也時人莫有識者扁鵲少時為人舍長舍客長桑君過扁鵲心自竒異之常謹以禮遇長桑君亦知扁鵲非常人也乃悉取其禁方書盡與扁鵲出史記醫緩醫緩者春秋時秦人也未詳其姓晉景公病求醫於秦伯伯使醫緩治之未至公夢二竪子相謂曰彼良醫也懼傷我焉將逃之其一曰我居肓之上汝居膏之下若我何緩至謂公曰疾不可為也在肓之上膏之下攻之不可達之不及達謂針也藥不至焉不可為也公曰良醫也厚禮而歸之出左傳醫和醫和者春秋時秦國人未詳其姓晉侯有病求醫於秦伯伯使醫和視之曰疾不可為也是謂近女室疾蠱非鬼非食惑以喪志喪志為惑女色良臣將死天命不祐趙孟曰良醫也厚其禮而歸之並春秋左氏傳文摯文摯者春秋時宋國良醫也洞明醫道亦兼異術龍叔子謂之曰子之術微矣吾有疾子能已之乎文摯則命龍叔背明而立文摯從後向明而熟視之曰嘻吾見子之心矣方寸之地虛矣幾聖人也子心六孔流通一孔不達今聖智為疾惑由此乎治之遂愈醫竘醫竘者秦之良醫也莫知其姓張子背腫命竘治之張子謂之曰非吾背也任子治焉治之遂愈夫身之與國而猶此也必有所委然後治之出尹子鳯綱鳯綱者漢陽人也常採百草花水漬之甕盛封泥自正月始迄九月末又取甕埋之百日煎丸之卒死者以此藥內口中水下之皆生服綱藥者非但疾瘥數百歲不死沒入地肺山仙去也出神仙傳矯氏俞氏盧氏矯氏俞氏盧氏並周之良醫也出列子及初學記扁鵲扁鵲者渤海鄭人也徐廣曰鄭當為鄚縣名今屬河間姓秦名越人至今天下言脈者由扁鵲也出史記子豹子豹者秦越人弟子虢太子死扁鵲乃使弟子子陽厲針砥石以取三陽五會有間太子蘇扁鵲乃使子豹為五分之尉以八減之齊和煮之以尉兩脅下太子遂能起坐焉出史記李諡李醯為秦太醫令自知伎不如扁鵲遂密使人刺殺之出史記崔文子崔文子者秦時太山人也志好黃老事居潛山下後作黃散赤丸藥賣之都市自言年三百餘歲後有疫氣人死者萬萬計長史請文子救之文子擁朱旙繫黃散以巡人間飲散服丸即愈所活者以萬計其後去之蜀賣藥故世人云崔文子赤丸黃散近於神也出列仙傳安期先生安期先生者琅琊鄉人也賣藥海邊時人謂之千歲公李少君太山採藥病困殆死遇安期安期與之神樓散服一錢匕遂愈秦始皇聞之召見與語三日三夜賜金璧數千萬出於阜鄉亭皆置之而去出列仙傳樓護漢樓護字君卿齊人也父為醫護少誦經方本草祕方十萬言長老咸敬重之共謂之曰以吾子之才何不宦學乎由是辭其父學經為京兆令甚有名譽漢書公孫光公孫光齊淄川唐里人也好醫術為當時所重初淳于意就光家求學光悉以教之曰所授妙方子無以教人意曰得禁方實幸甚死不敢妄傳光曰爾後必為國工吾方盡矣臨淄陽慶其方甚竒異吾不如之可謹事之必得其方意遂辭光而事慶焉出史記陽慶陽慶山東齊人也傳黃帝扁鵲之脈書診病知人死生太倉公太倉公者齊太倉長臨淄人也姓淳于氏名意少而喜醫方術髙后八年得見師臨淄元理公乘陽慶慶有古先道遺傳黃帝扁鵲之書五色診病知人生死決嫌疑定可治及藥論書甚精悉受其禁方秦信秦信者不知何許人也少明敏有度量好經方本草及黃帝扁鵲之脈書為當代良醫王遂王遂不知何郡人少習經方工於理療以藝業精博為齊王侍醫宋邑宋邑者臨淄人也率性愛人志尚醫術就齊太倉公長淳于意學五診脈論之術為當世良醫並史記馮信馮信齊臨淄人也為齊太倉長性好醫方精於診處而臨淄王猶以其識見未深更令就淳于意學方意教以按法逆順論藥法定五味及和劑湯法信受之擅名於漢出史記髙期髙期不知何許人也入仕為濟北王太醫王以期術藝未精遣就倉公淳于意學經脈髙下及竒絡結當論俞所居及氣當上下出入邪正逆順以宜定鑱石刺灸之法歲餘亦頗通之乃以此知名王禹王禹不知何郡人以藝術為濟北王太醫以識見未精就倉公意學數歲悉通之以此知名漢代唐安唐安齊臨淄人也言貌謙恭風儀溫雅性好醫術就倉公學意教以五診上下經脈竒咳四時應隂陽之法乃為齊醫杜信杜信不知何郡人也性度溫恭謙柔好學知自身之病乃悉心學醫自欲扶危持顛兼以安人濟衆遂詣倉公求學情理甚懇意憐之教以上下經脈五診之法二歲餘亦以知名漢代並史記玄俗玄俗者莫知其姓字也自言河間人恆食巴豆雲母賣藥於都市為人治病河間王買藥服之下蛇十餘頭王問其病源俗云王病乃六世餘殃非王所知也緣王常放乳鹿仁感天心故遭俗耳王欲以女妻之俗夜亡去不知所之後有人見於常山之下焉列仙傳張機後漢張機字仲景南陽人也受術於同郡張伯祖善於治療尤精經方舉以孝亷官至長沙太守後在京師為名醫於當時為上手時人以為扁鵲倉公無以加之也出何顒别傳及甲乙經仲景方論序郭玉郭玉太醫丞廣漢人也和帝試玉之診使嬖臣美手者與宫人雜處帷中令玉診之玉曰左陽右隂非一女之脈也帝甚竒之後漢書程髙程髙廣漢人也性好經方問道無倦有一藝長於已者必千里伏膺聞涪翁善醫術及針經診脈尋求積年竟乃得之擅名當代為太醫丞後漢書涪翁涪翁者不知姓名釣於涪水因號涪翁精於醫術所治病不限貴賤皆摩踵救之而不求其報甚為當代所重後漢書沈建沈建丹陽人也父為長吏而建獨好道不肯仕宦學導引服食之術延年却老之法又能治病病無輕重建治輒愈建斷穀不食輕舉飛行或去或來如此三百餘年乃絶迹不知所之出神仙傳張伯祖張伯祖南陽人也志性沈簡篤好方術診處精審療皆十全為當時所重同郡張仲景異而師之因有大譽出張仲景方序論杜度杜度不知何許人也仲景弟子識見宏敏器宇沖深淡於驕矜尚於救濟事仲景多獲禁方遂為名醫出仲景方衛沈衛沈不知何郡人也仲景弟子知書疏有小才撰四逆三部厥經及婦人胎臟經小兒顱𩕄經方三卷皆其所制知名當代出仲景方華他華他字元化沛國譙人也洞曉醫方兼善養性之術年百餘嵗而貌有壯容時人謂之仙魏志列傳李當之李當之者不知何許人也華他弟子少通醫經尤精藥術出梁七録吳普吳普廣陵人也為華他弟子以藝術知名性恬淡善醫方年九十餘而耳目聰明牙齒完堅知名當代梁七録樊阿樊阿彭城人受術於華他遂為名醫出張湛養生論華他别論封君達青牛道士封君達隴西人也服黃連五十餘年又入鳥鼠山服汞百餘嵗後還鄉里視之如年三十者常騎青牛聞有疾病殆死者無論識與不識以藥治之應手而愈後入玄丘山仙去出神仙傳及博物志韓康韓康字伯休京兆灞陵人常採藥於名山賣於長安市口不二價三十餘年時有女子從康買藥守價不移女子曰公是韓伯休即乃不二價康嘆曰我本避名女子皆知有我何用藥為遁入灞陵山中莫知所之出高士傳董奉董奉字君異侯官人也為人治病病愈令種杏五株輕者一株數年之間杏有十萬杏熟以榖一器易一器杏以所得榖賑濟貧乏奉在人間近二百年顔貌若三十許一旦舉手指天竦身入雲出葛洪神仙傳負局先生負局先生吳人也莫知其姓名負石磨鏡人有疾苦即出紫丸赤丸與服無不差後大疫家至户到與藥活數萬餘人不取錢去時語人曰吾欲還蓬萊山為汝曹下神水崖頭一旦有水色白從石間流下服多愈疾出列仙傳李撰李撰字欽仲梓童涪人也通五經諸子無不該覽博好醫方為庶子遷僕射中散大夫後在官卒蜀志李子豫李子豫晉時不知何郡人也少善醫方當代稱其通靈許永為豫州刺史其弟患心腹堅痛十餘年殆死忽自夜聞屏風後有鬼謂腹中鬼曰何不促殺之不然李子豫當從此過以赤丸打殺汝汝其死矣腹中鬼對曰吾不畏之於是許永使人候子豫子豫果來未入門病者自聞腹中呻吟聲及子豫入視曰鬼病也遂於其箱出八毒赤丸與服須臾腹中雷鳴膨轉大利數行遂差今八毒丸方是也出續搜神記張苗張苗不知何郡人雅好醫術善消息診處為時所重出晉書王叔和王叔和高平人也博好經方尤精診處洞識攝養之道深曉療病之源採托羣論撰成脈經十卷篇次張仲景方論為三十六卷大行於世出張湛養生方趙泉趙泉不知何許人性好醫方拯救無倦善療衆疾於瘧尤工為時嘆服出晉書葛洪葛洪字稚川丹陽句容人也廣覽衆書及諸史百家之言下至短雜文章近得萬卷自號抱朴子善養性之術明拯救之法撰經效諸藥方三卷名曰肘後出晉中興書皇甫謐皇甫謐字士安幼名靜安定朝郡人也沈靜寡欲始有高尚之志以著述為務自得風痺疾因而學醫習覽經方手不輟卷遂盡其妙裴顗裴顗字逸之河東人也多學術善醫經診處通明方藥精富於時名醫碩學咸皆嘆伏官至尚書左僕射並晉書劉德劉德彭城人也少以醫方自達長以才術知名當朝縉紳伏膺附響工治衆疾於虛勞不足尤見精通療之隨手而愈由是承流向風千里而來者多矣官至太醫校尉史脫史脫不知何郡人器性沈毅志行敦簡善診候明消息多辨論以醫精專拯療工竒拜太醫校尉治黃疸最為高手宫泰宫泰不知何郡人幼而岐嶷長而聰敏靜好墳典雅尚方術有一藝長於已者必千里尋之善診諸疾療上氣尤異制三物散方治喘嗽上氣甚有異效世所貴焉靳邵靳邵不知何許人也性明敏有才術本草經方誦覽無不通究裁方治療意出衆見創置五石散礜石散方晉朝士大夫無不服餌獲異效焉阮侃阮侃字德如陳留尉氏人也幼而聰惠長而好學性沉靜有大度以秀才為郎遊心方技無不通會於本草經方療治之法尤所耽尚官至河內太守以上出晉書張華張華字茂先范陽方城人也學業優博辭藻溫麗精於經方本草診論工竒理療多效出晉書及徐廣晉紀蔡謨蔡謨字道明不知何許人也素以儒道自達治涖知名性有道風耽尚醫術嘗覽本草經方手不釋卷及授揚州刺史將之任渡江食蟹誤中彭蜞毒殆死嘆曰讀爾雅不熟為勤學所誤焉出晉紀程據程據不知何許人志性沈毅雅有度量少以醫術知名為太醫令晉中興記支法存支法存者嶺表僧人也幼慕空門心希至道而性敦方藥尋覓無厭當代知其盛名自永嘉南渡晉朝士夫不習水土所患皆腳弱惟法存能拯濟之出千金方序仰道士仰道士嶺表僧人也少以聰惠入道長以醫術關懷因晉朝南移衣纓士類不習水土皆患軟腳之疾染者無不斃踣而此僧獨能療之天下知名焉千金方序論范汪范汪字玄平不知何郡人少孤年六歲過江依外家新野庾氏賔於園中布衣疏食燃薪寫書畢讀誦亦遍遂博通百家之言性仁愛善醫術嘗以拯恤為事凡有疾病不以貴賤皆治之所活十愈八九晉中興書殷仲堪殷仲堪陳郡人父病積年衣不解帶躬學醫方究其精妙出晉書王顯王顯字世隆滎陽平人也以醫術自達而明敏初文昭皇后之懷世宗夢為日所逐化為龍而繞后后寤而驚悸遂成心疾敕召諸醫及顯為后診脈徐謇言是微風入臟宜進湯藥及加針灸顯診云按三部非有心疾將是懷孕生男之象果如顯言乃補御史出後漢書徐謇徐謇字成伯丹陽人也與兄文伯皆善醫謇性祕忌承奉不得意雖貴如王公不為措療魏孝文遷洛除中散大夫文伯事南齊位至太山蘭陵守出南齊史及後魏書徐雄徐雄謇之子也為員外散騎侍郎醫術為江左所稱至雄子之才貴盛贈太常卿兗州刺史齊史王纂王纂者海陵人少習經方尤精針石逺近知其盛名出劉穎叔異苑徐熙徐熙字秋夫不知何郡人時為射陽令善醫名聞海內道度道度熙之長子也器宇宏深節行清敏少精醫術長有父風位至蘭陵太守叔嚮叔嚮熙之次子也志性溫恭敏而好學善於政理尤工醫術官至太山太守並宋書薛伯宗薛伯宗不知何許人善以禁氣治人病出宋書及吳均齊春秋徐仲融徐仲融不知何郡人為濮陽太守性好黃老隱秦望山有道士過之求飲因留一葫蘆遺之曰君習之子孫當以道術救世位至二千石仲融開視乃扁鵲鏡經一卷因精心學之名振海內仕至濮陽太守胡洽胡洽道士不知河許人性尚虛靜心栖至道以拯救為事醫術知名徐文伯徐文伯字德秀東陽人也為太山太守素有學行篤名醫術徐嗣伯徐嗣伯東陽人也文伯之弟志節慷慨超然不羣少負其才雅有異術而性行仁愛經方診訣占候靡不詳練悉心拯救不限貴賤皆磨踵救之多獲竒效特為當代所稱並宋書僧深僧深齊宋間道人也少以醫術知名療腳弱腳氣之疾為當時所伏撰録法存諸家舊方三十餘卷經用多效時人號曰深師方千金方序論劉涓子劉涓子不知何許人晉末於丹陽郊外夜射忽有一物髙二丈許因射而中之走若電激聲若風雨夜不敢追明日率門人弟子鄰巷數十人尋其蹤迹至山下見一小兒問曰何姓小兒云主人昨夜為劉涓子所射取水以洗瘡因問小兒主人是誰答曰是黃父鬼乃隨小兒還未至聞搗藥聲遙見三人一人卧一人開書一人搗藥即齊聲呌突而前三人並走遺一帙癰疽方并一臼藥涓子得之從宋武帝北征有被瘡者以藥塗之隨手而愈論者謂聖人作事天必助之蓋天以此授武帝也涓子用方為治千無一失演為十卷號曰鬼遺方出龔慶宣鬼遺方序羊昕羊昕字敬元不知何許人志好文儒性敦方藥蒞事詳審診療精能以拯濟功竒纍遷中散夫夫義興太守秦承祖秦承祖不知何郡人也性耿介有決斷當時名人咸所歸伏而專好藝術精於方藥不問貴賤皆治療之當時稱之為上手並宋書張子信張子信河內人也清靜好文學少以醫術知名太寧中徴為尚藥典御出齊書顧歡顧歡字玄平吳郡人也隱於會稽山隂白石村歡性仁愛素有道風或以禳厭而多所全護有病邪者以問歡歡曰君家有書乎曰唯有孝經可取置病人枕邊恭敬之當自差如言果愈問其故曰善禳惡正勝邪吳均齊春秋李元忠李元忠驃騎大將軍兼中書令晉陽縣伯趙郡柏仁人也初以母老多患遂通集方術志性仁恕疾病療之無間貴賤北齊書李密李密殿中尚書濟川刺史容城縣侯食邑四百户字希雍平棘人也密方直有至行母病積年不愈乃習經方遂盡其妙多所全活由是知名崔季舒崔季舒字叔正博陵安平人少孤明敏有識幹涉獵經史愛好文章長於尺牘有經世才精於醫術經方本草嘗所披覽不限貴賤皆拯治之北齊書祖挺祖挺字孝徴范陽酋人也博學善屬文尤長於醫術北齊書禇澄禇澄齊尚書吳郡太守字彥通雅有才量博好經方善醫術診處工候究盡其疾病療之無貴賤皆先審其苦樂榮悴鄉壤風俗水土所宣氣血強弱然後裁方用藥至於寡婦僧尼必有異乎妻妾之療鄧宣文鄧宣文不知何許人少以醫術知名志性方直除太醫尚藥典御並北齊書徐之才徐之才金紫光祿大夫開府儀同三司尚書令西陽郡王字士茂髙平金鄉人幼而俊發酬應如響善醫有機辨武明皇太后不豫之才奉藥立愈肅宗召與同坐令皇太子拜之贈帛千段錦四百匹車馬衣服上利田園千畝張太素齊書張逺遊張逺逰齊人也以醫藥道術知名尋有詔徴令與術士同合九轉金丹丹成顯祖置之玉匣曰貪人間樂不能飛上天待我臨死方可服同上陶𢎞景梁陶𢎞景貞白先生字通明丹陽人母郝氏夢兩天人手執香爐來至其所既而有孕以孝建三年夏至日生幼而警慧博學通經有志養生性好醫方專於拯濟利益羣品故修撰神農本草經三卷出梁書及藝文類聚徐之範徐之範儀同大將軍太常卿恆山太守嗣西陽王即北齊之才之弟也亦以醫術知名官至太常卿襲兄爵為西陽王齊滅入周拜儀同大將軍後周書徐敏齊徐敏齊太常卿之範之子也工醫博覽多藝開皇中贈朝散大夫出隋書甄權甄權許州扶溝人常以母病與弟立言專習醫方遂究其妙甄立言甄立言權之弟也俱以母病專心習醫遂盡其妙武德中纍遷太常丞御史大夫杜淹患風毒發腫太宗令立言治之既而奏曰更二十一日午時死果如其言宋俠宋俠者不知何郡人也性明敏有學術於經方本草尤所敦尚竟以醫術知名許胤宗許胤宗常州義興人初仕陳為新蔡王外兵參軍時栁太后感風不能言脈益沈而噤胤宗曰口不下藥宜以湯氣蒸之令藥入腠理周時可差遂造黃耆防風湯數十斛置牀下氣如煙霧如其言便得語由是超拜義興太守並唐史孫思邈孫思邈雍州華原人七歲就學日誦千言善談莊老百家之説性好醫術但是經方無不該覽撰千金等方行於世張文仲張文仲洛州洛陽人以醫術著名文仲則天時為侍御醫尤善療風疾則天令撰療諸方奏曰風有一百二十種氣有八十種大抵雖同人性各異唯氣頭風則隨發動臨時消息之但有風氣之人春末夏初秋暮得通泄即不至困劇孟詵孟詵者汝州梁人也以進士擢第垂拱初纍遷鳯閣舍人少好方術以藥餌為事撰補養方必效方行於世王方慶王方慶太原人也雅有才度博學多文篤好經方精於藥性秦鳴鶴秦鳴鶴不知何許人也為髙宗侍醫並唐史許智藏許智藏髙陽人幼嘗以母疾博覽醫方世號名醫仕陳為散騎侍郎會秦孝王俊有疾上馳召之夜夢其亡妃崔氏泣曰本來相迎聞許智藏將至其人若到當必相苦為之奈何明夜俊又夢崔氏曰妾得計矣當入靈府中避之智藏至為俊診脈曰疾已入心即當發癎不可救也果如其言出隋書巢元方巢元方不知何許人也大業中為太醫博士奉詔撰諸病源候論五十卷罔不該集宋宣獻撰巢氏病源序元珠先生元珠先生不知何許人隱顯莫測惟太僕令王冰識其為異人乃師事之元珠洞眀素問究極微奧密授妙旨教冰五臟六氣修煉養生之法草石性理祛邪去疾神方由是冰乃注大經素問至一為醫家宗範出仙傳王冰自號啓玄子王冰寶應中為太僕令篤好醫方得先師所藏太素及全元起者大為次注素問合八十一篇二十四卷且序曰將升岱嶽非徑奚為欲詣扶桑無舟莫過乃精勤博訪而并友其人厯十二年方臻理要詢謀得失深遂夙心出林光祿素問序醫説卷一
