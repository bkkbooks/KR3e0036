body:
  text: 醫說卷二宋張杲撰醫書醫書皇甫謐帝王世紀曰黃帝命雷公岐伯教制九針著內外經素問之書咸出焉黃帝內傳曰帝升為天子針經脈訣無不備也故金匱甲乙之類皆祖黃帝黃帝與岐伯問難黃帝御極坐明堂之上臨觀八極考建五常以為人生負隂而抱陽食味而被色寒暑相蕩喜怒交侵乃與岐伯上窮天紀下極地理逺取諸物近取諸身更相問難雷公之倫授業傳之而內經作矣蒼周之興秦和述六氣之論具明於左史厥後越人得其一二演述難經西漢倉公傳其舊學東漢仲景撰其議論晉皇甫謐次為甲乙隋楊上善纂為太素唐王氷篤好之大為次注林億素問序素問惟八卷班固曰內經十八卷素問即其經之九卷兼靈樞九篇乃其數焉雖年代移革而授學猶存懼非其人時有所隱故第七一卷師氐藏之今之奉行惟八卷爾周有和緩漢有淳于魏有張公華公皆得斯道妙者也玉氷素問序醫之起帝王世紀曰黃帝使岐伯主典醫藉以療衆疾說文曰巫彭初作醫吕氏春秋亦曰巫彭作醫方書所出世諸方書藥法雖損益隨時大抵祖述黃帝如脈經之出於晉王叔和病源之出於隋巢元方湯液經之出於商伊尹傷寒論出於漢張機千金備急出於唐孫思邈外臺祕要出於唐王圭皇朝太平集天下名方為太平聖惠其餘紛紛無代無之髙氏小史曰炎帝作藥方以救時疫事物紀原難經帝王世紀曰黃帝命雷公岐伯論經脈旁通問難八十一為難經楊元操難經序曰黃帝八十一難經者秦越人所作按黃帝內經一秩秩九卷其義難究越人乃採精要八十一章為難經同上陸宣公裒方書陸宣公在忠州裒方書以度日非特假此以避禍蓋君子之存心無所不用其至也前輩名士往往能醫非惟衛生亦可及物而今人反耻言之近時士大夫家藏方或集驗方流布甚廣皆仁人之用心本草單方近已刻於四明及本朝諸公文集雜說中名方尚多未見有類而傳之者豫屢為之恨藏書不廣儻有能用豫言集以傳諸人亦濟物之一端也本草百藥自神農始淮南子曰神農始嘗百草之滋味當此之時一日而遇七十毒世本曰神農和藥濟人則百藥自神農始也世紀或云伏羲嘗味百草非也梁陶𢎞景本草序曰神農氏王天下宣藥療疾以拯夭傷髙氏小史曰炎帝嘗百藥以治病嘗藥之時百死百生帝王世紀曰炎帝嘗草木宣藥療疾著本草四卷至梁陶𢎞景唐李世績等注叙為二十卷皇朝開寶中重校定仁宗嘉祐中命掌禹錫等集類諸家叙藥之說為補注本草唐書于志寧傳志寧云班固惟記黃帝內外經不載本草梁七録乃稱之世謂神農嘗藥黃帝以前文字不傳以識相付至桐雷乃載篇册然所載郡縣多漢時張仲景華他竄記其語梁陶𢎞景此書應與素問同類其餘多與志寧之說同也事物紀原藥有君臣佐使藥有君臣佐使大扺養命之藥則多君養性之藥則多臣療病之藥則多佐使猶依本性所主而兼復斟酌詳用此者益當為善用藥增減千金方云夫衆疾積聚皆起於虛虛生百病積者五臟之所積聚者六腑之所聚如斯等疾多從舊方不假增減虛而勞者其弊萬端宜應隨病增減聊復審其冷熱記其增損之主耳虛勞而頭痛復熱加枸杞萎蕤虛而欲吐加人參虛而不安亦加人參虛而多夢紛紜加龍骨虛而多熱加地黃牡礪地膚子甘草虛而冷加當歸芎藭乾薑虛而損加鍾乳棘刺蓯蓉巴㦸天虛而大熱加黃芩天門冬虛而多忘加茯神逺志虛而驚悸不安加龍齒沙參紫石英小草若冷則用紫石英小草若客熱則用沙參龍齒不冷不熱皆用之虛而口乾加麥門冬知母虛而吸吸加胡麻覆盆子柏子仁虛而多氣兼微咳加五味子大棗虛而身強腰中不利加磁石杜仲虛而多冷加桂心吳茱萸附子烏頭虛而勞小便赤加黃芩虛而客熱加地骨皮白水黃茋白水地名虛而冷用隴西黃茋虛而痰復有氣用生薑半夏枳實虛而小腸利加桑螵蛸龍骨雞肶胵虛而小腸不利加茯芩澤㵼虛而損溺白加厚朴諸藥無有一一歷而用之但據體性冷熱的相主對聊叙增損之一隅夫據方者宜準此藥有宣通補泄藥有宣通補泄輕重澀滑燥濕此十種者是藥之大體而本經都不言之後人亦未述遂令調合湯丸有昧於此者至如宣可去壅即薑橘之屬是也通可去滯即通草防己之屬是也補可去弱即人參羊肉之屬是也泄可去袐即葶藶大黃之屬是也輕可去實即麻黃葛根之屬是也重可去怯即磁石鐵粉之屬是也澀可去脫即牡礪龍骨之屬是也滑可去著即冬葵榆皮之屬是也燥可去濕即桑白皮赤小豆之屬是也濕可去枯即紫石英白石英之屬是也只如此體皆有所屬凡用藥者審而詳之則靡所遺失矣本草黑白字滕元發云一善醫惟取本草白字藥用之多驗蘇子容云黑字者多後漢人益之藥有隂陽配合本草云凡天地萬物皆有隂陽大小各有色類尋究其理並有法象故毛羽之類皆生於陽而屬於隂鱗介之類皆生於隂而屬於陽所以空青法木故色青而主肝丹砂法火故色赤而主心雲母法金故色白而主肺雌黃法土故色黃而主脾磁石法水故色黑而主腎餘皆以此推之例可知也誤注本草張文潜好食蟹晚苦風痺然嗜蟹如故至剔其肉滿貯巨杯而食之嘗作詩云世言蟹毒甚過食風乃乘風淫為末疾能敗股與肱我讀本草書美惡未有慿筋絶不可理蟹續牢如絙骨萎用蟹補可使無騫崩凡風待火出熱甚風乃騰中言若遇蟹其快若霜氷俗傳未必妄但恐殊愛憎本草起東漢要之出賢能雖失諒不逺堯跖終殊稱書生自信書俚說徒營營文濳為此詩殆嗜蟹之癖而為之辨耶抑真信本草也如河豚之目并其子凡血皆有毒食者每剔去之其肉則洗滌數十過俟色如雪方敢烹故梅聖俞詩云烹炮茍失所入喉為鏌鎁而大觀本草乃云河豚性溫無毒所謂注本草誤而能殺人者殆類此也藥名之異本草一物而有數名者詳載本經至有日常用之藥乃有異名一時難以尋討今直指其名表而出之庶有益於後學牡䝉乃紫參衛矛即鬼箭紫萎今凌霄花蘹香子即茴香也莎草根今香附子是北亭砂乃碙砂茗苦荼者茶也無食子沒石子是南燭枝今烏飯葉菰根茭筍也惡實即牛蒡子蠡實即馬藺淫羊藿即仙靈脾假蘇是荆芥葫是大蒜牙子乃狼牙馬勃乃馬屁菌也商陸即當陸根敗天公人戴竹笠之敗者薰陸香乳香也訶梨勒初未成實風吹之墜地謂之隨風子太平廣記載南威橄欖也石蜜櫻桃也盧橘枇杷也木密棗也塺塵也葱白涼青熱通九竅韭白暖地之羊肉青涼閉九竅萊服乃蘿蔔小草即逺志葉半天河竹籬頭水也署預今之山藥神屋即龜甲五靈脂寒號蟲糞也芰實菱也烏芋即慈菰蚤休即紫荷車浮石載石蟹條下慎火草即景天也針灸針灸之始帝王世紀曰太昊畫八卦以類萬物之情六氣六腑五臟五行隂陽四時水火升降得以有象百病之理得以有類乃制九針又曰黃帝命雷公岐伯教制九針蓋針灸之始也明堂今醫家記針灸之穴為偶人㸃志其處名明堂按銅人俞穴圖序曰昔黃帝問岐伯以人之經絡窮妙於血脈參變乎隂陽盡書其言藏於金蘭之室洎雷公請問乃坐明堂以授之後世言明堂者以此並事物紀原妙針獺走宋人王纂海陵人少習經方尤精針石逺近知其盛名宋元嘉中縣人張方女日暮宿廣陵廟門下夜有物假作其壻來女因被魅惑而病纂為治之始下一針有獺從女被內走出病因而愈劉穎叔異苑針芻愈鬼徐熙字秋夫不知何郡人時為射陽少令善醫方名聞海內常夜聞鬼呻吟聲甚凄苦秋夫曰汝是鬼何所需答曰我姓斛名斯家在東陽患腰痛死雖為鬼而疼痛不可忍聞君善術願相救濟秋夫曰汝是鬼而無形云何厝治鬼曰君但縳芻為人索孔穴針之秋夫如其言為針腰四處又針肩井三處設祭而埋之明日一人來謝曰蒙君醫療復為設祭病除飢解感惠實深忽然不見當代稱其通靈長子道度次子叔嚮皆精其術焉唐史針愈風手唐甄權許州扶溝人常以母病與弟立言專習醫方遂究其妙隋開皇初為袐書省正字後稱疾除魯州刺史庫狄欽患風手不得引諸醫莫能療權謂曰但得弓箭向垜一針可以射矣針其肩隅一穴應時愈貞觀中年一百三歲太宗幸其家視其飲食訪以藥性因授朝散大夫賜几杖衣服其修撰脈經針法明堂人形圖各一卷至今行用焉同上許希善針天聖中仁宗不豫國醫進藥久未效或薦許希善用針者召使治之三針而疾愈所謂興龍穴是也仁宗大喜遽命官之賜豫甚厚希善既謝上復西北再拜仁宗怪而問之希善曰臣師扁鵲廟所在也仁宗嘉之是時孔子之後久失封爵故顔大初作許希詩以諷之於是詔訪孔子四十七代孫襲封文宣王皇朝類苑針法善用針者從隂引陽從陽引隂以右治左以左治右以我知彼以表知裏針愈風眩秦鳴鶴為侍醫髙宗苦風眩頭重目不能視武后亦幸災兾逞其志至是疾甚召鳴鶴張文仲診之鳴鶴曰風毒上攻若刺頭出少血即愈矣天后自簾中怒曰此可斬也天子頭上豈是試出血處耶上曰醫之議病理不加罪且吾頭重悶殆不能忍出血未必不佳命刺之鳴鶴刺百㑹及腦戶出血上曰吾眼明矣言未畢后自簾中頂禮拜謝之曰此天賜我師也躬負繒寶以遺鳴鶴針鼻生贅狄梁公性好醫藥尤妙針術顯慶中應制入關路傍大榜云能療此兒酬絹千匹有冨室兒鼻端生贅如拳石綴鼻根蒂如筋痛楚危亟公為腦後下針疣贅應手而落其父母輦千絹奉焉公不顧而去集異說筆針破癰李王公主患喉癰數日痛腫飲食不下才召到醫官言須針刀開方得潰破公主聞用針刀哭不肯治痛逼水穀不入忽有一草澤醫曰某不使針刀只用筆頭蘸藥癰上霎時便潰公主喜遂令召之方兩次上藥遂潰出濃血一盞餘便寬兩日瘡無事令傳其方醫曰乃以針繫筆心中輕輕劃破其潰散爾别無方言醫者意也以意取效爾名醫録針瘤巨虱臨川有人瘤生頰間癢不可忍每以火烘炙則差止已而復然極以患苦醫者告之曰此真虱瘤也當剖而出之取油紙圍頂上然後施砭瘤才破小虱涌出無數最後一白一黑兩大虱皆如豆殼中空空無血與頰了不相干略無瘢痕但瘤所障處正白爾丁志善針無為軍張濟善用針得訣於異人能觀解人而視其經絡則無不精因歲饑疫人相食凡視一百七十人以行針無不立驗如孕婦因仆地而腹偏左針右手指正久患脫肛針頂心而愈傷寒翻胃嘔逆纍日食不下針眼眥立能食皆古今方書不著陳瑩中為作傳云藥王藥王為世良醫嘗草木金石名數凡十萬八千悉知酢鹹淡甘辛等味故從味因悟入益知今醫家别藥口味者古矣邵氏聞見録捫腹針兒朱新仲祖居桐城時親戚間有一婦人妊孕將産七日而子不下藥餌符水無不用待死而已名醫李幾道偶在朱公舍朱引至婦人家視之李曰此百藥無所施惟有針法吾藝未至此不敢措手爾遂還而幾道之師龎安常適過門遂同謁朱朱告之故曰其家不敢屈公然人命至重公能不惜一行救之否安常許諾相與同往才見孕者即連呼曰不死令其家人以湯溫其腰腹間安常以手上下摩之孕者覺腸胃微痛呻吟間生一男子母子皆無恙其家驚喜拜謝敬之如神而不知其所以然安常曰兒已出胞而一手誤執母腸胃不復能脫故雖投藥而無益適吾隔腹捫兒手所在針其虎口兒既痛即縮手所以遽生無他術也試令取兒視之右手虎口有針㾗其妙如此泊宅編針急喉閉於大指外邊指甲下根齊針之不問男女左右只用人家常使針針之令血出即效如大段危急兩手大指都針之其功甚妙庚志砭石砭石謂以石為針也山海經曰髙氏之山有石如玉可以為針則砭石也刺誤中肝督郵徐毅得病華他往省之毅謂他曰昨使醫曹吏劉祖針胃脘訖便苦咳嗽欲卧不安他曰刺不得胃脘誤中肝也食當日減五日不救如他言九針九針上應天地隂陽一天二地三人四時五音六律七星八風九野一針皮二針肉三針脈四針筋五針骨六針調隂陽七針益精血八針除風九針通九竅除三百六十五節氣一鑱針二員針三提針四鋒針五䤵針六員利針七毫針八長針九大針工針僧海淵閬人也工針砭天禧中入吳楚遊京師寓相國寺中書令張士遜疾國醫拱手淵一針而愈由是知名既老歸蜀范景仁賦詩餞之云舊鄉山水繞禪扃日日山光與水聲歸去定貪山水樂不教魂夢到神京治平二年化去張唐英貽以偈曰言生本不生言滅本不滅覺路自分明勿與迷者說劉季孫銘其塔曰資身以醫有聞於時餘幣散之拯人於危君子所難嗟乎師針舌底治舌出不收王況字子亨本士人為南京宋毅叔壻毅叔既以醫名擅南北況初傳其學未精薄逰京師甚悽然㑹鹽法忽變有大賈覩揭示失驚吐舌遂不能復入經旬食不下咽尫羸日甚國醫不能療其家憂懼榜於市曰有治之者當以千萬為謝況利其所售之厚姑往應其求既見賈之狀忽發笑不能制心以謂未易措手也其家怪而詰之況謬為大言答之曰所笑者輦轂之大如此乃無人治此小疾耳語主人家曰試取針經來況謾檢之偶有穴與其疾似是者況曰爾家當勒狀與我萬一不能治則勿尤我當為針之可立效主病者不得已亦從之急針舌之底抽針之際其人若委頓狀頃刻舌遂伸縮如平時矣其家大喜謝之如約又為之延譽自是翕然名動京師既小康始得盡心肘後之書卒有聞於世事之偶然有如此者況後以醫得幸宣和中為朝請大夫著全生指迷論一書醫者多用之王明清餘話艾謂之一壯醫用艾一灼謂之一壯以壯人為法也其用若干壯壯人當依此數老幼羸弱量力減之類苑灸背瘡京師萬勝門剩員王超忽覺背上如有瘡隱起倩人看之已如盞大其頭無數或教往梁門裏外科金龜兒張家買藥張視嚬眉曰此瘡甚惡非藥所能治只有灼艾一法庶可冀望萬分然恐費力乃撮艾與之曰且歸家試灸瘡上只怕不疼直待灸疼方可療爾灼艾十餘殊不知痛妻守而哭之至第十三壯始大痛四傍惡肉捲爛隨手墮地即似稍愈再詣張謝張付藥敷貼數日安則知癰發於背脅其捷法莫如灸也類編蒜灸癰疽凡人初覺發背欲結未結赤熱腫痛先以濕紙覆其上立視候之其紙先乾處則是結癰頭也取大蒜切成片如當三錢厚薄安其頭上用大艾炷灸之三壯即換一片蒜痛者灸至不痛不痛者灸至痛時方住最要早覺早灸為上一日二日十灸十活三日四日六七活五六日三四活過七日不可灸矣若有十數頭作一處生者即用大蒜研成膏作薄餅鋪頭上聚艾於蒜餅上燒之亦能活也若背上初發赤腫一片中間有一􅀢米大頭子便用獨頭蒜切去兩頭取中間半寸厚薄正安於瘡上却用艾於蒜上灸二七壯多至四十九壯江寧府紫極觀因掘得石碑載之灸瘵疾女童莊妙真緣姊坐瘵疾不起餘孽亦駸駸見偶趙道人過門見而言曰汝有瘵疾不治何耶答曰喫了多少藥勿效趙曰吾得一法治此甚易當以癸亥夜二更六神皆聚時解去下體衣服於腰上兩傍微陷處針灸家謂之腰眼直身平立用筆㸃定然後上牀合面而卧每灼小艾炷七壯勞蟲或吐出或瀉下即時平安斷根不發更不傳染敬如其教因此獲生類編灸咳逆法豫族中有病霍亂吐利垂困忽發咳逆半日之間遂至危殆有一客云有灸咳逆法凡傷寒及久疾得咳逆皆為惡候投藥皆不效者灸之必愈豫遂令灸之火至肌咳逆已定元豐中豫為鄜延經略使有幕官張平序病傷寒已困一日官屬㑹飲通判延州陳平裕忽言張平序已屬纊求往見之豫問何遽至此云咳逆甚氣已不屬豫忽記灸法試令灸之未食頃平裕復來喜笑曰一灸遂差其法乳下一指許正與乳相直骨間陷中婦人即屈乳頭度之乳頭齊處是穴艾炷如小豆許灸三壯男灸左女灸右只一處火到肌即差若不差則多不救矣良方灸鼻衄徐德占教衄者急灸項後髮際兩筋間宛宛中三壯立止蓋血自此入腦注鼻中常人以線勒頸後可止衄此灸决效無疑同上灸牙疼法隨左右所患肩尖微近後骨縫中小舉臂取之當骨解陷中灸五壯豫目覩灸數人皆愈矣灸畢項大痛良久乃定永不發豫親病齒痛百方治之皆不驗用此法遂差同上腳氣灸風市蔡元長知開封正據案治事忽覺如有蟲自足心行至腰間即墜筆暈絶久之方蘇掾屬云此病非俞山人不能療趣使呼之俞曰是真腳氣也法當灸風市為灸一壯蔡晏然復常明日疾如初再呼俞曰欲除病根非千艾不可從其言灸五百壯自此遂愈仲兄文安公守姑蘇以鑾輿巡幸虛府舍暫徙吳縣縣治卑濕旋感足痺痛掣不堪忍服藥勿效乃用所聞灼風市肩隅曲池三穴終身不復作僧普清苦此二十年每發率兩月用此灸二十一壯即時痛止其他蒙此力者不一而足夷堅志灸腳轉筋岐伯灸法療腳轉筋時發不可忍者灸腳踝上一壯內筋急灸內外筋急灸外三里頻灸若要安三里莫要乾患風疾人宜灸三里者五臟六腑之溝渠也常欲宣通即無風疾灸頭臂腳不宜多如灸頭上穴灸多令人失精神臂腳穴灸多令人血脈枯竭四肢細而無力既復失精神又加於細即令人短夀灸痔疾唐陜州王及郎中充西路安撫司判官乘驢入駱谷及宿有痔疾因此大作其狀如胡瓜貫於腸頭熱如煻煨火至驛僵仆主驛吏言此疾某曽患來須灸即差用栁枝濃煎湯先洗痔便以艾灸其上連灸三五壯忽覺一道熱氣入腸中因大轉㵼先血後穢一時至痛楚㵼後遂失胡瓜登騾而馳本事方灸蛇毒朝野僉載記毒蛇所傷用艾灸當齧處灸之引去毒氣即差其餘惡蟲所螫馬汗入瘡用之一效灸難産張文仲灸婦人橫産先手出諸般符藥不捷灸婦人右腳小指頭尖頭三壯炷如小麥大下火立産灸臍風樞密孫公抃生數日患臍風已不救家人乃盛以盤合將送諸江道遇老媼曰兒可活即與俱歸以艾炷臍下遂活青箱記不宜灸凡婦人懷孕不論月數及生産後未滿百日不宜灸之若絶子灸臍下二寸三分間動脈中三壯女子后門不灸出千金方因灸滿靣黑氣有人因灸三里而滿面黑氣醫皆以為腎氣浮面危候也有人云腎經有濕氣上蒸於心心火得濕成煙氣形於面面屬心故心腎之氣常相通如坎之外體即離離之外體即坎心腎未常相離也耳屬水其中虛則有離之象目屬火其中滿則有坎之象抑可見矣以去濕藥治之如五苓散防已黃蓍之類皆可用醫餘神醫太醫集業國家以文武醫入官蓋為養民設未有不自古學而得之者學古之道雖别而同為儒必讀五經三史諸子百家方稱學者醫者之經素問靈樞是也史書即諸家本草是也諸子難經甲乙中藏太素是也百家鬼遺龍樹金鏃刺要銅人明堂幼幼新書産科保慶等是也儒者不讀五經何以明道德性命仁義禮樂醫不讀靈素何以知隂陽運變德化政令儒不讀諸史何以知人才賢否得失興亡醫不讀本草何以知名德性味養生延年儒不讀諸子何以知崇政衛教學識醇疵醫不讀難素何以知神聖工巧妙理奧義儒不讀百家何以知律厯制度休咎吉凶醫不讀雜科何以知脈穴骨空竒病異證然雖如是猶未為博况經史之外又有文海類集如漢之班馬唐之韓栁及我大宋文物最盛難以槩舉醫文漢有張仲景華他唐有孫思邈王氷等動輒千百卷其如本朝太平聖惠乘閒集效神巧萬全備見崇文名醫别録三因方趙簡子扁鵲傳趙簡子病五日不知人大夫皆懼於是召扁鵲入視之曰血脈滯也而何怪昔秦穆公常七日如此而寤寤而告公孫子輿曰我夢之帝所甚樂帝告我晉國將亂五世不安其後將霸未老而死霸者之子且令而國男女無别後獻公之亂文公之霸而襄公敗秦師於殽而歸縱淫今主君之病與之同不出三日疾必間間必言矣居二日半簡子寤史記神醫陳昭遇者嶺南人善醫隨劉鋹歸朝後為翰林醫官所治疾多愈世以為神醫絶不讀書詰其所習不能答嘗與所親曰我初來都下持藥囊抵軍壘中日閲數百人其風勞冷氣之候皆默然識之然後視其長幼虛實按古方用湯劑鮮不愈者實未嘗尋脈訣也莊周所謂懸解董遇以為讀書百遍義自見豈是之謂歟皇朝類苑尸蹶􅉑太子死扁鵲曰太子病所謂尸蹶者也夫以陽入隂中動胃繵緣中經維絡别下於三焦膀胱是以陽脈下遂隂脈上爭㑹氣閉而不通隂上而陽內行下內鼓而不起上外絶而不為使上有絶陽之絡下有破隂之紐破隂絶陽之色已廢脈亂故形靜如死狀太子未死也夫以陽入隂支蘭臟者生以隂入陽支蘭臟者死凡此數事皆五臟蹶中之時暴作也良工取之拙者疑殆扁鵲乃使弟子子陽厲針砥石以取外三陽五㑹有間太子蘇乃使子豹為五分之尉以八減之劑和煮之以更尉兩脅下太子起坐更適隂陽但服湯二旬而復故故天下盡以扁鵲為能生死人扁鵲曰越人非能生死人也此自當生者越人能使之起爾史記死胎李將軍妻病甚呼華他視脈曰傷娠而胎不去將軍言聞實傷娠胎已去矣他曰按脈胎未去也將軍以為不然他舍去婦稍小差百餘日復動更呼他他曰此脈故事有胎前當生兩兒一兒先出血出甚多後兒不及生母不自覺旁人亦不寤不復迎遂不得生胎死血脈不復歸必燥著母脊故使多脊痛今當與湯并針一處此死胎必出湯針既加婦痛急如欲生者他曰此死胎久枯不能自出宜使人探之果得一死男手足完具黑長可尺許他之絶技凡此類也三國魏志郝翁精於醫郝翁者名允博陵人少代其兄長征河朔不堪其役遁去月夜行山間憊甚憩一樹下忽有大羽禽飛止其上熟視之一黃衣道士也允拜手乞憐道士曰汝郝允乎因授以醫術晚遷鄭圃世以神醫名之逺近之人賴以活者四十餘年非病者能盡活之也蓋其術精良可信不幸而不可治必先語之雖死亦無恨於脈非獨知己病能前知未病與死近者頃刻逺者纍年至其時皆無失歲常候測天地六元五運考四方之病前以告人亦無失皇祐中翁死張峋子堅志其墓曰夏英公病泄太醫皆為中虛翁曰風客於胃則泄殆藁本湯證也英公駭曰吾服金石等藥無數泄不止其敢飲藁本乎翁強進之泄止邵氏聞見録禇澄善醫南史曰禇澄善醫術建元中為吳郡太守百姓李道念以公事到郡澄見謂汝有重病答曰舊有冷病至今五年衆醫不差澄為診謂曰汝病非冷非熱當是食白瀹雞子過多所致令取蒜一升煮服仍吐一物如涎裹之動開看是雞雛羽翅爪距貝足能行走澄曰此未盡更服所餘藥又吐得如向者雞十三頭而病都差當時稱妙唐與正治疾唐與正少年得脈法於臨安醫者黃澤繼又得藥法於太學生夏德懋所召紫霞仙遇人有竒疾多以意治其侄女年數歲得風疸疾先發於臆迤邐延上赤腫痛癢醫以上膈風熱治之不效唐診之曰是肝肺風熱盛極耳以升麻羌活荆芥鼠粘子赤芍藥淡竹葉桔梗乾葛八物治之自下漸退而腫聚於頂其髙數寸雖飲食寢處無妨而疾終未去也唐母吳夫人曰此女乳母好飲熱酒至并啜其糟疾殆因是歟唐方悟所以至頂不消之由思之唯乾葛消酒且能療火毒乃於先方加葛三倍使服之二日腫盡失去從舅吳巡檢病不得前溲卧則微通立則不能㳙滴醫遍通用小腸藥窮技巧弗驗唐因其侄孫大用來問吳常日服何藥曰叔祖常服黑錫丹問何人結砂曰自為之唐灑然悟曰是必結砂時鉛不死硫黃飛去鉛砂入膀胱卧則偏重猶可溲立則正塞水道以故不能通令取金液丹三百粒分為十服煎瞿麥湯下之膀胱得硫黃積鉛成灰從水道下猶纍纍如細砂病遂愈葛之消酒硫黃之化鉛皆載經方茍不知病源而以古方從事未見其可也夷堅志以醫知名成州團練使張鋭字子綱以醫知名居於鄭州政和中蔡魯公之孫婦有娠及期而病國醫皆以為陽證傷寒懼胎之墜不敢投涼劑魯公密邀鋭視之鋭曰兒處胎十月將生矣何藥之能敗即以常法與藥且使倍服之半日而兒生病亦失去明日婦大泄而喉閉不入食衆醫復指言其疵且曰二疾如氷炭又産蓐甫近雖扁鵲復生無活理也鋭曰無庸憂將使即日愈乃入室取藥數十粒使吞之咽喉即通下泄亦止逮滿月魯公開宴自諸子諸孫及婦女甥壻合六十人請鋭為客公親酌酒為夀曰君之術通神吾不敢知敢問一藥而治二疾何鋭曰此於經無所載特以意處之向者所用乃附子理中丸裹以紫雪爾方喉閉不通非至寒藥不為用既已下咽則消釋無餘其得至腹中者附子力也故一服而兩疾愈公大加嘆異盡斂席上金七箸遺之刑部尚書慕容彥逢為起居舍人母夫人病亦召鋭於鄭至則死矣時方六月暑將就木鋭欲入視彥逢不忍意其欲求錢乃曰道路之費悉當奉償實不煩入鋭曰傷寒法有死一晝夜復生者何惜一視之彥逢不得已自延入悲哭不止鋭揭面帛注視呼仵匠語之曰若嘗見夏月死者面色赤乎曰無然則汗不出而蹶爾不死也幸無亟斂趨出取藥命以水二升煮其半灌病者戒曰善守之至夜半大瀉則活矣鋭舍於外館至夜半時守病者覺有聲勃勃然遺屎已滿席出穢惡物斗餘一家盡喜遽敲門呼鋭鋭應曰吾今日體困不能起然亦不必起明日方可進藥也天且明出門若將便旋然徑命駕歸鄭彥逢詣其室但留平胃散一貼而已其母服之數日良愈蓋鋭以彥逢有求錢之疑故不告而去紹興中流落入蜀王秬叔堅問之曰公之術古所謂十全者幾是歟曰未也僅能七八耳吾長子病診脈察色皆為熱極命煮承氣湯欲飲之將飲復疑至於再三將遂飲如有掣吾肘者姑持杯以待兒忽發顫悸覆綿衾至四五始稍定汗下如洗明日而脫然使吾藥入口則死矣安得為造妙世之庸醫學方書未知萬一自以為足吁可懼哉夷堅志耳聞風雨聲孫兆殿丞治平中間有顯官權府尹忘其名氏一日坐堂决事人吏環立尹耳忽聞風雨鼓角聲顧左右曰此何州郡也吏對以天府尹曰若然吾乃病耳遽召孫公往焉公診之乃留藥治之翌日尹如故尹召孫問曰吾所服藥切類四物飲孫曰是也尹曰始慮為大患服此藥立愈其故何也孫曰心脈太盛腎脈不能歸耳以藥凉心經則腎脈復歸乃無恙孫之醫出於衆人皆如是衆人難之孫則易之衆人易孫則難之真世之良醫也青箱集非孕潘璟字溫叟名醫也虞部員外郎張咸之妻孕五歲南陵尉富昌齡妻孕二歲團練使劉彛孫妾孕十有四月皆未育溫叟視之曰疾也凡醫妄以為有妊爾於是作大劑飲之虞部妻墮肉塊百餘有眉目狀昌齡妻夢二童子色漆黑倉卒怖悸疾走而去彛孫妾墮大蛇猶蜿蜒不死三婦人皆無恙屯田郎中張諲妻年四十餘而天癸不至溫叟察其脈曰明年血潰乃死既而果然又貴江令王霽夜夢與婦人謳歌飲酒晝不能食如是三歲溫叟治之疾益平則婦人色益沮飲酒易怠而謳歌不樂久之遂無所見溫叟曰疾雖衰然未愈也如夢男子青巾而白衣者則愈矣後果夢則能食夷堅志徙癰南史曰薛伯宗善徙癰公孫泰患發背伯宗為氣封之徙置齊前栁樹上明日而癰消樹邊便起一瘤如拳大稍稍長二十餘日瘤大膿爛出黃赤汁升餘樹為之痿損太平御覽劉從周妙醫韶州曲江人劉從周妙於醫術有自得之見著書十篇大抵與世俗異其論痢疾云常人以白痢為冷證赤痢為熱證故所用藥入氷炭其實不然但手足和暖則為熱當煎粟米湯調五苓散繼服感應丸二十粒即愈手足厥冷則為寒當服已寒丸之類凡治痢當以此别之初不問赤白也如盛夏發熱有傷寒冒暑二證若熱有進退則為冒暑一向熱不止則為傷寒當以此别之拔麥中蟲有人家女病腫以榜召醫皆不識馬嗣明問病由云曽以手拔麥穗即有一小赤物長二尺許似蛇入其手指中因驚倒即覺手臂疼腫月餘漸及半身肢節俱腫痛不可忍嗣明處方治之皆愈劉穎叔異苑華他醫疾華他沛國譙人通飬性之術年且百歲而猶有壯容時人以為仙精於方藥處劑不過數種心識分銖不假稱量針灸不過數處若疾發結於內針藥所不能及者乃令先以酒服麻沸散既醉無所覺因割破腹背抽割積聚若在腸胃則斷截湔洗去疾穢而縫合付以神膏四五日瘡愈一月之間皆平復破腹取病華他傳一士大夫不快他曰君病深當破腹取然君夀亦不過十年病不能殺君忍病十歲夀俱當盡不足故自刳裂士大夫不忍痛癢必欲除之他遂下手所患尋差十年竟死並魏志扁鵲見齊侯扁鵲過齊初見齊桓侯曰君有疾公不應後又見之曰君有疾乃可治之公曰卿欲治無病之人以求其功後又見公越人便走數日病發召越人越人曰初見君病在皮膚針灸所及再見君病在血脈湯藥所及今見君病入骨髓司命亦無奈何後數日桓侯乃薨文摯文摯齊人也齊威王病發使召文摯摯至謂太子曰王病怒即愈王若即殺臣奈何太子曰無慮吾當救之文摯於是不時來見王及來不脫履而登牀王大怒使左右持下將烹之后及太子扣頭請救王怒遂解赦摯因此病愈六國時人並史記董奉董奉候官人也時交州刺史杜燮中毒藥而死奉以太一散和水沃燮口中須㬰乃蘇燮自說初死時有一車門直入一處內燮於土窟中以土塞之俄頃聞太一使至追杜燮遂開土窟燮得出華他華他字元化善養生之術廣陵太守陳登患胸煩滿面赤不食使人請華他他曰府君胸中有蟲欲成蓋腥物之所為乃作湯令登服之遂吐三升許蟲蟲頭皆赤半身猶是生膾他曰此病必更再發若值良醫乃可治後果發時他不在病發遂卒臟氣已絶縣史尹世苦四肢煩口中乾不欲聞人聲小便不利他曰試作熱食得汗則愈不汗後三日死即作熱食而汗不出他曰臟氣已絶於內當啼哭而絶果如他言並魏志病有六不治驕恣不論於理一不治輕身重財二不治衣食不能適三不治隂陽并臟氣不定四不治形羸不能服藥五不治信巫不信醫六不治有一於此則重難治也千金方引史記隨俗為醫扁鵲名聞天下過邯鄲聞貴婦人即為帶下醫過雒陽聞周人愛老人即為耳目痺醫來入咸陽聞秦人愛小兒即為小兒醫隨為變扁鵲兄弟三人鶡冠子云扁鵲兄弟三人並醫魏文侯問孰最扁鵲曰長兄神視故名不出家仲兄神毫毛故名不出閭臣針人血脈投人毒藥故名聞諸侯竪傷脾濟北王召淳于意診脈諸女子侍者至女子竪竪無病意告永巷長曰竪傷脾不可勞法當春嘔血死王曰得母有病乎意對曰竪病重在死法中王召視之其顔色不變以為不然春竪捧劔從王之側王去竪後令人召之即仆於厠嘔血死病得之流汗流汗者同法病內重毛髮而色澤脈不衰此亦關內之病也並史記病狂蘄水縣髙醫龎安時治病無不愈其處方用意幾於古人自言心解初不從人授也蘄有富家子竊出遊值鄰人有鬬者排動屋壁富人子大驚懼疾走惶惑突入市市方陳刑尸富人子走仆尸上因大驚到家發狂性理遂錯醫巫百方不能已龎為劑藥求得絞囚繩燒為灰以調藥一劑而愈龎得他人藥嘗之入口即知其何物及其多少不差也張右史明道雜志肝氣暫舒四明僧奉真良醫也天章閣待制許元為江淮發運使奏課於京師方欲入對而其子病亟瞑而不食惙惙欲逾宿矣使奉真視之曰脾氣已絶不可治死在明日元曰觀其疾勢固知其不可救今方有事須陛對能延數日之期否奉真曰如此自可諸臟皆已衰唯肝臟獨過脾為肝所勝其氣先絶一臟絶則死若急㵼肝氣令肝氣衰則脾少緩可延三日過此無術也乃投藥至晚乃能張目精稍復啜粥明日漸蘇而能食元甚喜奉真笑曰此不足喜肝氣暫舒爾無能為也後三日果卒筆談醫說卷二
