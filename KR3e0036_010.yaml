body:
  text: 醫說卷十宋張杲撰小兒小方孫思邈千金方曰小兒六歲以下黃帝無說中古有巫妨始撰顱𩕄經以占夀夭自兹始有小方則小兒方藥始於巫妨也善醫小兒杜任郎中善醫里人王奉職宗簡時任於汶陽時有郡人孟生家甚溫厚惟一子數歲抱疾他醫數人治之無驗召任治之數日而良已踰月而平復人詢任曰君以何藥主之任語之故其人驚曰公所言皆藥之至溫者也他人不取君用之能起其疾其義可聞乎任曰孟生富家也而衆醫皆用犀珠金銀主之其性至凉多則寒其胃又從而投之由是多不喜食日益羸瘠則潰其元失其本矣吾之劑先溫其胃使其飲食如故然後攻其他疾是以先壯其本而無失者焉又知杜君之善醫也如此青箱雜記瘡豆禁雞鴨子療病豌豆瘡欲無瘢頻揭去痂勿令隱肌乃不成瘢縱揭傷有微血但以靣膏塗無苦也瘡家不可食雞鴨卵即時盲瞳子如卵白其應如神不可不戒良方小兒夜啼井口邉草主小兒夜啼著母席薦下勿令知之酉陽雜爼小兒不可食雞養生論曰雞肉不可令小兒食食之令生蛔蠱又令體消瘦杜陽雜編治兒語遲社壇餘胙酒治小兒語遲以少許喫吐酒噴屋四角辟蚊蟲本草兒得母寒下痢東陽陳叔山小兒一歲得下痢嘗先啼日以羸困問華他他曰其母懷軀陽氣內養乳中虛冷兒得母寒故令不時愈他與四物女萎丸十日即除魏志小兒感冷身熱有小兒感冷身大熱惡寒此有表證用發汗藥汗出遂凉過一日復熱醫謂表解裏未解驗之服四順飲子利動臟腑一行遂凉隔一日又再熱醫云經熱未解驗之小便赤故知心熱未解服生氣湯遂凉過三日人熱其家無所措手醫曰脉已和非病也既發汗又利大小便其兒已虛陽氣無所歸皆見於表所以身熱以和胃氣藥如六神散之類加烏梅煎令微覺有酸味收其陽氣歸自此全愈小兒糞青此脾虛生風之證也脾屬土其色黃糞黃則是脾家正色今乃青肝木尅脾也肝屬木其色青肝盛脾虛受肝之尅故糞青也當用益脾去風藥如半硫丸加白附子蝎稍可以治之雖然小兒青糞拋下便青者是風冷也良久然後青者非病也小兒糞自然如此小兒㵼後腳弱小兒因患泄㵼或疳氣服藥瀉之却患咳嗽治得咳嗽少愈已五六歲腳弱不能行師曰脾傳肺故咳嗽肺傳腎故不能行脾屬土土生金金生水故傳之腎腎主腰腳故不能行因用猪腰子煎汁服五疳保童丸半月遂能行小兒得地氣方行小兒未會行能坐不可常常抱在手中可以入坐車能獨坐春夏坐於地上寒則以薦席襯之人得地氣方能行惜之過當常抱持之所以當行而不能行也萬物非土不生故小兒亦要得地氣也以上醫録小兒初生畏寒小兒初生候浴水未得且以綿絮包裹抱大人懷中暖之及浴了亦當如此雖暑月亦未可遽去綿絮漸漸去之乍出母腹不可令冒寒氣也預煎下沸湯以器收之臨時漸暖不犯生水則兒不生瘡以此一月為佳小兒初生回氣小兒初生氣欲絶不能啼者必是難産或冒寒所致急以綿絮包裹抱懷中未可斷臍且將胞衣置炭火爐中燒之仍撚大紙燈蘸油㸃之於臍帶上往來遍帶燎之蓋臍帶連兒臍得火氣由臍入腹更以爇醋湯捋洗臍帶須臾氣回啼哭如常方可浴洗了即斷臍帶小兒初生服藥小兒初生急以綿裹指栻盡口中惡血若不急拭啼聲一出即入腹成百病矣亦未須與乳且先與拍破黃連浸湯取濃汁調朱砂細末抹兒口中打盡腹中舊屎方可與乳兒若多睡聽之勿强與乳則自然長而少病小兒初生通大小便小兒初生大小便不通腹脹欲絶者急令婦人以溫水先漱口了吸咂兒前後心並臍下手足心共七處每一處凡三五次漱口吸咂以紅赤為度須㬰自通不爾無生意有此證遇此法可謂再生小兒夜啼有四證小兒夜啼有四證一曰寒二曰熱三曰重舌口瘡四曰客忤寒則腹痛而啼靣青白口有冷氣腹亦冷曲腰而啼此冷證也熱則心躁而啼面赤便赤口中熱腹暖啼時或有汗仰身而啼此熱證也若重舌口瘡則要乳喫口到乳上便啼身額皆微熱急取燈照口若無瘡舌必腫也客忤者見生人氣忤犯而啼也小兒傷乳食發熱小兒傷乳及食者或時發熱熱有退時退熱後但肚熱或夜間熱者此傷乳食也其糞有酸臭氣異常千金紫丸主之小兒發熱治法小兒積熱者表裏俱熱則遍身皆熱頰赤口乾小便赤大便焦黃先以清凉四順飲子利動臟腑熱則去既去復熱者裏熱已解而表熱未解也當用惺惺散或紅綿散內加麻黃微發汗表熱乃去表熱去後又發熱者何也世醫到此盡不能曉或再用凉藥或再解表或以謂不可醫誤致夭傷者甚多此表裏俱虛氣不歸元而陽浮於外所以再發熱非熱證也只用六神散入粳米煎和其胃氣則收陽氣歸內身體便凉熱重者用銀白散小兒血熱小兒血熱者每旦食後發熱夜則凉世醫多謂虛勞或謂疳熱此血熱也宜用豬膽丸急慢驚風小兒發癎俗云驚風有隂陽證因身熱面赤而發搐搦上視牙關緊硬者陽證也因吐㵼或只吐不㵼日漸面色白脾虛或冷而發驚不甚搐搦微微目上視手足微動者隂證也陽證用凉藥隂證用溫藥不可一概作驚風治也又有一證欲發瘡疹先身熱驚跳或發搐搦此非驚風當服發散藥小兒吐瀉用藥小兒暑月多吐瀉其證不一宜詳審用藥不可差謬有伏暑吐瀉小水必不利宜服五苓𣪚香薷𣪚有傷食吐㵼者其吐及糞皆有酸臭氣宜服感應丸三方易知今不復載㵼多日口唇白及糞色亦白及㵼糞頗多者因而成冷也宜以前方六神散每二錢匕加附子末一錢匕煎作三四服以防變癎也小兒㵼痢小兒暑月多瀉者一則伏暑心臟熱小水不利清濁不分因成泄㵼可服五苓散或大順散二藥皆用沸湯調若小水快而㵼者冷瀉也宜于六神𣪚內加附子煎服若肚大瀉色白者疳㵼也宜服官局六神丸瀉者不可急以熱藥止之若以熱藥止之便變成痢凡病痢者皆因有積赤痢熱積也白痢冷積也赤白痢冷熱不調之積也赤多白少者熱多而冷少也白多赤少者冷多而熱少也小兒解顱小兒解顱曾有人作頭巾與裹遮護之久而自合亦良法也瘡疹小兒生未有不發瘡疹自一歲至十歲至十二三歲須發一次家有數小兒一兒病此餘即次第皆及之便當防慎其證有身熱頭痛如傷寒狀但不惡風唯惡熱所以異於傷風者唇紅尻骨及耳尖皆冷或腹痛眼澀及口舌皆痛腹痛者腹中先出眼澀者眼中先出咽喉及口舌痛者皆先有瘡也或如沙如粟米狀或為癮疹如風泛狀皆其證也熱輕者瘡亦輕熱重者瘡亦重方其身熱時瘡未出直待身凉方出亦不可不知其未出亦須服藥唯是認得證候分明以投湯劑庶不誤人性命也未出時只可服升麻湯紅綿散地龍散消毒飲此皆平平藥或見兒身不甚熱即飲少酒熱甚者不可飲酒瘡疹有表裏證小兒瘡疹有表裏證其瘡皮不薄如赤根白頭漸漸赤腫而有膿差遲者謂之木豆此裏證發于臟也其瘡皮薄如水泡破即易乾者謂之水豆此表證發于腑也發於臟者重發於腑者輕熱重者至有見鬼神目上視發搐搦如驚癎之狀世人誤認驚癎投以冷藥無不為害者不可不慎也如覺熱大盛涎壅平平藥不可攻者宜以雄黃解毒丸利之以减其毒須遍身以燈照仔細看覷如未有紅㸃子出者可下之既出則不可利恐蓄伏也瘡疹黏衣用牛糞小兒瘡疹出了遍身潰膿沾黏衣衾睡臥不得者用臘月黃牛糞日乾燒灰鋪一寸許在牀上令臥之其間瘡有大成片無皮及有成豆癰者皆用牛糞灰摻之即愈剝瘡痂免成瘢小兒靣上瘡子才膿出急以真酥潤之頻潤為佳才有瘡痂急剝去更潤之痂硬不落有礙肉生遂成瘢子此理昭然人多不曉反謂剝早成瘢甚誤也瘡疹不可洗靣小兒瘡疹不可洗靣生水入眼即損眼也唯要忌口止可食粥及鯽魚靑魚鵪子之類餘魚及猪羊肉皆不可食恐損眼也瘡疹用胭脂塗眼小兒瘡疹未出認得是此證急以胭脂塗眼周回令瘡不入眼亦甚妙瘡疹後服清凉飲子小兒瘡疹皆出盡身已凉喜食物亦稍能轉動以清凉飲子濃煎量兒大小與之須利三二行即安樂後不發熱不腫眼不鼻衄不患痢世人不用此法者于此數證恐不能免也小兒丹毒小兒丹者風熱積毒所成冬間火烘衣藉不候冷以衣兒或夜間蓋覆太暖日間親火或妳娘喜食燒灸物飲酒之類皆致兒病丹也或發於手足或發於頭面胸背其熱如火輕輕著手則痛不可忍急為砭出血為上策千金有服食並榻湯皆可用以上皆李左司保生要方小兒吐㵼後成慢驚小兒吐㵼或成慢驚昏睡手足似搐而不甚搐金液丹半兩白丸子三錢同研極細生薑米飲調下三錢多服乃效服至一二兩無害候胃氣已生手足漸暖漸减金液丹增白丸子以意詳之小兒初生不飲乳小兒初生不飲乳及不小便妳汁二合葱白一寸分四破右以銀石器煎取一合注子灌立愈兒臍血出小兒初生未滿月多啼呌至臍中血出以白石脂末貼之即愈未愈微微炒過放冷再貼仍不得剝揭兒臍久不乾當歸焙乾為末右著臍中頻用自差豫家小兒病臍濕出膿及清水者五十餘日一傅而乾後因尿入瘡復病又得傅愈良方薏苡浴兒薏苡葉煎湯浴初生嬰兒一生少病暑月可作熟水暖胃益氣血瑣碎録臍風撮口小兒初生一七內忽患臍風撮口百無一活坐視其斃者皆是良可憫有一法極驗世罕有知者凡此兒齒齦上有小泡子如粟米狀以溫湯蘸熟帛裹手指輕輕擦破即口開便安不用服藥神妙保生方瘡瘍生於頰雄黃治瘡瘍尚矣周禮瘍醫只療瘍以五毒攻之鄭康成注云今醫方合五毒之藥用黃蝥置石膽丹砂雄黃􅈨石磁石其中燒之三日三夜其烟上著以雞羽取之以注瘡惡肉破骨則盡出楊大年嘗筆記其事族人楊嶠年少時有瘍生於頰連齒輔車外腫若覆甌內潰出膿血不輒吐之痛楚難忍療之百方彌年不差人語之依鄭法製藥成注之瘡中少頃朽骨連兩牙潰出遂愈後更安寧信古方攻病之速也黃蝥即瓦合也本事方木癡成瘡南方多雨有物曰木癡其大概類鼻涕積隂而生於古木之上聞人氣則閃閃而動人過其下有墮於人體間者即立成瘡久則遍其肌體時有客患其木癡之瘡遇一道士謂曰以朱砂麝香塗之即愈客如其言果愈耳塞敷瘡鄭師甫云嘗患足上傷作瘡水入腫痛不可行步有丐者令以耳塞敷之一夕水盡出愈邵氏聞見録壁土治瘡爛暑月肌膚瘡爛或因搔成瘡者林才中嘗暑月臥病肌膚多瘡爛汁出有一乳姥曰此易差也取乾壁土揉細末傅之隨手即差良方治瘡久不合露蜂房蛇蛻皮亂髮各燒灰存性取一錢匕酒服治瘡久不合東坡大全治下疳瘡有富家子唐靖年十八九未娶忽於隂頭上生瘡初只針眼來大小畏疼不敢洗刮日久攻入皮肉連莖爛一二寸許醫者止用膏藥貼之愈疼亦無人識此瘡有貧道周守真曰此謂下疳瘡亦名妬精瘡緑為後生未娶精氣益盛陽道興起及當泄不泄不泄强泄脹斷嫩皮怕疼痛失洗刮攻入皮內日久遂爛有害却命者靖告先生為治之守真曰若欲治此疾須是斷房事數日先用荆芥黃皮馬鞭草甘草銼入葱煎湯洗之去膿靨以訶子燒灰入麝香乾摻患處令睡睡醒服冷水兩三口勿令陽道興起脹斷瘡靨靨堅即愈庚志遍身患瘡凡人患瘡遍身有百藥不效者用檳榔一箇為細末生硫黃一錢同研細入膩粉一錢和均每用一錢安手心內油調塗外腎不得洗手但擦手令乾可也一兩日間瘡便愈膁瘡有一種膁瘡赤腫而痛用黃連黃蘖之類皆凉藥也久而不愈其瘡冷矣却當用溫藥如鹿角灰頭髮灰乳香之類治之當愈此隂陽寒暑往來之理也醫餘舋瘍人身血氣周身不知幾千息凡人血行而擁則瘡癤於虛六處則生核謂之舋瘍舋瘡生也瘡差核亦消東坡物類相感志獺髓補瘡吳孫和寵鄧夫人嘗醉舞如意誤傷鄧頰血流嬌婉彌苦命太醫合藥言得白獺髓雜玉與琥珀屑當滅此㾗和以百金購得白獺乃合膏琥珀太多及差痕不减左頰有赤㸃如痣酉陽雜爼石菖蒲愈瘡有人患遍身生熱毒瘡痛而不癢手足尤甚然至頸而止粘著衣被曉夕不得睡痛不可任有下俚教以菖蒲三㪷銼日乾之舂羅為末布席上使病人恣臥其間仍以被衣覆之既不粘著衣被又復得睡不五七日之間其瘡如失後自患此瘡亦如此應手神驗其石菖蒲絡石者節密入藥須此等風熱細疹有人病遍身風熱細疹癢痛不可任連胸脛臍腹及近隱處皆然疾涎亦多夜不得睡以苦參末一兩皂角二兩水一升揉攄取汁銀石器熬成膏和參末為丸桐子大三二十丸溫水下食後次日便愈風毒濕瘡有婦人患臍下腹上下連二隂遍滿生濕瘡如馬瓜瘡他處並無癢熱而痛大小便澀出黃汁食亦减身面微腫醫作惡瘡治用鰻鱺魚松脂黃丹之類藥塗上瘡愈熱痛愈甚治不對故如此問之此人嗜酒貪啖喜魚蝦發風之物急令用溫水洗拭去膏藥尋以馬齒莧四兩爛研細入青黛一兩再研均塗瘡上即時熱减痛癢皆去仍服八正散日三服分散客熱每塗藥得一時久藥已乾燥又再塗新濕藥凡如此二日减三分之一五日减三分之二自此二十日愈既愈而問曰此瘡何緣至此曰中下焦蓄風熱毒氣若不出當作腸癰內痔仍須常禁酒及發風物然不能禁酒果然患內痔王說本草衍義患瘡踐壞竈土令人患瘡踏雞子殼令人得白癜風魚臍瘡皇祐中學䆒任道腿間患一瘡始發赤腫復絶便變黑後穴則有黃水出四邊浮漿起纍治不差醫王通看之此瘡狹長似魚臍下瘡也遂以大針針四向并中隨針有紫赤水汁出如豆汁言此一因風毒藴結而成二因久坐血氣凝澀而致三因食肉有人汗落其間也道曰素好讀書而久坐此疾數歲前夏月道中買猪脯味水飯疑似人肉食已後得斯疾通曰與誤食人汗不逺矣以一異𣪚子用雞子清調傅其瘡日三易數日得愈道堅求其方通曰止用雪𤣥一味自後纍訪名醫求其雪𤣥何物醫皆不識道因至許鄭間會醫者郝老曰嘗記聖惠有一方治此疾用臘月猪頭燒灰以雞子清調傅此乃是也雪𤣥非郝老博學多記後醫豈不惑耶名醫録頭瘡禁用水銀小兒頭有瘡有風切不可用水銀擦自瘡而入經絡必緩筋骨百藥不能治醫方併云人有患漆瘡者不可以朱漆器炙熱尉之恐朱中有水銀入經絡也黑漆器則不妨此方正類以生草烏塗白秃以巴豆薰痔而致死者瑣碎録治惡瘡南豐市民嚴黃七兩足生瘡臭穢潰爛衆皆驅斥不容迹出貨角器於村野而旅邸又不容至京潜投宿於五夫人祠下夜半遭黃衣吏訶逐曰何人敢以腐穢腳觸汚此間謝曰不幸纒惡疾無處見容冒死來此紛拏次夫人抗聲令勿逐且呼使前曰吾授汝妙方用漏蘆子一枚生乾為末入膩粉少許井水調塗當效嚴拜謝依而治之果愈類編同上治善惡瘡仁宗在東宫時嘗患胙腮命道士贊能治療取赤小豆四十九粒呪之雜他藥為末傅之而愈中貴任承亮在傍知狀後承亮自患惡瘡濱死尚書郎傅求授以藥立愈問其方赤小豆也承亮始悟道士之技所謂誦呪乃神其術耳久之㳂官過豫章或苦脅疽幾逹五臟醫者治之甚捷承亮曰君得非用赤小豆耶醫驚拜曰某用此活三十口願勿宣言周少隱病宗室彥符傳之曰善惡諸瘡無藥可治者皆能治有生發背狀如爛瓜周鄰家乳婢復疽作用之皆如神其法細末水調傅瘡及四傍赤瘇藥落再傅之同上搔髮際成竅出血頃有一人指縫中因搔癢遂成瘡有一小竅血濺出不止用止血藥及血竭之類無效數日遂不起後有一人於耳後髮際搔癢亦有一小竅出血與前相似人亦無識者適有一道人言此名髮泉但用多年糞桶篐曬乾燒灰傅之當愈果如其言使前指縫血出遇此亦必愈病肥脉許慎云人病肥脉癮疹當取人姓曹氏帛布拭之則愈也傅瘡燈花末傅金瘡止血生肉令瘡黑今燭花落有喜事不爾得錢之兆也本草病癩趙瞿病癩厯年醫不差乃賫糧棄送於山穴中瞿自怨不幸吁嘆涕泣經月有仙人經穴見而哀之具問其詳瞿知其非常人叩頭自陳乞命於是仙人取囊中藥賜之教其服百餘日瘡愈顔色恱肌膚潤仙人再過視之瞿謝活命之恩乞遺其方仙人曰此是松脂彼中極多汝可煉服之長服身轉輕力百倍登危陟險終日不困年百歲齒不墮髮不白夜臥常見有光大如鏡抱朴子腳瘡有人患腳瘡冬月頓然無事夏月臭爛疼痛不可言一道人視之曰爾因行草上惹著蛇交遺瀝瘡中有蛇兒冬伏夏出故疼痛也以生蝦䗫搗碎傅之日三四換凡三日有一小蛇自瘡中出以鐡鉗取之其病遂愈摘青雜說黃連愈癬指揮使姚歡年八十餘鬚髮不白自言年六十歲患癬疥周匝頂踵或教服黃連遂愈久服故髮不白其法以宣連去鬚酒浸一宿焙乾為末蜜丸桐子大日乾臨臥酒吞二十粒東坡大全五絶病五絶五絶病者一曰自縊死氣已絶二曰墻壁屋崩壓死氣已絶三曰溺水死氣已絶四曰鬼魘死氣已絶五曰産乳死氣已絶並能救治之問葛生授何人得此神術能活人命生曰我因入山採藥遇白衣人問曰汝非葛醫生否我乃半夏之精汝遇人有五絶之病用我救治即活但用我作末水丸令乾入鼻中即生矣名醫録治卒死劉太丞毗陵人有鄰家朱三只有一子年三十一歲忽然卒死脉全無請太丞治之取齊州半夏細末一大豆許納鼻中良久身微暖氣更蘇迤邐無事人問卒死太丞單方半夏如何活得死人答曰此南嶽魏夫人方出外臺祕要凍死人路逄凄風苦雨繁霜大雪衣服沾濡冷氣入臟致令隂氣閉於內陽氣絶於外榮衛結瀝不復通故致禁絶而死若早得救療血溫氣通則生又云凍死一日猶可活過此則不可也溺死人為水所沒水從孔竅入灌注臟腑其氣壅閉故死若早拯救得出則泄瀝其水令氣得通便得活也又云半日及一日猶可活氣若已絶心上暖亦可活自縊人有不得志意者多生忿恨往往自縊若覺早雖已死徐徐捧下其隂陽經絡雖暴壅閉而臟腑真氣未盡所以猶可救若遽斷其繩則氣不能還不得生又云自旦及暮雖冷猶可活自暮至旦則難活此謂晝則陽盛其氣易通夜則隂盛其氣難通又云夏熱易治氣雖斷而心微溫一日以上猶可活夏日熱倒人法暑月熱倒人昏迷悶亂急扶在隂凉處切不可與冷飲當以布巾衣物等蘸熱湯覆臍下及氣海間續續以湯淋布帛上令徹臍腹但暖則漸醒也如倉卒無湯處掬道上熱土於臍端以多為佳冷則頻換也後與解暑毒藥若才熱倒便與冷飲或用冷水淋之類即死舊有一法或道途無湯處即掬熱土於臍上仍撥開作窩子令衆人旋溺於其中以代熱湯亦可取效解者用白虎湯竹葉石膏之類凡覺中暑急嚼生薑一大塊冷水送下如已迷悶嚼大蒜一大瓣冷水送下如不能嚼即用水研灌之立醒路中倉卒無水渴甚急嚼生葱二寸許和津同咽可抵飲水二升集驗方疝癉痺湧疝齊郎中令循病衆醫皆以為蹶人中而刺之淳于意診之曰湧疝也令人不得前後溲循曰不得前後溲三日矣意飲以火齊湯一飲得前溲再飲大溲三飲而疾愈病得之內所以知循病者切其脉時右口氣急脉無五臟氣右口脉大而數數者中下熱而湧左為下右為上皆無五臟應故曰湧疝中熱故溺赤也氣疝齊北宫司空命婦出於病衆醫皆以為風入中病主在肺刺其足少陽脉淳于意診其脉曰病氣疝客於膀胱難於前後溲而溺赤病見寒氣則遺溺使人腹腫出於病得之欲溺不得因以接內所以知出於病者切其脉大而實其來難是厥隂之動也脉來難者疝氣之客於膀胱也腹之所以腫者言厥隂之絡結小腹也厥隂有過則脉結動動則腹腫意即灸其足厥隂之脉左右各一所即不遺溺而溲清小腹痛止即更為火齊湯以飲之三日而疝氣散即愈牡疝安陵阪里公乘項處病淳于意診脉曰牡疝牡疝在膈下上連肺病得之內意謂之慎無為勞力事則必嘔血死處後蹴踘要蹶寒汗出多即嘔血意復診之曰當旦夕死即死病得之內所以知項處病者切其脉得畨陽畨陽入虛裏處旦夕死一畨一絡者牡疝也意曰他所診期决死生及所活已病衆多頗忘之不能盡識不敢以對肺消癉齊章武里曹山跗病淳于意診其脉曰肺消癉也加以寒熱即告其人曰死不治適其共養此不當醫治法曰後三日而當狂妄起行欲走後五日死即如期死山跗病得之盛怒而以接內所以知山跗之病者意切其脉肺氣熱也脉法曰不平不鼓形弊此五臟髙之逺數以經病也故切之時不平而代不平者血不居其處代者時參擊並至乍躁乍大也此兩絡脉絶故死不治所以加寒熱者言其人尸奪尸奪者形弊形弊者不當關灸石及飲毒藥也臣意未往診時齊太醫先診山跗病灸其足少陽脉口而飲之半夏丸病者即泄注腹中虛又灸其少隂脉是壞肝剛絶深如是重損病者氣以故加寒熱所以後三日而當狂者肝一絡連屬結絶乳下陽明故絡絶開陽明脉陽明脉傷即當狂走後五日死者肝與心相去五分故曰五日盡盡則死矣腎痺齊王黃姫兄黃長卿家有酒召客召淳于意諸客坐未上食意望見王后弟宋建告曰君有病往四五日君腰脅痛不可俯仰又不得小溲不亟治病即入濡腎及其未舍五臟急治之方今客腎濡此所謂腎痺也宋建曰然建故有腰脊痛往四五日天雨黃氏諸倩倩者女壻也見建家京下方石京者倉廩之屬即弄之建亦欲效之效之不能起即復置之暮腰脊痛不能溺至今不愈建病得之好持重所以知建病者臣意見其色太陽色乾腎部上及界要以下者枯四分許故以往四五日知其發也意即以柔湯使服十八日而病愈胸痺古有患胸痺者心中急痛如錐刺不得俯仰蜀醫為胸府有惡血故也遂取生韭數斤搗汁令服之即果吐出胸中惡血遂差又蕭炳謂小兒初生宜與韭根汁灌之吐出惡血長則無病驗韭能歸心氣而去包中惡氣治胸中也名醫録熱病氣齊中御府長信病淳于意入診其脉告曰熱病氣也然暑汗脉少衰不死曰此病得之當浴流水而寒甚已而熱信曰唯然往冬時為王使於楚至莒縣陽周水而莒橋梁頗壞信則攬車轅未欲渡也馬驚即墮信身入水中幾死吏即來救信出之水中衣盡濡有間而身寒已熱如火至今不可以見寒意即為之液湯火齊逐熱一飲汗盡再飲熱去三飲病已即使服藥出入二十日身無病者所以知信之病者切其脉時并隂脉法曰熱病隂陽交者死切之不交并隂并隂者脉順清而愈其熱雖未盡猶活也腎氣有時間濁在太隂脉口而希是水氣也腎固主水故以此知之失治一時即轉為寒熱脾氣齊丞相舍人奴從朝入宫淳于意見之食閨門外望其色有病氣意即告宦者平平好為脉學臣意所意即示之舍人奴病告之曰此傷脾氣也當至春膈塞不通不能食飲法至夏泄血死宦者平即往告相曰君之舍人奴有病病重死期有日相君曰卿何以知之曰君朝時入宫君之舍人奴盡食閨門外平與倉公立即示平曰病如是者死即召舍人奴而謂之曰公奴有病不舍人曰奴無病身無痛者至春果病至四月泄血死所以知奴病者脾氣周乘五臟傷部而交故傷脾之色也望之殺然黃察之如死青之兹衆醫不知以為大蟲不知傷脾所以至春死病者胃氣黃黃者土氣也土不勝木故至春死所以至夏死者脉法曰病重而脉順清者曰內關內關之病人不知其所痛心急然無苦若加以一病死中春一愈順及一時其所以四月死者診其人時愈順愈順者人尚肥也奴之病得之流汗數出炙於火而以出見大風也以上史記脾疸有病口甘者土氣之溢也名曰脾疸有病口苦者名曰膽疸胃疸已食如饑者胃疸胃熱則消榖也靣腫曰風足脛腫曰水目黃曰黃疸醫功報應許學士許叔微少嘗以登科為禱一夕夢神告曰汝欲登科須憑隂德叔微自念家貧無力惟醫乃可於是精意方書久乃通妙人無髙下皆急赴之既而所活愈多聲名益著復夢其神授以一詩曰藥有隂功陳樓間處堂上呼盧喝六作五是年登第六名進士第上一名陳祖言下一名樓材及注關用升甲恩如第五名授職官以歸與詩中之言無一字差此則濟人之病急者也聶醫善士儀州華亭人聶從志良醫也邑丞妻李氏病垂死治之得生李氏美而淫慕聶之貌他日丞往旁郡李僞稱疾使邀之伺其至語之曰我幾入鬼録賴君復生顧世間物無足以報德願以此身供枕席之奉聶驚懼趨而出逮夜李復盛飾而就之聶絶袖脫去乃止亦未嘗與人言後歲餘儀州推官黃靖國病隂吏逮入冥證事且還行至河邉見獄吏捽一婦人剖其腹濯其腸而滌之傍有僧語曰此乃子同官某之妻也欲與醫者聶生通聶不許可謂善士其人止六十夀以此隂德遂延一紀仍世世賜子孫一名官婦人减算如聶所增之數所以蕩滌腸胃者除其淫也靖國素與聶善既蘇密往訪之聶驚曰方私語時無一人聞者而奔來之夕吾獨處室中此唯婦人與吾知耳君安所得聞靖國具以告聶死後一子登科其孫圗南紹興中為漢中雒縣丞屬仙井喻迪孑焉正汝礪作隱德詩數百言以發潜德此不復載夷堅志用詭道以劫流俗王居安秀才久苦痔疾聞蕭山有善工力不能招致遂命舟自烏程走錢塘舍於靜邸中使人迎醫醫絶江至杭既見欣然為治藥餌且云請以五日為期可以除根本初以一藥放下大腸數寸又以一藥洗之徐用藥線結痔信宿痔脫其大如桃復以藥餌調養數日遂安此工初無難色但放下大腸了方議報謝之物病者知命懸其手盡許行橐為酬方許治療又玉山周僅調官京師舊患膀胱氣外腎偏墜有貨藥人云只立談間可使之止約以萬錢及三縑之報相次入室中施一針所苦果平周大喜即如數負金帛而去後半月其疾如故使人訪醫者已不見矣古之賢人或在醫卜之中今之醫者急於聲利率詭道以劫流俗殆與穴坯挾刃之徒無異豫目擊二事今書之以為世警泊宅編徐樓臺當塗外科醫徐樓臺孫大郎於紹興八年療溧水縣蠟山富民江舜明背疽因邀謝錢三百千之外復覔銀二十五兩未許遂以紙撚點藥入瘡病甚致斃不一年徐病熱哀呌不絶但云舜明莫打我數日死其子隨母改嫁其醫遂絶丁志符助教宣城符裏鎮人符助教治癰疽操心亡狀病者瘡不毒先以藥發之忽一黃衣卒來持片紙示之云隂司追汝以藤杖㸃其背符大呌痛黃衣曰汝元來也知痛隨手成大疽而死水陽陸醫宣城管內水陽村醫陸陽字義若以技稱建炎中朱莘老編修妻避盜驚憂致疾陸誤投以小柴胡湯殺之溧水髙淳鎮李氏子病瘵召之用功未效從出娼家飲索錢并酒饌不與投以剛劑數十粒又殺之紹興九年陸暴病呼曰朱宜人李六郎休打我我便去也旬日死同上醫僧瞽報溫州醫僧法程字無枉少瞽百端治之不愈但晝夜誦觀世音菩薩名號如是十五年夢中聞菩薩呼之使前若有物縶其足不可動菩薩嘆曰汝前世為灸師誤灸損人眼今生當受此報難以免但吾憐汝誠心當使汝衣食豐足遂探懷中掬寶珠滿手與之既寤醫道大行衣鉢甚富至七十餘猶在申志下胎果報京師有一婦人姓白有美容京人皆稱為白牡丹貨下胎藥為生忽患腦痛日增其腫名醫治之皆不愈日久潰爛臭穢不可聞每夜聲喚逺近皆聞之一日遂說與家中曰我所蓄下胎方盡數為我焚之戒子弟曰誓不可傅此業其子告母云我母因此起家何棄之有其母曰我夜夜夢數百小兒咂我腦袋所以疼痛呌喚此皆我以毒藥壞胎獲此果報言訖遂死名醫録段承務宜興段承務醫術精髙然貪顧財賄非大勢利者不能屈致翟忠惠公居常熟欲見之不可諉平江守梁尚書邀之始來既回平江適一富人病來謁醫段曰此病不過湯藥數劑可療然非五百千為謝不可其家始許半酬拂衣去竟從其請别奉銀五十兩為藥資段求益至百兩乃出藥為治數日愈所獲西歸中塗夜夢一朱衣曰上帝以爾為醫而厚取賄賂殊無濟物之心命杖脊二十遂敕左右捽而鞭之既寤覺脊痛呼僕視之捶㾗宛然還家未幾而死已志鮑君大王明州人家女既嫁歸寧媵妾幽蘭從羣婢往後園挑菜忽悶眩仆地言語無倫如有憑附扶至房半日方醒問其故曰吾必死矣吾前生是河北眼科醫有村媪獨處病赤目吾隂利其資投轉藥殺之盡掩室中之藏外無一知者媪訴諸東嶽命逮治而吾冥數未竟不可尋索後二十年前身死又注生此州媪久抱恨泉壤復往訴嶽帝憐之擇健駚賫文書詣天下郡縣求訪殆遍末乃到浙東既至此將入城閽卒呵問示以文書卒曰是城隍符耳吾城中事乃鮑君大王主之城隍無預拒不得入駚與媪迤邐至城外三十里髙橋下潜伏纍日别有鬼吏從西來亦駐橋邉與嶽駚更問訊吏曰吾正𨽻鮑君為急足近往洞庭君山廟投書回幸此相遇吾極念汝能從吾行當祈城卒令入也二人拜謝偕往果得入徑詣鮑君殿下呈􅊾鮑君展視曰此檄城隍神也汝何自而入駚悉以實告鮑君呼曩吏曰只差汝同追吏聲喏挾駚媪同出數日不值一夕中秋街巷聞老婦燒夜香者祝云有女子在某宅為從嫁其詞云云媪欣然曰寃家可得矣趨至其居而門神不納又伏藏後園適審認已為冥中所録行且就逮宿世寃孽定無脫理家人欲召巫史救之未暇媵自持刀剔雙目而死戊志醫不貪色宣和間有一士人抱病經年百治不瘥有何澄者善醫其妻召至引入密室中告之曰妾以良人抱疾日久典賣殆盡無以供湯藥之資願以身相酬醫正色拒之曰小娘子何為出此言但放心當為調治取效切不可以此相汚萬一外人知之非獨使某醫藥不效不有人誅必有鬼責未幾其夫疾愈何澄一夕夢神引入神祠有判官語之汝醫藥有功不於艱急之際以色欲為貪亂良人婦女上帝令賜汝錢五萬貫官一資未數月東宫得疾國醫不能治有詔召草澤醫澄乃應詔進劑而愈朝廷賜錢三千貫與初品官自後醫道盛行京師號為何藥院家醫以救人為心醫者當自念云人身疾苦與我無異凡來請召急去無遲或止求藥宜即發付勿問貴賤勿擇貧富專以救人為心冥冥中自有祐之者乘人之急故意求財用心不仁冥冥中自有禍之者吾鄉有張彥明善醫僧道貧士軍兵及貧者求藥皆不受錢或反以錢米與之來請召雖至貧下亦去富者以錢求藥不問多寡必多與藥期於必愈未嘗萌再携錢來求藥之心病若危篤亦多與好藥以慰其心終不肯受錢豫與處久詳知其人為醫而口終不言錢可謂醫人中第一等人矣一日城中火災周回爇盡烟焰中獨存其居一歲牛災尤甚而其莊上獨全此神明祐助之其子讀書乃預魁薦孫二三人皆龎厚俊爽亦天道福善之信然也使其孜孜以錢物心失此數者所得不足以償所失矣同門之人可不鑑哉醫說卷十
