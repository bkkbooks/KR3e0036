body:
  text: 醫説卷三宋張杲撰神方夢獲神方虞雍公并甫紹興二十八年自渠州守召至行在憩北郭外接待院因道中冒暑得泄痢疾連月重九日夢至一處類神仙居一人被服如仙官延之坐視壁間有韻語藥方一紙讀之數遍其詞曰暑毒在脾濕氣連腳不㵼則痢不痢則瘧獨煉雄黄蒸餅和藥甘草作湯服之安樂别作治療醫家大錯夢囘尚能記即録之葢治暑泄方也如方服遂愈夷堅志夢藥愈眼疾饒州民郭端友精意事佛紹興乙亥之冬募衆紙筆縁自出力以清旦静念書華嚴經期滿六部乃止癸未之夏五部將終忽兩目失光翳膜障蔽巫醫鍼刮皆無功自念唯佛力可救次年四月晦誓心一日三時禮佛觀音願於夢中賜藥或方書至五月六日夢皂衣人告曰汝要眼明用獺掌散熊膽丸則可明日遂詣市藥但得獺掌散㸃之不效後於道藏獲觀音治眼熊膽丸方舉室驚喜即依方市藥旬日乃成服之二十餘日藥盡眼明至是年十月平復如初即日接書前帙感靈應特異増為十部乃止今眸子瞭然外人病目疾者服其藥多愈藥用十七品南熊膽一分為主黄連宻蒙花羌活各一兩半防己二兩半草龍膽蛇蜕地骨皮大木賊仙靈脾皆一兩瞿麥旋復花甘菊花皆半兩蕤仁二錢半麒麟竭一錢蔓青子一合同為細末以羯羊肝一具煑其半焙乾雜於藥中取其半生者去膜爛研入上件藥杵而丸之桐子大飯後米飲下三十丸諸藥修治無别法唯木賊去節㽔仁用肉蔓青水淘蛇蜕炙云夷堅志觀音治痢李景純傳有一婦人乆患痢將死夢中觀音菩薩授此方服之遂愈用木香一味細末水飲調服本草人參胡桃湯洪輯居溧陽縣西寺事觀音甚敬㓜子佛䕶病痰喘醫不能治凢五晝夜不乳食證危甚又呼醫杜生診視曰三嵗兒抱病如此雖扁鵲復生無如之何爾輯但憂泣辦凶具而其母以嘗失孫愁悴尤切輯益窘懼投哀請禱於觀音至夜中妻夢一婦人自後門入告曰何不服人參胡桃湯覺而語輯輯灑然悟曰是兒必活此葢大士垂教爾急取新羅人參寸許胡桃肉一枚不暇剥治煎為湯灌兒一蜆殻許喘即定再進遂得睡明日以湯剥去胡桃皮取净肉入藥與服喘復作乃即如昨夕法治之信宿有瘳此藥不載於方書葢人參定喘而帶皮胡桃則歛肺也予以淳熈丁未四月有痰疾之撓因晚對上宣諭使以胡桃肉三顆生薑三片臨卧時服之畢即飲湯三兩呷又再嚼桃薑如前數且飲湯勿行動即就枕既還玉堂如恩指敬服旦而嗽止痰不復作輯之事亦類此云已志懸癰糓道外腎之間所生癰毒名為懸癰醫書所不載世亦罕有知者初發唯覺甚癢壯如松子大漸如蓮實四十餘日後始赤腫如胡桃遂破若破則大小便皆自此去不可治矣其藥用横紋大甘草一兩截長三寸許取山澗東流水一大盌井水河水不可用以甘草蘸水文武火慢煑不可性急須用三時乆水盡為度擘視草中潤然後為透却以無灰酒兩椀煑俟至一半作一服溫服之初未便效驗二十日始消未破者不破可保安平雖再進無害興化守姚康朝正苦此癰衆醫拱手兩服而愈神授乳香飲吳大昔以泥補葺善神後因結屋墜梯折傷腰勢殊亟夢神來云汝昔嘗救我我不敢忘授以乳香飲其方用酒浸虎骨敗龜黄蓍牛膝萆薢續㫁乳香七品覺而能記即喚子買藥敬服之一旬愈已志夢張王藥愈癰時康祖為廣徳宰事張王甚敬舉家不食猪肉後授溫倅下體抱疾小愈左乳復生癰繼又胷臆間結核其大如拳堅如石荏苒半歳百藥皆不能施已而牽掣臂腋徹於肩痛楚特甚亟禱王祠下夢間語曰若要安但用薑自然汁製香附服之可也夢覺呼其子檢本草視之二物治證相符訪醫者張棣亦云有理遂用香附去毛薑汁浸一宿為末二錢米飲調才數服瘡膿流出腫硬漸消自是獲愈庚志救疫神方靖康二年春京師疫氣大作有異人書一方於齋舎凢因疫發腫者服之無不效其方黒豆二合炒令香熱甘草二寸炙黄以水二盞煎其半時時呷之同上治吐血秀州進士陸迎忽得疾吐血不止氣蹷驚顫狂躁跳躍雙目直視至深夜欲㧞户而出如是兩夕諸醫遍用古方及草澤單方拯療不瘳舉家哀訴所事觀音夢授一方但服一料當永除根本用益智一兩生珠二錢青皮半兩麝一錢碾細末燈心湯調陸覺取筆記之明日治藥隨手而愈同上吕真人治目疾江陵傅氏家貪鬻紙為業性喜雲水見必邀迎小閣塑吕仙翁像朝暮焚香敬事甚謹雖妻子不許入一日有客方巾布袍入共語曰適有百金邀傅飲傅目昏多淚客教用生熟地黄切焙椒去目及閉口者微炒三物等為末蜜丸桐子大五十丸鹽米飲空心下傅如方治藥不一月目明夜能視物享年八九十耳目聪明精力如少年辛志驚風妙藥趙周氏之子三歳忽驚風掣瘲體如反張弓不納乳食四肢盡冷衆醫莫能措手族弟善信來云邑主簿李賡藏一方療此證如神急求併力治藥才合就便以擦兒齒少頃作噦咳聲手稍轉動自夜至旦灌兩餅從此平復趙焚香設誓將終其身以施人名蝎稍餅子用赤足全吳蚣一條蝎梢乳香白花蛇肉朱砂天南星白殭蚕各半兩麝香三錢凢八味砂乳麝别研蛇酒浸去皮骨取净南星煨􅉯蚕生用與蜈蝎五者為末别研三者和均酒糊丸揑作餅徑四分煎人參或薄荷或金銀花湯磨化一粒周歳以下者半之全活小兒不可計庚志治内障羊肝丸治目方用黄連者多矣而羊肝丸尤竒特異用黄連末一兩白羊子肝一具去膜同於砂盆内研令極細衆手為丸梧桐子大毎服以溫水下三十丸連作五劑但是諸目疾及翳障青盲皆治忌猪肉冷水唐崔承元者因官治一死囚出活之囚後數年以病目致死一旦崔為内障所苦喪明逾年後半夜嘆息獨坐忽聞堦除悉􅌥之聲問為誰徐曰是昔䝉活囚今故報恩至此遂以此方告言訖而沒崔以此合服不數月眼復明神精丹許叔微家一婦人夢二蒼頭一在前一在後手中持一物前者云到也未後者應云到也擊一下爆然有聲遂魘覺後心一㸃痛不可忍昏悶移時叔微所合神精丹有此證即取三粒令餌之過數刻痛止遂醒其方出千金中殆晋景公夢二竪之比也同上寒嗽晋之姪事觀音甚謹適苦嗽踰月夜夢老僧呼謂之曰汝嗽只是感寒吾有方授汝但用生薑一物切作薄片焙乾為末糯米糊丸芥子大空心米飲下三十丸覺如其言數服而愈癸志丁公藤愈風南史解叔謙鴈門人母有疾夜於庭中稽顙祈告聞空中云得丁公藤治即差訪醫及本草皆無至宜都山中見一翁伐木云是丁公藤療風乃拜泣求得之及漬酒法受畢失翁所在母疾遂愈本草豨薟丸江陵府節度使進豨薟丸方臣有弟訮年三十一中風牀枕五年百醫不差有道人鍾鈄者因覩此患可餌豨薟丸必愈其藥多生沃壌五月間收洗去土摘其葉及枝頭九蒸九曝不必太燥但取蒸為度杵為末煉蜜丸梧子大空心溫酒米飲下二三十丸所患忽加不得憂至四十服必復如故五十服當丁壯奉宣付醫院詳録又知益州張詠進表云臣因換龍興觀掘得一碑内説修養氣術并藥二件依方差人訪問採覓其草頗有異金稜銀線素根紫荄對節而生蜀號火杴莖葉頗同蒼耳誰知至賤之中乃有殊常之效臣自喫至百服眼目精明即至千服鬚髪烏黒筋力輕健效驗多端臣本州有都押衙羅守一曽因中風墜馬失音不語臣與十服其病立痊又和尚智嚴年七十患偏風口眼喎斜時時吐涎臣與十服亦便瘥今合一百劑差職員史元奏進同上一服飲福康梁緄心脾疼痛數年之間不能得愈服藥無效或教供事穢跡神且誦咒語乆之夢中告曰與汝良藥名為一服飲可取髙良薑香附子等分如本條修製細末二錢七溫以陳米飲下空心服為佳不煩再服已而果驗後嘗以濟人皆效類編然百一選方云二味須各炒後合若同炒即不效診法診法診法常以平旦隂氣未動陽氣未散飲食未進經脉未盛絡脉調均氣血未亂故乃可診有過之脉切脉動静而視精明察五色觀五臟有餘不足六腑強弱形之盛衰以此參决死生之分千金方動脉十二經皆有動脉獨取寸口以决五臟六腑死生吉凶之法寸口者脉之大㑹手太隂之動脉也人一呼脉行三寸一吸脉行三寸呼吸定息脉行六寸人一日一夜凢一萬三千五百息脉行五十度周於身漏水下百刻榮衛行隂陽各二十五度為一周也故五十度復㑹於手太隂太陽者寸口也即五臟六腑之終始千金方脉行氣順逆孫尚藥曰凢診脉先視人之長短肥瘦形氣相得者不病形氣不相得者病形氣損者危形氣反者死形氣既反脉又加之懸絶者形氣俱病見者立死故人長脉亦長人短脉亦短人肥脈亦厚人瘦脉亦急此形氣之相得也然人頼五行以生而常為八邪所攻若非果有誤中他邪得病亦易為治療謂形氣相得也形氣不相得而反者謂人長脉短之類若得病必難拯治此是人之氣候無病者不乆當病病者危危者死矣切須畏忌樽節和氣養神勿更恣意不慎轉耗天真深思深思鷄峰方四時之脉凢脉順四時者謂春弦夏洪秋毛冬石中有和氣軟滑而長乃是不病之人得病即易為治療蓋從和氣而生也用法萬全如氣反脉逆形氣相失名曰不可治是形盛氣虛形虛氣盛故不可治也凢人形氣俱虛安糓者過期而死不安糓者不過期而死安糓謂飲食尚進期是八節之氣候也鷄峰方肥痩虛實診脉治病必先度人之肥瘦以調氣之虛實虛則補之實則泄之若形瘦脉大胷中多氣者必死是形氣俱不足而脉反有餘故死也故人形盛脉細少氣不足者危危者近於死也猶有可治之理以氣不足而形盛故也其形氣相得者生是人形氣肥瘦長短氣候相得故生也參伍不調者病謂脉氣交亂而不調故病也上下寸闗尺三部脉如參舂者病甚也三部脉左右手十至不可數者死是一呼一吸脉來徃十至已上無生氣也故死矣鷄峰方形氣相得相反大凢診脉先定四時之脉便取太過不及虛實冷熱寒溫至數損益隂陽盛衰五行生尅臟腑所屬看之以為大法然後取其人形神長短肥瘦氣候虛實盛衰性氣髙下布衣血食老㓜強弱但順形神四時五氣氣候無過者生之本其形氣與五形反者危病若過盛而形氣反逆脉有懸絶者死不治矣鷄峰普濟方善别脉郭玉廣漢人也後漢章帝時為侍郎為人善别脉知人生死帝令童男衣女子之衣詐云有病使玉診脉玉曰此女誰言病據脉狀陽盛隂弱臣謂非女帝善之遷五官中郎將龎安常脉法察脉之要莫急於人迎寸口是二脉相應如兩引繩隂陽均則繩之大小等凢平人之脉人迎大於春夏寸口大於秋冬何謂人迎喉旁取之内經所謂别於陽者也越人不盡取諸穴之脉但取手太隂之行度魚際后一寸九分以配隂陽之數而得闗格之脉然不先求喉手引繩之義則昧尺寸隂陽闗格之所起寸四倍於尺則上魚而為溢故言溢者寸倍尺極矣溢之脉一名闗一名内格一名隂乘之脉曰外闗者自闗以上外脉也隂拒陽而出故曰外格隂生於寸動於尺今自闗以上溢於魚際而闗以后脉伏行是為隂壯乘陽而陽竭陽竭則死脉有是者死矣此所謂寸口四倍於人迎為闗隂之脉者也闗以后脉當一寸而沉過者謂尺中倍於寸口至三倍則入尺而為覆故言覆者尺倍寸極矣覆之脉一名曰内闗一名曰外格一名曰乘陽之脉内闗者闗以下内脉也外格者陽拒隂而内入也陽生於尺動於寸今自闗以下覆入尺澤而闗以前脉伏行則為陽亢乘隂而隂竭亦死脉有是者死矣此所謂人迎四倍於寸口為格陽之脉也經曰人迎於寸口皆盛過四倍則為闗格闗格之脉羸不能極天地之精氣而死所謂闗格者覆溢是也雖然獨覆獨溢則補㵼以生之尺部一盛㵼足少陽補足厥隂二盛㵼足太隂補足少隂三盛瀉足陽明補足太隂皆一瀉而一補之四盛則三陽極導之以斜當盡取少陽太隂陽明之冗脉静者取三陽於足脉數者取於手瀉陽二當補於隂一至寸而反之脉有九候者寓浮中沉於寸闗尺也且越人不取十二經穴者直以二經配合於手太隂行度自尺至寸九分之位復分三部部中有浮中沉以配天地人也又曰中風木傷寒金溫水熱火溫病起於濕濕則土病土病而諸臟受害其本生於金木水火四臟之變也陽浮隂濡為風溫陽數隂實為溫毒陽濡隂急為濕溫隂陽俱盛為溫瘧其治之也風濕取足厥隂木手少隂火溫毒專取少陽火傷寒取手太隂金手少隂火濕温取足少隂水鄉人皆為我能與傷寒語我察傷寒與四溫變辯其疑似而不可亂也故定隂陽於喉手配覆溢於尺寸寓九侯於浮沉分四溫於傷寒此皆扁鵲略開其端而余參以内經諸書考究而得其説審而用之順而治之病不得逃焉張右史集太素之妙予伯祖張諱擴字子充歙人也家舊以財雄鄉里族人有以醫名者因畱意焉長聞蘄水道人龎君安常以醫聞淮甸徑從之逰一日丐者扣門自言為風寒所苦龎君令以藥濟之丐者問當用何湯使龎君見其手執敗扇指以此煎湯調所服之藥公初不省其意乃曰豈非本草所謂敗扇能出汗者乎龎曰然公辭歸嘆曰龎君用藥則善矣聞川有王朴先生者其察脉非特知人之病而太素之妙能測人之死生禍福見於未著之前服膺㡬年盡得其妙乃辭而歸先是宣之南陵有富者惟一子而家累萬計適中寒疾以為不可救則氣息僅存以為可療則邈不知人召公治之公笑曰正有此藥然此病證後三日當蘇蘇必欲飲水則以此藥與之服畢當酣寢切勿驚動醒則汗解而安矣富者如其言其子之疾果愈南陵宰其妻亦苦寒疾醫者環視無所措手公探囊中得藥服之疾起矣如其言而亦安祈門宰陳君􅐐聞公之名召之是時縣學士子餘三十人聞公太素之妙丞相汪公廷俊預學職陳請遍診生員公診至丞相則曰南人得北脉後官當為相國然登第後必自北方起時丞相欲徃京師家貧公力賛其行至京師邈未有遇因言於公曰恐誤所許之術公曰安之當達矣未踰年果登第授北京大名簿徊環北京而梁公子美辟之遷至大中大夫後至宣政末力贊太上皇入繼大寳而正位槐鼎皆自北方起也丞相范公堯夫當徽廟即位之初朝廷以其舊徳元勲將虛左召之而丞相嬰疾召公診視問曰某此去夀㡬何公曰丞相脉不出半年丞相曰使某得至京師皆先生力也公曰如此則可丞相遂同公朝京師朝廷方欲大用范公力辭授以醴泉觀使奏公以假承務郎丞相後果以不起聞矣公出京至宋尚書蹇公序辰知應天府召公察脉公白尚書無官脉旦夕必有失俄被㫖放歸田里未踰半年復召公察脉問曰某復如何公曰今日之脉與前不同當得郡矣不踰時而知杭州蔡元度樞宻吳國夫人王荆公女也有疾召公而愈嘆曰天下醫工未有妙如張承務者黄君謨誥授淮西提刑過當塗遇之公察脉而言曰大夫食禄不在淮西相次還朝矣然非今日宰相所謂宰相者猶未起起則有召命不滿歳當三遷又曰大夫不病而細君病良可憂九月矣後朝廷召蔡公京用之而黄君階此而進一歳之内皆如公言作序送公曰余自崇寧年中授淮西提刑待次南歸過當塗遇故人張子充為予切脉而言曰大夫食禄不在淮西相次還朝矣然非今日宰相所謂宰相者猶未起起則有召命不滿歳當三遷又曰大夫不病而細君病良可憂九月今丞相蔡公當國被㫖除户部郎中八月遷吏部九月長夀縣君卒十二月遷左司此數者與子充之言若合符節夫察人之脉知其病不病可治不可治故有之矣察夫之脉而知婦生死者間或有之至於察庻官之脉而知當朝宰相之出入未之見也自非術數窮天地智識窺造化其孰能與於此哉三年六月為之賦詩因序其略黄山樓掛斗牛星三十六峰森翠屏溫泉一泒瀉東溟下有丹砂連赤城軒轅黄帝招廣成採山飲水學長生夜半常談内外經飄風驟雨迅雷霆獨騎龍去逰天庭至今山水黙通靈張君盡得其精英溫潤如玉清如氷放指測人無遁形三尸九蟲潛震驚富貴貧賤及死生自量多少提重輕無嫌黒白太分明片言隻字皆至誠當時宰相及公卿邀至在門倒屣迎其言簡嫚色驕矜馬須欲徃人不行惠然訪我來嵓扄且謂連珠脉已形口不可傳心可銘一飲三㪷如建瓴老夫先醉君獨醒短歌不足為先聲尚有史官書姓名及姑熟李公端叔之儀青山郭公功甫祥正尚書黄公道夫太尉薛公肇明皆與之遊先是功甫有子得異疾四肢如削人視其氣息僅存以命在須臾召公診之公曰無足憂翌日功甫飯公公曰所召何人功甫即言所召者惟吾子充一人而已公曰可増一客及期問公何人可預此席公以郭之病子對功甫曰兒如此豈能陪燕豆公未應間力請其子同席遽授一藥酒未再進疾大作涎沫皆出公令視之必有物在其間果得一魚骨隨出舊疾因頓愈有詩送公云公不見左真人韓伯休聞名不可見今迺逢張侯張侯生新安聲名滿皇州探􅄨隂陽闗夀命推短修何代無異人志妙安可求靈丹輒起死固匪醫之流衣冠乃儒者眉宇仙氣浮願言分一粒洗我千歳憂髙飛出塵寰相􅇷汗漫遊而黄公道夫序之則曰張君字子充得脉於異人来逰京師能以疾證占休咎告於省府之官累累皆中或怪其異疑用它術寓言在脉予曰不然萬物墮五行數中五行之在五臟死生禍福之變動於脉見於面聞於聲乃其深切著明者也又何疑之哉其術方行於京師偶以憂還江上略書其事以告東南好事者與之共信焉元符己夘正月二十二日僉山黄尚書及紹興間待制曽公開守徽日視事之始因召先祖揮字子發醫乃問曽出外方否對以蚤歳從先兄子充徃建康公冄三嘆曰子充之術非常術也不知其為此邦人詢待制公迺薛公子壻爾當公在都下時鄉邦前軰在國學者無不扣之而殿院胡公汝明求診公曰公當登第然心脉未圓候圓則成矣後徃見之許其不出此舉遂中壬辰年之第先是士大夫聞公名者皆踵至沓來惟恐其後有授全齊貳車者方其未有所授公診脉謂之曰公脉止有七日及五日有全齊貳車之除乃曰張某妄人耳言我脉止有七日今五日乃有此除深怒之及七日晨起盥嗽遽仆於地子弟視之已不可救亟召公而告其疾公曰鰕逰脉見前已言之不可療矣其子後作文擬扁鵲過齊見齊桓之事推美公之先見如此公歸鄉時承議董正封為徽守召診其脉公曰承議今歳必當􅄻子董以為官既未該奏補亦非郊祀之年族人中亦未有可以奏官及之者疑之適宛陵幕僚㳂檄至徽亦云子充之言不獨許承議亦許宛陵守矣恐不足信未踰年而徽廟登極凢守土之臣並得捧表恩澤先祖隨侍至建康一日有一婦人扣門求藥伯祖偶不在舍先祖為診之既歸則禀伯祖以婦人六脉所受之患併所與之藥伯祖云如吾弟所與藥病當退矣此婦人據其脉氣當嫠居三年左乳下必有黒痣或再来當問之適及三日而婦人果再扣門先祖問其所以果如伯祖之言及紹興丙寅資政何公鑄謫居新安先祖累蒙資政招醫後何公有序送之云余自弱冠逰學金陵已聞張子充以醫名江東士大夫多神其術以謂其察脉非特知人之疾至於貴賤禍福期以歳月旬日若神余嘗異之而恨未識其人也後三十年余謫居新安識其弟揮方知子充為此邦人且聞其事甚詳揮嘗親授指教於子充故其議論有據切脉精審今為此邦醫師之冠余居徽三年多頼其診治故特書之因以見子充之術果不凢其傳於後者猶如此也惜乎公名盛於崇寧大觀時而享年止四十九卒於南昌是日也晨起見郡將云某之大事在今日午時後事必當累公郡將曰不至此否公曰吾診脉血已入心矣使人俟之果如期而卒張季明自記其伯祖子充事魚遊蝦戲太常博士楊日宣病寒郝允診曰君脉首震而尾息尾震而首息在法為魚逰蝦戱不可治不數日死邵氏見聞錄傷寒百痾之本真誥有言曰常不能慎事上者自致百痾之本而怨咎於神靈乎當風卧濕反責它人於失覆皆癡人也夫慎事上者謂舉動之事必當慎思若飲食恣情隂陽不節最為百痾之本致使虛損内起風濕外侵所以共成其害如此者豈得闗於神明乎惟當勤於藥術療理爾察病先識其源欲療病先察其源先候其病機五臟未虛六腑未竭血脉未亂精神未㪚服藥必活若病已成可得半愈病勢已過命將難全病之所由夫病之所由来雖多端而皆闗於邪邪者不正之因謂非人生之常理風寒暑濕饑飽勞逸皆各是邪非獨鬼氣疫癘者矣人生氣中如魚在水水濁則魚瘦氣昏則人病邪氣之傷人最為深重經絡既受此氣傳入臟腑臟腑隨其虛實冷熱結以成病病又相生故流遍遂廣精神者本宅身以為用身既受邪精神亦亂神既亂矣則鬼神斯入鬼力漸強神守稍弱豈得不致於死乎古人譬之植楊斯理當矣但病亦别有先從鬼神來者則宜以祈禱祛之雖曰可祛猶因藥療致益者李子豫有赤丸之例是也其藥療無益者是則不可祛晋景公膏肓之例是也大都鬼神之害則多端疾病之源惟一種蓋有輕重者爾三説本草六經傷寒用藥格法夫傷寒始自太陽逆傳陽明至於厥隂而止六經既别治法不同太陽屬膀胱非發汗則不愈必用麻黄者以麻黄生於中牟雪積五尺有麻黄處雪則不聚葢此藥能通内陽氣却外寒也陽明屬胃非通泄則不愈必用大黄芒硝以利之少陽屬胆無出入道柴胡與半夏能利能汗佐以子芩非此不解太隂屬脾中州土也性惡寒濕非乾薑白术不能溫燥少隂屬腎性畏寒燥非附子不能溫厥隂屬肝藏血養筋非溫平之藥不能潤養此經之常道也後學不知倫類妄意進餌遂致錯亂諸證蜂起夭傷人命可不究辯且三陽病汗下和解人必知之至太隂脾經溫燥不行亦當溫利自陽明出如溫脾丸用大黄者是也少隂腎經雖用附子復使麻黄則知少隂亦自太陽出厥隂用桂自少陽出明矣及其二陽􅉱閉皆當自陽明出故三隂皆有下證如少隂口燥咽乾下利清水太隂腹滿時痛厥隂舌捲腎縮皆當下之學者宜審詳不可率易投也傷寒有五傷寒有五有中風有傷寒有濕溫有熱病有溫病自霜䧏至春分傷風冷即病者謂之傷寒冬受寒氣春又中風而病者謂之溫病至夏病發者名􅉯病病而多汗者謂之濕溫其傷八節虛邪者謂之中風陽證傷寒程元章婺源㳺汀人與妻皆嗜食鼈婢梅香主炰飪每滋味不適口必撻之嘗得一大者長尺方操刀欲屠覩其伸縮顫悸為之不忍指而與言㝷常烹製少失必遭杖責罰今放汝不殺亦不過痛打一頓遂解縳置於舎後汙池中池廣二丈水亦未嘗竭程夫婦以鼈肥大且滿意飫餐既失之怒甚杖婢數十經二年婢患􅉯疾發狂奔躁不納粥飲體熱昏憒葢陽證也家人知不可療畀入池上茅亭以待絶命明日天未曉聞有扣宅後門扉者謂為鬼物叱去之乃言我是梅香病已無事乞令歸家啓闗信然問其故對曰半夜後髣髴見一黒物將濕泥草徧罨我身環繞三四十匝便覺心下開豁四肢清凉全無所苦始知獨在亭子内程氏未以為然迨暮便使徃傚昨夕偃卧而宻伺之見巨鼈自池出啣水藻浮萍遮覆其體程不省所以婢詳道本末云鼈比昔日其大加倍視尾後穿竅尚存於是涸池取得之送諸深溪程追悼前過不復食此鄉人聞者相傳為戒邑醫虞和仲時到彼親見其事為予引霖夢弼言􅉯證之極悴未可解者汲新井水浸衣裳互熨之為妙不謂水族細微亦能如此葢隂徳所招云類編竹葉石膏湯袁州天慶觀主首王自正病傷寒旬餘四肢乍冷乍熱頭重氣塞唇寒面青累日不能食勢已殆甚袁唯一醫徐生能調治此疾診之曰脉極虛是為隂證必服桂枝湯乃可觀宇去城三里徐居在城内畱藥而歸未及煮若有語之曰何故不服竹葉石膏湯王回顧不見寮中但有一老道士適入市只小童子在呼問之曰恰何人到此曰無人自惑焉急遣邀徐醫還正告曰或教我服此如何徐曰寒燠如氷炭君之疾狀已危果餌前藥立見委頓它日殺人之謗非吾所能任也自為煑桂枝湯一椀曰姑飲之正使不對病猶未至傷生萬一發燥狂眩旋用師所言未為晚方酬答次復聞耳傍人云何故不肯服竹葉石膏湯自正益悚矣俟徐去即買見成藥兩貼付童使煎又聞所告如初於是㫁然曰神明三告我殆是賜以更生安得不敬聴即盡其半先時頭不能舉若戴千斤倐爾清輕唇方漸暖咽膈通暢無所礙悉服之少頃汗出如洗徑就睡及平旦脫然如常時自正為人謹飭常茹素與人齋醮盡誠故為神所祐如此庚志聖散子之功聖散子主疾功效非一去年春杭州民病得此藥全活者不可勝數所用中下品藥畧計每千錢即得千服所濟已及千人昔薄拘羅尊者以一訶梨勒於一病比丘故獲報身身常無衆疾柴胡㕮咀朱肱吳興人尤深於傷寒在南陽太守盛次仲疾作召肱視之曰小柴胡湯證也請併進三服至晚乃覺滿又視之問所服藥安在取視乃小柴胡散也肱曰古人製㕮咀剉如麻豆大煑清汁飲之名曰湯所以入經絡攻病取快今乃為散滯在膈上所以胷滿而病自如也因旋製自煮以進兩服遂安夷堅志寒厥劉錫鎮㐮陽日寵妾病傷寒暴亡衆醫云脉絶不可治或言市上賣藥許道人有竒術可用召之曰是寒厥爾不死也乃請健卒三十人速掘地作坑熾炭數百介雜薪燒之俟極熱施薦覆坑舁病人卧其上葢以氊蓐少頃氣騰上如蒸炊遍體流汗衣被濕透已而頓蘓始取藥數種調治即日愈同上風濕不可汗下論風濕不可汗下春夏之交人病如傷寒其人汗自出肢體重痛轉仄難小便不利此名風濕非傷寒也隂雨之後卑濕或引飲過多多有此證但多服五苓散小便通利濕去則愈切忌轉瀉發汗小悮必不可救初虞世云醫者不識作傷風治之發汗下之必死己未年京師大疫死正為此予自得其説救人甚多壬辰年予守官洪州一同官妻有此證因勸其速服五苓散不信醫投發汗藥一夕而斃不可不謹也大扺五苓散能導水去濕耳胷中有停飲及小兒吐哯欲作癎服五苓散最效初君之說詳矣予因廣此説以信諸人信效方取汗不可先期南史記范雲初為陳武帝屬官武帝有九錫之命在旦夕矣雲忽感傷寒之疾恐不預慶事召徐文伯診視以實懇之曰可便得愈乎文伯曰便差甚易政恐二年後不復起矣雲曰朝聞道夕死可况二年乎文伯以火燒地布桃葉設席置雲扵上頃刻汗解裹以溫粉翌日愈雲甚喜文伯曰不足喜也後二年果卒夫取汗先期尚促夀限况不顧表裏不待時日便欲速效乎每見病者不耐未三四晝夜促汗醫者隨情順意鮮不敗事故予書此為醫者之戒本事方傷寒舌出臨安民有因傷寒而舌出過寸無能治者但以筆管通粥飲入口每日坐於門一道人見之咨嗟曰吾能療此頃刻間爾奈藥不可得何家人聞而請曰茍有錢可得當竭力訪之不肯告而去明日又言之至於旬時㑹中貴人罷直歸下馬觀病者道人適至其言如初中貴問所須乃梅花片腦也笑曰此不難致即遣僕馳取以付之道人屑為末掺舌上隨手而縮凢用五錢病立愈丁志四時癘疾周禮天官下曰疾醫長養萬民之疾病四時皆有癘疾春時有痟首疾頭痛夏時有痒疥疾秋時有瘧寒疾冬時有嗽上氣疾辯沙疾沙病江南舊無今東西皆有之原其證醫家不載大凡才覺寒慄似傷寒而狀似瘧但覺頭痛渾身壯􅉯手足厥冷鄉落多用艾灸以得沙為良有因灸膿血迸流移時而死者誠可憐也有雍承節印行此方云初得病以飲艾湯試吐即是其證急以五月蠶退紙一片碎剪安椀中以楪蓋宻以湯泡半椀許仍以紙封楪縫勿令透氣良乆乗熱飲之就卧以厚衣被葢之令汗透便愈如此豈不勝如火艾枉殘害人命敬之信之葉氏錄騐方暑氣所中今歳熱甚聞道路城市昏仆而死者此皆虛人勞人或饑飽失節或素有疾一為暑氣所中不得泄即闗竅皆窒非暑氣使然氣閉塞而死也古方治暑無它但用辛甘發散疏導心氣與水流行則無害矣崇寜乙酉歳余為書局時一養馬僕馳馬出局下忽仆地絶急以五苓大順散灌之皆不驗已踰時同舎王相使取大蒜一握道上熱土雜研爛以新水和之濾去滓决其齒灌之少頃即蘇至暮此僕為余復御而歸乃知藥病相對有如此者此方本徐州沛縣市門忽有板書釘其上或傳神仙以救人者沈存中王聖美皆著其説而余親驗之乃使書百本散逺近庻㡬有救其急者也石林老人避暑錄傷寒後睡不著人病傷寒陽證或患熱疾服凉藥而得愈飲食未充夜間輙睡不著是膽冷也若脉細身凉隨其虛實下金液丹一服大冷者下百粒及五六十粒不甚冷者三二十粒即睡著當以服證為凖也脉細微大便不甚實小便清面色青白舌下不紅面帶青色皆冷證也醫餘傷寒差後之戒傷寒病初差不可過飽及勞動或食羊肉行房事與食諸骨汁并飲酒病方愈脾胃尚弱食過飽不能消化病即再來謂之食復病方愈氣血尚虛勞太早病即再來謂之勞復又復寒食羊肉行房事並死食諸骨汁飲酒者再病龎安常云飲酒者亦死用藥不同夫傷寒中風濕溫熱病痙暍時疫雖同隂陽之法須别作治療若與傷寒同治必致危損經言脉有隂陽之法何也凢脉浮大洪數動滑此名陽脉也沉細澁弱弦微此名隂脉也隂病見陽脉者生陽病見隂脉者死審而察之諸風風者百病之始風者百病之始也清净則肉腠閉拒雖有苛毒弗能害故病乆則傳化上下不并良醫弗為中風用藥凢中風用續命排風風引竹瀝諸湯及神精丹茵芋酒之類更加以艾無不愈者然此病積習之乆非一日所能致皆大劑乆而取效唐書載王太后中風喑黙不語醫者蒸黄蓍數斛以薫之得差葢此類也今人服三五盞便求效責醫也亦速矣孟子曰七年之病三年之艾乆後知爾本事方中風凢人中風脉無不大者非熱也是風脉也中風有冷熱陽病則熱隂病則冷冷則用溫風藥熱則用凉風藥不可一槩用也凢中風皆不可吐出涎人骨節中皆有涎所以轉動滑利中風則涎上潮咽喉中滚響以藥壓下涎再歸骨節可也不可吐出若吐出涎時間快意積乆枯了人手足不可不戒也小兒驚風亦不可吐出涎其患與大人同方其發搐搦時不可捉住手足則涎不歸手足而固病成但覺寛鬆抱之可也醫餘辯諸風證頭風多饒白屑毒風靣上生瘡刺風狀如鈄刺腰痛如錐癎風急倒作聲發搐急慢頑風不認痛痒癧風頸生斑剥暗風頭旋眼黒不辯東西􅖟風靣生赤㸃肝風鼻悶眼瞤兩臉赤爛偏風口眼喎邪節風肢節㫁續指甲㫁落脾風心多嘔逆酒風行歩不前肺風鼻塞項疼膽風令人不睡氣風肉内蟲行腎風耳内蟬聲隂間濕痒寒濕脚氣癱風半身不遂瘓風手足拳攣胃風不伏水土虛風風寒濕痺腸風脫肛瀉血腦風頭旋偏痛賊風發聲不響産風四肢疼痛骨風膝腫如槌膝風腿寒骨痛心風健㤀多驚盛風語言蹇澁髓風臂膞酸疼臟風夜多盗汗血風隂囊濕痒烏風頭面腫塊皮風紫白癜癬肌風遍身燥痒體風身生腫毒閉風大便燥澁軟風四肢不舉緑風瞳人開大青風吐極青盲虎風發吼羊呌大風成片爛瘡諸風劉子儀曰經有急風候又有卒中風候又有風癔候夫急風與卒中理固無二指風而言則謂之急風指病而言則謂之卒中其風癔葢出於急風之候也何者經云奄然忽不知人咽中塞窒然舌強不能言如此則是中急風其候也發汗身軟者生汗不出身直者死若痰涎壅盛者當吐之視其鼻人中左右上白者可治一黒一赤吐沫者死風痱風痱者身無痛也病在臟四肢不收智不亂一旦臂不隨者風痱也能言微有知則可治不能言者不可治足如􅂂霜肘如入湯股脛滛鑠眩悶頭痛時嘔短氣汗出乆則悲喜不常三年死凢欲治此病依先後次第不得亂投湯藥以失機宜非但殺人因兹遂為痼疾當先服竹瀝飲子鷄峰普濟方風痙經有風痙候又有風角􅃓反張候痙者身體強直口噤如發癎壯角亐反張者腰背反折不能俯仰二者皆曰風邪傷於陽之經而然也治法一同同上腲腿經稱腲腿風者為四肢不收身體疼痛肌肉虛滿是也以風邪侵於肌肉之間流於血脉之内既云肌肉虛滿即風邪入腎之經絡而然也水氣論曰諸腫俱屬於腎是也治法當兼理腎為得一云不治變為水氣同上風眩夫風眩之病起於心氣不足胷中蓄熱實故有頭風面熱之所為也痰熱相感而動風風心相亂則悶瞀故謂之風眩悶瞀大人曰癲小兒則為癎一説頭風目眩者由血氣虛風邪入腦而牽引目系故也五臟六腑之精氣皆上注於目血氣與脈並上為目系屬於腦後出於項中血脉若虛則為風邪所傷入腦則轉而目系急故成眩也診其脉洪大而長者風眩也凢人病發宜急與續命湯困急時但度灸穴便宜針之無不差者初得針便灸最良同上風痺夫痺者為風寒濕三氣共合而成痺也其狀肌肉頑厚或則疼痛此由人體虛腠理開則受於風邪也其邪先中經絡後入於五臟以其春遇痺者為筋痺不已又遇邪者則移入於肝也肝痺之狀夜卧則驚飲食多小便數夏遇痺者為脉痺血脉不流令人萎黄脉痺不已又遇邪者則移入於心心痺之狀心下鼓氣卒然逆喘不通咽乾喜噫仲夏遇痺為肌痺肌痺不已後遇邪者則入於脾脾痺之狀四肢懈墮發咳嘔吐秋遇痺者為皮痺則皮膚都無所覺皮痺不已則入於肺肺痺之狀氣奔喘痛冬遇痺者為骨痺骨重不可舉不遂而痛骨痺不已又遇邪者則移於腎腎痺之狀喜脹診其脉大澁者為痺脉來急者為痺脉澁而𦂳者為痺同上偏枯經有偏風候又有半身不遂候又有風偏枯候此三者大要同而古人别為之篇目葢指風則謂之偏風指疾則謂之半身不遂其肌肉偏小者呼為偏枯皆由脾胃虛弱所致也夫脾胃為水糓之海水糓之精化為血氣潤養身體今脾胃虛弱則水糓之精養有所不周血氣偏虛為邪所中故半身不遂或至肌肉枯小爾治法兼治脾胃皆鷄峰方小中不須深治風淫末疾謂四肢凢人中風悉歸手足故也而疾勢有輕重故病輕者俗名小中一老醫常論小中不須深治但服溫平湯劑正氣逐濕痺使毒流一邊餘若不作隨性將養雖未能為全人然尚可茍延歳月若力攻之縱有平復者徃徃恬不知戒病一再來則難以支吾矣譬如捕㓂拘於一室則不使之逸越自亡它慮或逐之再至則其禍當劇於前矣此語甚有理而予見世之病者大體皆如是但常人之情以幻質為已有豈有得疾為廢人而不力治者此未易以筆舌喻也泊宅編邪風邪風之至疾如風雨善治者治皮毛次治肌膚次治筋脉次治六腑次治五臟治五臟者半死半生也風厥汗出而身熱者風也汗出而煩滿不解者厥也睡防風吹睡中風吹手足或酸或疼或腫用鹽炒熱帕裹熨之微有汗出即愈仍用术附湯加𦍑活煎服𤨏碎録白􅋪病昔有一僧得病狀如白􅋪卒不成瘡但每旦取白皮一升許如蛇蛻醫者謂多啖炙煿所致與局方解毒雄黄丸三四服而愈長松治大風釋普明齊州人乆止靈巖晚遊五臺得風疾眉髪俱墮百骸腐潰哀號苦楚人不忍聞忽有異人教服長松明不知識復告之云長松生古松下取根餌之皮色如薺苨長三五寸味微苦類人參清香可愛無毒服之益人兼解諸蟲毒明採服不旬日毛髪俱生顔貌如故今并代間士人以長松雜甘草乾山藥為湯煎服甚佳然本草及諸方書皆不載獨釋慧祥作清凉傳始序之澠水燕談療風􅋪病絶不同瘵病骨先絶風病筋先絶􅋪病肉先絶𤨏碎録食穿山甲動舊風疾余嘗行衡州道中遇醴陵尉自衛陽方囘以病歸問其得疾之由曰某食猪肉入山既深無肉可以食偶從者食穿山甲肉因嘗數臠舊有風疾至是復作今左手足廢矣因以箧中風藥遺之後半月聞其人痼疾頓愈及至永州觀圗經曰穿山甲不可殺於堤岸血一入土則堤岸不可復塞葢能透地脉也如此尉因誤食致病而旬日痼疾盡愈亦可怪也今人用以通婦人脉甚驗􅣪草治風杜甫詩有除􅣪草詩一篇今蜀中謂之毛􅣪毛芒可畏觸人如蜂蠆然治風疹擇最先者以此草㸃之一身皆失葉背紫者入藥蚺蛇治風泉州有客盧元欽染大風唯鼻根未倒屬五月五日官取蚺蛇膽欲進或言肉可治風遂取一截蛇肉食之三五日頓漸可百日平復蛇墜酒罌治風商州有人患大風家人惡之山中為起茅舎有烏蛇墜酒罌中病人不知飲酒漸差罌㡳見蛇骨方知其由也朝野僉記同上桑枝愈臂痛桑枝一小升細切炒香以水三大升煎取二升一日服盡無時圖經云桑枝平不冷不熱可以常服療體中風痒乾燥脚氣風氣四肢拘攣上氣眼暈肺氣嗽消食利小便乆服輕身聰明耳目令人光澤兼療口乾仙經云一切仙藥不得桑枝煎不服出抱朴子政和間予嘗病兩臂痛服諸藥不效依此作數劑臂痛㝷愈本事方透水丹愈耳痒族人友夔壯歳時兩耳痒日一作遇其甚時殆不可耐擊刮挑剔無所不至而所患自若也常以堅竹三寸許截之折為五六片細削如洗箒狀極力撞入耳中皮破血出或多至一蜆殻而後止明日復然失血既多為之困悴適有河北醫士周敏道到鄉里因徃謁之周曰此腎臟風虛致浮毒上攻未易以常法治也宜買透水丹服之勿飲酒啖濕麵􅂼菜鷄豬之屬能盡一月為佳夔用其戒數日痒止而食忌不能乆既而復作乃著意痛㫁迨於累旬耳不復痒類編臂細無力不任重此乃肝腎氣虛風邪客滯於榮衛之間使氣血不能周養四肢故有此證肝主頂背與臂膞腎主腰胯與腳膝其二臟若偏虛則隨其所主而生病焉今此證乃肝氣偏虛宜專補肝補腎鷄峰方風眩賈黄中為禮部侍郎兼起居監察中風眩卒太宗悼惜之切責諸醫大搜在城醫工凢通神農本草黄帝難經素問及善鍼灸藥餌者校其能否以補翰林醫學及醫官祗候風癉齊王太后病召臣意入診脉曰風癉客浮難於大小溲溺赤臣意飲以火齊湯一飲即前後溲再飲病已溺如故病得之流汗出􅎵􅎵者去衣而汗晞也所以知齊王太后病者臣意診其脉切其太隂之口溼然風氣也脉法曰沉之而太堅浮之而太𦂳者病主在腎腎切之而相反也脉大而躁大者膀胱氣也躁者中有熱而溺赤史記淳于意傳風蹶濟北王病召臣意診其脉曰風蹶胷滿即為藥酒盡三石病已得之汗出伏地所以知濟北王病者臣意切其脉時風氣也心脉濁病法過入其陽陽氣盡而隂氣入隂氣入則寒氣上而熱氣下故胷滿汗出伏地者切其脉氣隂隂氣者病必入中出及瀺水也瀺士咸切痺齊王故為陽虛候時病甚衆醫皆以為蹶臣意診脉以為痺根在右脇下大如覆杯令人喘逆氣不能食臣意即以火齊粥且飲六日氣下即令更服丸藥出入六日病已病得之内診之時不能識其經解大識其病所在同上苦沓風臣意常診安陽武都里成開方開方自言以為不病臣意謂之病苦沓風三歳四肢不能自用使人瘖瘖即死今聞其四肢不能用瘖而未死也病得之數飲酒以見大風氣所以知成開方病者診之其脉法竒咳言曰臟氣相反者死切之得腎反肺法曰三歳死也史記同上癱瘓世傳左為癱右為瘓此説􅀹非何者經既有偏中半身不遂之候即癱瘓之候當以左右俱中者名之又説以春夏得之難治秋冬得之易療春夏者陽氣上騰火力方盛風火相得而王故難治也秋冬者陽氣降下漸微即易療也此説亦未可必惟其中之淺深為難易耳治法兼理肝腎為得葢肝主筋腎主骨風中肝腎則筋骨癱瘓鷄峰方迵風陽虛侯相趙章病召臣意衆醫皆以為寒中臣意診其脉曰迵風音洞言徹入四肢迵風者飲食下嗌音益謂喉下也而輒出不留法曰五日死而後十日乃死病得之酒所以知趙章之病者臣意切其脉脉來滑是内風氣也飲食下嗌而輒出不留者法五日死皆為前分界法後十日乃死所以過期者其人嗜粥故中臟實中臟實故過期師言曰安糓者過期不安糓者不及期出史記又齊淳于司馬病臣意切其脈告曰當病迵風迵風之狀飲食下嗌輒後之後如側也病得之飽食而疾走淳于司馬曰我之王家食馬肝飽甚見酒來即走去馳疾至舎即泄數十出臣意告曰為火齊米汁飲之七八日當愈時醫秦信在旁臣意去信謂左右閣都尉曰意以淳于司馬病為何曰以為迵風可治信即笑曰是不知也淳于司馬病法當後九日死即後九日不死其家復召臣意臣意徃問之盡如意診臣即為一火齊米汗使服之七八日病已所以知之者診其服時切之盡如法其病順故不死史記同上手足沉重狀若風者此證其源起於脾虛榮衛不足胃為水糓之海脾氣磨而消之水糓之精化為榮衛以養四肢若起居失節飲食不時則致脾胃之氣不足既榮衞之氣潤養不周風邪乘虛而干之葢脾胃主四肢其脉連舌本而絡於唇口故四肢與唇口俱痺語言蹇澁也治法宜多用脾胃藥少服去風藥則可安矣若乆乆不治則變為痿疾經所謂治痿獨取陽明是也陽明者胃之經也鷄峰方上氣常須服藥張文仲言風有一百二十四種氣有八十一種唯脚氣頭風上氣常須服藥不絶自餘即隨其發動臨期消息之但有風氣之人春末夏初及秋暮要得通洩即不困劇所謂通洩者如麻黄牽牛郁李仁之類是也不必苦駃利藥太平御覽熱蹶故濟北王阿母自言足熱而懑臣意告曰熱蹶也則刺其足心各三所按之無出血病旋已病得之飲酒太醉史記眉髪自落崔言曰職𨽻左親騎軍一旦得疾雙眼昏咫尺不辯人物眉髪自落鼻梁崩倒肌膚有瘡如癬皆為惡疾勢不可救因為洋州駱谷子歸寨使遇一道流自谷中出不言名姓授其方曰皂角刺一二觔為灰蒸乆晒碾為末食上濃煎大黄湯調一錢七服一旬鬢髪再生肌膚悦潤眼目倍明得此方後入山不知所之感應神仙傳醫説卷三
