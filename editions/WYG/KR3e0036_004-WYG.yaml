body:
  text: 醫說卷四宋張杲撰勞瘵五勞夫人作勞傷於五臟五臟之氣因傷成病故謂之五勞肺勞之狀短氣而面腫不聞香臭肝勞之狀面目乾黒口苦精神不守恐畏不能獨卧目視不明心勞之狀忽忽喜忘大便難或時溏利口内生瘡脾勞之狀舌根苦直不得嚥唾腎勞之狀背難俯仰小便不利赤黄而有餘瀝囊濕生瘡小腹裏急治法肝勞補心氣心勞補脾氣脾勞補肺氣肺勞補腎氣腎勞補肝氣此療子以益母也經曰聖人春夏飬陽秋冬養隂以補其根本肝心為陽脾肺腎為隂夫五臟實亦成勞虛則補之實則瀉之六極六極者筋極主肝脉極主心肉極主脾氣極主肺骨極主腎精極主臟肺筋極之狀令人數轉筋十指手甲皆痛苦倦不能乆立脉極之狀忽忽喜忘少顔色眉髪墮落肉極之狀飲食無味不生肌肉皮膚枯槁氣極之狀正氣少邪氣多氣不足多喘少言骨極之狀腰腎酸削齒痛手足煩痛不欲行動精極之狀肉虛少氣喜忘鬢衰落然謂之極者病重於勞也治法與治勞同七傷七傷者一曰大怒逆氣傷肝二曰憂愁思慮傷心三曰飲食大飽傷脾四曰形寒飲冷傷肺五曰乆坐濕地傷腎六曰風雨寒濕傷形七曰大怒恐懼傷志肝傷則少血目暗心傷則苦驚喜忘脾傷則面黄善卧肺傷則短氣咳嗽腎傷則短氣腰痛厥逆下冷形傷則皮膚枯槁志傷則恍惚不樂治法與五勞六極同虛勞男子平人脉大為勞極虛亦為勞男子勞之為病其脉浮大手足煩春夏劇秋冬差隂寒精自出痠削不能行寸口脉浮遲浮則為虛遲則為勞虛則衞氣不足浮則榮氣竭脉直者遲逆虛也脉􅉣無陽是腎少寸闗􅉣無血氣逆冷是大虛脉浮微緩而大者是勞也脉微濡相搏為五勞微弱相搏虛損為七傷冷勞冷勞之人氣血枯竭表裏俱虛隂陽不和精氣散失則内生寒冷也皆由臟腑乆虛積冷之氣遂令宿食不消心膈飽滿臍腹疼痛面色痿黄口舌生瘡大腸泄痢手足無力骨節酸疼乆而不痊轉加羸瘦故曰冷勞勞疰勞動作也郭逢原曰凢人暫爾疲倦通謂之勞而今人以勞為惡疾而惡聞之親戚朋友共為隠諱見其疾狀莫敢呼之殊不知勞之為病初起於動作不能節謹致於疲倦且傷不已漸成大疾凢言虛勞者五勞是也六極七傷為類葢蒙荘所謂精太用則竭神太勞則弊者治法不過補養五臟滋益氣血使之強盛則其疾自去又有傳尸勞者則非此類葢縁尸疰及挾邪精鬼氣而成者也經曰人有三虛逢年之虛遇月之空失時之和乍感生死之氣忽犯鬼物之精大槩寒􅉯淋露沉沉黙黙不的知其所苦而無處不惡積月累年漸就委頓既死之後又復傳疰他人者是也兹又須用通神明去惡氣諸藥以治之經曰草木咸得其性􅄦神無所遁情刳射剸犀驅曳邪惡飛丹鍊石引納清和疑其為此疾而設已上鷄峰方傳勞葛洪云􅄦疰者是五屍之一疰又挾諸鬼邪為害其病變動乃有三十六種至九十九種大略使人寒􅉯淋瀝沉沉黙黙不的知所苦無處不惡累年積月漸就沉滯以至於死傳為旁人乃至滅門覺如是候者急治􅆩肝一具隂乾杵末服方寸七日三未愈再作肘後云此方神良宣和間天慶觀一法師行考召極精嚴時一婦人投狀述患人有祟所附須􅁷召至附語云非我為禍别是一鬼亦因病人命衰為祟爾渠今已成形在人肺中為蟲食其肺絲故令吐血聲嘶師掠之此蟲還有畏忌否乆而無語再掠之良乆云容某説惟畏􅆩𤓰屑為末以酒服之則去矣患家如其言而得愈此予目所見也究其患亦相似􅆩爪者殆􅆩肝之類歟本事方遇道人治傳勞方袁州寄居武節郎李應本相州法司嘗以吏役事韓似夫樞宻兵火後忽於宜春見之云從岳侯軍得官今閒居於此從容問其家事澘然淚下曰某先有男女三人長子因議買宅入乆空無人所居之室忽覺心動背寒凛凛遂成勞瘵之疾垂殆傳於次室女也長子既死女病㝷亟繼又傳於第三子證候一同應大恐即禱於城隍神每日設麫飯以齋雲水兾遇異人且許謝錢三十萬數日因徃市中開元寺前有一人衣俗士服自稱貧道踵足而呼曰團練聞宅上苦傳尸勞貧道有一藥方奉傳同入寺中問其姓名不答口授云云應即取筆書之道人言欲過湖南應畱之飯云已喫飯了欲贈之錢云自有盤纒臨行又言此藥以天靈葢虎糞内骨為主切須仔細㝷覔青蛇腦如無亦可服藥前一日須盛享城隍神求為隂助應曰既求之於神何必用藥道人曰不然即揖别西去應以其事頗異敬如其言治藥既成設五神位具飲饌十品如待賓客以享城隍又别列酒食以犒飲隂兵仍於其家設使者一位於病榻之間服藥食頃臟腑大下得蟲七枚色如紅燠肉而腹白長約一寸濶七八分前鋭後方腹下近前有口身之四周有足若魚骨細如針尖而曲已死試取火焚之以鐡火筯劄刺不能入病勢頓減後又服一劑得小蟲四枚自此遂安今已十年肌膚悦澤不復有疾道人後竟不來其藥用天靈葢三錢酥炙黄色為末秤虎糞内骨一錢人骨為上獸骨次之殺虎大腸内取者亦可用同青蛇腦小豆許或菉豆許同酥塗炙色轉為度無蛇腦只酥炙亦得鼈甲極大者醋炙黄色為末秤一兩九肋者妙安息香半兩桃仁一分去皮尖研以上為末絹篩過檳榔一分别為細末麝香一錢别研青蒿取近梢三四寸細剉六兩豉三百粒蔥根二十一箇拍破東引桃栁李桑枝各七莖麄如筯頭大各長七寸細剉楓葉二十一片如無亦得童子小便半升右先將青蒿桃栁李桑枝楓葉蔥豉以官省升量水三升煎至半升許去滓入安息香天靈葢虎糞内骨鼈甲桃仁與童子小便同煎取汁去滓有四五合將檳榔麝香同研均調作一服早晨溫服以被葢覆出汗恐汗内有細蟲以帛子拭之即焚此帛相次須瀉必有蟲下如未死以大火焚之並棄長流水内所用藥切不得令病人知日後亦然十來日後氣體復圓再進一服依前焚棄至無蟲而止此藥如病者未亟可以取安如已亟俟其垂死則令下次已傳染者服之先病者雖不可救後來者㫁不傳染出百一選方韓樞宻孫廬師亞卿傳勞傷瘵疾男子勞傷而得疾瘵漸見痩瘠用童子小便二盞無灰酒一盞以新甆瓶貯之入全猪腰一對内宻封泥日晚以慢火養熟至中夜止五更初更以火温之發瓶飲酒食腰子病篤者只一月效平日痩怯者亦可服此藥葢以血養血全勝金石草木之藥也𤨏碎錄勞復故督郵頓子獻得病已差詣華佗視脉曰尚虛未復復勿為勞事御内即死臨死當吐舌數寸其妻聞其病徐從百里外省之止宿交接中間三日病發一如佗言三國志鬼疰韶州南七十里曰古田有富家婦人陳氏抱異疾常日無他苦每遇微風吹拂則股間一㸃竒痒爬搔不停手已而舉體皆然逮於發厥凢三日醒及坐有聲如欬其身乍前乍後若摇兀之狀率以百數甫少定又經日始困卧不知人累夕愈至不敢出户更十醫弗效劉大用視之曰吾得其証矣先與一服取念珠一串来病家莫知何用也當婦人摇兀時記其疏數之節已覺微減然後云是名鬼疰因入神廟看為邪所慿致精彩蕩越法當用死人枕煎湯飲之既飲大瀉數行宿痾脱然大用云枕用畢當送還元處如遲畱使人顛狂葢但借其氣耳類編瘵疾越州鏡湖邵長者女十八染瘵疾累年刺灸無不求治醫亦不效有漁人趙十煑鰻羮與食食覺内熱之病皆無矣今醫家所用鰻煎乃此意尸疰飛尸者逰走皮膚穿臟腑每發刺痛變作無常遁尸者附骨入肉攻鑿血脉每發不可得近見尸聞喪哀哭便發風尸者滛濯四肢不知痛之所在每發昏沉得風雪便作沉尸者纒骨結臟衝心脇每發絞切遇寒冷便作注尸者舉身沉重精神錯雜常覺昏廢每節氣致變輙成大惡皆宜用忍冬葉數斛煮取濃汁稠煎服之如鷄子大一枚日三太乙精神丹蘇合香丸治此病第一本事方虛勞用藥凢虛勞之疾皆縁情慾過度榮衞傷勞致百脉空虛五臟衰損邪氣乗襲致生百疾聖人必假藥石以資氣血宻腠理以禦諸邪肌肉之虛猶如體之輕虛如馬勃通草蒲梢燈心之屬是也非滋潤粘膩之物以養之不能實也故前古方中鹿角膠阿膠牛乳鹿髓羊肉飴糖酥酪杏仁煎酒􅁡人參當歸地黄門冬之類者葢出此意本草云補虛去弱羊肉人參之屬是也所謂虛勞者因勞役過甚而致虛損故謂之虛勞今人才見虛弱疾證悉用燥熱之藥如伏火金石附子薑桂之類致五臟焦枯血氣乾涸而致危困皆因此也如虛而兼冷者止可於諸虛勞方中加諸溫熱藥為助可也如此即不失古人之意醫餘鰻治勞疾有人多得勞疾相因染死者數人取病者於棺中釘之棄於水永絶傳染之患流之金山有人異之引岸開視見一女子猶活因取置漁舎多得鰻􅢵魚食之病愈遂為漁人之女稽神錄虚勞服藥養生必用方論虛勞不得用凉藥如柴胡鼈甲青蒿麥門冬之類皆不用服唯服黄茋建中湯有十餘歳女子因發熱咳嗽喘急小便少後來成腫疾用利水藥得愈然虛羸之甚遂用黄茋建中湯日一服三十餘日遂愈葢人禀受不同虛勞小便白濁隂臟人服橘皮煎黄茋建中湯獲愈者甚衆至於陽臟人不可用煖藥雖建中湯不甚熱然有肉桂服之稍多亦反為害要之用藥亦量其所禀審其冷熱而不可一槩以建中湯治虛勞也謹之醫餘骨蒸内熱睦州楊寺丞有女事鄭迪功苦有骨蒸内熱之病時發外寒寒過内􅉯附骨蒸盛之時四肢微痩足跌踵者其病在五臟六腑之中衆醫不差因遇處州吳醫看曰請為治之只單用石膏散服後體微凉如故其方出外臺秘要只用石膏乳細十分似麵以新汲水和服方寸七取身無􅉯為度名醫錄氣血虚發厥熱氣虛則發厥血虛則發熱厥者手足冷也氣屬陽陽虛則隂湊之故發厥血者隂也血虛則陽湊之故發熱也氣虛發厥者當用溫藥血虛發熱者不宜用凉藥當用溫養氣血之藥以補之宜養隂黄茋建中湯之類是也又有一種病實熱者極而手足厥冷所謂熱深厥亦深此當用凉藥須以脉别之也此最難辯差之毫厘則害人性命戒之醫餘治羸疾開元間明州人陳藏器撰草本拾遺云人肉治羸疾自此閭閻相效割股治羸仁和縣一吏早衰病瘠齒落不已從貨藥道人得一单方只碾生硫黄為細末實於豬臟中水煑臟爛碾細宿蒸餅圓如桐子大隨意服之兩月後飲啖倍常歩􅂂輕捷年過九十畧無老態執役如初因從邑宰入村醉食牛血遂洞下數十行所泄如金水自是尫悴少日而死李巨源得其事於臨安入内醫官管範嘗與王樞使言之王云但聞豬肪脂能制硫黄兹用臟􅀹為有理亦合服之乆當見效類編治勞瘵吐血翦草狀如茜草又如細辛婺台二州皆有之惟婺可用其法每取一觔净洗碎為末入生􅁡一觔和成膏以陶器盛之不得犯鐡日一蒸不曝至九日乃止治勞瘵吐血損肺及血妄行名曰神傳膏令病人五更起面東坐不得語言用匙抄藥如食粥然每服四匙良乆呷稀粟米粥壓之藥只冷服粟飲亦不可太熱或吐或下皆無害如乆病肺損咯血一服立愈本事方天靈葢謹按天靈葢神農本經人部惟髪髲一物外餘皆出後世醫家或禁術之流竒性之論殊非仁人之用心世稱孫思邈有大功於世以殺命治命尚有隂責况於是也近數見醫家用以治傳尸勞未有一效者信本經不為害也殘忍傷神又不急於取效茍有可易即易仁者宜盡心焉茍不以是説為然决為庸人之所惑亂設云非此不可是不得已則宜以年深塵泥所漬杇者為良以其絶屍氣也本草鼻衂吐血鼻衂饒州士民李士哲苦鼻衂垂至危困醫授以方取蘿蔔自然汁和無灰酒飲之則止醫云血隨氣運轉氣有滯逆所以妄行蘿蔔最下氣而酒導之是以一服效經五日復如前僅存喘息而張思順以明州刋王氏单方刮人中白置新瓦上火逼乾以溫湯調服即時血止至今十年不作張監潤之江口鎮適延陵鎮官曽棠入府府委至務同視海舶曽著白茸毛背子盛服濟潔正對談之次血忽出如傾變所服為紅色駭曰素有此疾特不過㸃滴耳今猛烈可畏覺頭空空然殆有性命之慮張曰君勿憂我當漸治一藥移時而就持與之血亦止不復作人中白者旋盆内積溓垢是也葢秋石之類特不多用火力治藥勿使其人知恐其以穢濁不肯服此方可謂神矣又予在汝州時因出驗屍有保正趙溫者不詣尸所問之即云衂血已數斗昏困欲絶予使人扶掖以來鼻血如􅉉溜平日所記治衂數方旋合藥治之血勢猛皆衝出予謂治血者莫如地黄試遣人四散㝷生地黄得十餘觔不暇取汁因使生喫漸及三四觔又以其滓塞鼻須􅁷血定又癸未歳予妹病吐血有醫者教取生地黄自然汁煑服之日服數升三日而愈有一婢病經血半年不通見釡中餘汁以為棄去可惜輙飲數杯㝷即通利地黄治血其功如此地黄但用新布拭净搗汁勿用水洗信效方嘔血咯血台州獄吏憫一大囚將死頗照顧之囚感語之吾七次犯死罪盡力抗諱苦遭訊考坐是肺皆挖損至於歐血適得一藥每用其效如神荷君庇拊之㤙特此以報只白芨一味米飲調爾其後凌遲儈者剖其胷見肺間竅穴數十處皆白芨補填之色猶不變也洪貫之聞其説為郢州長夀宰規之赴洋州任一卒忽苦咯血勢絶危貫之用此救之一日即止癸志山梔子茅花愈衂血蔡子渥傳云同官無錫監酒趙無疪兄衂血甚已死入殮血尚未止一道人過門聞其家哭詢問其由道人云是曽服丹或燒煉藥予有藥用之即活囊間出藥半錢七吹入鼻中立止良乆得活乃山梔子燒存性末之本事方又治鼻衂不止欲絶者取茅花一大把挫碎用水兩椀煮一椀分二服飲立止良方頭風偏頭疼裕陵傳王荆公偏頭疼方云是禁中秘方用生萊菔汁一蜆殼仰卧注鼻中左痛注右右痛注左或兩鼻皆注亦可數十年患皆一注而愈荆公與僕言已愈數人矣良方頭眩有人苦頭眩頭不得舉目不得視積年華佗使悉解衣倒懸令頭去地三寸濡布拭身體令周匝視諸脉盡出五色佗令弟子以鈹刀决脉五色血盡視赤血出乃下以膏摩被覆汗出周匝飲以葶􅐗散而愈三國志蹶頭熱菑川王病召臣意診脉曰蹶上為重頭痛身熱使人煩懑臣意即以寒水拊其頭刺足陽明脉左右各三所痛旋已病得之沐髪未乾而卧診如前所以蹶頭熱至肩史記婦人偏頭痛有一婦人患偏頭痛一邊鼻塞不聞香臭常流清涕或作臭氣一陣服遍治頭痛藥如芎蝎皆不效人無識此病者或曰腦癰偶有善醫云但服局方芎犀丸不十數服忽作􅅉涕突出一鋌稠膿其疾遂愈沐頭洗浴沐頭不可用冷水必成頭風之疾浴罷不可和衫裙寢恐成外腎腫疼腰背拳曲婦人月水來不可沐頭婦人女子月事來不可洗頭或因感疾終身為痼病不可治泊宅編川芎不可乆服一族子舊服芎藭醫鄭叔熊見之云芎藭不可乆服多令人暴死後族子果無疾而卒予􅊚家朝士張子通妻因病腦風服芎藭甚久亦一旦暴亡予自見者筆談眼疾目疾凢人食五辛諸熱食飲刺頭出血過多極目逺視燈前㸔字月下攻書不避煙火博奕經時飲酒不已熱飡麫食抄寫多年雕縷繡畫泣淚過多房慾無節逺觀星火視日目極瞻望山川皆是喪明之本可不謹哉𤨏碎錄讀書損目讀書之苦傷肝損目誠然晋范寗嘗苦目病就張湛求方湛戱之曰古方宋陽子少得其術以授魯東門伯次授左丘明遂世世相傳以及漢杜子夏晋左太冲凢此諸賢並有目疾得此方云損讀書一減思慮二專内視三簡外觀四旦起晚五早夜眠六凢六物熬以神火下以氣簁蘊於胷中七日然後納諸方寸修之一時近能數其目睫逺視尺箠之餘長服不已洞見墻壁之外非但明目乃亦延年審如是而行之非可謂之嘲戱亦竒方也本事方觀音洗眼偈台州僧處瑫中年病目常持誦大悲咒夢觀音傳授法偈令每旦咒水七遍或四十九遍用以洗眼凢積年障翳近患赤目無不獲痊處瑫跪受而寤悉用記憶如說誦行之不踰時平愈夀至八十八歳其偈曰救苦觀世音施我大安樂賜我大方便滅我愚癡暗賢刼諸障礙無明諸罪惡出我眼室中使我視物光我今說是偈洗懴眼識罪普放净光明願覩微妙相戊志眼疾不可洗浴舊說眼疾不可浴浴則病甚至失明者承直郎白彦良云未壯歳之前歳歳患赤眼一道人勸但能㫁沐頭則不復病此彦良自此不沐今七十餘更無眼病泊宅編眼痛不食有人患赤眼腫痛脾胃虛弱喫飲食不得診其肝脉盛脾脉弱服凉藥以治肝則損脾愈喫飲食不得服煖藥以益脾則肝愈盛而加病何以治之但於溫平藥中倍加肉桂不得用茶調恐損脾也肉桂殺肝而益脾故一治而兩得之傳曰木得桂而死醫餘眼赤腫有人患眼疾每睡起則眼赤腫良乆却無事百方治之無效師曰此血熱也非肝病也卧則血歸於肝熱血歸肝故令眼赤腫也良乆便無事者人睡起血復散於四肢故也遂用生地黄汁浸粳米半升渗乾曝令透骨乾凢三浸三乾用甆瓶子煎湯一升令沸下地黄米四五匙煎成薄粥湯放溫食半飽後飲一兩盞即睡如此兩日遂愈生地黄汁凉血故也同上眼疾有虛實凢眼疾有上盛下虛者有上虛下實者虛者宜服補腎藥補其母也實者宜服凉心經藥瀉其子也眼科云所謂補藥者非硫黄附子鹿茸蓯容之類是朱砂磁石之類也治眼而補下當用眼藥故也兹為至理同上赤目戒食患赤目以熱水濯足若澡浴必致失明切不可食犬鷄魚鵞鴨卵一目失明錢鏐年老一目失明聞中朝國醫胡某者善醫上言求之晋祖遣醫泛海而徃醫視其目曰尚父可無療此當延夀五七歳若决瘼去内瘴即復舊但慮損福耳鏐曰吾得不為一目鬼於地下足矣願醫盡其術以療之當厚報醫為治之復故鏐大喜厚賂醫金帛寳帶五萬緡具舟送歸京師醫至鏐卒年八十一矣劉頴叔異苑治眼郭太尉真州人乆患目盲有白翳膜遍喫眼藥無能效者有親仲監税在常州守官聞張鼉龍之名因薦於太尉請張公視之曰此眼太尉縁熱藥過多乃生外障視物不明朝朝昏黒更無所覩醫者皆為肝元損下虛補其肝腎眼愈盲甚張曰請太尉將藥㸃眼并服之一月取翳微消後果一月翳退雙目如舊因求㸃喫藥方乃只用猪膽微火銀銚内煎成膏入氷腦粒如黍米大㸃入眼中微覺翳輕後又將猪膽白膜皮曝乾合作小繩如􅁫大小燒作灰待冷㸃翳盛者亦能治之此方甚好勿妄傳名醫錄治内障􅌻地黄麥門冬車前子相雜治内障眼有效屡試信然其法細搗􅁡丸桐子大三藥皆難搗羅和合異常甘香真竒方也東坡大全篇治爛縁眼潭州宗室趙太尉家乳母苦爛縁風眼近二十年有賣藥老媼過門云此眼有蟲其細如絲色赤而長乆則滋生不已吾能談笑除之入山取藥晚下當為治療趙使僕隂尾之見溫㳂道掇叢蔓木葉以手挼碎送口咀嚼而留汁滓於小竹筒内俄復還索皂紗䝉乳母眼取筆畫雙眸於紗上然後滴藥汁漬眼下縁轉盼間蟲從紗中出其數十七狀如先所云數日再至下縁肉乾如常人復用前法滴上縁又得蟲十數家人大喜後傳與醫者上官彦誠遍呼鄰側村婦病此者驗試無不立差其藥乃覆盆子葉一味著於本草陳藏器云治眼暗不見物冷淚浸淫不止及青盲等取此草日曝乾搗令極爛薄綿裏之以男子所飲乳汁浸如人行八九里乆用㸃目中即仰卧不過三四日視物如少年但禁酒麫油葢治眼妙品也癸志治内障限眀州定海人徐道亨父沒奉母周㳺四方事之盡孝淳熈中到泰州宿於逆旅因患赤眼而食蟹遂成内障欲進路不能素解暗誦般若經出丐市里所得錢米仍持歸養凢厯五年忽夜夢一僧長眉大鼻托一鉢盂盂中有水令徐掬以洗眼復告之曰汝此去當服羊肝丸百日徐知為佛羅漢喜而拜願乞賜良方僧曰用净洗夜明砂一兩當歸一兩蟬殻一兩木賊去節一兩共碾為末買羊肝四兩水煮爛搗如泥入前藥拌和丸桐子大食後溫熟水下五十丸服之百日復舊與母還鄉母亡棄家入道治眼二百味花草膏福州人病目兩眼間赤濕流淚或痛或痒晝不能視物夜不可近燈光兀兀癡坐其友趙謙子春語之曰是為爛縁血風我有一藥正治此名曰二百味花草膏病者驚曰用藥品如是世上方書所未用豈易遽辦君直相戱耳趙曰我適見有藥當以與君明日擕一錢七至竪凝成膏使以匙抄少許入口一日淚止二日腫消三日痛定豁然而愈乃徃謁趙致謝且扣其名物笑曰只用羯羊膽去其中脂而滿填好􅁡拌匀蒸之候乾即入瓶研細為膏以蜂採百花羊食百草故隠其名以眩人云癸志班瘡入眼小兒班瘡入眼皆由熱重毒氣上攻多因食熱物所致若瘡子盛發時覺眼腫痛時時與開㸔之睛上無瘡即不害事若有瘡亦須服清凉飲子每日食後一服微利之瘡子乾後將攝不如法及飲食不謹或無故眼自痛者即毒氣不盡也輕者清凉飲重者雄黄解毒丸須大下三四行然後服治眼藥只得睛不破無不愈者保生方眼中常見鏡子有一少年眼中常見一小鏡子俾醫工趙卿診之與少年期來朝以魚鱠奉候少年及期赴之延於内且令從容俟客退方接俄而設臺子施一瓶芥醋更無他味卿亦未出迨禺中乆候不至少年饑甚且聞醋香不免輕啜之逡巡又啜之覺胸中豁然眼花不見因竭瓶啜之趙卿知之方出少年以啜醋慙謝卿曰郎君先因喫鱠太多芥醋不快又有魚鱗在胷中所以眼花適來所備芥醋欲郎君因饑以啜之果愈此疾乃烹鮮之㑹乃權詐也比鎻夢言目疾忌俗有目疾者切忌浴令人目盲遯齋閒覽偷針眼凢患偷針眼者以布針一箇對井以目睛睨視之已而拆為兩段投井中眼即愈勿令人見目視一物為二荀牧仲頃年常謂予曰有人視一物為兩醫者作肝氣有餘故見一為二教服補肝藥皆不驗此何疾也予曰孫真人云目之絲上屬於腦後出於腦中邪中於頭因逢身之虛其入深則隨目絲於腦入於腦則轉轉則目絲急急則目眩以轉邪中於睛所中者不相比則睛㪚睛散則歧故見兩物也令服驅風入腦藥得愈本方洗眼方以當歸黄連芍藥等分用水濃煎汁乘熱洗冷則再溫洗甚益眼目但是風毒赤目花醫等皆可用之凢眼目之病皆縁血脉凝滯使然故以活血藥合黄連治之血得熱即行故乘熱洗之用者無不神效出本草黄連注口齒喉舌耳治喉閉元公張少卿説開徳府士人擕僕入京其一忽患喉閉脹滿氣塞不通命在頃刻詢諸郡人云惟馬行街山水李家可㸔治即與之徃李駭曰證候危甚猶幸來此不然即死何疑乃於笥中取一紙撚用火㸃著才烟起吹滅之令僕張口刺於喉間俄吐出紫血半合即時氣寛能言及啖粥飲掺藥傅之立愈士人甚神其技後還鄉里村落一庸醫偶傳得此術云咽喉病發於六腑者如引手可探及刺破瘀血即已若發於五臟則受毒牢深手法藥力難到惟用紙撚為第一然不言所以用之之意後有人拾得其殘者益預以巴豆油塗紙故施火即著藉其毒氣徑赴病處類編又凢人患喉閉及纒喉風用藥開得咽喉後可以通得湯水急喫薄粥半碗或一碗壓下邪熱不壓即病再來不可不知也咽喉既可身熱頭痛不除此感外邪㸔脉氣及大小便有表證則發汗有裏證則微下之皆愈愈後虛喘而身不熱者必是服凉藥過多而下虛也當服鎮重溫藥一服如黒錫丸正一丹之類以粥壓之咽喉腫毒有人患咽喉腫病下食不得身熱頭疼大便不通衆醫之論紛然皆以為熱當服凉藥有一善醫云脉緊數是感寒氣所致衆醫不從善醫者曰我有法驗得寒熱浴室中生火用炒术葱湯淋浴若是病熱則此煖處必有汗而咽喉痛不減若是感寒則雖浴無汗患信其言遂入浴淋洗而無汗就浴室中服麻黄湯須􅁷大汗出大便通即時無事衆醫服其神凢辯熱病與感冷皆可用此法醫餘巧匠取喉鈎咸平中職方魏公在潭州有數子弟皆㓜因相戱以一釣竿垂釣用􅀥作餌登陸釣鷄雛一子學之而誤吞其鈎至喉中急引乃鈎以鬚逆不能出命之諸醫不敢措手魏公大怖令人遍問老婦必能經厯時有一老婦九十餘歳言亦未嘗見此切料有智識者可出之時本郡有一莫都料性甚巧令聞魏公魏公呼老婦責之曰吾子誤吞鈎莫都料何能出之老婦曰聞醫者意也其莫都料曽水中打碑塔添仰瓦魏公大咍親屬勉之曰試詢之公遂召莫都料至沉思時乆言要得一蠶蠒及大念佛珠一串與之都料遂將蠒翦如錢大用物權四面令軟以油潤之仍中通一竅先穿上鈎線次穿數珠三五枚令兒坐正開口漸添引數珠挨之到喉覺至繋鈎處乃以力向下一推其鈎已下而脫即向上急出之見蠒錢向下裹定鈎線鬚而出並無所損魏公大喜遂厚賂之公曰心明者意必大巧意明者心必善醫名醫録舌腫滿口一士人㳂汴東歸夜泊村歩其妻熟寐撼之問何事不答又撼之妻驚起視之舌腫已滿口不能出聲急訪醫得一叟負囊而至用藥掺比曉復舊問之乃蒲黄一味須真者佳本事方舌無故出血一士人無故舌出血仍有小穴醫者不曉何疾偶曰此名衂炒槐花為末掺之而愈良方牙疼牙疼有四一曰熱二曰冷三曰風四曰蚛熱者怕冷水冷者怕熱湯不怕冷熱即是風牙有蚛竅者即是蚛牙用藥之法熱用牙硝鬱金雄黄荆芥之類冷用乾薑蓽撥細辛之類風用猪牙皂角殭蠶蜂房川草烏之類蚛用雄黄石灰砂糖之類熱牙宜於牙齦上出血諸牙痛用藥畢皆以溫湯潄之醫餘牙齒日長牙齒逐日長漸漸脹開口難為飲食葢髓溢所致只服白术愈衛生十全方舌脹出口有人舌腫脹舒出口外無敢醫者一村人云偶有此藥歸而取至乃二紙撚以燈燒之取烟薫舌隨即消縮衆問之方肯言吾家舊有一牛赤舌腫脹出口人教以萆麻取油蘸紙撚燒烟薫之而愈因以治人亦驗治齒痛葉景夏家一妾為病齒所苦遇痛作時爬牀刮席呌呼連夕徹旦勺飲不可入口醫者無所不用經年不差或授一方取附子尖天雄尖全蝎七箇皆生碾碎拌和以紙撚蘸少許㸃痛處隨手則止林元禮云是未足為竒舊得一法捕蚵蚾大者一枚削竹箆子刮其眉即有汁粘其上約所取已甚則放之而以汁㸃痛處凢疳蝕癰腫一切齒痛悉可用藥到痛定仍不復作姪孫僴云此名蟾酥膏先以箆掠眉下汁未出時當以細杖鞭其背及頭候作怒鼓脹則流注如涌然後挹以綿徑窒痛處類編齲齒齊中大夫病齲齒淳于意灸其左太陽脉即為苦參湯日漱三升出入五六日病已得之風及卧開口食而不漱史記飲酒潄口劉几年七十餘精神不衰每一飲酒輙一漱口雖醉不忘也曰此可以無齒疾晡後食少許物便已明道雜志潄口食冷進士劉遁遇異人曰世人奉養徃徃倒置早漱口不若將卧而漱去齒間所積牙亦堅固今人食冷物必飲湯將溫其脾已氷其脾又何溫之有不若未食冷物先飲湯溫之繼食冷即無患也翰苑名談棗能黄齒倪彦及朝奉嘗為太原府幕官云彼中人喜食棗無貴賤老少常置棗於懐袖間等閒探取食之郡人之齒多黄縁食棗故嵇叔夜所謂齒居晋而黄虱處頭而黒是也遯齋閒覽齒藥西嶽蓮花峰碑載治口齒烏髭藥歌猪牙皂角及生薑西國升麻蜀地黄木律旱蓮槐角子細辛荷葉翦荷葉心子也要相當青鹽等分同燒煅研煞將來使更良揩齒牢牙髭鬢黒誰知世上有仙方類苑齒間肉壅出汪丞相徽之祁門人有寵平日好食動風物性尤嗜蟹或作蟹炰蟹簽恣噉之一日得風熱之疾齒間壅一肉出漸大漲塞口不能閉水漿不入痛苦待盡已而有一道人言能治此疾丞相命醫之不日而愈其法用生地黄取汁一椀猪牙皂角數鋌火上炙令熱蘸汁令盡末之傅壅肉上隨即消縮多以金與之得此方其壻李大夫説飲酒喉舌生瘡連月飲酒咽喉爛舌生瘡水中螺蚌肉葱豉薑椒煮汁飲三盞差聖惠方苦參不可潔齒予嘗苦腰重乆坐則旅拒十餘歩然後能行有一將佐見予曰得無用苦參潔齒否予時以病齒用苦參數年矣曰此病由也苦參入齒其氣傷腎能使腰重後有太常少卿舒昭亮用苦參揩齒歳乆亦病腰自後悉不用腰痛皆愈此皆方書舊不載也筆談齒縫出血齒縫出血不止他藥不能治者鹽主之素問曰鹽勝血故也蘭室寳鑑内用麥門冬煎湯漱之亦良虎鬚治齒痛虎鬚治齒痛仙人鄭思逺常騎虎故人許隠齒痛求治鄭曰虎鬚及熱挿齒間即愈㧞數莖與之積年耳聾驢生脂和生薑熟搗綿裹塞耳治積年耳聾本草按本草乃生椒非薑第未試用骨哽韻畧用骾字類治哽以類推凢治哽之法皆以類推鸕鷀治魚哽磁石治針哽髪灰治髪哽狸虎治骨哽亦各從其類也硼砂治哽鄱陽汪友良因食辣蹄誤吞一骨如小指大哽於咽喉間隠然見於膚革引手可揣摸百計不下凢累日雖咳嗽亦痛僅能畧通湯飲家人憂懼於昏睡處次觀一人著朱衣來告曰聞汝為骨所苦吾有一藥唯南硼砂最妙恍惚驚寤謂非夢也殆神明隂受以方欲全其命索藥笥得砂小塊汲水滌洗取而含化才食頃脫然而失壬志呪水治哽以净器盛新汲水一盞捧之面東黙念云謹請太上東流水急急如南方火帝律令勅一氣念七遍即吹一口氣入水中如此七吹以水飲患人立下或用此咒水可以食針並竹刺百一選方漁人治哽蘇州吳江縣浦村王順富家人因食鱖魚被哽骨横在胷中不上不下痛聲動鄰里半月餘飲食不得㡬死忽遇漁人張九言你取橄欖與食即軟也適此春夏之時無此物張九云若無㝷橄欖核搗為末以急流水調服之果安問張九爾何縁知橄欖治哽張九曰我等父老傳橄欖木作取魚掉箆魚若觸著即便浮被人捉却所以知魚怕橄欖也今人煮河豚須用橄欖乃知去魚毒也治哽滁州蔣教授名南金因食鯉魚玉蟬羮為肋骨所哽凢治哽藥及象牙屑用之皆不效或令以貫衆不拘多少濃煎汁一盞半分三服併進連服三劑至夜一咯而出因戱曰此管仲之力也百一選方故魚網治哽故魚網主哽以網覆哽者頸差如煮汁飲之骨當下矣本草倉卒有智秀州士大夫家一小兒五歳因戱劇以首入搗藥臼中不復出舉家驚呼無計或教之使執兒兩足以新汲水急澆之兒驚啼體縮遂得出又有小兒觀打稲取糓芒寘口中黏著喉舌間不可脫或令以鵞涎灌之即下葢鵞涎能化糓也二者皆一時甚急非倉卒有智未易脫夷堅志喘𠻳喘有三證凢人患喘其證有三一曰寒二曰熱三曰水病熱者發於夏而不發於冬冷病者遇寒則發也水病者胸膈滿悶脚先腫也熱病者宜蛤蚧丸冷病宜煑肺散水病審其冷熱虛實虛而冷者紫金丹熱而實者防己丸此出養生必用方不合防己丸但言腹有濕熱欲驗喘疾是水不是水者小便􅉣脚微腫而喘者水證也當作水治之小便不􅉣脚不腫只作喘治之沈存中良方蒲頽葉孫大資麻黄梓朴湯不拘冷熱皆可服也咳𠻳咳嗽有二一曰熱二曰寒熱嗽有濃痰鼻聞腥氣宜服凉藥寒嗽痰薄宜服熱藥飲冷水一二呷而暫止者熱嗽也呷熱湯而暫止者冷嗽也此法用之有騐以小柴胡湯治熱嗽以理中湯加五味子治寒嗽皆已試之驗醫餘同上又經曰人感於寒則受病微則為咳甚為泄為痛凢咳嗽五臟六腑皆有之惟肺先受邪葢肺主氣合於皮毛邪之初傷先客皮毛故咳為肺病五臟則各以治時受邪六腑則又為五臟所移古人言肺病難愈而喜卒死者肺為驕臟怕寒而惡熱故邪氣易傷而難治以其湯散徑過針灸不及故也十種咳嗽者肺咳心咳脾咳腎咳肝咳寒咳風咳攴飲咳膽咳厥隂咳華佗所謂五嗽者冷嗽氣嗽鱢嗽飲嗽邪嗽孫真人亦有方治寒毒疰嗽者厯代方論著之甚詳惟今之所謂勞嗽者無所經見意其華佗所謂邪嗽真人所謂疰嗽者是也此病葢酒色過度勞極傷肺損動經絡其重咯唾膿血輕者時發時差又有因虛感邪惡之氣且傳疰得之或先嘔血而後嗽或先咳嗽漸就沉羸此非特内損肺經又挾邪惡傳疰之氣所以特甚病之毒害無過此也真人治疰嗽通氣丸方用蜈蚣四節又云夢與鬼交通及飲食者全用蜈蚣外臺方四滿丸治五嗽亦用蜈蚣近世名公能推原其㫖意率用蛤蚧天靈葢桃栁枝麝香丹砂雄黄安息香之類以通神明之藥療之髙出古人之意又肺中有蟲如蠶令人喉痒而咳湯散徑過針灸不及以藥含化蟲死即嗽止鷄峰方治痰嗽緩帶李防禦京師人初為入内醫官真嬪御閣妃苦痰嗽終夕不寐面浮如盤時方有甚寵徽宗幸其閣見之以為慮馳遣呼李李先數用藥詔令徃内東門供狀若三日不效當誅李憂撓伎窮與妻對泣忽聞外間呌云咳嗽藥一文一貼喫了今夜得睡李使人市藥十貼其色淺碧用淡虀水滴麻油數㸃調服李疑草藥性獷或使臟腑滑泄併三為一自試之既而無他於是取三貼合為一擕入禁廷授妃請分兩服以餌是夕嗽止比曉面腫亦消内侍走白天顔絶喜錫金帛厥直萬緡李雖幸其安而念必宣索方書何辭以對殆亦死耳命僕俟前賣藥人過邀入坐飲以巨鍾語之曰我見鄰里服汝藥多效意欲得方倘以傳我此諸物為銀百兩皆以相贈不吝曰一文藥安得其直如此防禦要得方當便奉告只蚌粉一物新瓦炒令通紅拌青黛少許爾扣其從來曰壯而從軍老而停汰頃見主帥有此故剽得之以其易辦姑藉以度餘生無他長也李給之終身類文治䶌喘信州老兵女三歳因食鹽蝦過多遂得􅋜喘之疾乳食不進貧無可召醫一道人過門見女病喘不止教使求甜𤓰蒂七枚研為粗末用冷水半茶鍾許調澄取清汁呷一小呷如其説才飲竟即吐痰涎若膠黐狀胸次既寛􅋜喘亦定次日再作又服之隨手愈凢三進藥病根如掃此藥味極苦難吞嚥俗諺所謂甘𤓰蒂苦非虛言也同上喘病李翰林天台人有莫生患喘病求醫李云病日乆矣我與治之乃取青橘皮一片展開入江子一箇將麻線繋定火上燒烟盡留性為末生薑汁酒一大鍾呷之過口便定實神方也名醫録肺氣肺者臟之葢也肺氣盛則脉大脉大則不得偃卧肺熱久嗽有婦人患肺熱乆嗽身如炙肌瘦將成肺勞以枇杷葉木通欵冬紫苑杏仁桑白皮等分大黄減半如常製為末蜜丸櫻桃大一丸食後夜卧含化未終劑而愈本草衍義喘有冷熱人有喘疾不可一槩治之須分隂陽病發於冬寒冷病也病發於暑月熱病也冷病服豉霜丸清中湯煮肺散熱病服青杏蛤蚧丸之類又有一方孫大資梓朴散不拘冷熱皆可服醫餘水喘有人先因咳嗽發喘胸膈疰悶難於倒頭氣上湊者宜早利水道化痰下氣若不早治必成水宜服紫金丹病水人水在膜外切不可鍼鍼透膜初時稍愈再來即不可治同上翻胃治翻胃淳熈元年冬樒姪自鄱陽徃四明過婺州義烏晚泊逆旅倐有野服者坐予傍扣其何人曰邑醫孫道攻療眼疾樒與之語孫曰君貴家子弟必藏好方畀我一二或可為人起疾樒素秘翻胃方即口授之其法用一大附去其葢刳中使净納丁香四十九粒復以葢覆之用線縛定寘銀石器中浸以生薑自然汁及葢而止慢火煮乾細末一錢七掺舌上漱津下若煩渴則徐食糜粥忌油膩生冷孫喜書之於册未㡬州鈐轄苦此病危甚孫為拯之正用此方數服愈類編驢尿治翻胃驢尿治翻胃外臺載昔㓜年經患此疾每食餅及羮粥等須􅅱吐出貞觀中許奉御兄弟及柴蔣等時稱名醫奉勅令治罄竭其術竟不能療漸至羸憊死在朝夕忽有一術士云服驢小便極驗日服二合後食惟吐一半晡時又服二合人定時食粥吐即便定迄至今日午時奏之大内五六人患翻胃同服一時俱差此藥稍有毒服時不可過多盛取及熱服二合病深七日以來服之良驗本事方乾嘔不吐粥食湯藥皆吐不停灸手間使二十壯若四肢厥脈沉絶不至者灸之便通此起死之法千金方霍亂夫霍亂之起皆由起居之失宜飲食之不節露卧濕地或當風取快溫凉不調清濁相犯風冷之氣歸於三焦傳於脾胃真邪相干水糓不化便至吐利皆名霍亂其揮霍之間便致撩亂診其脈來代者霍亂又脈代而絶者是證也霍亂脈大者可治微細者不可治脈微而遲氣息少不欲言者不可治養生方云七月食蜜令人暴下鷄峰方醫説卷四
