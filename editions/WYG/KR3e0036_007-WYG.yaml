body:
  text: 醫説卷七宋張杲撰積傷滯用藥不同人之臟腑皆因觸冐以成疾病而脾胃最易受觸盖日用飲食稍或過多則停積難化冷熱不調則吐嘔㵼痢膏粱者為尤甚盖口腹恣縱不能謹節近用消化藥或論飲食既傷於前難以毒藥反攻其後不復使巴豆碙砂等藥止用麴蘖之類不知古今立方用藥各有主對麴蘖止能消化米榖如肉食有傷則非碙砂阿魏等藥不能治也至於魚蟹過傷則須用橘皮紫蘓生薑果菜有傷則須用丁香桂心水飲傷則須用牽牛芫花固不可一概論也必審其所傷之因對用其藥則無不愈其間輕重則随患人氣血以増之而已又有一等虚人沉積不可直取當以蠟匱其藥盖蠟能粘逐其病又可久留腸胃間又不傷氣能消磨至盡也又有痺氣偏虚飲食遲化者止宜助養脾胃則自能消磨不須用尅化藥耳病久成積聚癥瘕者則須用三稜鼈甲之類寒冷成積者輕則附子厚朴重則􅈨石硫黄瘀血結塊者則用大黄桃仁之類醫者宜審詳之雞峯方物能去積厨家索粉與掉粉不得近杏仁近之則爛頃有一兵官食粉多成積師以積氣丸杏仁相半細研為丸熟水下五丸數服愈摭醫新説中有一人食黄鷯子過多因食鷂子羮遂愈有傷粽子成積用麴末加少木香末為散鹽湯調數日口中聞酒香其積遂散三說醫餘食藥凡人服食藥一例須用巴豆是大不然養生必用方主青張木香丸亦未是也巴豆去積牽牛利水不可一概用且如傷食米麵之類當用神麴麥蘖傷肉當用阿魏氣不快當用丁木香青陳皮磨積塊用三稜􅅫术取熱積用大黄冷積用巴豆痰積用牽牛血積用乾漆此其大畧也更以意推之同上治積用藥大抵治疾或以所惡者攻之以所喜者誘之則易愈如碙砂水銀治肉積神麴麥蘖治酒積水蛭䖟蟲治血積木香㯽榔治氣積牽牛甘遂治水積雄黄膩粉治涎積礞石巴豆治食積各從其類也若用羣隊之藥分其勢則難取效許嗣宗所謂獵不知兎廣絡原野冀一人獲之術亦疎矣須是認得分明是何積聚然後増加用藥不爾反有所損嗣宗自謂不著書在臨時變通也本事方攧撲打傷堕馬齊中郎破石病淳于意診其脉告曰肺傷不治當後十日丁亥溲血死即後十一日溲血而死破石之病得之堕馬僵石生所以知破石之病者切其脉得肺隂氣其來散數道至而不一也色又乗之所以知其堕馬者切之得番隂脉番隂脉入虚裏乗肺脉肺脉散者固色變也乗之所以不中期死者師言曰病者安榖則過期不安榖則不及期其人嗜黍黍主肺故過期所以溲血者診脉法曰病喜養隂處者順死喜養陽處者逆死其人喜自靜不躁又久安坐伏几而寝故血下泄史記治臂臼脫許元公入京師赴省試過橋堕馬右臂臼脫路人語其僕曰急與挼入臼中若血漬臼則難治矣僕用其説許已昏迷不覺痛遂就橋舁歸邸或曰非田馬騎不能了此疾急召之至已入暮秉燭視其靣曰尚可治乃施藥封腫處至中夜方甦逹旦痛止去其封損處已白其青瘀乃移在臼上自是日日易之腫直至肩背於是以藥下之㵼黑血三升五日復常遂得赴試盖用生地黄研如泥木香為細末以地黄膏攤紙上掺木香末一層又再攤地黄貼腫上此正治打撲傷損及一切癰腫未破令内消云類説龜獻竒方治傷折治腕折傷筋損疼痛不可忍用生地黄一斤切藏𤓰薑糟一斤生薑四兩切右都炒令均熱以布裹罨傷折處冷則易之曾有人傷折宜用生龜尋捕一龜将殺患人忽夢見龜告言曰勿相害吾有竒方可療夢中授此方本事方打撲傷損打撲傷損瘀血凝滯氣因不行闗竅皆不通大便必閉壮者可服洗心散老弱者可服七聖㯽榔丸凡有此証須問臟腑所打處疼痛若傷處大痛大便三兩日不通然後可下前二藥若大便不閉傷處不甚猛痛則不可服宜服没藥乳香當歸之類醫餘又長安石史君嘗至通衢有從後呼其姓第者曰吾無求於人念汝有難故來救汝出一紙卷授石曰有難則用之乃治折傷内外損方書也明年因趨朝坐馬為他馬所踶折足墜地又蹋一臂折家人急合此藥且灌且裹至夜半痛止後手足皆堅牢如未傷時方本出良方用川當歸鉛粉各半兩硼砂二錢同研令細濃煎蘓木汁調服一大匕損在腰以上先喫淡粥半盞然後服藥在腰以下即先服後食仍頻頻呷蘓木汁别作糯米粥入藥末拌和攤紙上或絹上封裹傷處如骨碎用竹木夾定仍以紙或衣物包之其妙如此故表而出之又汀州瀝口市民陳公誦觀音甚誠慶元初出行攧折一足忍痛呌菩薩越三晝夜夢一僧拄杖持缽登門問所苦陳曰不幸折一足貧無力訪醫只得告佛僧曰不用過憂吾有一方接骨膏正可治汝便買菉豆粉於新鐡鍋内炒令眞紫色旋汲井水調成稀膏然後厚傅損處須教遍滿貼以白紙将杉木縳定其效如神不必假它劑也語訖僧忽不見陳亦寤如方修製用之則愈又紹熈五年秋湖口人林四因日暮馳馬顛墜折一足骨斷招外醫莫肯治經旬痛甚偶一道人過門聞其聲而入視曰續筋接骨非敗龜殻不可此却難得要生者甚易道人曰但得殻足矣生與敗等也語訖即退林招衆醫議之皆云一足所傅多少龜殻灰可辦兹去五里許江畔一大龜身濶二尺常跧伏泥中捕而脫其殻燒灰傅損處計其収效賢於小者百數也時已昏暮未暇遣僕半夜後鄰室張翁者夢烏衣人來訪自通為江畔老龜哀投甚切云林四折足醫欲殺吾取殻以療傷望一言救䕶張謝曰老夫愚鈍如何施力烏衣云只煩丈人詣林氏諭衆醫曰徃日甞有龜傳一方於人而贖命者用淹藏𤓰糟罨㫁處次将杉板夹縳定方書亦甞載記如更増赤小豆一味拌入糟中然後板夾不過三日即十全安愈願翁便為告之異日當圖報遂去黎明張如所戒林與醫皆喜而從之應期而驗類編熱葱涕愈傷指崔給事頃在澤潞與李抱真作判官李相方以毬杖按毬子其軍将以杖相格乗勢不能止因傷李相拇指並爪甲擘裂遽索金瘡藥裹之强坐頻索酒飲至數盃已過量而靣色愈青忍痛不止有軍言取葱新折者便入溏灰火煨熟剥皮擘開其間有涕取罨損處仍多煨取續續易熱者凡三易之靣色却赤斯須云已不痛凡十數度易熱葱並涕裹纒遂畢席笑語本事方打撲傷自然銅有人飼折翅鴈後遂飛去今人打撲傷研極細水飛過同當歸没藥各半錢酒調頓服仍以手摩痛處本草衍義堕馬折足定州人崔務堕馬折足醫令取銅末和酒服之遂痊平及亾後十餘年改葬視其脛骨折處有銅末束之朝野僉載蹴鞦韆墜損宣和中有一國醫忽乗快行宣押就一佛刹醫内人限目今便行鞭馬至則􅄫未有人須臾臥轎中扶下一内人快行送至奉㫖取軍令状限日下安痊醫診視之已昏死矣問其從人皆不知病之由惶恐無地良久有二三老内人至下轎環而泣之方得其實云因蹴鞦韆自空而下墜死醫者云打撲損傷自屬外科欲申明又恐後時參差不測再視之㣲覺有氣忽憶藥篋中有蘓合香丸急取半兩於火上焙去腦麝用酒半升研化灌之至三更方呻吟五更下惡血數升調理數日得痊予謂正當下蘓合香丸盖從髙墜下必挾驚悸血氣錯亂此藥非特逐去瘀血而又醒氣醫偶用之遂見功效此藥居家不可闕如氣逆鬼邪殗殜傳尸心痛時疾之類皆治良方載甚詳須自合為佳耳本事方搓衮舒筋道人詹志永信州人初應募為卒𨽻鎮江馬軍二十二歳因習驍騎墜馬右脛折為三困頓且絶軍帥命舁歸營醫救鑿出敗骨數寸半年稍愈扶杖緩行骨空處皆再生獨脚筋攣縮不能伸既落軍籍淪於乞丐經三年遇朱道人亦舊在轅門問曰汝傷未復初何不求醫對曰窮無一文豈堪辦此朱曰正不費一文但得大竹管長尺許鑽一竅繫一䋲掛於腰間每坐則置地上舉足搓滚之勿計工程久當有效詹用其説兩日便覺骨髓寛暢試猛伸足與常日差逺不兩月病筋悉舒與未墜時等予頃見丁子章以病足故作轉軸踏脚用之其理正同不若此為簡便無力者立可辦也癸志竒疾簷溜盥手龍伏藏指𤓰中石藏用近世良醫也一士人嘗因承簷溜盥手覺為物觸入指𤓰中初若􅁝髪然既數日稍長如線伸縮不能如常始悟其為龍伏藏也乃見石藏用扣其治療之方藏用曰此方書所不載也當以意去之歸可末蜣螂塗指庶不深入胸膜冀他日免震厄之患士人如其言後因迅雷見火光繞身士人懼急以針穴指果見一物自針穴所躍出不能為灾李定云滕樞宻翰苑叢記婦人異疾陳子直主簿妻有異疾每腹脹則腹中有聲如擊鼔逺聞於外行人過門者皆疑其家作樂腹脹消則鼔聲亦止一月一作經十餘醫皆莫能名其疾嘔物如舌鎮陽有士人嗜酒日嘗數斗至午夜興一發則不可遏家業殘破一夕大醉嘔出一物如舌初視無㾗竅至欲飲時眼偏其上矗然而起家人沃之以酒立盡至嘗日所飲之數而止遂投之猛火急爆裂為十數片士人自此惡酒消食籠齊諧記云江夏郡安陸縣隆安中有人姓郭名坦兄弟三人大兒得天行病後遂大能食日食斛米家給五年貧罄後乞至一家門前已得飯復乞於其後門此家語云汝已就前門食那得復從後門來其人答曰實不知君家有兩門腹大飢不可忍後門有三畦薤一畦大蒜因㗖之兩畦便大悶極臥地須㬰大吐吐一物似籠因出地漸小主人持飯出不復食遂撮飯著所吐物上即消成水此病尋差東坡物類相感志孕婦腹内鍾鳴有一貧士扵常賣處買得一藥方册子其間有一方能治婦人腹内鍾鳴用鼠窟前畚土研羅為末每服二錢麝香湯調其疾立愈髀瘡兒出異苑曰晋時長山趙宣母姙身如常而髀上痒搔之成瘡兒從瘡出母子平安太平御覧人靣瘡江左有商人左􅈩上有瘡如人靣亦無他苦商人戯滴酒口中其靣亦赤色以物食之亦能食食多則覺􅈩内肉脹起或不食之則一臂痺有善醫者教其厯試諸藥金石草木之類悉試之無苦至貝母其瘡乃聚眉閉口商人喜曰此藥可治也因以小葦筒啟其口灌之數日成痂遂愈然不知何疾也本事方啖物不知飽江南逆旅中一老婦啖物不知飽徐德占過逆旅老婦愬以飢其子耻之對德占以蒸餅啖之盡二竹簣約百餅猶稱飢不已日飯一石米随則利之飢復如故京兆醴泉主簿蔡繩予友人也亦得飢疾毎飢立須啖物稍遲則頓仆悶絶懐中甞置餅餌雖對貴官遇饑則便齕啖繩有美行博學有文為時聞人終以此不幸無人識其疾每為之哀傷筆談腸癢疾傅舍人忽得腸癢之疾至劇時徃徃對衆失笑吃吃不止此疾古人所未有遯齋閒覧王氏異疾汾州王氏得病右脇有聲如蝦蟇常欲手按之不則聲聲相接羣醫弗能辯聞晉陽山人趙巒善診巒曰此因驚氣入於臟腑不治而成疾故常作聲王氏曰因水邉行次有大蝦蟆躍髙數尺驀作一聲氏忽驚呌便覺右脇牽痛自後作聲尚似蝦蟇也巒乃與六神丹服之來日取下青涎類蝦蟆之衣遂差巒言診王氏脉右關脉伏結積病也故止作積病治用六神丹㵼之而愈名醫録瘵飢蟲從政郎陳撲富沙人母髙氏年六十餘得飢疾每作時如蟲齧心即急索食食罷乃解如是三四年畜一猫極愛之常置於旁猫呌則取魚肉和飯以飼一日猫適呌命取鹿脯自嚼而啖猫至于再覺一物上觸喉間引手探得之如拇指大墜于地頭尖匾類塌沙魚身如蝦殻長八寸漸大侔兩指其中盈實剖之腸肚亦與魚同有八子胎生蠕蠕若小鰍人皆莫能識為何物盖聞脯香而出髙氏疾即愈小兒魃病千金論凡小兒有魃病者是娠婦被惡神導其腹中令兒病也魃小鬼也其病証㣲微下利寒熱徃來毫毛鬢髪髫鬡不恱者是也宜服龍胆湯凡婦人先有小兒未能行而母更有娠使兒飲此乳亦作魃也令兒黄瘦骨立髪落壮熱也保生方足靣竒方趙先生字子固母劉氏年㡬八十左足靣一瘡下連大指上連外踝以至膁骨每歲輙數發發必兼旬累月昏暮癢甚搔爬移時出血如泉呻吟痛楚殆不可忍夜分即漸已明日復然每一更藥則瘡轉大而劇百試不驗如是二十餘年淳熙甲辰仲冬之末先生為太府丞一夕母病大作相對悲泣無計困極就睡夢四神僧黙坐一室旁有長榻先生亦坐因而發嘆一僧問其故光生荅之以實僧曰可服牛黄金虎丹又一僧云朱砂亦好既覺頗驚異試取藥半粒强服之良久腹大痛舉家且悔俄而下礧磈物如鐵石者數升是夕瘡但㣲癢不痛而無血數日成痂自此遂愈朱砂之説竟不復試先生因圖僧像如所夢者而記其事金虎丹方出和劑本治中風痰涎湧塞所用牛黄龍腦膩粉金箔之類皆非老人所宜服今乃取竒效意此疾積熱臟腑而發于皮膚歲久根深未易蕩滌故假凉劑以攻之不可以常疾論也神僧之夢盖誠孝所感百一選方産後腸癢針線袋主婦人産後腸中癢不可忍以袋安所臥褥下無令知之本草甑氣薰靣腫張徳俊云頃年和倅餘杭人将赴官因蒸降真木犀香自開甑靣仆甑靣上為熱氣所薰靣即浮腫口眼皆為之閉更數醫不能治最後一醫云古無此證請以意療之於是取僧寺久用炊布燒灰存性隨傅随消不半月而愈盖以炊布受湯上氣多反用以出湯毒亦猶以鹽水取鹹味爾醫者之智亦可喜百一方蛟龍病古有患者飲食如故發則如癲靣色青黄小腹脹滿狀如姙孕醫者診其脉與證皆異而難明主療忽有一山叟曰聞開皇六年㶚橋有人患此病盖因三月八日邉水食芹菜得之有識者曰此蛟龍病也為龍遊于芹菜之上不幸食之而病也遂以寒食􅄳每劑五合服之數劑吐出一物雖小但似蛟龍状而有兩頭其病者依而治之獲愈名醫録疑病何解元陳留人也一日㑹飲于趙修武宅酒至數盃忽見盞底有似一小蛇嚥入口亦不覺有物但每每思而疑之日久覺心痛自思小蛇長大食其五臟明年又因舊㑹趙宅恰才執盃又見小蛇乃放下盞細㸔時趙宅屋梁上掛一張弓却是弓梢影在盞中因此解疑其心疾遂無乃致疑而成病也同上産婦腹中癢箭簳及鏃主婦人産後腹中癢安所臥蓆下勿令婦人知本草食鱠吐蝦蟆永徽中崔爽者每食生魚三斗乃足於後飢作鱠未成爽忍飢不禁遂吐一物如蝦蟆自此之後不復能食鱠矣宣室志瘡破雀飛金州防禦使崔堯封有親外甥李言吉者左目上臉忽癢而生一小瘡漸大長如鴨卵其根如弦恒壓其目不能開堯封每患之他日飲之酒令大醉遂剖去之言吉不知覺也贅既破中有黄雀鳴噪而去聞竒録蛇在皮中華佗别傳曰瑯琊有女子右股上有瘡癢而不痛愈而復作佗曰當得稻糠色犬一頭繫馬頸走出五十里㫁頭向癢乃從之須臾有蛇在皮中動以鐡錐横貫引出長三尺許七日便愈東漢注又獨異志所載與此相類恠石鏡在日南國之西南有石鏡方數百里光明瑩徹可鑒五臟六腑亦名仙人鏡國人若有疾輙照其形遂知起病某臟採藥餌之無不差者冷疾直閣将軍房伯玉患冷疾夏月常複衣張嗣伯為之診曰卿熱須以水發之非冬月不可至十一月令二人夾捉伯玉解衣在石上取冷水從頭澆之盡二十斛伯玉口噤家人哭請止不可又盡水百斛伯王始能動見背上彭彭有氣俄而起伯玉曰熱不可忍乞冷飲嗣伯以水與之一飲一斗遂差史記人漸縮世有竒疾者吕縉叔以制誥知潁州忽得疾但縮小臨終僅如小兒古人不曾有此疾終無人識視直如曲有一人家妾視直物如曲弓弦界尺之類視之皆如鈎醫僧奉真親見之二說筆談寒熱注病又有婦人長病經年世謂之寒熱注病冬月中華佗令坐石槽中平旦用冷水汲灌云當滿百始七十灌冷戰欲死佗令滿數至八十灌熱氣乃蒸出囂囂然髙二三尺滿百灌佗乃使燃火温牀厚覆衣良久汗洽出著粉燥便愈刳腹視脾又有人病腹中攻痛十餘日鬢髪堕落華佗曰是脾半腐可刳腹治也使飲藥令臥破腹就視脾果半腐壊以刀㫁之割去惡肉以膏傅之即差魏太祖聞而異之召佗常在左右太祖苦頭風每作心亂目眩佗鍼鬲随手而愈大怒病差又有一郡守病華佗以其為人甚怒則差乃多受其貨而不加功無何弃去留書罵之守果大怒令人追殺守子知之嘱令勿逐瞋恚吐黒血數升而愈三說魏志蒸之得汗晉書曰張苖雅好醫術善消息診處陳廪丘得病連服藥發汗汗不出衆醫云發汗不出者死自思可蒸之如中風法温氣于外迎之必得汗也復以問苖云曾有人疲極汗出臥簟中得冷病苦憎寒諸醫與散四日凡八過發汗汗不出苖乃燒地布桃葉于上蒸之即得大汗便於被下傅粉身極燥乃起即愈廪丘如其言果差視胎已死魏志曰甘陵相夫人有娠腹痛不安方得六月佗視脉曰胎已死矣使人手摸知所在在右則女在左則男人云在左于是為湯下之果下男形則愈死枕愈病齊書曰徐嗣伯常有傴人患滯冷積年不差嗣伯為診之曰尸注也當得死人枕煮服之乃愈於是徃古塚中取枕枕已一邉腐闕服之即差後秣陵人張景年十五腹脹而黄衆醫不能療以問嗣伯此石蚘爾極難療當得死人枕煮服之依語煮枕以湯投之得大利並蚘蟲頭堅如石者五升病即差後沈僧翼患眼痛又多見鬼物以問嗣伯嗣伯曰邪氣入肝可覔死人枕煑服之服竟可埋枕於故處如其言又愈王晏問之曰三病不同而皆用死人枕而俱差何也荅曰尸注者鬼氣伏而未起故令人沉滯得死人枕促之䰟氣飛越不得復附體故尸注可差石蚘者久蚘也醫療既癖蚘蟲轉堅世間藥不能遣所以須鬼物驅之然後可散故令煮死人枕也夫邪氣入肝故使眼痛而見魍魉應須邪物以鈎之故用死人枕也氣因枕去故復埋于塜間也太平御覧病悲思州監軍病悲思郝允告其子曰法當甚悸即愈時通守李宋卿御史嚴甚監軍内所憚也允與其子請于宋卿一造問責其過失監軍皇怖汗出疾乃已邵氏聞見録榖獨氣殿中丞姚程腰脊痛不可俛仰郝曰榖獨氣也當食發怒四肢受病傳于大小絡中痛而無傷法不當用藥以藥攻之則益痛須一年能偃仰二年能坐三年則愈矣後三年果愈同上兒生腎縮思村王氏之子生七日兩腎縮一醫云硫黄茱茰研大蒜塗其腹仍以菵草蛇牀子薰之遂愈盖初生受寒氣而然也𤨏碎録飲水得疾有黄門奉使交廣回周顧謂曰此人腹中有蛟龍上驚問黄門曰卿有疾否曰臣馳馬大庾嶺時當大熱困且渇遂飲水覺腹中堅痞如石周遂以消石及雄黄煮服之立吐一物長數寸大如指視之鱗甲具投之水中俄頃長數尺復以苦酒沃之如故以器覆之明日已生一龍矣上甚訝之明皇雜録誤吞金䥊張成中漢上人有女七八歲因將母金䥊子一隻剔齒含在口中不覺嚥下胸膈疼不可忍憂惶無措忽銀匠來見某有藥可療歸取藥至米飲抄三錢令服来早大便取下後問之乃羊脛炭一物為末爾名醫録羊脛炭亦治誤吞錢妙飛絲入眼飛絲入人眼令人睛漲白突出痛不可忍即以新筆兩三管濡好墨運睛上則飛絲纒筆而出即安蛇蟲獸咬犬傷白芷治蛇齧臨川有人以弄蛇貨藥為業一日方作塲為蝮所齧即時隕絶一臂之大如股少頃遍身皮脹作黄黑色遂死有道人方旁觀出言曰此人死矣我有一藥能療但恐毒氣益深或不可治諸君能相與證明方敢為出力衆咸竦踊勸之乃求錢二十文以徃才食頃奔而至命汲新水解裹中藥調一升以杖抉傷者口灌入之藥盡覺臍中搰搰然黄水自其口出腥穢廹人四體應手消縮良久復故其人已能起與未傷時無異遍拜觀者且鄭重謝道人道人曰此藥不難得亦甚易辦吾不惜傳諸人乃香白芷一物也法當以麥門冬湯調服適事急不暇姑以水代之吾今活一人可行矣拂袖而去郭邵州㳓得其方甞有鄱陽一卒夜直更舍為蛇齧腹明旦赤腫欲裂以此飲之即愈夷堅志被毒蛇傷有人被毒蛇傷良久已昏困有老僧以酒調藥二錢灌之遂蘓及以藥滓塗咬處良久復嚾二錢其苦皆去問之乃五靈脂一兩雄黄半兩為末爾有中其毒者用之無不驗本草衍義辟蛇毒南海地多蛇而廣府治尤甚某侍郎為帥聞雄黄能禁制此毒乃買數百兩分貯絹囊掛於寝室四隅經月餘日卧榻外常有黑汁從上滴下臭且臊使人穿承塵窺之則巨蠎横其上死腐矣于是盡令撤去障蔽死者長丈許大如柱旁又得十數條皆蟠蚪成窠穴他屋所驅放者合數百自是官舍為清類編蛇蟲所傷凡蛇傷蟲咬倉卒無藥去處以大藍汁一碗雄黄末二錢調均㸃在所傷處併令細細服其汁神驗如無藍以靛花青黛代之山林日用法毎欲出時用雄黄一桐子大火上燒烟起以薰脚棚草屨之類及袍袖間即百毒不敢侵害邪祟逺避集驗方同上治蚯蚓咬浙西軍将張韶為蚯蚓所咬其形如大風眉鬚皆落毎聞蚯蚓鳴於體有僧教以濃作鹽湯浸身數遍差蜘蛛齧蜘蛛齧者雄黄末傅之朝野僉載猫傷猫兒傷研薄荷末塗之百一選方馬咬被馬咬者燒鞭梢灰塗之盖取其相服也蜈蚣咬蜈蚣咬取蜘蛛一枚咬處安當自飲毒蜘蛛死痛未止更著生者孫真人惡蛇螫趙延禧云遭惡蛇所螫處貼蛇皮便於其上文之引去毒氣即止壁鏡咬壁鏡咬醋磨大黄塗之又壁鏡毒人必死用白􅈨治之太平廣記用桑柴灰汁三度沸取調白􅈨為膏金瘡口即善兼治蛇毒蠶咬蠶咬人毒入肉取苧汁塗之今以苧近蠶則蠶不生也本草治諸獸傷馬咬用獨顆栗子燒灰貼鼠咬用麝香吐調塗或用猫毛燒灰裛之猫咬用薄荷汁塗狗咬傷涎入瘡令人昏悶者浸椒水調菵草末塗猪咬松脂鎔作餅子貼又屋溜中泥塗春末夏初狂犬咬人即令狂過百日乃得免當終身禁食犬肉若食蠶蛹此毒亦發定不可救宜忌之右先去却惡血灸瘡中十壮明日以後日灸一壮百日乃止忌酒每七日搗韭汁飲一二盞猘犬所傷沈約宋書曰張収甞為猘犬所傷醫云宜食蝦蟆膾収甚難之醫含笑先嘗収因此乃食瘡亦即愈犬傷犬傷人量所傷大小爛嚼杏仁沃破處以帛繫定至差無苦本草衍義又遇惡犬以左手起自寅吹一口氣輪至戍掐之犬即退伏𤨏碎録虎犬咬虎犬咬人掺􅈨納瘡中裹之止痛立愈蠆螫魏志曰彭城夫人夜之厠蠆螫其手呻吟無賴華佗令温湯漬手數易湯常令暖其旦則愈太平御覧蝎螫􅈨石一兩醋半升煎之投􅈨末於醋中浸螫處井底泥傅亦愈蠼螋妖蟲蠼螋妖蟲也隠於墻壁間尿射人之影令人遍體生瘡如湯火所傷治法用烏雞翅毛燒灰油調傅以雞者百蟲所畏故能治之𤨏碎録云有人苦此用雞子大頭剜小竅取白塗四畔愈湯火金瘡大黄療湯火瘡建昌士人黄襲字昭度云有鄉人為賈泊舟潯陽月下髣髴見二人對語曰昨日金山修供甚盛吾徃赴之飲食皆血腥不可近吾怒庖者不謹漬其手鼎中今已潰爛矣其一曰彼固有罪子責之亦太過曰吾比悔之顧無所及其一曰何難之有吾有藥可治但搗生大黄以米醋調傅瘡上非惟愈痛又且滅瘢兹方甚良第無由使聞之爾賈人適欲之金山聞其語意冥冥之中假手以告遂造寺中詢之乃是夜有設水陸者庖人揮刀誤傷指血落食中恍惚之際若有人掣其手入鑊内痛楚徹骨號呼欲死賈人依神言療之二日愈夷堅志醋泥塗火燒瘡北夢𤨏言記火燒瘡方云孫光憲家人作煎餅一婢抱孩子擁爐不覺落火爐上遽以醋泥塗之至曉不痛亦無瘢㾗定知俗説亦不厭多聞良方湯火瘡劉寄奴為末先以糯米漿雞翎掃傷著處後掺藥末在上並不痛亦無㾗大凡湯著先以鹽末掺之䕶肉不壊然後用藥傅之至妙本事方湯火瘡禁用冷凡被湯火燒者初謹勿以冷物及井下泥尿泥及蜜淋塌之其熱氣得冷則却深摶至骨爛入筋也所以人中湯火後苦攣縮者良由此也巢氏病源治湯火呪俚巫多能持呪語而蹈湯火者元仲弟得其訣為人拯治無不立差呪云龍樹王如来授吾行持北方壬癸禁火大法龍樹王如來吾是北方壬癸水収斬天下火星辰千里火星辰必降急急如律令呪畢即握真武印吹之即用少許冷水洗雖火燒手足成瘡亦可療類編歛金瘡口歛金瘡口止疼痛用劉寄奴一味為末掺金瘡口裏宋髙祖劉裕㣲時伐狄見大蛇長數丈射之傷明日復至聞有杵臼聲徃覘之見青衣童子數人於榛中搗藥問其故荅曰我王為劉寄奴所射合藥傅之帝曰吾神何不殺答曰寄奴王者不死不可殺帝叱之皆散収藥而返毎遇金瘡傅之良驗寄奴髙祖小字也本事方治金瘡周崈班縁捕海宼被寇以提刀斫傷血出不止分明筋如㫁骨如折用花蕋石掩之血不止痛亦不定有兵士李髙言某在軍中被人中傷欲死見統領與藥一貼名紫金散掩之血止痛定明日瘡靨如鐡遂安又無瘢㾗後告統領求此方只用紫藤香甆瓦鎌刮下石碾碾細傅之救却萬千人也名醫録云紫藤香即降之最佳者又温州有匠人造屋失脚墜地地上有鏟頭􅆆柱傍脚痃被傷血如湧出村中無藥有僧道光於門扇上撮得塳塵掩定血止痛定兩日便靨堅問道光塳塵如何治得金瘡曰古人用門桯塵者此也火氣入脚生瘡有婦人因冬間向火兩股上遂成瘡其汁淋漓人無識者後見一人云此皆因火氣入内生此但用黄柏皮為末掺之立愈果如其言後又再作適無黄柏用薄荷煎塗之立愈漆澆成瘡徃年蕪湖二漆牙相爭其一人以漆一桶自頭澆其一人患瘡㡬死有人教以鐵店磨鐡槽中泥塗之即愈以蟹黄塗之亦愈𤨏碎録田舍試驗之法藕皮散血起自庖人牽牛逐水近出野老麵店蒜虀乃是下蛇之藥路旁地菘而為金瘡所秘本草治箭鏃不出孫真人云治箭鏃在咽喉胸膈及鍼刺不出以螻蛄搗取汁滴上三五度箭頭自出食忌鼠盗忌食夜藏飲食於器中覆之不宻鼠欲盗食不可得環器而走淚堕器中食之者得黄疾通身如蠟鍼藥難治食胡羊肉不可食松子淡食鹽傷筋醋傷骨淡飯吃了肥木腯多言損氣多記損心多怒傷精多笑傷神飲食不可露天凡飲食不可放在露天恐飛絲堕飲食中食之令人咽喉生泡急以白􅈨巴豆燒灰吹入口内或急擦即差𤨏碎録雜忌茅屋漏水堕諸脯肉上食之成癥結及暴肉作脯不肯乾者祭神肉無故自動蜘蛛及行蜂落食肉上凢食無故色變脯腊入火灸不動不得火而自動者皆能殺人不可食之夜臥當耳勿有孔吹即耳聾逺行疲乏而來勿入房成五勞旦起勿開目洗靣令人目澁失明父淚母涙不得堕子目中即精破生翳脩真祕訣勿過食某見數老人飲食至少其說亦有理内侍張茂則每食不過粗飯一盞許濃膩之物絶不向口老而安寕年八十餘卒茂每勸人必曰旦暮少食無大飽王晳龍圗造食物必至精細食不盡一器食包子不過一二枚爾年入十卒臨老尤康强精神不衰王為予言食取補氣不飢則已飽生衆疾至用藥物消化尤傷和也劉元袐監食物尤薄僅飽即止亦年八十而卒劉監尤喜飲酒每飲酒更不食物啖少果實而已循州蘓侍郎每見某即勸令節食言食少則臟氣流通而少疾蘓公貶瘴鄉累年近六十而傳聞亦康健無疾盖得此力也蘓公飲酒而不飲藥每與客食未飽公已捨匕筯張太史明道雜記食鼈不可食莧方書言食鼈不可食莧温革郎中因併啖之自此苦腹痛每作時㡬不知人疑鼈莧所致而未審乃以二物令小蒼頭食之遂得病與革類而委頓尤劇未㡬遂死舁其尸置馬廐未歛也忽小鼈無數自九竅湧出散走廐中惟遇馬溺者輙化為水革聞自臨視掊聚衆鼈以馬溺灌之皆即化為水于是革飲馬溺遂差或云白馬溺尤良温革字叔皮𤨏碎録食蟹反惡陳正卿云頃年與一承局同航船承局者為舟中人言甞為同官差徃昌國見白蟹不論錢因買百錢得數十枚痛飲大嚼且食紅柿至夜忽大吐繼之以血昏不省人病垂殆同邸有知其故者憂之忽一道人云唯木香可解但深夜無此藥偶有木香餅子一帖試用之病人口已噤遂調藥灌即漸漸甦省吐定而愈百一選方銅器不可盖食銅器盖食器上汗滴食中令人發惡瘡内疽食性忌之也炊湯不宜洗靣炊湯經宿洗靣令人無顔色洗體令人成癬未經宿者洗靣令人亦然食驢鼈漏肉之戒食驢肉喫荆芥茶殺人食鼈肉同莧菜殺人茅舍漏滴在肉上食之殺人此三䓁尤宜戒之三説本草食勿多飽多臥食謹勿多多則生病飽勿多臥臥則心蕩心蕩多失性食多生病則藥不行集異説發暴浙中人因食𤓰匏多要發吐㵼霍亂謂之發暴以致於有不救者為何𤓰匏種之在土不久值時暖易長易成使人食之則發暴若同香葇共食則可免香葇今香薷也今人所謂香葇和食𤓰子是矣名醫録飲食忌凡人食欲少而數不欲頓而多食不欲急急則損脾法當熟嚼令細冷食不用熱水潄口熱食不用冷水潄口食必先食熱然後食冷醉飲過度酒有大毒大熱大寒凝海唯酒不冰其至熱也飲之昏亂易人本性其至毒也若解風寒宣血脉消邪氣引藥勢不過於酒也若醉飲過度盆傾斗量毒氣攻心穿腸腐脇此䘮生之源也修真祕訣黄帝雜忌法一日之忌暮無飽食一月之忌晦無大醉一歲之忌暮無逺行終身之忌暮無燃燭行房鹹傷筋醋傷骨飽傷肺饑傷氣久視傷血久臥傷氣久立傷骨久坐傷肉久行傷筋凡向北勿安牀勿靣北坐夜臥勿覆其頭人魘勿令燃燈喚之定死無疑正月寅日燒白髪吉凡寅日翦手甲午日翦足甲又燒白髪吉戎幕雜談飲食禁食黄顙魚不可服荆芥呉人魏㡬道志在妻家啖黄魚羮罷採荆芥和茶而飲少焉足底竒痒上徹心肺跣足行沙中馳宕如狂足皮皆破欲裂急求解毒藥餌之㡬兩日乃止食蜜不可食鮓韶州月華寺側民家設僧供新蜜方熟羣僧飽食之有某院長老兩人還至半道遇村墟賣鮓不能忍嚵買食盡半斤是夕皆死食河豚不可服風藥李􅜜郎中過常州王子雲縉為郡招之晨餐辦河豚為饌李以故不食遣歸餉妻妻方平明服藥不以為慮啜之甚羙即時口鼻流血而絶李未終席訃音至矣二説夷堅志飲食宜緩王介玉頃甞道旁食有一老人進言飲食須用緩盖脾喜温不可以冷熱犯之唯緩食冷熱之物至脾皆温矣又因論飲食大冷熱則傷隂陽之氣晃氏夜話隂地流泉不可飲隂地流泉二月八月行塗之間勿飲之令人夏發瘧瘴又損脚令軟五月六月勿飲澤中停水食著魚鼈精令人病鼈瘕也本草食禁荆芥一名假蘇本草謂性温不然實㣲凉吾竄嶠嶺久數見食黄顙魚偶犯荆芥者必立死甚于鈎吻毒矣物性相反有可畏如是世人於食禁殆不可不知百衲居士鉄圍山叢談禽獸蟲魚肉異不可食禽獸蟲魚之屬或有感沴氣所生形色變異者皆為毒物謹勿食之謂物有形質變異者如獸有岐尾蟹有獨螯羊一角雞四足是也物有形色變異者如白鳥𤣥首烏雞白首白馬青蹄白馬黑頭是也有形色無異其肉變恠者如落地不沾灰塵經宿肉體尚暖曝炙不燥入水自動之類是也有皮肉無異腸臟變改者如肝色青黯腎氣紫黒魚無腸膽牛肝葉孤之類是也有一物常食性善與他物相反過口而害人者如鮠魚同鹿肉食之殺人羊肉同鱠酪食之害人羊肝得生椒破人臟猪肉得胡荽爛人臍是也有一物常食性平與他物相感入腹成動物者如鱠生同酥乳食之變諸蟲鼈肉與莧菜食之還生鼈牛肉同猪肉食之成寸白蟲猪羊肉以桑楮柴煮灸食之亦成寸白也東虢婁居中食治通説勿食生鮮旋殺物命以應急需既虧愛物之仁又失養口體之正且肉未停冷動性猶存鱠生之屬損人尤甚昔有食魚鱠而生病者用藥下之已變虫形而能動有鱠縷尚存故可驗也有食鼈肉而成疾者用藥下之已成動物而能行有類鼈状故可驗也諸肉膾而食之生蟲成病者甚多一切㣲細物命旋烹不熟食之害人固不可測為癥為瘕為痼疾為竒病此不可不知亦不可忽者也食治四時不食金匱要略方曰春不食肝夏不食心秋不食肺冬不食腎四季不食脾謂畜獸五臟能益人五臟春時木旺肝氣盛脾氣敗故不食肝食之則肝氣愈盛脾氣愈敗因成脾病則難治也或春月肝經受病明有虛證亦宜食肝以補之或春月肝氣太盛即宜食肺以抑之又云肝病禁辛心病禁鹹脾病禁酸肺病禁苦腎病禁甘五味遞相尅制故禁之也或肝氣太盛因而生病亦宜辛味以制之更在心智變通不可全執定論他臟倣此食治飽勿便睡偶食物飽甚雖覺體倦無輙就寝可運動徐行約百餘歩然後解帶鬆衣伸腰端坐兩手按摩心腹交义来徃約一二十過復以両手自心脇間按擦向下約十數過令人腹氣通不致壅塞過飽食物随手消化也生物食之無益食物可生噉者唯有果核時新初市無貴先甞貴在實成氣足以走趂市利之物多未成熟故也時果鮮味易于可口無喜其甘酸至于意足而後已棗栗之屬經火熟者稍多食雖無妨亦忌于飽飯之後菜品中以蘿蔔下麪茵蔯和羮皆生用為宜萵苣嫩苖蕪菁肥根苦藚落蘓雖可生噉皆不益腸胃不若淹爼煮羮以為麪飯之佐也百榖之屬固不可生食一切動物皆然或鱠魚如絲抹肉成縷沃醋食之已失食養之正有将蛤蜊螃蟹析殻乗活而噉者肉味致用豈有是理既輕殘物命還輕忽自已之性命也生食果菜自有所損此又損之彌甚以好生之徳衛生之經併失之故也食治食無求飽論語云不多食又云食無求飽謂食物無務于多貴在能節所以保冲和而順頥養也若貪生務飽淤塞難消徒積暗傷以召疾患盖食物飽甚耗氣非一或食不下而上湧嘔吐以耗靈源或飲不消而作痰咯唾以耗神水大便頻數而洩耗榖氣之化生􅘞便利滑而獨耗源泉之浸潤致于精清冷而下漏汗淋漓而外泄莫不由食物而過傷滋味太厚如能節滿意之食省爽口之味常不至於飽甚者即䪺䪺必無傷物物皆為益糟粕變化早晚溲便按時華精和凝上下津液含蓄神藏内守榮衛外䕶邪毒不能犯疾沴無由作故知聖人之立言垂教足以為養生之大經也東虢婁居中食治通說􅘞與溲同用飲食以時飲食以時饑飽得中水榖化冲氣和融精血以生榮衛以行腑臟調平神志安寕正氣充實於内元真通㑹於外内外邪沴莫之能干一切疾患無從而作也食飲以宜食飲之宜舉其大畧當候以饑而後食食不厭熟嚼仍候焦渇而引飲飲不厭細呷無待饑甚而後食食不可太飽或覺微渇而省飲飲不欲太頻漿不欲甘酸肉無貪肥脆食不厭精細飲不厭温熱飯無令少於麪菜常令稱於肉肉不厭軟暖菜不可生茹五味無令勝榖味肉味無令勝食氣滋味欲澹而和食時當謹其度故得食飲常羙津液常甘身輕而不倦神清而少睡胷腑通暢而少噫胃脘寛紓而不脹省解帶摩腹之勞免食藥耗氣之失皆目前近效也同上粥能暢胃生津液張文濳粥記贈潘邠老張安道每晨起食粥一大盌空腹胃虚榖氣便作所補不細又極柔膩與腸腑相得最為飲食之良妙齊和尚説山中僧每將旦一粥甚繫利害如或不食則終日覺臟腑燥渇盖能暢胃氣生津液也今勸人每日食粥以為養生之要必大笑大抵養生性命求安樂亦無深逺難知之事正在寝食之閒耳或者讀之果笑文潜之說然予觀史記陽虚侯相趙章病太倉公診其脉曰法五日死後十日乃死所以過期者其人嗜粥故中臟實故過期師言曰安榖者過期不安榖者不及期由是觀之則文濳之言又似有証後又見東坡一帖云夜飢甚呉子野勸食白粥云能推陳致新利膈養胃僧家五更食粥良有以也粥既美快粥後一覺尤不可説五味致疾五味養形過則致病故多食鹹則脉凝澁而變多食苦則皮槁而髪㧞多食酸則肉胝皺而唇掲多食甘則骨痛而髪落多食辛則筋急而爪枯本事方飲酒面青赤飲酒者肝氣㣲則面青心氣㣲則面赤魚無腮不可食養生方云魚無腮不可食食之令人五月發癩巢氏病源醫説卷七
