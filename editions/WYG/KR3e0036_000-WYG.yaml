body:
  text: 醫説序醫之伐病猶將之伐敵也夫决機戰攻之地以取勝用兵者固皆有是心及一旦為背水陣則觀者􅕎然矣非有淮隂為之辦析則孰知其出於兵法是兵之不可以無其説也兵不可以無説醫其可以無説乎里中張杲季明自其伯祖子充以醫顯京洛間受知於范忠宣其祖子發蓋學於伯祖而有得者也於是其父彦仁繼子發而術更竗於充深微所衍固三世之醫也季明則欲博觀逺覽𢎞暢其道凡書之有及於醫者必記之名之曰醫説始見則曰已得幾事矣再見則曰近又得幾事矣其意欲滿千事則以傳諸人予念醫家之書本之以素問靈柩廣之以難經脉訣而藥之君臣佐使咸萃於本草世固不外是而為醫也今有出一奇以起人之死則衆必相與驚異以為昔人所未到自明觀之其不有似於背水陣乎故予知是書之為有益也己酉嵗冬季明擕以過我且曰書雖未成請姑先祥之以勉杲之意所勿及㑹予有鄢郢之役殊倥􅘓然念季明請甚篤又顓顓於其業蒐選冝必精故不暇之盡譔而徒嘆其當盛年著書遽肯出與人共之其存心有足大者豈非逮事其祖多異聞故不以得之紙上者為已私分也歟此子所以益重季明也遂書以冠醫説之首己酉嵗十月六日朝奉大夫權發遣郢州羅頊序欽定四庫全書子部五醫説目錄醫家類卷一三皇歴代名醫太昊伏犧氏炎帝神農氏黄帝巫彭巫咸岐伯俞跗桐君雷公伯髙少俞馬師皇秦長桑君醫緩醫和文勢醫竘鳯綱􅀈氏俞氏盧氏扁鵲子豹李䤈崔文子安期先生樓䕶公遜光陽慶太倉公秦信王遂宋邑馮信髙期王禹唐安杜信𤣥俗張機郭玉程髙涪翁沈建張伯祖杜度衞沈華佗李當之吳普樊阿封君達韓康董奉負局先生李譔李子豫張苗王叔和趙泉葛洪皇甫謐裴顗劉徳史脱宫泰靳邵阮侶張華蔡謨程據支法存仰道士范汪殷仲堪王顯徐謇徐雄王纂徐熈道度叔嚮薛伯宗徐仲融胡洽徐文伯徐嗣伯僧深劉涓子羊昕秦承祖張子信顧歡李元忠李密崔季舒祖挺禇澄鄧宣文徐之才張逺遊陶𢎞景徐之範徐敏齊甄權甄立言宋俠許𦙍宗孫思邈張文仲孟銑王方慶秦鳴鶴許智藏巢元方元珠先生王冰自號啟𤣥子卷二醫書醫書黄帝與岐伯問難素問惟八卷醫之起方書所出難經陸宣公裒方書本草百藥自神農始藥有君臣佐使用藥増減藥有宣通補洩本草黒白字藥有隂陽配合誤註本草藥名之異鍼灸鍼灸之始明堂妙鍼獺走鍼芻愈鬼鍼愈風手許希善鍼鍼法鍼愈風眩鍼鼻生贅筆鍼破癰鍼瘤巨虱善鍼捫腹鍼兒鍼急喉閉砭石刺誤中肝九鍼工鍼鍼舌底治舌出不收艾謂之一壯灸背瘡蒜灸癰疽灸瘵疾灸欬逆法灸鼻䘐灸牙疼法腳氣灸風市灸腳轉筋三里頻灸灸頭臂腳不宜多灸痔疾灸蛇毒灸難産灸臍風不宜灸因灸滿面黒氣神醫太醫集業趙簡子神醫尸蹷死胎郝翁精於醫禇澄善醫唐與正治疾以醫知名耳聞風雨聲非孕徙癰劉從周妙醫㧞麥中蠱華佗醫疾破腹取病扁鵲見齊桓侯文摯董奉華佗臟氣已絶病有六不治隨俗為醫扁鵲兄弟三人竪傷脾病狂肝氣暫舒卷三神方夢獲神方夢藥愈眼疾觀音治痢人參胡桃湯懸癰神授乳香飲夢張王藥愈癰救疫神方治吐血呂真人治目疾驚風妙藥治内障羊肝丸神精丹寒嗽丁公藤愈風豨薟丸一服飲診法診法動脈脈形氣逆順四時之脈肥瘦虛實形氣相得相反善别脈龎安常脈法太素之妙魚遊蝦戲傷寒百痾之本察病先識其源病之所由六經傷寒用藥格法傷寒有五陽證傷寒竹葉石膏湯聖散子之功柴胡㕮咀寒厥風濕不可汗下取汗不可先期傷寒舌出四時癘疾辯沙病暑氣所中傷寒後睡不著傷寒差後之戒用藥不同諸風風者百病之始中風用藥中風辯諸風證諸風風痱風痙腲腿風眩風痺偏枯小中不須深治邪風風厥睡防風吹白癩病長松治大風瘵風􅋪絶不同食山甲動舊風疾􅣪草治風蚺蛇治風蛇墜酒罌治風桑枝愈臂痛透氷丹愈耳癢臂細無力不任重風眩風癉風蹶痺苦沓風癱瘓迵風又手足沈重狀若風者上氣常須服藥熱蹶眉髪自落卷四勞瘵五勞六極七傷虚勞冷勞勞疰傳勞遇道人治傳勞方勞傷瘵疾勞復鬼疰瘵疾尸疰虛勞用藥鰻治勞疾虛勞服藥骨蒸内熱氣血虛發厥熱人肉治羸疾治羸瘠治勞瘵吐血天靈蓋鼻䘐吐血鼻䘐又嘔血咯血山梔子茅花愈䘐血頭風偏頭疼頭眩蹶頭熱婦人偏頭痛沐頭洗浴婦人月水來不可沐頭川芎不可乆服眼疾目疾眼疾不可沐浴讀書損目眼痛不食眼赤腫眼疾有虛實赤目戒食一目失明治眼觀音洗眼偈治内瘴治爛縁眼治内障眼治眼二百味花草膏班瘡入眼眼中常見鏡子目疾忌浴偷鍼眼目視一物為二洗眼湯口齒喉舌耳治喉閉又咽喉腫痛巧匠取喉鈎舌腫滿口舌無故血出牙疼牙齒日長舌脹出口治齒痛齲齒飲酒漱口漱口食冷棗能黄齒齒藥齒間肉壅出飲酒喉舌生瘡苦參不可㓗齒齒縫血出虎鬚治齒痛積年耳聾骨哽治哽以類推硼砂治哽呪水治哽漁人治哽治哽故漁􅃠治哽倉卒有智喘嗽喘有三證咳嗽又治痰嗽治齁喘喘病肺氣肺熱乆嗽喘有冷熱水喘飜胃治飜胃驢尿治飜胃乾嘔不止霍亂卷五心疾健忘抑精順理心疾驚氣入心神志恍惚神氣不寧健忘詩忽不識字治人心昏塞多忘喜誤治惡夢麝枕癲病又又狂魘不寤夢卧而不寐小便如泔夜魘暮卧呪桑葉止汗太驚發狂犯天麥毒夢遺心脈溢關瘖人卧血歸於汗血脈笑歌狂疾膈噎諸氣氣膈五膈五噎諸氣五噎靛治噎疾糠治卒噎病噎吐蛇食飴主噎百病生於氣天地氣所生氣虛氣逆有餘不足重虛寒熱厥氣候六氣胃氣五臟之本四時五行五臓五氣旦暮氣四時之氣更傷五臟五臟所藏五臟所傷五臟之脈五入五惡五液五主五禁汗出體有可已之疾消渴渴服八味丸又又仲景止渴浮石止渴苦酒止渴熱中消中富貴人心腹痛淋附心痛腹痛有数種大瀉腹痛暑月破痛小腹切痛真心痛脾痛氷煎理中丸心痛食地黄麪膀胱氣痛砂石淋頭垢治淋諸瘧瘧名不同又又驢軸治瘧痁疾又瘧疾病有不可補者癥瘕癥瘕遺積瘕蟯瘕蛇瘕米瘕髪瘕斛二瘕食髪致疾瘕鼈癥鼈瘕痃癖京三稜治癥瘕諸蟲應聲蟲又蚘蟲五臟之蟲九蟲之状諸蟲入耳誤吞水蛭又又苦寸白蟲又又誤吞蜈蚣蜒蚰及百蟲入耳尸蟲酒蟲卷六臟腑泄痢當暑勿食生冷辯臟腑下痢治赤白痢乆患泄㵼痢有赤白罌粟治痢車前止暴下薑茶治痢二藥治痢治臟腑半夏益脾止瀉乳煎蓽撥治氣痢臟腑秘澁腸胃流熱腸風痔疾痔腸風臟毒腸風下血酒利臟毒下血脫血癰疽服石發疽病疽治背瘡治喉癰治癰疽治癰疽方療癰毒發背無補法結癰預療背疽雲母膏愈腸癰釘疽癰瘡腳氣腳氣痞絶腳氣無補法腳心如中箭腳氣治閉結并腳氣附船愈腳氣病腳躄旋復根汁能續筋漏時康祖心漏鱔魚覆漏鱔漏蟻漏犬齧瘤得鍼灸鼠漏李先虱瘤腫癭病腫腫隂腫如升小兒隂腫小兒熱毒遊腫婦人隂腫堅硬脚腫背腫傳腫癭井錫鎮癭中毒中仙茅附子毒中蕈毒中鱔鼈蝦䗫毒中豆腐毒諸果有毒中班鳩毒中蜈蚣毒藥反中毒中魚毒中菜毒魚魫遇蠱毒中酒毒天蛇毒中桃生毒誤飲蛇交水中蜘蛛毒中山鷄鷓鴣毒中石班魚子毒地漿治菌毒解毒解蠱毒呪并方解砒毒治蠱毒解藥毒解毒蟹解漆毒獸能解藥毒蛛為蜂螫保靈丹卷七積傷滯用藥不同物能去積食藥治積用藥攧撲損傷墮馬治臂臼脫龜獻竒方治傷折打撲傷損又又又熟葱涕愈傷指打撲損墜馬折足蹴鞦韆墜損搓衮舒筋竒疾簷溜盥手龍伏藏指甲中婦人異疾嘔物如舌消食籠孕婦腹内鐘鳴髀瘡兒出人面瘡啖物不知飽腸癢疾王氏異疾療饑蟲小兒魃病足面竒瘡産後腸癢甑氣薫面腫蛟龍病疑病産婦腹中癢食鱠吐蝦蟆瘡破雀飛蛇在腹中怪石鏡冷疾人漸縮小視直如曲寒熱注病刳腹視脾大怒病差蒸之得汗視胎已死死枕愈病病悲思穀獨氣兒生腎縮飲水得疾誤吞金䥊飛絲入眼蛇蟲獸咬犬傷白芷治蛇齧被毒蛇傷辟蛇毒蛇蟲所傷山林日用法治蚯蚓咬蜘蛛齧猫傷馬咬蜈蚣咬惡蛇螫壁鏡咬又蠶咬治諸獸傷猘犬所傷犬傷又虎犬咬蠆螫蝎螫蠼螋妖蟲湯火金瘡大黄療湯火瘡醋泥􅂗火燒瘡湯火瘡湯火瘡禁用冷治湯火呪歛金瘡口治金瘡又火氣入腳生瘡漆澆成瘡田舍試騐之法治箭鏃不出食忌鼠盗食忌淡食飲食不可露天雜忌勿過食食鼈不可食莧食蟹反惡銅器不可蓋食炊湯不宜洗面體食驢鼈漏肉之戒食勿多飽勿卧發暴飲食忌醉飲過度黄帝襍忌法飲食禁食蜜不可食鮓食河豚不可食風藥飲食宜緩隂地流泉不可飲食禁禽獸蟲魚肉異不可食勿食生鮮四時不食飽勿便睡生物食之無益食無求飽飲食以時食飲以宜粥能暢胃生津液五味致疾飲酒面青赤魚無腮不可食卷八服餌并藥忌桃膠愈百病服术藥欲用陳食术不飢服术忌蛤服黄連服松栢服黄精不食蒜真菊野菊論物理服菖蒲服餌忌羊血三藥朴消下死胎常服熱藥枲耳補益補骨脂丸用藥偏見遍體盡疼功在橘皮人氣粉犀老人疾患物性皆有離合藥議服藥忌食施藥風土不同蒼术辟邪隂氣所侵流水止水服雄黄古方無妄用草藥不可妄用服藥次序服餌五味各有所歸治胡臭又枳殻散之戒疾證妄庸議病病生於和氣不須深治辯證病名不同外感内生諸病取像反治法五臟六腑其説有謬六淫之疾治病有八要病不可治者有六失婦人以帛幪手臂勇怒欝冒尸厥外患當以意治論醫醫醫特意耳論黄連書藥用君臣鬚髮眉所屬活人書六氣六候卷九飬生修飬調攝飬生又又神氣内外丹六氣飬神存想飬性吐納和氣夜卧存心中氣服玉泉般運捷法真常子飬生飬性之術藏精飬神飬生偈孫真人飬生銘孫真人飬生雜訣無輕攝飬孫真人十二多抱朴子十五傷攝飬衛生五事善攝生保飬調攝真人飬生銘芡能飬生摩面腎神心腎肝膽四損精氣形體欲動摇金石藥之戒服丹之戒五石散不可服服丹之過服金石藥之戒金液丹無妄服川人服丹秋石不可乆服丹砂之戒服水銀服丹多灸風市穴雷世賢丹藥服丹自焚丹發背疽丹緩其死婦人婦人婦人論飬胎大論避忌法轉女為男法又視井生男天癸十月而生姙孕避忌郝翁醫婦人驗姙婦不語半産正産産難催生歌産難厭勝産後寒氣入腹産婦頭疼寒熱渴飲五味汁産難胞衣不出懐子而不乳孕婦逆生産後瘛瘲運悶婦人月水不通及不㫁漏下帶下崩中四物湯之功療師尼寡婦别製方任氏面疾姙子又卷十小兒小方善醫小兒瘡豆禁鷄鴨子小兒夜啼小兒不可食鷄治兒語遲兒得母寒下痢小兒感冷身熱小兒糞青小兒㵼後腳弱小兒得地氣方行小兒初生畏寒小兒初生四氣小兒初生服藥小兒初生通大小便小兒夜啼有四證小兒傷乳食發熱小兒發熱治法小兒發熱急慢驚風小兒吐瀉用藥小兒㵼痢小兒解顱瘡疹有表裏證瘡疹黏衣用牛糞剥瘡痂免成瘢瘡疹不可洗面瘡疹用胭脂􅂗眼瘡疹後飲清涼飲子小兒丹毒小兒吐瀉後成慢驚小兒初生不飲乳兒臍血出兒臍乆不乾薏苡浴兒臍風撮口瘡瘡生於頰木癡成瘡耳塞敷瘡壁土治瘡爛治瘡乆不合治下疳瘡遍身患瘡膁瘡舋瘍獺髓補瘡石菖蒲愈瘡風熱細􅇙風毒濕瘡患瘡魚臍瘡頭瘡禁用水銀治惡瘡治善惡瘡搔髪際成竅出血病肥脈傅瘡病癩腳瘡黄連愈癬五絶病五絶治卒死凍死溺死自縊夏月熱倒人法疝癉痺湧疝氣疝牡疝肺消癉腎痺胷痺熱病氣脾氣脾癉胃疸醫功報應許學士聶醫善士用詭道以刼流俗徐樓臺符助教水陽陸醫醫僧瞽報下胎