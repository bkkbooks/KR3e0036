body:
  text: 醫説卷八宋張杲撰服餌並藥忌服藥忌食有术勿食桃李及雀肉胡荽大蒜青魚鮓等物有藜蘆勿食狸肉有巴豆勿食蘆筍羮及野猪肉有黄連桔梗勿食豬肉有地黄勿食蕪荑有半夏菖蒲勿食飴糖及羊肉有細辛勿食生菜有甘草勿食菘菜又云勿食海藻有牡丹勿食生胡荽有啇陸勿食犬肉有恒山勿食生䓤生菜有空青朱砂勿食生血有茯苓勿食醋物有鼈甲勿食莧菜有天門冬勿食鯉魚服藥不可多食胡荽及蒜雜生菜又不可食諸滑物果實等又不可多食肥猪犬肉油膩肥羮魚鱠腥臊等物服藥通忌見死尸及産婦厭穢事本草藥欲用陳狼毒枳實橘皮半夏麻黄呉茱萸皆欲得陳久者其餘須精新也桃膠愈百病桃膠以桑灰汁潰服之百病愈久久服之身輕有光明在晦夜之地如月出也多服之則可以辟榖抱朴子服术紫㣲夫人服术叙云察草木之速益於已者并不及术术氣則式遏鬼津益血生腦逐惡致真守精衛命古人名為山精之卉山薑之精太上導仙銘曰子欲長生當服山精子欲輕翔當服山薑食术不飢内篇云南陽文氏值亂逃壺山中飢困欲死有一人教之食术遂不饑數十年乃還鄉里顔色更少氣力轉勝故术一名山精神藥經曰必欲長生當服山精抱朴子服术忌蛤世云服术忌雀鴿非鳩鴿也乃蜃蛤耳外即刁衎久服术因食蛤㵼血食鳩鴿則無恙嘗有雀鬭入盆池中旬日皆化為蛤後以死雀投其中則不化雀蛤氣類同也戎幕閒談服黄連劉奉林周時人學道嵩山四百年三合神丹為邪物所敗乃入委羽山閉氣三日不息今千餘年猶未升仙但服黄連得不死耳不能有所役使服松脂松脂以鎮定者為良細布袋盛漬水中沸湯煮之浮水靣者罩籬掠取投新水中久煮不出者棄不用入白茯苓末杵羅為末每日取三錢匕著口中用熟水潄仍如常法揩齒更啜少熟水嚥之仍潄齒牢牙駐顔烏髭也東坡大全集服黄精脂川有士人虐所使婢婢乃逃入山中久之見野草枝葉可愛即㧞取根食之甚美自是甞食久而遂不飢輕健夜息大樹下聞草中動以為虎懼而上樹避之及曉下平地其身歘然凌空而去自一峯之頂若飛烏焉數歲其家人採薪見人告其主使捕之不得一日遇絶壁下以􅃠三靣圍之俄而騰其山頂其主異之或曰此婢安有仙骨不過服靈藥食遂以酒饌五味香美置徃來之路觀其食否果來食食訖遂不能逺去就擒之具述其故指所食之草即黄精也不食蒜黄仙君口訣服食藥物不欲食蒜及石榴子猪肝犬頭肉真菊野菊蜀人多種菊以苗可以菜花可以藥園圃悉能植之闤闠中賣郊野之人多採野菊供藥肆頗有致誤真菊延齡野菊㵼人如張華言黄精益夀鈎吻殺人如此類也牧堅野談論物理舒州醫人李惟熙善論物理云菱芡皆水物菱寒而芡暖者菱花開背日芡花開向日故也又曰桃杏雙仁輙殺人者其花本五出六出必雙草木花皆五出唯梔子雪花六出此殆隂陽之理今桃杏六出雙仁皆殺人者失常故也服菖蒲韓衆服菖蒲十三年身生毛石上一寸九節紫花者善抱朴子服餌忌羊血服餌之家忌食羊血雖服藥數十年一食則前功盡䘮三藥上藥養命謂五石練形六芝延年也中藥養性謂合歡蠲忿萱草㤀憂也下藥除病謂大黄除實當歸定痛也博物志朴硝下死胎朴硝為細末二錢温童子小便調下知洪州進賢曽通仕定永云昔為豐城尉家有猫孕五子一子已生四子死腹中腹脹啼呌欲絶試以問醫醫教以此藥灌之死子即下猫得不死後有一牛亦如此用此法亦活醫者云本治人方用以治畜亦效後以活人無不驗者信效方常服熱藥夏文莊公性豪侈禀賦異於人纔睡則身冷如殭一如逝者既覺須令人温之良久方能動人有見其陸行而車箱運載一物巍然問之乃綿帳也以數千両綿為之常服仙茅鍾乳硫黄莫知紀極晨朝每食鍾乳粥有小吏竊食之遂疽發㡬不可救筆談枲耳補益枲耳並根苖葉實皆取濯去砂土懸隂乾浄掃地上燒為灰湯淋取濃汁泥連兩竈煉之灰汁耗即旋取傍釜中已滚灰汁益之經一日夜不絶火乃旋得霜乾甆瓶盛每日早晚臨睡酒調一錢匕補暖去風駐顔不可偹言尤治皮膚風令人膚革滑净每洗靣及浴取少許如澡頭用尤佳無所忌昌圖之父從諌宜州文學家居於邕服此十餘年今七八十紅潤輕健盖専得此藥也良方補骨脂丸唐鄭相云予為南海節度七十有五越地卑濕傷於内外衆疾俱作陽氣衰絶乳石補益之藥百端不應元和七年有訶陵國舶主李摩訶獻此方經七八日而覺應驗自爾常服其功神驗十年二月罷郡歸京録方傳之其方用破故紙十兩揀洗為末胡桃肉去皮二十兩研如泥即入前末更以好蜜煉和匀如飴盛甆器中旦日以温酒化藥一匙服之不飲酒熟水下彌久則延年益氣恱心明目補添筋骨禁食芸薹羊血畨人呼為補骨脂丸本事方用藥偏見蜀人石藏用以醫術㳺都城其名甚著陳承餘杭人亦以醫顯石好用暖藥陳好用凉藥古之良醫必量人之虚實察病之隂陽而後投以湯劑或補或㵼各随其證二子乃執偏見於冷暖俗語曰藏用擔頭三斗火陳承篋裹一盤冰泊宅編遍體盡疼周離亨甞言作館職時一同舍得疾遍體疼每作殆不可忍都下醫或云中氣或云中濕或云脚氣用藥悉不效疑氣血凝滯所致為製一散飲之甚驗予未及問所用藥沉思久之因曰據此證非延胡索不可周君大駭曰何以知之予曰以意料之恐當然爾延胡索當歸桂等分依常法治之為末疾作時温酒調三四錢随人酒量頻進之以止為度盖延胡索活血化氣第一品也其後趙待制霆導飲失節肢體拘攣數服而愈功在橘皮橘皮寛膈降氣消痰逐冷有殊功他藥多貴新唯此貴陳須洞庭者最佳外舅莫强中知豐城縣得疾凡食已輙胸滿不下百方治之不效偶家人軰合橘紅湯取甞之似有味因連日飲之一日坐㕔事方操筆覺胸中有物墜于腹大驚目瞪汗如雨急扶歸須臾腹痛下數塊如鐡彈子臭不可聞自此胸氣廓然盖脾之冷積也抱病半年所服藥餌凡㡬種不知功乃在一橘皮世人之所忽豈可不察哉其方橘皮去穰取紅一斤甘草鹽各四兩水五盌慢火煮乾焙搗為末㸃服又古方以橘紅四兩灸甘草一兩為末湯㸃名曰二賢散以治痰特有驗盖痰久為害有不可勝言者世醫雖知用半夏南星枳實茯苓之屬何足以語此同上人氣粉犀諸藥中犀最難搗必先鎊屑乃入衆藥中搗之衆藥篩羅已盡而犀獨在余偶見一醫僧元逹者解犀為小塊方半寸許以極薄紙裹置懐中使近肉以人氣蒸之候氣蒸薫浹洽乗熱投臼中急𢷬應手如粉因知人氣之能粉犀也然今醫工皆莫有知者歸田録老人疾患常見世人治年髙之人疾患将同年少亂投湯藥妄行鍼灸以攻其疾務欲速愈殊不知上夀之人血氣已衰精神减耗危若風燭百疾易攻至於聴視不至聦明手足舉動不隨其志身體勞倦頭目昏眩風氣不順宿疾時發或祕或泄或冷或熱此皆老人之常態也不須𦂳用鍼藥務求痊差徃徃因此别致危殆且攻病之藥或汗或吐或解或利縁衰老之人不同年少年少之人真氣壮盛雖汗吐轉利未至危困其老弱之人若汗之則陽氣泄吐之則胃氣逆㵼之則元氣脫立致不可救此養老之大忌也大體老人藥餌止是扶持之法只可用温平順氣進食補虚中和之藥治之不可用市肆贖買他人惠送不知方味及狼虎之藥與之服餌切宜審詳若身有宿疾或時發動則随其疾状用中和湯藥調順三朝五日自然無事惟是調停飲食依食醫之法随食性變饌治之此最為良也養老奉親書物性皆有離合尋萬物之性皆有離合虎嘯風生龍吟雲起磁石引鍼琥珀拾芥漆得蟹而散麻得漆而湧桂得葱而軟樹得桂而枯戎鹽累卵獺膽分杯其氣爽有相闗感多如此類其理不可得而思之本草藥議古方云雲母麄服則著人肝肺不可去如枇杷狗脊毛不可食皆云射人肝肺世俗持此之論甚多皆謬説也又言人有水喉食喉者亦謬説也世傳歐希范五臟圗亦畫二喉盖當時驗之不審耳水與食同嚥豈能就中遂分入二喉人但有咽有喉二者而已咽則納飲食喉則通氣咽則下入胃脘次入胃又次入腸又次入大小腸喉則下通五臟出入息五臟之氣呼吸正如冶家之鼓鞴人之飲食藥餌但自咽入腸胃何甞能至五臟凡人之肌骨五臟腸胃雖各别其入腸之物精英之氣味皆能洞逹但滓穢即入二腸凡人飲食及服藥既入腸胃為真氣所蒸英精之氣味以至金石之精者如細研硫黄硃砂乳石之類凡能飛走融結者皆随真氣洞逹肌骨猶如天地之氣貫穿金石土木曽無㽞碍自餘頑石草木則但氣味洞達耳及其勢盡則滓穢傳于大腸潤濕渗入小腸此皆敗物不復變化惟當退洩爾凡所謂某物入肝某物入腎之類以氣味到彼爾物質豈能至彼哉此醫不可不知也筆談施藥夫人既以五榖養其生而亦以藥石伐其病茍無藥石則寒暑勞苦之太過喜怒饑飽之無節時令不常衛生無術身貧而莫求醫藥雖富者或無良劑或客遊半道臥病而無所治療如是而䘮者亦多矣且好仁之士有濟物之心或蓄一驗方或有一竒藥計力多寡精加脩製廣行施恵使沉疴宿疾苦楚萬状危惡之候一藥能愈俾呻吟變為和氣雖身貧力㣲難以脩合濟人者誠能得一竒湯妙劑随所治之疾印冩千百本粘之於墻壁道路之間利亦溥矣風土不同夾河風性寒民多傷風河洛以東地鹹水性冷故民雖哺粟食麥亦無熱疾滑臺風水性寒冷尤甚士民服附子如芋栗蒼术辟邪越民髙十二歉歲無食挈妻兒至徳清雇妻於秀州倉官李深家為乳媪髙得錢還越而死李僕許八随直在秀以幹歸德清及再來之日媪患恍惚譫語作厥夫聲責罵故妻不為資薦李問何以得至此曰我随許僕船便是以得來李命巫逐未至謾燒蒼术烟薰燎鬼遽云我怕烟氣不敢更㽞遂無語媪病亦差今人衝惡者必爇术盖邪鬼所畏也類編隂氣所侵乾道中江西士人赴調都下逰西湖民間一女子明艷動人求之於其父母啖以重幣峻郤焉回家不復相聞又五年赴調尋舊逰茫無所覩悵然空還忽遇女子於半途呼揖問訊士喜甚叩其徙舍之由女曰我久適人夫坐庫事繫獄未出能過我啜茶否士欣然並行過旅舘女曰此可棲泊無庸至吾家㽞半歳将議挾以偕逝女始歛袵曰向自君去憶念之苦感疾而亾今非人也無由陪後乗但隂氣侵君深當暴㵼宜服平胃散以補安精血士聞語驚惋曰藥味皆平何得功效女曰中用蒼术去邪氣乃為上品夷堅志流水止水孫思邈千金方人參湯言須用流水用止水即不驗人多疑流水止水無别予嘗見丞相荆公喜放生每日就市買活魚縱之江中莫不洋然唯鰌䱉入江水輙死乃知鰌䱉但可居止水則流水與止水果不同不可不信又鯽魚生流水中則背鱗白生止水中則鱗背黑而味惡此亦一驗也良方服雄黄劉無名甞於庚申日守三尸服雄黄後見二鬼曰我奉泰山真符來攝君見君頂上黄光數尺不可近得非雄黄之功乎𤨏碎録古方無妄用鄱陽周順醫有十全之功云古方如聖恵千金外臺祕要所論病源脉證及鍼灸法皆不可廢然處方分劑與今大異不深䆒其㫖者謹勿妄用有人得目疾用古方治之目遂突出又有婦人因産病用外臺祕要坐導方其後反得惡露之疾終身不差曾有士人得脚弱病方書羅列積藥如山而疾益甚予令屏去但用杉木為桶濯足令排樟腦於兩股間以脚䙀繫定月餘而安健如故南方多此疾不可不知順固名醫語必不妄故書以為誡遯齋閒覽草藥不可妄用紹興十九年三月英州僧希賜徃州南三十里洸口掃塔有客船自番禺至舟中士人携一僕僕病脚弱不能行舟師憫之曰吾有一藥治此病如神餌之而差者不可勝計當以相與既賽廟畢飲胙頗醉乃入山求得藥漬酒授病者令天未明服之如其言藥入口即呻吟云腸胃極痛如刀割截遲明而死士人以咎舟師舟師恚曰何有此即取昨夕所餘藥自漬酒服之不踰時亦死盖山多㫁腸草人食之輙死而舟師所取藥為根蔓所纒結醉不暇擇徑投酒中是以及於禍則知草藥不可妄服也甲志服藥次序病在胸腹以土者先食後服藥病在心腹以下先服藥而後食病在四肢血脉者宜空服而在旦病在骨髓者宜飽滿而在夜本草服餌凡服藥藥氣與食氣不欲相逢食氣消則服藥藥氣散則進食其藥有食前食後者皆宜審此𤨏碎録五味各有所歸凡藥以酸養骨辛養筋鹹養脉苦養氣甘養肉滑養竅治胡臭胡臭股内隂下常濕臭或作瘡青木香好醋浸致腋下夾之愈外臺秘要方又百草灰主腋臭及金瘡五月五日採露収之一百種隂乾燒作灰以井花水為團燒令白以釅醋和為餅腋下夾之乾即易當抽一身痛悶瘡出即止以水小便洗之不過三兩度又主金瘡止血生肌取灰和石灰為團燒令白括傅瘡上枳殻散之戒每人家婦女有孕則服枳殻散謂能束胎令人易産乃大不然凡胎壮則子有力故易産村婦平日健啖其産特易令服枳殻反致無力兼子亦氣弱難養也本草衍義疾證妄庸議病世間凡有病人親朋故舊交逰来問疾其人曾不經事未讀一方自誇了了詐作明能談説異端或言是虚或言是實或云是風或云是蟲或道是水或云是疾紛紛謬說種種不同破壊病人心意不知孰是遷延未就時不待人歘然致禍各自散走是故大須好人及好名醫識病深淺探賾方書博覽古今事事明解者㸔病不爾大悞人事孫真人千金方病生於和氣不須深治凡人三部脉大小浮沉遲疾同等不越至數均和者雖病有寒熱不解此為隂陽和平之脉縱病必愈此乃感小邪之氣故不可深治大攻吐㵼發汗若藥勢過多反致危損切切禁之如應四時氣候平均者雖有小邪寒熱此乃無妄之疾勿藥有喜不可拘以日數次第强為攻發必别致大患辯證山氣多男澤氣多女水氣多喑風氣多聾木氣多傴石氣多力險氣多癭暑氣多殘雲氣多夀谷氣多痺丘氣多尫衍氣多仁陵氣多貪腦神曰覺元髪神曰𤣥華目神曰虚監鼻神曰冲龍舌神曰始梁𤨏碎録病名不同凢古今病名率多不同緩急尋檢常致疑阻若不判别何以示衆且如世人呼隂毒傷寒最為劇病實隂陽之侯命一疾而渉三病以此為治豈不甚逺而殊不知隂毒少隂隂陽自是三候為治全别古有方證其說甚明今乃混淆害人最急又如腸風臟毒咳逆慢驚遍稽方論無此名稱深窮其状腸風乃腸痔下血臟毒乃痢之蠱毒咳逆者噦逆之名慢驚者隂癎之病若不知古知今何以為人司命加以古人經方言多雅奥以痢為滯下以蹷為脚氣以淋為癃以實為祕以天行為傷寒以白虎為厯節以膈氣為膏肓以喘𠻳為咳逆以强直為痙以不語為瘖以緩縦為痱以怔忡為悸以痰為飲以黄為癉諸如此類可不討論而况病有數候相類二病同名者哉宜其視傷寒中風熱病温疫通曰傷寒膚脹鼔脹腸覃石瘕率為水氣療中風専用乎痰藥指帶下或以為勞疾伏梁不辨夫風根中風不分乎時疾此今天下醫者之公患也是以别白而言之雞峯方外感内生諸疾四時之中有寒暑燥濕風氣相搏喜變諸疾須預察之稍失防閑則並能中人又有時行疫癘瘴瘧等疾逓相傳染者而人之五臟有大小髙下堅脆端正偏傾六府亦有長短薄厚緩急禀賦不同各如其靣目有疾恙至少者有終身長抱一疾者具飲食五味禽魚蟲菜果實之属性有偏嗜者金石草木血肉苦辛之藥素有服餌者又有貴者後賤富者乍貧有常貴常富者有暴貴暴富者有暴苦暴樂者有始樂終苦者有離絶藴結憂恐喜怒者故常富者惡勞驕惰者情消多事則神勞多語則氣諍多笑則腑傷多恐則志攝多樂則意逸多喜則錯忘多怨則百脉不定多惡則憔悴無權多好則昏迷不定此又非外邪所中而得之於内者也良工必精審察其由先知病者臟腑經絡受病之所由又别外感内生之所致則可舉萬全矣取像古之論疾多取像取類使人易曉以臟腑稀散為鴨溏或為鶩溏野鴨謂之鶩謂其生於水中屎常稀散故也以遇夜月昏不見物為雀目雀遇昏晚目不見物故也以腎氣奔衝為奔豚謂豚能奔逸而不能速也以時氣聲嗄咽乾欲睡復不安眠為狐惑以狐多疑惑也以大便艱難為野雞痔謂欲使而復止故也狼漏始發于頸腫無頭有根起於闕盆之上連延耳根腫大謂其疾來暴猛如狼故也其源縁憂恚氣上不得下嚌嘈漏始發於脛下無頭尾如棗核塊累移在皮中謂其無頭尾状若蠐螬故也反治法治病之法莫不以寒療熱以熱療寒通則塞之塞則通之益所不勝損其所勝氣平邪伏病乃良已然疾勢有大小藥力有重輕聖賢制方論必求其所因以伏其所主譬由火也人間之火遇草而爇得木而燔可以濕伏可以水滅疾之小者似之而疾之大者則若神龍之火得濕則焰遇水則燔寒與熱相拒熱與寒相違不可以常法治也故經有熱因寒用寒因熱用塞因塞用通因通用之法可使氣調可使必已治熱者以豆豉浸酒此因熱用寒者也治寒者以蜜煎烏頭此因寒用熱者也久痢通滑必當先去其積中滿實塞必當峻補其下經云寒積内凝久痢㵼溏愈而復發連厯歲時以熱下之結散痢止此因通治之法也下虚中滿之病補虚則滿甚於中宣導則轉虚其下故當疎啟其中峻補其下此因塞治之法也同上五臟六腑其說有謬古人論五臟六腑其說有謬者而相承不察今欲以告人人誰信者古者左腎其府胱膀右腎命門其府三焦丈夫以藏精女子以繫胞以理言之三焦當如膀胱有形質可見而王叔和三焦有藏無形不亦大謬乎盖三焦有形如膀胱故可以有所藏有所繫若其無形尚何以藏繫哉且其所以謂之三焦者何也三焦分布人體中有上中下之異方人心湛寂欲念不起則精氣㪚在三焦榮衛百骸及其欲念一起心火熾然翕撮三焦精氣流入命門之府輸冩而去故號此府為三焦耳世承叔和之謬而不悟可為長太息也予甚異其說後為齊州從仕有一舉子徐遁者石守道之婿也少嘗學醫為衛州聞髙敏之遺說療病有精思予為道驤之言遁喜曰齊甞大飢羣匄相臠割而食有一人皮肉盡而骨脉全者遁以學醫故徃視其五臟見右腎之下有脂膜如手大者正與膀胱相對有二白脉自其中出夾脊而上貫腦意此則導引家所謂夾脊雙關者而不悟脂膜如手者之為三焦也聞君之言與所見懸合可以證古人之謬龍川志六淫之疾孫尚藥曰夫六淫之氣天之常行者也盖人無樽節傷其氣候暴中邪毒有疎治瘡轉著肢體或寒温不避暑濕時傷憂思喜怒疾恚便起治療有差攻傳五臟遂至轉深醫者茍求目前之㨗效不審丸散之悞投刻意世財動邀冨貴企踵權豪希圗謀進病者又即惜吝資財不知其身可貴委憑庸妄必死無生可不哀哉凡六淫疾者切在細明治療有中必得十全之效陽淫熱疾則拒熱不前㸔虚實以凉之隂淫寒疾則怯寒而身拒須憑温藥以治之風淫末疾必身强直末四肢也此乃動性不調須和冷熱以平之在陽則熱在隂則寒故寒則筋攣骨痛熱則痿緩不収雨淫腹疾濡泄濕氣要憑渗燥之方更㸔冷熱之候晦邪所淫精神熒惑當平正氣而可痊明淫心疾狂邪重盛讝妄多言憂愁轉甚此二氣同一皆引心胷之虚邪治療正氣須用至寳之藥平生經驗甚多故集口訣方書以傳於家孫尚藥曰夫風者天地之號令物性之動氣人雖萬物之貴不能樽節觸冐四時乗精氣虚邪而入於腠理積之微末累傷重併滿而大作或不慎味欲所傷又深虚邪實邪以干正氣搏陽經則痿厥而肢體不収襲隂經則筋攣絡急中風之名因兹而起初得小中之候漸作癱瘓之疾故風趣百竅獨聚一肢言語蹇澁形若癡人醫者妄令吐㵼用藥燥煩十無一痊致使人手足不任精神昏亂殊不知内不能通外不能泄致瞀悶形死又不知通泄之藥亦不在大吐大下似此治療徃徃五死五生雖其人禀氣充實亦為所苦彌甚不幸遂至枉死竊觀自古聖賢治療有法十有九驗夫療病之法必先凖四時虚實以詳中病之由依䋲墨拯濟乃是解死脫厄之路四時之病春中時風自東而來名曰温風盖時令不和而傷人也浮而輕淺可汗而解敗毒散羌活細辛之類更㸔發起在隂在陽隨而得效若其人自虚羸從後而來名曰虚風主人煩悶肢體攣痺不任便可服續命湯八風湯成劑頓服更加灸法三五日間勢必减退漸漸調和以求生路如從前來名曰實風亦主人瞀悶脉𦂳浮大宜以茯神湯西州續命湯求效不用火刼自使勢漫湏緩緩治之故千金曰風者百病之長又曰治風不以續命湯治之則為不治風所以見聖人之心矣雞峯方同上治病有八要夫治病有八要八要不審病不能去非病不去無可去之術也故須審辨八要庶不違誤其一曰虚五虚是也脉細皮寒氣少泄利前後飲食不進此為五虚二曰實五實是也脉盛皮熱腹脹前後不通悶瞀此五實也三曰冷臟腑受其積冷是也四曰熱臟腑受其積熱是也五曰邪非臟腑正病也六曰正非外邪所中也七曰内病不在外也八曰外病不在内也既先審此八要參之六脉審度所起之源繼以望聞問切加諸病者於於與烏同有不可治之疾也本草衍義病不可治者有六失夫病不可治者有六失失於不審失於不信失於過時失於不擇醫失於不識病失於不知藥六失之中有一於此即為難治非止醫家之罪亦病家之罪也矧有醫不慈仁病者猜鄙二理交馳於病何益由是言之醫者不可不慈仁不慈仁則招禍病者不可猜鄙猜鄙則招禍惟賢者動逹物情各就安樂亦治病之一說耳同上婦人以帛幪手臂治婦人雖有别科然亦有不能盡聖人之法者今豪足之家居奥室之中處帷幔之内復以帛幪手臂既不行望色之神又不能殫切脉之巧四者有二闕焉黄帝有言曰凡治病察其形氣色澤形氣相得謂之可治色澤以浮謂之易已形氣相失謂之難治色夭不澤謂之難已又曰診病之道觀人勇怯骨肉皮膚能知其情以為診法若患人脉病不相應既不得見其形醫人止據脉供藥其可得乎如此言之烏能盡其術也此醫家之公患世不能革醫者不免盡理質問病家見所問繁遝為醫業不精徃徃得藥不肯服似此甚多扁鵲見齊侯之色尚不肯信况其不得見者乎嗚呼可謂難也已同上勇怒脉勇怒而靣青骨勇怒則靣白血勇怒而靣赤酉陽雜爼鬰冒人平居無苦疾忽如死人身不動摇黙黙不知人目閉不能開口噤不能言或㣲知人惡聞人聲但如眩冒移時方寤此由已汗過多血少氣併於血陽獨上而不下氣壅塞而不行故身如死氣過血還隂陽復通故移時方寤名曰鬰冒亦名血厥婦人多有之宜白微湯倉公散本事方尸厥夫尸厥者是隂陽氣逆也此為陽脉卒下墜隂脉卒上昇隂陽離居榮衛不通真氣厥亂客邪乗之其状如死猶微有息而不長脉尚動而形無知也聴其耳内翛翛有如嘯聲而股間煖者是也雖無嘯聲而脉動者故當以尸厥治之其寸口脈沉大而滑沉則為氣實氣相摶身温而汗此為入腑雖卒厥不知人氣復則自愈若唇面身靑冷此為入臟亦卒厥不知人即死候其左手闗上脉隂陽俱虚者足厥隂手少隂俱虚也病若恍惚尸厥不知人妄有所見也外患當以意治人之疾病無不自虚實冷熱而作各有形證可以對治其用藥不過補㵼寒温而已然亦有不由虚實冷熱而致者如前說是也或有諸蟲入耳喉中諸鯁蠼螋溺人影而生瘡目中有眯之類皆非虚實冷熱之病法當以意治之如灌牛乳炙豬肉掩耳上以治諸蟲黙念鸕鷀及戴魚􅃠以治魚鯁象牙末狐狸骨以治骨骾地上畫蠼螋形取其腹上土以治溺影瘡膽汁雞肝血及視水中豆以治目中眯之類竹溜牙以治竹刺此皆以意治之法也論醫醫脉之難明古今所病也至虚有盛候大實有羸状疑似之間便有死生之異士大夫多祕所患以求痊驗醫能否使索病於冥漠之中辨虚實冷熱於疑似之間醫者不幸而失終不肯自謂失也巧飾遂非以全其名間有謹愿者雖合主人之言亦參以所見兩存而雜治吾平生求醫盖於平時黙檢其工拙有疾求療必盡告以所患使醫了然知患之所在然後診之虚實冷熱先定於中脉之疑似不能惑也故雖中醫治吾疾常愈吾求疾愈而已豈以困醫為事哉東坡醫特意耳甄權以母疾與弟立言䆒習方書遂為髙醫所撰脉經鍼方明堂等圗傳于時後以醫顯義興許𦙍宗或勸其著書貽後世答曰醫特意耳思慮精則得之脉之候幽而難明吾意所解口不能宣也古之上醫要在視脉病乃可識病與藥值惟用一物攻之氣純而愈速今之人不善為脉以情度病多其物以幸其功譬獵不知兎廣絡原野冀一人獲之術亦踈矣一藥偶得他味相制弗能専力此難愈之驗也脉之妙處不可傳虚著方劑終無益於世此吾所以不著書也唐書本傳論黄連書觀比聞公以眼疾餌黄連至十數兩猶不已不知果然否審如所聞殆不可也觀頃年氣血未定頗好方術之説讀醫經數年甞記釋者云服黄連苦參久而反熱甚以為不然後乃信之盖五味入胃各歸其所喜故苦先歸心酸先歸肝甘先歸脾辛先歸肺鹹先歸腎入肝則為温入心則為熱入肺則為清入腎則為寒入肝則為至隂而血氣兼之皆為増其氣不已臟氣有所偏勝則必有所偏絶黄連苦參性雖大寒然其味至苦入胃則先歸於心乆而不已則心火勝火勝則熱乃其理也眼疾之生本於肝之熱肝與心為子母夫心為子肝為母心火也肝亦火也腎孤臟也人甞患一水不勝二火今病本於肝而久餌苦藥使心有所偏勝是所謂以火救火命之曰益多其不可亦明矣夫藥所以療疾其過也適所以為疾比聞初作時十已損其七八正宜莭藥慎䕶飲食以俟其自平非如决疣潰癰可以忽然一朝去也輙具以進惟留意而聴之無忽秦觀與喬希聖論黄連書藥用君臣舊說有藥用一君二臣三佐四使之説其意以為藥雖衆主病者専在一物其他則節級相為用大畧相統制如此為宜不必盡然也所謂君者主此一方固無定物也藥性論乃以衆藥之和厚者定為君其次為臣為佐有毒者多為使此謬論也設若欲攻堅積則巴豆軰豈不得為君也良方鬚髪眉所屬醫者所論人鬚髪眉雖皆毛類而所主五臓各異故有老而鬚白眉髪不白者或髪白而鬚眉不白者臟氣有所偏故也大率髪屬於心禀火氣故上生鬚屬腎禀水氣故下生眉屬肝禀木氣故側生男子腎氣外行上為鬚下為勢故女子宧人無勢則亦無鬚而眉髪無異于男子則知不屬腎也類苑活人書朱肱呉興人進士登科喜論醫尤深於傷寒在南陽時太守盛次仲疾作召肱醫而愈因論經絡之要盛君力贊成書盖潛心二十年而活人書成道君朝詣闕投進得醫學博士肱之為此書固精贍矣甞過洪州聞名醫宋道方在焉因携以就見宋留肱欵語坐中指駁數十條皆有考據肱惘然自失即日解舟去由是觀人之所學固異耶将朱氏之書亦有所未盡耶後之用此書者能審而謹擇之則善矣六氣六候男子之生也覆女子之生也仰其死於水也亦然男内陽而外隂女子反之故易曰坤至柔而動剛書曰沉濳剛克古之逹者盖知此也秦醫和曰天有六氣淫為六疾陽淫熱疾隂淫寒疾風淫末疾雨淫腹疾晦淫惑疾明淫心疾夫女陽物而晦時故淫則為内熱蠱惑之疾女為蠱惑世知之者衆其為陽物而内熱雖良醫未之言也五勞七傷皆熱汗而蒸晦淫者不為蠱則中風皆熱之所生也醫和之言當表而出之讀左氏春秋書此良方醫説卷八
