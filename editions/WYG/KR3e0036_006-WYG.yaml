body:
  text: 醫説卷六宋張杲撰臟腑泄痢當暑勿食生冷當盛暑時食飲加意調節縁伏隂在内腐化少遲又果蓏園蔬多将生噉蘇水桂漿唯欲冷飲生冷相值剋化尤難㣲傷即飱泄重傷則霍亂吐利是以暑月食物尤要節减使脾胃易於磨化戒忌生冷免有腹臟之疾雖盛夏冐暑難為全㫁飲冷但剋意少飲勿與生硬果菜油膩甜食相犯亦不至生病也辨臟腑下痢病水泄青白或黄白或米榖不化膓鳴腹痛者此傷冷也為洞泄寒中又為霍亂吐㵼其脉細弱而𦂳宜理中丸平胃散調中湯以温補之盛則金液丹朝真丹主之或藥入則吐出者内隂盛也用湯者當以冷服用丸者以地漿服熱因寒用之法也病水泄下深黄及有完榖小便赤腹脅但脹滿而不痛煩燥悶亂渇而喜飲者此傷熱也為挾熱下利其脉洪大而數宜駐車丸參連散蘖皮湯以和之甚則三黄丸調胃承氣湯挾熱下血者蘖皮湯主之病泄瀉色黄而有沫腸鳴腹脅脹滿時微作痛者為冷熱不調其脉沉𦂳而小數也服熱藥則轉甚戊巳丸香連丸主之下部注悶裏急後重者必欲變膿血利之則愈病暴泄注下或青白或黄白米榖或化或不化腹脇或脹或不脹或痛或不痛但噫生熟氣全不思食因與温補諸藥而後轉有異證者有所傷也此為飱泄其脉外虛而内實關脉沉且𦂳也宜消積丸不二丸以化之甚則用偹急丸主之右不二丸用砒不可多服曾見醫者有害又春傷以風夏必飱泄又風氣行於腸胃則暴泄下利其脉浮緩而虚也並宜服羌活安中湯胃風湯荆黄湯訶􅀺散主之病赤白下利或膿多血少或膿少血多皆為有積或先挾熱泄㵼更服温藥因變膿血下利關脉沉𦂳按之有力而小疾也並宜先與消化積滯才微利過即以香連丸駐車丸戊巳丸便愈化積滯用消積丸不二丹感應丸淹延惡利用朱粉丹主之集驗方治赤白痢有人久患痢赤白兼下或純白或純赤百藥不愈者病久服藥已多治痢多用毒藥攻擊得臟氣不和所以難愈史載之用輕清和氣藥與之遂愈後來屢有驗其方用鸎粟殻􅁡炙人參白术白茯苓川芎甘草炙黄蓍等分為細末二錢水一盞生薑棗烏梅半箇煎八分温服不以時久患泄㵼有人久患泄㵼以暖藥補脾及分利小水百種治之不愈醫診之心脉獨弱以益心氣藥補脾藥服之遂愈盖心火也脾土也火生土脾之旺頼火之燥心氣不足則火不燥脾土受濕故令泄㵼今益心補脾而又能去濕豈有不效者又有一種泄㵼作冷作積作心氣不足治之及服硫黄附子甚多皆不效因服火杴丸而愈此腸胃有風冷也胃風湯兼服暖藥亦佳又有一種脾泄㵼服泰山老李炙肝散而愈乃白芷白术白芍藥桔梗四味也醫餘痢有赤白凡人患痢不問赤白脉小身凉者易安脉大身熱者難差患痢未有不腹痛者皆縁有積也暑積及熱積多患赤痢冷積多患白痢亦有腸胃有風而患赤痢者有冷熱不調而患赤白痢者暑積痢可用黄連阿膠丸綿煎散加滑石白痢可用駐車丸感應丸之類冷熱不調用戊巳丸巴豆丸子之類綿煎散入滑石治赤痢極有功又有豆飲子加减亦有功治諸般痢用之每有效官局靈砂丹亦甚竒此數藥自夏及秋皆不可闕也同上鸎粟治痢治痢以鸎粟古方未聞今人所用雖其法小異而皆有竒功或用數顆慢火炙黄為末米飲下或去粟用殻如上法或以殻五七枚甘草一寸半生半炙大椀水煎取半碗温温呷蜀人山叟曰用殻并去核鼠查子各數枚焙乾末之飲下尤治噤口痢泊宅編車前止暴下歐陽文忠公常得暴下國醫不能愈夫人云市人有此藥三文一帖甚效公曰吾軰臟腑與市人不同不可服夫人使以國醫藥雜進之一服而愈召賣藥者厚遺之求其方乃肯傳但用車前子一味為末米飲下二錢匕云此藥利水道而不動真氣水道利則清濁分榖臟自止矣良方薑茶治痢憲宗賜馬總治㵼痢腹痛方以生薑和皮切碎如粟米用一大盞并草茶相等煎服之元祐二年文潞公得此疾百藥不效而予傳此方而愈同上二藥治痢鄂渚有統制王存病痢㡬年無休息骨立垂死逄道人令煎四物湯下駐車丸每服一百粒初服此藥减半併服之不數日頓愈近世養生方治臟腑肉豆䓻刳作甕子入通明乳香少許復以末塞之不盡即用麫和少許裏荳䓻煨焦黄為度三物皆碾末仍以茶末對烹之大全集半夏益脾止瀉半夏今人唯知去痰不言益脾盖能分水故也脾惡濕濕則濡而困困則不能制水經曰濕勝則瀉一男子夜數如厠或教以生薑一兩碎之半夏湯洗與大棗各三十枚水一升磁瓶中慢火燒為熟水時時呷數日便已乳煎蓽撥治氣痢獨異志唐貞觀中張寳藏為金吾長闕嘗因下直歸櫟陽路逄少年畋獵割鮮野食倚樹嘆曰張寳藏身年七十未甞得一食酒肉如此者可悲哉傍有僧􅃌曰六十日内官登三品何足嘆也言訖不見寳藏異之即時還京師時太宗苦於氣痢衆醫不效即下詔問殿庭左右有能治此疾者當重賞之寳藏曾困其疾即具疏以乳煎蓽撥方上服之立差宣下宰臣與五品官魏徴難之逾月不進擬上疾復發問左右曰吾前飲乳煎蓽撥有功復命進之一啜又平因思曰甞令與進方人五品官不見除授何也徴懼曰􅆢詔之際未知文武二吏上怒曰治得宰相不妨已授三品官我天子也豈不及汝邪乃厲聲曰與三品文官授鴻臚卿時正六十日矣其方每服用牛乳半斤蓽撥三錢匕同煎减半空腹頓服良方臟腑秘澁老人臟腑不可用大黄老人津液少所以秘澁更服大黄以㵼之津液皆去定須再袐甚於前只可服寛潤大腸之藥如養生必用方二仁丸是也更用槐花末煎湯淋洗亦妙風藥燥膓又有一種風袐者當用㯽榔七聖丸雖有大黄斟酌服之勿令㵼可也又有婦人産後大便袐須四五日六七日不通者出血已多津液少也濃煎􅂵蘓湯飲一兩盞自通更一日不通服局方大麻仁丸三十丸醫餘腸胃流熱腸胃流熱則糞門暴腫用蝸牛細研塗之則消腸風痔疾痔腸風臟毒痔腸風臟毒一體病也極難得藥亦縁所以致疾不同雖良藥若非對病固難一概取效常人酒色飲食不節臟腑下血是謂風毒若釋子軰患此多應飽食乆坐體氣不舒而得之乃脾毒也王渙之知舒州下血不止郡人朝議大夫陳宜父令其四時取其方栢葉如春取東枝之類燒灰調二錢服而愈予得方後官贑上以治貳車呉令昇亦即效提㸃司屬官陳逸大夫偶來問疾呉倅告以用陳公之方而獲安陳君􅕚頞曰先人也仍須用側栢為佳道塲慧禪師曰若釋子恐難用此不若灼艾最妙平直量骨脊與臍平處椎上灸七壮或年深更於椎骨兩傍各一寸灸如上數無不除根者又予外兄劉向為嚴椽予過之留飲訝其瘦瘠問之荅曰去歳臟毒作凡半月自分必死得一藥服之至令無苦問何藥不肯言再三扣始言只這桌子上有之乃是乾柿燒灰飲下二錢本草曰柿治腸癖解熱毒消宿血有病者宜求之素問腸癖為痔泊宅編腸風下血人患腸風下血者何也人腸皆有脂裏之厚則腸實而安腸中本無血血縁有風或有熱以消其脂腸遂薄渗入身中血初患者必服冷藥而愈服之過當則腸寒而脂愈不生其血必再作凡熱者其血鮮冷者其血青黒察其冷熱用藥可也醫餘酒痢有人日逐飲酒遂成酒利骨立不食但飲酒一兩盞利作㡬年矣因與香茸丸一兩服遂止盖麝能治酒毒臟毒下血洛陽一女子年四十六七躭飲無度多食魚􅈉攝理之方蔑如也後以飲啖過常蓄毒在臟日夜二三十度大便與膿血雜下大腸連肛門痛不堪任醫以止血痢藥不效又以腸風藥則益甚盖腸風則有血而無膿凡如此已半年餘氣血漸弱食漸减肌肉漸瘦稍服熱藥則腹愈痛血愈下服稍凉藥則泄注氣羸粥愈减服温平藥則病不知将朞歳醫告術窮垂命待盡或有人敎服人參散病家亦不敢主張謾與服之才一服知二服减三服膿血皆定自此不十服其疾遂愈後問其方云治大腸風虚飲酒過度挾熱下痢膿血疼痛多日不差樗根白皮人參各一兩為末二錢匕空心温服調下飲酒以温米飲代忌油膩濕麫青菜果子甜物雞魚蒜等衍義脫血臂多青脉曰脫血尺脉緩濇謂之解㑊安臥脉盛謂之脫血臥乆傷氣也癰疽服石發疽齊王侍醫遂病自煉五石服之臣意徃過之遂請意曰不肖有病幸診遂也臣意即診之告曰公病中熱論曰中熱不溲者不可服五石石之為藥精悍公服之不得數溲亟勿服色將發癰遂曰扁鵲曰隂石以治隂病陽石以治陽病夫藥石者有隂陽水火之劑故中熱即為隂石柔劑治之中寒即為陽石剛劑治之臣意曰公所論逺矣扁鵲雖言若是然必審診起度量立䂓矩稱權衡合色脉表裏有餘不足順逆之法参其人動静與息相應乃可以論論曰陽疾處内隂形應外者不加悍藥及鑱石夫悍藥入中則邪氣辟矣而宛氣愈深診法曰二隂應外一陽接内者不可以剛藥剛藥入則動陽隂病益衰陽病益著邪氣流行為重困於俞始喻反忿發為疽意告之後百餘日果發為疽乳上入闕盆死此謂論之大體也必有經紀拙工有一不習文理隂陽失矣史記病疽齊侍御史成自言病頭痛臣意診其脉告曰君之病惡不可言也即出獨告成弟昌曰此病疽也内發於腸胃之間後五日當􅢝腫後八日嘔膿死成之病得之飲酒且内成即如期死所以知成之病者臣意切其脉得肝氣肝氣濁而静此内關之病也脉法曰脉長而弦不得代四時者其病主在于肝和即經主病也代則絡脉有過經主病和者其病得之筋髓裏其代絶而脉賁者病得之酒且内所以知其後五日而􅢝腫八日嘔膿死者切其脉時少陽初代代者經病病去過人人則去絡脉主病當其時少陽初關一分故中熱而膿未發也及五分則至少陽之界肝與心相去五分故曰五日盡也及八日則嘔膿死故上二分而膿發至界而􅢝腫盡泄而死熱上則熏陽明爛流絡流絡動則脉結發脉結發則爛解故絡交熱氣已上行至頭而動故頭痛史記治背瘡京師人司仲因言里人父患背瘡若負火炭晝夜呼叫其子泣於余遇道人曰子何憂之深也告之道人曰子當求不耕之地遇野人糞為蟲鳥所殘即以杖去其糞取其下土篩而傅之乃如其言用之立愈父曰豈以氷着吾背邪吾五臟俱寒矣類編治喉癰楊立之自廣州通判歸楚州喉間生癰既腫潰而膿血流注曉夕不止寝食俱廢醫者束手適楊吉老來赴郡守招立之而子走徃邀至熟視良久曰不須看脉已得之矣然此疾甚異須先啖生薑片一斤乃可投藥否則無法也語畢即出子有難色曰喉中潰膿痛楚豈食生薑立之曰吉老醫術通神其言不妄試取一二片啗我如不能進屏去無害遂食之初時殊為甘香稍復加益至半斤許痛處已寛滿一斤始覺味辛辣膿血頓盡粥餌入口了無滯礙明日招吉老謝而問之對曰君官南方多食鷓鴣此禽好啖半夏乆而毒發故以薑製之今病源已清無服他藥予記唐小說載崔魏公暴亡醫梁新診之曰中食毒僕曰常好食竹雞梁曰竹雞多食半夏苖盖其毒也命捩生薑汁折齒灌之遂復活甚與此相類類記治癰疽房州虞侯張進本北方人因送還郡守逄道人買酒與飲得其治癰疽方寄居文録曺子病背瘡醫不能療聞進有此技試呼之進元無手訣但以成藥塗傅未旬日而愈張子温五歳兒生瘡於鬢邉繼又發於腦後證候可憂亦以付進凡所用皆一種不過三夕二者皆平温與之錢而問之進不復有隠謹以告但擇阿膠透徹者一兩水半升煎令消然後入虢丹一兩慢火再熬數數攪匀俟三五沸乃取出攤令極冷貯於瓶罌中如用時以毛掃布瘡四靣而露其口如瘡未成則遍塗腫處良久自消切勿犯手更無他法雖一切惡瘡皆可傅治不特癰疽也同上治癰疽方歙丞胡權在都下遇異人授以治癰疽内托散方曰吾此藥能令未成者速散已成者速潰敗膿自去無用手擠惡肉自去不假刀砭服之之後痛苦頓减其法用人参當歸黄芪各二兩芎藭防風厚朴桔梗白芷甘草各半之皆細末别入桂末一兩令均毎以三五錢熱酒調服以多為妙不能飲者木香湯調然不若酒服為竒療癰毒向友正元仲之子也淳熈八年為江陵支使攝公安令癰發於胸臆間拯療半載弗愈甞浴罷痛甚委䪺而臥似夢非夢見一丈夫微揖而坐傳藥方與之曰用沒藥𤓰蒌乳香三味酒煎服之且言桃源許軫知縣亦有此方但不用爪蒌若用速效宜服此友正敬謝即如所戒不終劑而愈後詣玉泉禱雨瞻夀亭關王像盖所感夢者因繪祀于家類編發背無補法諺云背無好瘡但生於正中者為真發背虞奕侍郎背中生小瘡不悟只以藥調補數日不疼不痒又不滋蔓疑之呼外醫灸二百壮已無及此公平生不服藥一年来唯覺時時手脚心熱疾作既不早治又服補藥何可久也泊宅編結癰五臟不和則九竅不通六腑不和則留結為癰預療背疽揚州名醫楊吉老其術甚著某郡一士人状若有疾懨懨不聊莫能名其何䓁病苦徃謁之楊曰君熱証已極氣血消鑠且盡自此三年當以背疽死不可為也士人不樂而退聞茅山觀中一道士於醫術通神但不肯以技自名未必為人致力士人心計交切乃衣僮僕之服詣山拜之願執薪水之役于席下道士喜留寘弟子中誨以讀經書夜祗事左右頥指如意厯兩月乆覺其與常𨽻别呼扣所從来始再拜謝過以實白之道士笑曰世間那有醫不得的病汝試以脉示我纔診脉又笑曰汝便可下山吾亦無藥與汝但日日買好棃一顆吃如生棃已盡則取乾者泡湯飲之仍食其滓此疾自當平士人歸謹如其戒經一歳復徃揚州楊醫見之驚其顔貌腴澤脉息和平謂之曰君必遇異人不然豈有痊安之理士人以告楊立具衣冠焚香望茅山設拜盖自咎其學之未至也北夢瑣言載醫者趙鄂云一朝士疾危只有一法請剰喫消梨不限多少如咀嚼不及捩汁而飲或希萬一用其言遂愈此意正同類編雲母膏愈腸癰楊介吉老者泗州人以醫述聞四方有儒生李氏子棄業願娶其女以授其學執子婿禮甚㳟吉老盡以精微告之一日有靈壁縣富家婦有疾遣人邀李生以往李初視脉云腸胃間有所苦耶婦曰腸中痛不可忍而大便從小便中出醫者皆以為無此證不可治故欲屈子李曰試為籌之若姑服我之藥三日當有瘳不然非某所知也下小丸子數十粒煎黄茋湯下之富家依其言下膿血數升而愈冨家大喜贈錢五十萬置酒而問曰始切脉時見芤脉現於腸部王叔和脉訣云寸芤積血在胸中關内􅑮芤腸裏癰此癰生腸内所以致然所服者乃雲毋膏為丸爾切脉至此可以言醫矣李後以醫科及第至博士李稙元秀即其從子也王仲言餘話釘疽張嗣伯甞聞屋中呻吟聲嗣伯曰此病甚重乃徃視之見一老姥稱體痛而處處有黯黑無數嗣伯還煮斗餘湯送令服之服訖痛勢愈甚跳投牀者無數須㬰所黯處皆㧞出釘長寸許以膏塗瘡口三日而復云此名釘疽也史記癰瘡唐李勣嘗疾醫診之曰得鬚灰服之方止太宗遂自翦髭燒灰賜服之復令傅癰瘡立愈故白樂天云翦鬚燒藥賜功臣仁宗皇帝賜吕夷簡古人有語髭可治疾今朕翦鬚與之合藥表朕意也脚氣脚氣痞絶唐栁栁州纂救死三方云元和十二年二月得乾脚氣夜半痞絶左脅有塊大如石且死因大寒不知人三日家人號哭滎陽鄭洵羙傳杉木湯服半食頃大下三次氣通塊散用杉木節一大升橘葉一升無葉以皮代大腹㯽榔七箇合而碎之童子小便三大升共煮一升半分二服若一服得快利停後服已前三日死矣㑹有教者得不死恐他人不幸有類予病故傳焉本事方脚氣無補法脚氣乃風毒在内不可不攻故先當㵼之脚心如中箭道士王裕曰有忽患脚心如中箭發歇不時此腎之風毒㵼腎愈泊宅編同上脚氣今人謂之脚氣者黄帝所謂緩風濕痺也千金云頑弱名緩風疼痛為濕痺治閉結并脚氣饒醫熊彦誠年五十五歳病前後溲便不通五日腹脹如鼔同軰環視皆不能措力與西湖妙果僧慧月相善遣信邀至訣别慧月驚馳而徃過釣橋逄一異客風姿瀟洒出塵揖之曰方外髙士何孑孑走趨如此慧月曰一善友久患閉結勢不可療急欲徃問客曰此易事也待奉施一藥即脫靴入水探一大螺而出曰事濟矣持抵其家以鹽半匕和殻生搗碎置病者臍下一寸三分用寛帛𦂳繫仍辦濁器以須其通慧月未深以為然姑巽謝之熊昏不知人妻子聚泣諸醫知無他策謾使試之曾未安席砉然暴下醫愧嘆而散慧月歸訪異人無所見矣熊後十六年乃終白石董守約以脚氣攻注為苦或教之搥數螺傅兩股上便覺冷氣趨下至足既而亦安類編附船愈脚氣痛顧安中廣徳軍人乆患脚氣筋急腿腫行履不得因至湖州附船中有一袋物為腿痛酸遂将腿閣袋上㣲覺不痛及筋寛而不急乃問梢人袋中何物應曰宣𤓰自此脚氣䪺愈名醫録脚躄有人病兩脚躄不能行舉詣佗佗望見云已飽針灸服藥矣不須復看脉便使解衣㸃背數十處相去或一寸或五寸縱邪不相當言灸此各十壮灸瘡愈即行後灸處夾脊一寸上下行端直均調如引䋲也漢書華佗傳旋復根汁能續筋筋斷復續者取旋復根絞取汁以筋相對取汁塗而封之即相續如故蜀児如逃走多刻筋以此續之百不失一漏時康祖心漏時康祖大夫患心漏二十年當胷數竅血液長流屢訪名醫皆云不可治或云竅多則愈損閉此則慮六他岐當存其一二猶為上策坐此形神枯瘁又積苦腰痛行則傴僂不飲酒雖雞魚蟹蛤之屬亦皆不向口淳熈四年有通判温州郡守韓子温見而憐之為檢聖惠方載腰痛一門冷熱二證示之使自擇康祖報曰康祖年老乆羸安敢以熱始作寒冷治療取一方用鹿茸者服之踰旬痛减仍覺氣宇和暢遂一意專服悉屏他藥洎月餘腰屈復伸無復呼痛心漏亦愈以告醫者皆不能測其所以然後九年康祖自鎮江通判滿秩造朝訪子温則精力倍昔飲膳無所忌歩履輕捷云漏愈之後日勝一日子温書吏呉汝弼亦苦是疾使就求藥服之旬有二日而差其方本只治腰痛用鹿茸去毛酥炙㣲黄附子炮去皮臍皆二両鹽花三分為末棗肉為丸三十丸空心酒下巳志鱔魚覆漏馬提刑記醫先祖忠肅公天聖中以工部尚書知濠州家有媪病漏盖十餘年一日老兵掃庭下且言前數日過市有醫自逺來道漏瘡可治特頃刻之力耳媪曰吾更醫多矣不信也其黨有以白忠肅公者即為召醫視之曰可治無疑須活鱔一條竹針五七枚醫乃擲鱔於地鱔困屈盤就盤以竹針貫之覆瘡良久取視有白蟲數十如針著鱔醫即鈐置杯水中蠕動如線復覆之又得十餘枚如是五六醫者曰蟲固未盡然其餘皆小蟲竟請以常用藥敷之時家所有㯽榔黄連為散傅之醫未始用藥明日可以乾艾作湯投白礬末二三錢洗瘡然後傅藥盖老人血氣冷必假艾力以佐陽而艾性亦能殺蟲也如是者再即生肌不一月當愈既而如其言醫曰瘡一月不治則有蟲蟲能蠕動氣血亦随之故瘡漏不可遽合則結痛實蟲所為又曰人每有疾經月不痊則必憊虚勞婦人則補脾血小兒則防驚疳二廣則並治瘴癘醫無名於世而治疾有效亦良醫也又其言有理故併録之良方鱔漏有人脚肚上生一瘡久遂成漏凡經二年百藥不效自度必死一村人見之云此鱔漏耳但以石灰二三升百沸湯泡熏洗但覺瘡痒即是也病者如其言用灰湯淋洗果痒竟用此洗不三兩次遂乾蟻漏有婦人項下忽生一塊腫漸縁至妳上腫起莫知何病偶用刀刺破出清水一碗日久瘡不合有道人見之云此蟻漏耳縁喫飯悞食蟻得此詢婦人云常來喫飯時羣蟻縁飯上逐之用湯泡喫徃徃有死蟻在中不覺食之道人云此易治但用穿山甲數片燒存性為末敷瘡上遂愈盖蟻畏穿山甲故也犬齧瘤得針處士蒯亮言其所知額角患瘤醫為剖之得一黑石碁子巨斧擊之終不傷缺復有足脛生瘤者因至親家為猘犬所齚正齧其瘤其中得為針百餘枚皆可用疾亦愈稽神録灸鼠漏栁休祖者善卜筮其妻病鼠瘤積年不差垂命休祖遂卜得頥之復按卦合得姓石人治之當獲鼠而愈也既而鄉里有奴姓石能治此病遂灸頭上三處覺佳俄有一鼠逕前而伏呼犬咋之視鼠頭有三灸處妻遂差拾遺方李生虱瘤浮梁李生得痒疾隠起如覆盂無所痛苦背唯竒痒不可忍飲食日以削無能識其為何病醫者秦德立見之曰此虱瘤也吾能治之取藥敷其上又塗一綿帶繞其圍經夕瘤破出虱斗許皆蠢蠕能行動即日體輕但有一小竅如箸端不合時時虱涌出不勝計竟死予計唐小說載賈魏公鎮滑臺日州民病此魏公云世間無藥可治唯千年木梳燒灰及黄龍浴水乃能治爾正與此同腫癭病腫先痛而後腫氣傷形也先腫而後痛形傷氣也風勝則動熱勝則腫燥勝則乾寒勝則浮濕勝則濡腫釋名曰腫鍾也寒熱氣所鍾聚也太平御覧隂腫如升治男子隂腫大如升核痛人所不能治者𢷬馬鞭草塗之小兒隂腫小兒隂囊忽虚腫痛以生甘草湯調地龍糞輕輕塗之小児熱毒遊腫破草鞋人亂頭髪燒灰醋和傅治熱毒逰腫本草婦人隂腫堅硬用枳實半斤碎炒令熟故帛裏熨冷則易之同上脚腫有男子六十一歳脚腫生瘡忽食猪肉不安醫以藥利之稍愈時出外中風汗出後頭面暴腫起紫黑色多睡耳輪上有浮泡小瘡黄汁出乃與小續命湯加羌活一倍煎服之遂愈本草衍義背腫楊愔患背腫馬嗣明以錬石塗之便差錬石法以粗黄色石如鵝鴨卵大猛火燒令赤内醇醋中自有石屑落頻燒至石屑盡曝乾搗篩醋和塗腫上無不愈傅腫仁宗在東宫苦腮腫用赤小豆末傅之遂愈或云可療發背洞㣲志癭説文曰癭頸瘤也典術曰服食天門冬治癭除百病太平御覧井錫鎮癭汝州人多病頸癭彼境地饒風沙沙入井中飲其水則生癭故今房間人家井以錫為井欄皆以夾錫錢鎮之或沉錫其中則飲者免此患華亭有一老僧昔行脚河南管下寺僧僮僕無一不病癭時有洛僧共寮毎食取携行苔脯同飱經數月僧項贅盡消若未甞病寺僧訝嘆乃知海岸鹹物能愈是疾癸志中毒中仙茅附子毒鄭長卿資政説少時随父太宰官懐州一將官服仙茅遇毒舌脹出口漸大與肩齊善醫環視不能治一醫獨曰尚可救少緩無及矣取小刀􅋇其舌隨破隨合􅋇至百數始有血一㸃許醫喜曰無害也舌應時消縮小即命煑大黄朴硝數碗連服之并以藥末掺舌上遂愈又盖諒郎中説其兄詵因感疾醫盧生勸服附子酒每生切大附二兩浸以斗酒旦起輙飲一盃服之二十年後再為陜西漕使諒自太學歸過之南樂縣拉同行中途曉寒詵飲一杯竟復令温半杯比酒至自覺㣲醉乃與妻使飲行數里妻頭腫如斗脣裂血流下駐道傍呼隨行李職醫告之李使黑豆菉豆各數合生嚼之且煎湯併飲至曉腫始消詵仍服之不輟到長安數月失明遂致仕時方四十二歲中蕈毒崇寧間蘇州天平山白雲寺五僧行山間得蕈一叢甚大摘而煑食之至夜發吐三人急採鴛鴦草生啖遂愈二人不甚肯啖吐至死此草藤蔓而生對開黄白花傍水依山處皆有之治癰疽腫毒尤妙或服或傅皆可今人謂之金銀花又曰老翁須本草名為忍冬並出已志中鱔鼈蝦䗫毒頃有一士人好食鱔魚及鼈與蝦䗫甞云此三物不可食大者有毒殺人蝦䗫小者亦令人小便袐臍下蔽疼有至死者宜以生豉一大合投新汲水半碗浸令豉水濃頓服之即差茅亭客話中荳腐毒人有好食荳腐因中其毒醫治不效偶更醫醫至中途適見做豆腐人家夫婦相爭因問之云今早做豆腐妻誤将蘿蔔湯置腐鍋中今豆腐更就不成盖腐畏蘿蔔也醫得其説至病家凡用湯液率以蘿蔔煎湯或調或嚥病者遂愈諸果有毒諸果有毒桃杏雙仁有毒五月食未成核果令人發癰疽癤及寒熱又夏秋果落地為惡蟲縁食之令人患九漏桃花食之令人患淋李仁不可和雞子食患内結不消本草衍義中斑鳩毒浙人王夫人忽日面上生黑斑數㸃日久滿面俱黑遍求醫治不效忽遇一草澤醫云夫人中食毒爾某治之一月平復後覔其方止用生薑一斤切碎研汁将滓焙乾却用薑汁煮糊元問其故云夫人日食斑鳩盖此物日甞食半夏苖是以中其毒故用生薑以解之名醫録中蜈蚣毒有中蜈蚣毒者以烏雞屎水調塗咬處大蒜塗亦效又畏蛞蝓不敢過所行之路觸其身即蜈蚣死故取以治蜈蚣毒桑汁白鹽塗亦效本草衍義藥反中毒治諸藥相反中毒用蠶退燒灰細研一錢冷水調下頻服取效雖面青脉絶腹脹吐血服之即活中魚毒虞侍郎蘓州人平生喜食生魚鱠中年病腹堅倒身不得毎發疼痛㡬死累治不效一善醫切脉曰侍郎右關脉伏伏為積聚有生冷之積成癥在腹則痛不可忍可以藥取之令用橄㰖汁吞丸子藥數粒晚下利一盆許是魚鱠縷前一截皆成魚矣從此遂安名醫録中萵菜毒王舜求云萵菜出咼國有毒百蟲不敢近蛇虺過其下誤觸之則目瞑不見物人有中其毒者唯生薑汁解之遯齋閒覧魚魫遇蟲毒南海魚有石首者盖魚枕也取其石治以為器可載飲食如遇蟲毒器必曝裂其效甚著福唐人製作尤精人但翫其色而鮮能識其用同上中酒毒飲酒中毒經日不醒者用黑豆一升煑取汁温服一小盞不過三服即愈今人謂之中酒是也服食反誤方天蛇毒太子中允關杞曾提舉廣南西路常平倉行部邕管一吏人為蟲所毒舉身潰爛有一醫言能治使視之曰此為天蛇所螫疾已深不可為也乃以藥傅其瘡有腫起處以鉗㧞之有物如蛇凡取十餘條而疾不起又予家祖塋在錢塘西溪甞有一田家忽病癩通身潰爛號呼欲絶西溪寺僧識之曰此天蛇毒爾非癩也取木皮煮飲一斗許令其恣飲初日疾减半兩三日頓愈驗其木乃今之秦皮也然不知天蛇何物或曰草間黄花蜘蛛是也人遭其螫仍為露水所濡乃成此疾露渉者亦當戒也中挑生毒興化人陳可大知肇慶府肋下忽腫起如生癰瘡状頃刻間其大如盌識者云此中挑生毒也俟五更以菉豆細嚼試若香甜則是已而果然乃搗川升麻為細末取冷熟水調二大錢連服之遂利下㵼出生葱數莖根鬚皆具腫即消縮煎平胃􅄆調補且食白粥後亦無他又雷州民康財妻為蠻巫林公榮用雞肉挑生值商人楊一者善醫療與藥服之纔食頃吐積肉一塊剖開筋膜中有生肉存已成雞形頭尾觜翅悉肖似康訴於州州捕林置獄而呼楊生令具疾證用藥其畧云凡喫魚肉𤓰果湯茶皆可挑初中毒覺胸腹稍痛明日漸加攪刺滿十日則物生能動騰上則胸痛沉下則腹痛積以瘦悴此其候也在上膈則取之其法用熱茶一甌投胆􅈨半錢於中候􅈨化盡通口呷服良久以雞翎探喉中即吐出毒物在下膈即㵼之以米飲下鬱金末二錢毒即㵼下乃擇人參白术各半兩碾末同無灰酒半升納瓶内慢火熬半日許度酒熟取温温服之日一盞五日乃止然後飲酒如其故丁志誤飲蛇交水陳齋郎湖州安吉人因歩春渇掬澗水兩口嚥之數日覺心腹㣲痛日久疼甚服藥無效醫診之云心脾受毒今心脉損甚齋郎答云去年歩春渴飲澗水得此醫云齋郎喫却蛇交水蛇在澗邊遺下不净在澗水内蛇已成形在齋郎腹中食其心而痛也遂以水調雄黄服下果下赤蛇數條皆能走也名醫録中蜘蛛毒治蜘蛛咬一身生絲羊乳一物飲之貞元十年崔員外從質云目擊有人被蜘蛛咬腹大如孕婦其家棄之乞食於道有僧遇之教飲羊乳未㡬日而平本草中山雞鷓鴣毒南唐相馮延已苦腦中痛累日不减太醫令呉廷紹宻詰厨人曰相公平日嗜何等物對曰多食山雞鷓鴣廷紹曰吾得之矣投以甘豆湯而愈盖山雞鷓鴣皆食烏頭半夏故以此解其毒出南唐書中石斑魚子毒誤喫石斑魚子吐不止者取魚尾草研汁服少許立止魚尾草又名樚木根形似黄荆八月間開紫花成穗葉似水楊無大樹經冬不凋漁人用以藥魚地漿治菌毒四明温台間山谷多生菌然種類不一食之間有中毒徃徃致殺人者盖蛇毒氣所薫蒸也有僧教掘地以冷水攪之令濁少頃取飲皆得全活此方見本草陶隠居注謂之地漿亦治楓樹菌食之笑不止一俗言食笑菌者居山間不可不知此法解毒解蠱毒呪方頃有朝官與一髙僧西遊道由歸峽城頓荒逺日過中餒甚抵小村舍聞其家畜蠱而勢必就食去住未判僧曰吾有神呪可無憂也食至僧閉目誦持俄見小蜘蛛延縁盌吻僧曰速殺之於是竟食無所損其呪曰姑蘇啄摩邪啄吾知蠱毒生四角父是穹窿窮毋是舍邪女眷属百萬千吾今悉知汝摩訶薩摩訶是時同行者競傳其本所至無恙别傳解毒方用豆豉七粒巴豆去皮二粒入百草霜一處研細滴水丸菉豆大以茅香湯吞下七丸又泉州一僧治金蠶毒云才覺中毒先吮白􅈨味甘而不澁次嚼生豆不腥者是也但取石榴根皮煎汁飲之即吐出活蟲無不立愈李䀲之云以白􅈨芽茶搗為末冷水服凡一切毒皆可治併載于此以貽後人辛志解砒毒凡人誤服生砒唯单飲生油以吐為度則其毒氣自消不能為害治蠱毒嘉祐中范吏部道為福州守日掲一方于石云凡中蠱毒無論年代逺近但煮一鴨卵挿銀釵於内併噙之約一食頃取見釵卵俱黑即中毒也其方用五倍子二兩硫黄末一錢甘草三寸一半炮出火毒一半生丁香木香麝香各十文輕粉三文糯米二十粒共八味瓶内水十分煎取七候藥靣生皺皮為熟絹攄去滓通口服病人平正仰臥令頭髙覺腹中有物衝心者三即不得動若出以盆桶盛之如魚鰾之類乃是惡物吐罷飲茶一盞㵼亦無妨旋煮白粥補忌生冷油膩鮓醬十日後服解毒圎三兩丸經旬平復丁木麝三香價嘉祐中十文今言之數倍乃可爾類編解藥毒王仲禮嗜酒壮歳時瘡􅖟發于鼻延于顙心甚惡之服藥弗效僧法滿使服何首烏丸當用二斤適墳僕識草藥乃掘得之其法忌鐵器但入砂鉢中藉黑豆蒸熟既成香味可人念所蒸水必能去風澄以頮靣初覺極熱漸加不仁至晚大腫眉目耳鼻渾然無别望之者莫不驚畏王之母髙氏曰凡人感風癩非一日積吾兒遇毒何至於是吾聞生薑汁赤小豆能解毒山豆根黑蚌粉能消腫亟命僕搗捩薑汁以三味為末調傅之中夜腫退到曉如初盖先採何首烏擇焉不精為狼毒雜其中以致此撓也同上解毒凡中藥毒及一切諸毒從酒得者難治言酒性行諸血脉流遍身體也因食得者易治言食與藥俱入於胃胃能容雜毒又逐大便泄出毒氣毒氣未流於血脉故易愈也解諸食毒爛嚼生甘草嚥之則毒吐出瑣碎録蟹解漆毒乾道五年襄陽有刼盗當死而特㫖貸命黥配者州牧慮其復為人害既受刑又以生漆塗其兩眼囚行到荆門已盲不見物寄禁長林縣獄以待傳送適有村叟以事在獄中憐而語之曰汝明日去時倩防送者徃蒙泉石仄尋石蟹搗碎之濾汁滴眼内漆當随汁流散瘡亦愈矣如其言訪得一小蟹用之留三日而行目睛如初畧無少損予妹婿朱晞顔時以當陽尉攝邑令親見之丙志獸能解藥毒名醫言虎中藥箭食清泥野豬中藥箭豗薺苨而食雉被膺傷以地黄葉貼之又礜石可以害鼠張鷟甞試之鼠中如醉亦不識人知取泥汁飲之須㬰平復鳥獸蟲物猶知解毒何况人乎被矢中者以甲蟲末傅之蛛為蜂螫處士劉易隠居王屋山甞於齋中見一大蜂􅇢於蛛􅃠蛛縳之為蜂所螫墜地俄頃蛛鼓腹破裂徐徐行入草嚙芋梗㣲破以瘡就嚙處磨之良久腹漸消輕躁如故自後人有為蜂螫者挼芋梗傅之而愈保靈丹徃時川蜀俗喜行毒而成都故事歲以天中重陽時開大慈寺多聚人物出百貨其間號名藥世者於是有於窓隙間呼貨藥一聲識其意亟授以千錢乃從窓隙度藥一粒號解毒丸或一粒可救一人命夫迹既叵測故時多疑出於神仙政和間祐陵以仁聖惠天下嘗即上清寳籙宫之前新作兩亭左曰仁濟主給藥治疾苦右曰輔正主符水除邪鬼因遂詔海内凡藥之治病彰彰有聲者悉索其書方而上之焉於是成都守臣監司奉命相共窮其状乃得售解毒丸家盖世世懼行毒者為仇害故匿其迹非有所謂神仙者既㨿方修治得其合即并藥奏御下殿中省上曰朕自施天子所服御以濟元元母煩有司也繇是殿中省羣醫諸師驗其方則王氏博濟方之保靈丹爾當是時猶子行適領殿中監事故獨得其詳吾落南來用是藥嘗救兩人食胡蔓草毒得不死盖不可不書百衲居士鐵圍山叢談醫説卷六
