body:
  text: 醫說卷九宋張杲撰養生脩養調攝養生皇甫隆遇青牛道士封君逹云體欲常少勞無過食去肥醲節酸鹹减思慮損喜怒謹房室又抱朴子曰人亦有不病者各有所制攝生食不欲飽眠不欲扇星下不臥劉根别傳曰取七歲男齒女髪與已頭垢合燒服之一歲則不知老常為之使老有少容也太平御覧又世有尫羸而夀考亦有盛壮而暴亡若元氣猶存則尫羸而無害及其已耗則盛壮而愈危是以善養生者謹起居節飲食導引闗節吐故納新不得已而用藥則擇其品之上性之良可以久服而無害者則五臟和平而夀命長不善養生者薄謹節之功遲吐納之效厭上藥而用下品伐真氣而助强陽根本已危僵仆無日蘓文神氣神者氣之子氣者神之母形者神之室氣清則神暢氣濁則神昏氣亂則神勞氣衰則神去室空則神腐人以氣為道道以氣為生生道兩存故長生久視内外丹老君曰氣象天地變通莫測陽龍隂虎木液金精二氣交㑹鍊而成者謂之外丹含和鍊藏吐故納新上入泥丸下注丹田修運不息朝於絳宫採於五石以哺百神此内丹也修道之士内丹可以延年外丹可以升仙内丹成而外丹不應外丹應而内丹不充皆未至於升舉六氣六氣者呬主肺呵主心嘘主肝呼主脾吹主腎嘻主三焦三焦法象於三十六氣分行於六腑通利水榖調適形神養神夫欲養神先須養氣養氣先須養腦養腦先須養精養精先須養血養血先須養水而九還七返者大而論之一年小而論之一日北斗一日一夜一週天天降地騰從寅至申為七返却至坤為九還存想神仙之要莫大乎存想存謂存我之神想謂想我之身閉目見自已之目収心見自已之心心目不離我身不傷我神則存想之漸也養性飬性之道欲小勞但勿大疲及强所不能堪爾食欲少而不欲頓常如飽中飢飢中飽善養性者先飢乃食先渴乃飲食後當行畢摩腹數百遍暮臥常習閉口口開則失氣邪從外入屈膝反臥益人氣力勝正偃臥春欲晏臥早起夏秋欲夜寢早起冬欲早臥晏起雖云早起莫在雞鳴前雖云晏起莫在日出後莫久行久立久坐久臥久聴久視莫强食莫强酒飲則不欲多多則速吐之養性之士唾不至逺行不疾歩耳不極聴目不極視坐不久處立不至疲臥不至厭先寒而衣先熱而解吐納凡吐者去故氣亦名死氣納者取新氣亦名生氣和氣彭祖曰和氣導氣之道宻室閉尸安牀暖席枕髙二寸半正身偃臥瞑目閉氣以鴻毛著鼻上不動經三百息耳無所聞目無所見心無所思如此則寒暑不能侵蜂蠆不能毒夀三百六十歳隣於真人也夜卧夜臥覺常叩齒九通咽唾九過以手按鼻左右上下數十過存心中氣仙經曰常存心中有氣大如雞子内赤外黄能辟衆邪延年益夀又云常存心如炎火如斗煌煌光明百邪不敢干之服玉泉道人蒯京年百七十八而甚丁壮言朝朝服玉泉琢齒玉泉者口中唾也朝旦未起早漱津令滿口含之琢齒二七過名曰練精脩真祕訣般運㨗法揚州有武官侍其某者官於二廣十餘年終不染瘴面紅膩腰足輕快初不服藥唯每日五更起坐兩足相向熱摩湧泉無數以汗出為度歐公平日不信仙佛笑人行氣晚年云數年来足瘡一㸃痛不可忍近有人傳一法用之三日不覺失去其法重足坐閉目握固縮榖道摇颭兩足如氣毬状氣極即休氣平復為之日七八得暇即為乃般運捷法也文忠痛已即廢若不廢當有益仇池筆意真常子養生酒多血氣皆亂味薄神䰟自安夜漱却勝朝漱暮飱不若晨飱耳鳴直湏補腎目暗必須治肝節飲自然脾健少思必定神安汗出莫當風立腹空莫放茶穿飬性之術楊泉物理論曰榖氣勝元氣其人肥而不夀元氣勝榖氣其人瘦而夀飬性之術常使榖氣少則病不生矣太平御覧藏精飬神藏精於晦則明飬神於静則安晦以蓄用静以應動善蓄者不竭善應者不窮此君子修身治人之術唯性近者得之易也飬生偈閑邪存誠練氣養精一存一明一練一清清明乃極丹元乃生坎離乃交梨棗乃成中夜危坐服此四藥一藥一至則極則處㡬費千息閑之廓然存之卓然飬之郁然練之赫然守之以一成之以久功在一日何遲之有孫真人養生銘怒甚偏傷氣思多太損神神疲心易役氣弱病相縈勿使悲歡極當令飲食均再三防夜醉苐一戒晨嗔亥寢鳴雲鼔寅興漱玉津妖邪難犯已精氣自全身若要無諸病甞當節五辛安神宜恱樂惜氣保和純夀夭休論命脩行本在人若能遵此理平地可朝真孫真人養生雜訣人年四十以上勿服㵼藥常餌補藥大佳人有所怒血氣未定因以合交令人發癰疽逺行疲乏來入房室為五勞虚損少子水銀不可近隂令人消縮鹿猪二脂不可近隂令隂痿不起故善養生者常少思少念少慾少事少語少笑少愁少樂少喜少怒少好少惡此十二少者養性之都契也養性之道常欲少勞但莫疲及强所不能堪耳且流水不腐戸樞不蠧以其運動故也甞當習黄帝内視法存想思念令見五臓如懸磬五色了了分明勿輟也常以鼻引氣口吐氣小㣲吐之不得開口復欲得出氣少入氣多每欲食送氣入腹氣為主人也凡心有所愛不用深愛有所憎不用深憎並皆損性傷神常欲令如飽中饑饑中飽盖飽則傷肺饑則傷氣常須少食肉多食飯勿食生菜生肉令人傷胃一切肉唯須煮爛停冷食之食畢當潄口數過令人牙齒不敗勿食父母本命所屬肉令人夀命不長勿食自已本命所屬肉令人䰟􅅎飛揚勿食一切腦大損人忍尿不便膝冷成痺忍大便不便成氣痔大小便不可努成病任之佳凡遇山水塢中出泉者不可久居常食令人患癭病又深隂地冷水不可飲必作痎瘧濕衣及汗衣皆不可久著令人發瘡春天不可薄衣令人傷寒霍亂頭勿向北臥頭邉勿安火罏夜臥常習閉口開則失氣且邪惡從口入及失血色凡人夜魘不得燃燈喚之定死無疑闇喚之吉亦不得近而急喚夜夢惡不須說清旦以水靣東方噀之呪曰惡夢著草木好夢成珠玉即無咎矣又夢之善惡並勿說為吉凡冬月忽有大熱夏月忽有大寒皆勿受之有患天行時氣皆犯此也凡人居處勿令有小隙致令風氣得入小覺有風勿强忍之久坐須急避之使人中風古來忽得偏風四肢不遂者皆由忽此耳凡在家及外行忽逄大風暴雨震雷昏霧皆是諸龍鬼神行動經過所致宜入室閉尸燒香静坐安心以避之待過後乃出不爾損人無輕攝養太平興國九年太宗謂宰相曰朕每日所為自有常節辰巳間視事既罷便即觀書深夜就寝五鼓而起盛暑晝日亦未甞寝乃至飲食亦不過度行之已久甚覺有力凡人食飽無不昏濁倘四肢無所運用更便就枕血氣凝滯諸疾自生欲求清爽其可得乎老子曰我命在我不在於天全係人之調適卿等亦當㽞意勿自輕於攝養也楊文公談苑孫真人十二多多思則神殆多念則志散多慾則志昏多事則形勞多語則氣乏多笑則臟傷多愁則心懾多樂則語溢多喜則㤀錯昏亂多怒則百脉不定多好則専迷不理多惡則憔悴無歡抱朴子十五傷才不逮强思之力不勝强舉之深憂重恚悲哀憔悴喜樂過度汲汲所欲戚戚所患久談言笑寝息失時挽弓引弩沉醉嘔吐飽食即臥跳走喘乏歡呼哭泣隂陽不交𤨏碎録同上攝養薄滋味省思慮節嗜慾戒喜怒惜元氣簡言語輕得失破憂沮除妄想逺好惡収視聴勤内顧同上衛生五事夫未聞道者放逸其心逆於生樂以精神徇智巧以憂畏徇得失以勞苦徇禮節以身世徇財利四徇不置心為之病矣極力勞形躁暴氣逆當風縱酒食嗜辛鹹肝為之病矣飲食生冷温凉失度久坐久臥大飽大飢脾為之病矣呼呌過常辯爭陪荅冒犯寒暄恣食鹹苦肺為之病矣久坐濕地强力入水縱慾勞形三田漏溢腎為之病矣五病既作故未老而羸未羸而病病至則重重則必斃嗚呼是皆弗思而自取之也衛生之士須謹此五者可致終身無苦經曰不治已病治未病正謂此矣善攝生善攝生者不勞神不苦形神形既安禍患何由而致也夫人之生以血氣為本人之病未有不先傷其氣血者世有童男室女積想在心思慮過當多致勞損男則神色先散女則月水先閉何以致然盖憂愁思慮則傷心心傷則血逆竭血逆竭故神色先散而月水先閉也火既受病不能榮養其子故不嗜食脾既虚則金氣虧故發嗽嗽既作水氣絶故四肢乾木氣不充故多怒鬢髪焦筋痿俟五臟傳遍故卒不能死然終死矣此一種於諸勞中最為難治盖病起於五臓之中無有已期藥力不可及也若或自能改易心志用藥扶持如此則可得九死一生舉此為例其餘諸勞可按脉與證而治之類編同上保養凡人一日一夜一萬三千五百二十息未甞休息也减之一息則寒加之一息則熱臟腑不和諸疾生焉故元氣在保養谷神在守䕶調攝臥處不可以首近火必有目疾亦不可當風必患頭風等疾背受風則𠻳唯胷無禁善調攝者雖盛暑不當風及露下久臥𤨏碎録真人飬生銘人欲勞於形百病不能成飲酒勿大醉諸疾自不生食了行百歩數以手摩肚寅丑日翦甲頭髮梳百度飢即立小便飽即坐旋溺行處勿當風居止無小隙過夜濯足臥飽食終無益思慮最傷神喜怒最傷氣毎去鼻中毛常習不唾地平明欲起時下牀先左脚一日無災殃去邪兼避惡如能七星歩令人長夀樂酸味傷於筋苦味傷於骨甘即不益肉辛多敗正氣鹹多促人夀不得偏耽嗜春夏少施泄秋冬固陽事獨臥是守真慎静最為貴錢財生有分知足将為利强知是六患少慾終無累神静自常安脩道宜終始書之壁屋中将以傳君子修真祕訣芡能養生呉子野云芡實盖温平耳本不能大益人然俗謂之水硫黄何也人之食芡也必枚囓而細嚼之未有多嘬而亟嗛者也舌頰唇齒終日囁嚅而芡無五味腴而不膩是以致玉池之水故食芡者能使人華液通流轉相挹注積其力雖過乳石可也以此知人能澹食而徐飽者當有大益吾在黄岡中見牧羊者必驅之瘠土云草短而有味羊得細嚼則肥而無疾羊猶爾况人乎摩靣太素經曰一靣之上兩手常摩拭令熱使人光澤皺斑不生先摩擦兩掌令熱以拭兩目又順手摩髪理櫛之状兩臂更互以手摩之髪不白脉不浮外腎神無錫游氏子少年躭於酒色旋得疾久而弗愈勢危甚忽語家人曰常見兩女子服飾華麗其長可三四寸毎縁吾足而行冉冉至腰而沒家人以為妖祟他日名醫自逺而至諸游或以叩之醫曰此盖腎神也腎氣絶則神不守舍故病者見之癸志心腎肝膽心之神發乎目則謂之視腎之神發乎耳則謂之聴肝之精發乎鼻則謂之嗅膽之􅅎發乎口則謂之言故妄視則傷心妄聴則傷腎妄嗅則傷肝妄言則傷膽四損逺唾損氣多唾損神多汗損血疾行損筋精氣形精者神之本氣者神之主形者氣之宅故神大用則歇精大用則竭氣大勞則絶體欲動摇魏志曰呉普常問道於華佗佗謂普曰人體欲得動摇但不當使極耳如動摇則榖氣易消血脉流通病不得生譬猶尸樞不蠧流水不腐以其常動故也史記金石藥之戒服丹之戒士大夫服丹砂死者前後固不一余所目擊林彦振平日充實飲噉兼人居呉下毎以强壮自誇有醫周公輔言得宋道方丹砂秘術可延年而無後害道方洪州良醫也彦振信之服三年疽發於腦始見髪際如粟越兩日鬢頷與胷背略平十日死方疾亟時醫使人以帛漬所潰膿血濯之水中澄其下略有丹砂盖積於中與毒俱出也謝任伯平日聞人畜伏火丹砂不問其方必求之服唯恐盡去歳亦發腦疽有人與之語見其疾将作俄頃間形神頓異而任伯猶未知覺既覺如風雨經夕死十年間親見此二人可以為戒矣石林老人避暑録五石散不可服醫之為術茍非得於心而恃書以為用者未見能臻其妙如术能動鍾乳按乳石論曰服鍾乳當終身忌术五石諸般用鍾乳為主復用术理極相反不知何謂予以問老醫皆不能言其義按乳石論云石性雖温而體本冷重必待其相蒸薄然後發如此則服石多者勢自能相蒸若要以藥觸之其發必甚五石散雜以衆藥用石殊少勢不能蒸須藉外物激之乃發爾如火少必因風氣所鼓而後發火盛則鼓之反為害此自然之理故孫思邈云五石散太猛毒寕服野葛不服五石遇此方即須焚之勿為含生之害又曰人不服石庶事不佳石在身中萬事休泰唯不可服五石散盖以五石散聚其所惡激而用之其發暴故也古人處方大體如此非此書所能盡也况方書仍多偽雜如神農本草最為舊書其間差殊尤多醫不可以不知也劉潁叔異苑服丹之過張中書慤自壮歳時無日不服丹砂暮年歸福州身體充腯飲啖加於人十倍其家困於供億獨一姪與婦竭力祗事張命以官每中夜苦飢但擊牀屏須亟以饅頭非五十枚不飽茹菜必十把常食羊肉必五斤經年之後姪家為枵空忽髪際生瘍浸淫及頂巍然若髙阜結為三十六瘡旬餘爆裂有聲瘡翻而外向如人口反脣而卒庚志服金石藥之戒服金石藥者潛假藥力以濟其慾然多諱而不肯言一旦疾作雖欲諱而不可得也呉興呉景淵刑部服硫黄人罕有知者其後二十年長子槖為華亭市易官發背而卒乃知流毒傳氣尚及其子可不戒哉泊宅編川人服丹川人好服丹盖西北方土厚人禀氣盛可勝丹不為所反南方魚鹽隂濕之地非宜服之大概脾惡濕腎惡燥久服損腎其害尤大𤨏碎録秋石不可久服服秋石久而成渇疾盖鹹能走血血走令人渇不能制水妄行同上丹砂之戒太學博士李干以進士為鄂岳從事遇方士桞泌從受藥法服之徃徃下血比四年病益急乃死其法以鈆滿一鼎以物按中為空實以水銀盖封四際燒為丹砂云余不知服食說自何世起殺人不可計而世慕向之盖至於此惑也在文書所記及耳相聞傳者不說今直取目見親與之游而以藥敗者六七公以為世戒工部尚書歸登殿中御史李虚中刑部尚書李遜遜弟刑部侍郎建襄陽節度使工部尚書孟簡東川節度御史大夫盧坦金吾将軍李道古此其人皆有名位世所共識工部既食水銀得病自說若有燒鐡杖自顛貫其下者摧而為火射竅節以出狂痛號呼乞絶其茵席甞得水銀發且止唾血數十年以斃殿中疽發其背死刑部且死謂予曰我為藥誤其季建一旦無病死襄陽黜為吉州司馬余自袁州還京師襄陽乗舸邀我於瀟湘屏人曰我得秘藥不可獨不死今遺子一器可用棗肉為丸服之别一年而病其家人至訊之曰前所服之藥誤方且下之下則平矣病二歲竟卒盧大夫死時溺出血肉痛不可忍乞死乃死金吾以劉秘得罪食秘藥五十死海上此可以為誡者也蘄不死乃速得死謂之智可不可也五糓三牡鹽醯果蔬人所常御人相厚勉必曰强食今惑者皆曰五榖令人天不能無食當務减節鹽醯以濟百味豚魚雞三者古以養老反曰是皆殺人不可食一筵之饌禁忌十常不食二三不信常道而務鬼怪臨死乃悔後之好者又曰彼死者皆不得其道也我則不然始病曰藥動故病病去藥行乃不死矣及且死又悔嗚呼可哀也已昌黎文集韓退之既知其害而晚年服硫黄而死見漁隠叢話服水銀侍其傳服水銀久之發癢爬搔成赤疹水銀随􅆶出細如粟顆建炎中帥杭已昏不任事既罷疾革未屬纊諸姬皆散不禁可為世戒泊宅編金液丹無妄服金液丹硫黄煉成乃純陽之物夏至人多服之反為大患有痼冷則宜服泊宅編服丹多灸風市穴江煥言馮恱御藥服伏火藥多腦後生瘡熱氣冉冉而上㡬不濟矣一道人教灸風市穴十數壯雖愈時時復作又教馮以隂煉秋石以大豆卷濃煎湯下遂悉平和其隂陽也隂煉秋石法余昔有之沈暘所傳是也大豆卷法大豆於壬癸日浸井花水中候豆生芽取皮作湯使之三槐王氏録雷世賢丹藥馬軍帥雷世賢家貲冨厚侍妾數十人出戍建康一意聲色常餌丹砂乳藥以濟其欲既求諸蜀道又多市金石珍品晝夜煎煉毎日服食不去口使一妾謹信者専掌之妾父自臨安來依其女雷以近舍屋處之父苦寒泄不嗜食妾取雷所服丹十粒與之父但進其半下咽未久覺臍腹間如火少焉熱不可奈繞舍狂走且百匝後有井徑投其中家人救出之遍身已突起紫泡如巨李經日皆陷凡泡處輙成一穴深寸許呌呼六日而卒雷君平日所餌不啻千許了無病惱此人才吞五粒旋䘮厥身亦異矣服丹自焚王偁定觀者元符殿帥恩之子有才學好與元祐故家遊范元實温濳溪詩眼中亦稱其能詩政和末為殿中監年二十八矣眷注甚渥少年貴仕酒色自娯一日忽宣召入禁中上云朕近得一異人能製丹砂服之可以長生久視煉治經歲而成如紫金卿為試之定觀欣躍拜命即取服之才下咽覺胸中煩燥之甚俄頃烟從口中出急扶歸已不救既殮之後但聞棺中剥啄之聲莫測所以已而火出其内頃刻之間遂成烈焰室廬盡焚開封府尹亟救之延燒數百家方止但得枯骨於餘燼中亦可怪也范子濟云丹發背疽丁廣者明清里中老儒也與祖父為軰行甞任保州教授郡将武人而通判者戚里子悉多姬侍以酒色沉縱㑹有道人過郡自言數百歲能煉大丹服之可以飽嗜慾而康强無疾然後飛昇度世守貳舘之以先生之禮事之選日剏丹竈依其法煉之四十九日而成神光爥天置酒大合樂相慶然後甞之廣聞之裁書以獻乞取刀圭以養病身道人者以其骨凡不肯與守貳憐之為請僅得半粒廣欣然服之不數日郡将通判皆疽發於背道人宵遁守貳相繼告殂廣腰間亦生􅟻甚皇恐急飲地漿解之得愈明年考滿改秩居里中疾復作又用前法稍痊偶覺熱燥因澡身水入瘡口中遂不得起金石之毒如此者併書之於此以為世誡丹緩其死宋道方毅叔以醫名天下居南京然不肯赴請病者扶携以就求脉政和中田登守郡母病危甚呼之不至登怒云使吾母死亦以憂去殺此人不過斥責即遣人擒至庭下呵之云三日之内不痊則吾當誅汝以徇衆毅叔曰容為診之既而曰尚可活處以丹劑遂瘉田喜甚云吾一時相困辱然豈可不刷前耻乎用太守之車從妓樂酬以千緍俾羣卒負於前増以綵仗導引還其家旬日後田母病復作呼之則全家遁去母遂殂盖其疾先已在膏肓宋姑以藥緩其死爾三說皆濟隂王明清餘話婦人婦人孫真人云婦人之病比之男子十倍難治以嗜慾多於丈夫故感病倍於男子盖以慈戀愛憎嫉妬憂患染著堅牢情不自抑遂因此成疾實非感冒外邪飲食起居失節之所致也誠以情想内結自無而生有是以釋氏稱談說酢梅口中水出想踏懸崖足心酸澁心憶前人或憐或恨眼中淚盈貪求財寶心發愛涎舉體光潤大率如此若非寛緩情意則雖服金丹大藥則亦不能已法當令病者先存想以攝心抑情意以養性葛仙翁云凡婦人諸病兼治憂恚令寛其思慮則疾無不愈婦人論夫天地造端於夫婦乾坤配合於隂陽雖清濁動静之不同而成象效法之有類原兹婦人之病與男子不同者亦有數焉古方以婦人病比男子十倍難治不亦言之深乎但三十六病産蓐一門男子無之其如外傷風暑寒濕内積喜怒憂思飲食房勞虚實寒熱悉與丈夫一同也依源治療可得而知之養胎大論夫養胎須分能所母為能養子為所養名義既殊致養亦别故謂之重身父母交㑹之初子假父母精血投誠於其間然後成姙元氣資始之謂也一月血聚謂之始衃二月精凝謂之始膏三月成形謂之始胎此亦無次第中次第也道生一一生二二生三三生萬物既以三而成不得不數月而分也成形之後隂陽施化男女始分隨見外象而有感於内四月始受少隂君火氣以養精五月受太隂濕土氣以養肉六月受少陽相火氣以養氣七月受陽明金氣以養骨八月受太陽水氣以養血九月受厥隂木氣以養筋十月臟腑俱偹神明已全俟時而生此皆所養胎息之所成始成終也避忌法一月足厥隂脉養内屬於肝肝藏血不可縱怒及疲極筋力觸冒邪風亦不可妄鍼灸其經二月足少陽脉養内屬於膽膽合於肝共榮於血不可驚動及鍼灸其經三月手心主脉養内屬右腎腎主精不可縱慾及悲哀觸冒寒冷亦不得鍼灸其經四月手少陽脉養内屬三焦三焦精府合腎以養精不可勞逸及鍼灸其經五月足太隂脉養内屬於脾脾養肉不可妄思及飢飽觸冒卑濕亦不可鍼灸其經六月足陽明脉養内屬於胃胃為臟腑海合於脾以養肉不得雜食及鍼灸其經七月手太隂脉養内屬於肺以養皮毛不可憂鬰及呌呼觸冒煩燥亦不得鍼灸其經八月手陽明脉養内屬於大腸合肺以養氣毋食燥物致氣澁及鍼灸其經九月足少隂脉養内屬於腎以養骨不可懐恐及房勞觸冒生冷亦不得鍼灸其經十月足太陽脉養内屬於膀胱以合腎太陽為諸陽主氣故使兒脉續縷皆成六腑通暢與母分氣神氣各全俟辰而生唯不説乎少隂心養者盖心為五臟大主如帝王不可有為也若将理得宜無傷胎臟更能知轉男胎教之法斯為盡善轉女為男法論曰陽施隂化所以有姙遇三隂所會多生女子但懐姙三月名曰始胎血脉不流象形而變是時男女未定故令於未滿三月間服藥方術轉令生男也其法以斧置姙婦牀下繫刀向下勿令人知恐不信者令待雞抱卵時依此置窠下一窠盡出雄雞此雖未試亦不可不知凡受胎三月逐物變化故古人立胎教能令生子良善長夀忠孝仁義聦明無疾十月之内常見好境象逺邪僻真良教也又姙孕欲得男女覺有孕未滿月以弓弩絃為帶縳腰中滿三月解轉女為男宫中秘法不傳房室經視井生男博物志曰婦人姙身三月未滿著婿衣冠平旦遶井三匝映水視影勿反顧必生男陳成者生十女其妻遶井三匝呪曰女為隂男為陽女多災男多祥鎻井三日不汲及期果生一男天癸女子二七而天癸至任脉通泰衝盛月事以時下有子丈夫二八腎氣盛天癸至精氣溢隂陽和故有子年老有子者氣脉常通腎氣有餘也有子男不過八八女子不過七七而天地精氣竭矣子夀不過天癸之數十月而生精氣受於天形體禀於地一月而膏二月而肧三月而胎四月而肌五月而筋六月而骨七月而成八月而動九月而躁十月而生淮南子姙孕避忌婦人姙身不欲見醜惡物食當避異常味不可見兎令兒唇闕不可噉薑令兒多指博物志郝翁醫婦人驗郝翁者名允博陵人晚遷鄭圃世以神醫目之里婦二一夜中口噤如死状翁曰血脉滯也不用藥聞雞聲自愈一行踸踔輙踣翁曰脉厥也當治筋以藥熨之自快皆驗士人陳堯遵妻病衆醫以為勞傷翁曰亟屏藥是為娠證且賀君得男子已而果然又二婦人姙一咽嘿不能言翁曰兒胞大經壅兒生經行則言矣不可毒以藥一極壮健翁偶診其脉曰母氣已死所以生者反恃児氣耳如期子生母死翁所治病神異不可勝紀邵氏後間見録姙婦不語孕婦不語非病也聞如此者不須服藥臨産日但服保生丸四物湯之類産後便語亦自然之理非藥之巧豈其功也哉醫餘半産正産夫半産正産婦人之常事也然其間多有産後染成大患忽絶無月行忽宫臟虧損不禁忽積成癥瘕而歲久月深傾損性命此無他輕之以為半産而不甚将養之所致也不知半産之後其将養當過於正産十倍正産止血臓空虚半産即肌肉腐爛常切譬之正産有如果中之栗夫票之為物俟其自熟隂陽氣足則其殻自開而栗自墜方是之時子之於殻兩無所損如婦人懐孕十月已滿隂陽氣足則其子宫自開而兒子生下若月未滿足因誤服藥餌忽寒邪熱毒所傷忽扶輕舉重忽倒地打傷其胎臓傷損胞繫腐爛然後其胎墜下即有如世人採折新栗碎其皮殻就殻中㫁其根蒂然後取得栗子此其半産之喻也以其胎臟傷損胞繋㫁去而後胎墜下則其半産之人将養調治得不過於正産十倍者哉正産之後補其虚生其好血化其惡血保其臓氣去其風邪人人無有不安也半産之後補其虚生其肌肉益其血窮其所因解其病去其風邪養其臓氣加之将養過於正産十倍傷損之胎無不平復也吁世之人多輕之至於傾危不可勝數得不惜哉𤨏碎録産難凡治産難之法有四一腎為慳藏其氣以慳祕為事如催生之方多用滑利迅疾之藥如兎腦筆頭灰弩牙蛇皮之類有水血先下子道乾澁令兒不能下者如猪脂蜜酒葱白葵子牛乳榆白皮滑石之類有稽停勞動之乆風冷乗勞虚客於胞胎使氣血凝滯澁而不下如桂牛膝酒葱之類五積散加順元散煎服尤妙有觸犯禁忌者如符法臘月兎腦硃砂乳香之類催生歌一烏梅三巴豆七胡椒細研爛搗取成膏酒醋調和臍下貼便令母子見分胞𤨏碎録産難厭勝凡産難宻以净紙書本州太守姓名燈上燒灰湯調即産此雖厭勝頗驗百一選方産後寒氣入腹婦人産當寒月寒氣入産門臍下脹滿手不敢犯此寒病也醫将治之以抵當湯謂其有瘀血甞教之曰非其治也可服張仲景羊肉湯少减水二服遂愈本草衍義産婦頭痛寒熱有婦人方産一兩月間頭疼發熱或發寒熱者何也其說有三一則作妳二則敗血不行三則傷風先以手按妳子妳痛者是作妳也宜服順氣散及􅆶蒌末之類以通其妳更以温湯洗之妳通則無事妳若不痛則問敗血行不行如敗血不行即是血作也急服行血藥如黑神散沒藥當歸之類妳既不痛敗血自行而乃身熱頭疼或發寒熱是傷風也依傷寒法随證治之醫餘渇飲五味汁一婦人暴渇唯飲五味汁名醫耿隅診其脉曰此血欲凝非疾也而果孕古方有血欲凝而渇飲味之證不可不知也産難胞衣不出陶隠居云産難取弓弩絃以縳腰及燒弩牙令赤内酒中飲之皆取法於快速之義也本草懐子而不乳蓄川王美人懐子而不乳召淳于意徃飲以莨菪藥一撮以酒飲之旋乳意復診其脉而脉躁躁者有餘病即飲以消石一齊出血血如豆比五六枚史記孕婦逆生孕婦欲産時遇腹中痛不肯伸舒行動多是曲腰眠臥忍痛其兒在腹中不能得轉故脚先出謂之逆産須臾不救母子俱亾但用烏蛇蛻一條蝉蛻二七箇血餘一箇小兒胎髪以上三味燒為灰分為二服温酒調下併進二服仰臥霎時其兒即時順生或用小絹鍼於小兒脚心刺三七刺急用鹽少許塗刺處即時順生子母俱活也劉潁叔異苑産後瘈瘲婦人疾莫大於産蓐倉卒為庸醫所殺者多矣亦未素稱講故也舊常見杜壬作醫凖一卷其平生治人用藥之驗其一記郝質子婦産四日瘈瘲戴眼弓背反張壬以為瘈病與大豆紫湯獨活湯而愈政和間余妻纔分娩猶在蓐中忽作此證頭足反接相去㡬二尺家人驚駭以數婢强拗之不直適記所云而藥囊有獨活乃急為之召醫未至連進三劑遂能直醫到即愈矣更不須用大豆􅂵湯古人處方神驗類此不可不廣告人二方在千金第三卷運悶凡産後運悶有四種有下血太多虚極運悶宜服羊肉湯兼黑神散有血下少血上逆於心亦令運悶如心腹刺痛宜服四物湯加桂黑神散芎藭散有體中素多風疾因産損傷氣血乗虚而運悶四物湯加防風羌活熱多者與獨活柴胡湯并治風痰藥有心氣将温過度邪熱上乗於心亦令人言語錯亂運悶者宜服鎮心補心丹生薑生地黄散至寳丹桃奴丸婦人月水不通及不㫁婦人衝任之脉起胞中為侯之海手太陽小腸之經也手少隂心之經也二經為表裏主下月水月水來如期謂之月信其不來者縁風冷傷夲經故血結在内不通也或曽經唾血或吐血致血枯或醉以入室勞傷肝氣肝臟血竭於内俱令月水不通又胃氣虚不能消化其水榖使津液不生血氣亦令月水不通其候膓中鳴是也但益津液則經血自下久不通者血結為塊若脾胃虚弱則變為水腫土不勝水故也其月水來而㫁者由勞傷經脉衝任氣虚不能制經血也漏下帶下崩中婦人衝任二脉為十二經之海二經氣虚復為勞傷則不能制其血故非時即下淋瀝不㫁謂之漏下其血與穢液相兼而下謂之帶下忽然暴下謂之崩中其色白為冷赤為熱赤白相兼有冷熱也東虢婁居中食治通說同上四物湯之功四物湯婦人之寳也洛陽李敏求赴官東呉其妻病牙疼每發呻吟宛轉至不能堪忍令婢軰以釵股按置牙間少頃銀色輙變黑毒氣所攻痛楚可知也沿路累易醫殊無效嘉禾僧惠海為製一湯服之半年所苦良已後因食熱麫又作坐間煮湯以進一服而愈其神速若此視藥之標題初不著名但云凉血活血而已敏求報之重徐以情扣之始知是四物湯盖血活而凉何由致壅滯以生疾莫强中一侍人久病經阻發熱咳嗽倦怠不食憔悴骨立醫工徃徃作瘵疾治之其勢甚危惙强中曰婦人以血氣為本血榮自然有生理因謝遣衆工專服此湯其法吺咀每慢火煮取清汁帶熱以啜之空腹日三四服未及月餘經候忽通餘疾如失泊宅編療師尼寡婦别製方昔宋禇澄療師尼寡婦各製方盖有此也此二種鰥居獨隂無陽欲心萌而多不遂是以隂陽交爭作寒作熱全類温瘧久則為勞甞讀史記倉公傳載濟北王侍人韓女病腰背痛寒熱衆皆以為寒熱也倉公曰病得之欲男子不可得也何以知欲男子而不可得診其脉肝脉弦出是以知也盖男子以精為主婦人以血為主男子精盛則思室婦人血盛則懐胎夫肝攝血者也厥隂弦出寸部又上魚際則隂血盛可知故知禇澄之言信有謂矣本事方任氏面疾興國初有任氏美色聘進士王公甫謂公甫不遂寸禄愁鬰懷忿不期面色漸變黑自慚而歸母家求醫治遇一道人曰此乃病也吾有藥可愈任氏懇求得之曰女真散以酒下二錢日兩服數日間面微微變白一月如舊厚賂而得其方用黄丹女萎二物等分為末爾名醫録姙子婦人手少隂脉動甚者姙子也少隂脉掌後陷者中當小指動而應手者也又正月十五日燈盞令人有子夫婦共於冨家局會所盗之勿令人知安臥牀下當月有娠醫説卷九
