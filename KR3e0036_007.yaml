body:
  text: 醫說卷七宋張杲撰積傷滯用藥不同人之臟腑皆因觸冒以成疾病而脾胃最易受觸蓋日用飲食稍或過多則停積難化冷熱不調則吐嘔㵼痢膏粱者為尤甚蓋口腹恣縱不能謹節近用消化藥或論飲食既傷於前難以毒藥反攻其後不復使巴豆碙砂等藥止用麴蘖之類不知古今立方用藥各有主對麴蘖止能消化米榖如肉食有傷則非碙砂阿魏等藥不能治也至於魚蟹過傷則須用橘皮紫蘇生薑果菜有傷則須用丁香桂心水飲傷則須用牽牛芫花固不可一概論也必審其所傷之因對用其藥則無不愈其間輕重則隨患人氣血以增之而已又有一等虛人沉積不可直取當以蠟匱其藥蓋蠟能粘逐其病又可久留腸胃間又不傷氣能消磨至盡也又有痺氣偏虛飲食遲化者止宜助養脾胃則自能消磨不須用尅化藥耳病久成積聚癥瘕者則須用三稜鱉甲之類寒冷成積者輕則附子厚朴重則􅈨石硫黃瘀血結塊者則用大黃桃仁之類醫者宜審詳之雞峯方物能去積厨家索粉與掉粉不得近杏仁近之則爛頃有一兵官食粉多成積師以積氣丸杏仁相半細研為丸熟水下五丸數服愈托醫新說中有一人食黃鷯子過多因食鷂子羮遂愈有傷粽子成積用麴末加少木香末為散鹽湯調數日口中聞酒香其積遂散三說醫餘食藥凡人服食藥一例須用巴豆是大不然養生必用方主青張木香丸亦未是也巴豆去積牽牛利水不可一概用且如傷食米麵之類當用神麴麥蘖傷肉當用阿魏氣不快當用丁木香青陳皮磨積塊用三稜蓬术取熱積用大黃冷積用巴豆痰積用牽牛血積用乾漆此其大略也更以意推之同上治積用藥大抵治疾或以所惡者攻之以所喜者誘之則易愈如碙砂水銀治肉積神麴麥蘖治酒積水蛭虻蟲治血積木香檳榔治氣積牽牛甘遂治水積雄黃膩粉治涎積礞石巴豆治食積各從其類也若用羣隊之藥分其勢則難取效許嗣宗所謂獵不知兔廣絡原野冀一人獲之術亦疏矣須是認得分明是何積聚然後增加用藥不爾反有所損嗣宗自謂不著書在臨時變通也本事方攧撲打傷墮馬齊中郎破石病淳于意診其脉告曰肺傷不治當後十日丁亥溲血死即後十一日溲血而死破石之病得之墮馬僵石生所以知破石之病者切其脉得肺隂氣其來散數道至而不一也色又乘之所以知其墮馬者切之得番隂脉番隂脉入虛裏乘肺脉肺脉散者固色變也乘之所以不中期死者師言曰病者安榖則過期不安榖則不及期其人嗜黍黍主肺故過期所以溲血者診脉法曰病喜養隂處者順死喜養陽處者逆死其人喜自靜不躁又久安坐伏几而寢故血下泄史記治臂臼脫許元公入京師赴省試過橋墮馬右臂臼脫路人語其僕曰急與挼入臼中若血漬臼則難治矣僕用其說許已昏迷不覺痛遂就橋舁歸邸或曰非田馬騎不能了此疾急召之至已入暮秉燭視其靣曰尚可治乃施藥封腫處至中夜方蘇逹旦痛止去其封損處已白其青瘀乃移在臼上自是日日易之腫直至肩背於是以藥下之㵼黑血三升五日復常遂得赴試蓋用生地黃研如泥木香為細末以地黃膏攤紙上摻木香末一層又再攤地黃貼腫上此正治打撲傷損及一切癰腫未破令內消云類說龜獻竒方治傷折治腕折傷筋損疼痛不可忍用生地黃一斤切藏瓜薑糟一斤生薑四兩切右都炒令均熱以布裹罨傷折處冷則易之曾有人傷折宜用生龜尋捕一龜將殺患人忽夢見龜告言曰勿相害吾有竒方可療夢中授此方本事方打撲傷損打撲傷損瘀血凝滯氣因不行關竅皆不通大便必閉壯者可服洗心散老弱者可服七聖檳榔丸凡有此證須問臟腑所打處疼痛若傷處大痛大便三兩日不通然後可下前二藥若大便不閉傷處不甚猛痛則不可服宜服沒藥乳香當歸之類醫餘又長安石史君嘗至通衢有從後呼其姓第者曰吾無求於人念汝有難故來救汝出一紙卷授石曰有難則用之乃治折傷內外損方書也明年因趨朝坐馬為他馬所踶折足墜地又踏一臂折家人急合此藥且灌且裹至夜半痛止後手足皆堅牢如未傷時方本出良方用川當歸鉛粉各半兩硼砂二錢同研令細濃煎蘇木汁調服一大匕損在腰以上先喫淡粥半盞然後服藥在腰以下即先服後食仍頻頻呷蘇木汁别作糯米粥入藥末拌和攤紙上或絹上封裹傷處如骨碎用竹木夾定仍以紙或衣物包之其妙如此故表而出之又汀州瀝口市民陳公誦觀音甚誠慶元初出行攧折一足忍痛呌菩薩越三晝夜夢一僧拄杖持鉢登門問所苦陳曰不幸折一足貧無力訪醫只得告佛僧曰不用過憂吾有一方接骨膏正可治汝便買菉豆粉於新鐡鍋內炒令真紫色旋汲井水調成稀膏然後厚傅損處須教遍滿貼以白紙將杉木縳定其效如神不必假它劑也語訖僧忽不見陳亦寤如方修製用之則愈又紹熙五年秋湖口人林四因日暮馳馬顛墜折一足骨斷招外醫莫肯治經旬痛甚偶一道人過門聞其聲而入視曰續筋接骨非敗龜殼不可此却難得要生者甚易道人曰但得殼足矣生與敗等也語訖即退林招衆醫議之皆云一足所傅多少龜殼灰可辦兹去五里許江畔一大龜身濶二尺常跧伏泥中捕而脫其殼燒灰傅損處計其收效賢於小者百數也時已昏暮未暇遣僕半夜後鄰室張翁者夢烏衣人來訪自通為江畔老龜哀投甚切云林四折足醫欲殺吾取殼以療傷望一言救護張謝曰老夫愚鈍如何施力烏衣云只煩丈人詣林氏諭衆醫曰往日嘗有龜傳一方於人而贖命者用淹藏瓜糟罨斷處次將杉板夾縳定方書亦嘗載記如更增赤小豆一味拌入糟中然後板夾不過三日即十全安愈願翁便為告之異日當圖報遂去黎明張如所戒林與醫皆喜而從之應期而驗類編熱葱涕愈傷指崔給事頃在澤潞與李抱真作判官李相方以毬杖按毬子其軍將以杖相格乘勢不能止因傷李相拇指並爪甲擘裂遽索金瘡藥裹之强坐頻索酒飲至數杯已過量而靣色愈青忍痛不止有軍言取葱新折者便入溏灰火煨熟剝皮擘開其間有涕取罨損處仍多煨取續續易熱者凡三易之靣色却赤斯須云已不痛凡十數度易熱葱並涕裹纒遂畢席笑語本事方打撲傷自然銅有人飼折翅鴈後遂飛去今人打撲傷研極細水飛過同當歸沒藥各半錢酒調頓服仍以手摩痛處本草衍義墮馬折足定州人崔務墮馬折足醫令取銅末和酒服之遂痊平及亡後十餘年改葬視其脛骨折處有銅末束之朝野僉載蹴鞦韆墜損宣和中有一國醫忽乘快行宣押就一佛剎醫內人限目今便行鞭馬至則寂未有人須臾臥轎中扶下一內人快行送至奉㫖取軍令狀限日下安痊醫診視之已昏死矣問其從人皆不知病之由惶恐無地良久有二三老內人至下轎環而泣之方得其實云因蹴鞦韆自空而下墜死醫者云打撲損傷自屬外科欲申明又恐後時參差不測再視之微覺有氣忽憶藥篋中有蘇合香丸急取半兩於火上焙去腦麝用酒半升研化灌之至三更方呻吟五更下惡血數升調理數日得痊豫謂正當下蘇合香丸蓋從髙墜下必挾驚悸血氣錯亂此藥非特逐去瘀血而又醒氣醫偶用之遂見功效此藥居家不可闕如氣逆鬼邪殗殜傳尸心痛時疾之類皆治良方載甚詳須自合為佳耳本事方搓衮舒筋道人詹志永信州人初應募為卒𨽻鎮江馬軍二十二歲因習驍騎墜馬右脛折為三困頓且絶軍帥命舁歸營醫救鑿出敗骨數寸半年稍愈扶杖緩行骨空處皆再生獨腳筋攣縮不能伸既落軍籍淪於乞丐經三年遇朱道人亦舊在轅門問曰汝傷未復初何不求醫對曰窮無一文豈堪辦此朱曰正不費一文但得大竹管長尺許鑽一竅繫一繩掛於腰間每坐則置地上舉足搓滚之勿計工程久當有效詹用其說兩日便覺骨髓寬暢試猛伸足與常日差逺不兩月病筋悉舒與未墜時等豫頃見丁子章以病足故作轉軸踏腳用之其理正同不若此為簡便無力者立可辦也癸志竒疾簷溜盥手龍伏藏指瓜中石藏用近世良醫也一士人嘗因承簷溜盥手覺為物觸入指瓜中初若絲髮然既數日稍長如線伸縮不能如常始悟其為龍伏藏也乃見石藏用扣其治療之方藏用曰此方書所不載也當以意去之歸可末蜣螂塗指庶不深入胸膜冀他日免震厄之患士人如其言後因迅雷見火光繞身士人懼急以針穴指果見一物自針穴所躍出不能為灾李定云滕樞密翰苑叢記婦人異疾陳子直主簿妻有異疾每腹脹則腹中有聲如擊鼓逺聞於外行人過門者皆疑其家作樂腹脹消則鼓聲亦止一月一作經十餘醫皆莫能名其疾嘔物如舌鎮陽有士人嗜酒日嘗數斗至午夜興一發則不可遏家業殘破一夕大醉嘔出一物如舌初視無㾗竅至欲飲時眼偏其上矗然而起家人沃之以酒立盡至嘗日所飲之數而止遂投之猛火急爆裂為十數片士人自此惡酒消食籠齊諧記云江夏郡安陸縣隆安中有人姓郭名坦兄弟三人大兒得天行病後遂大能食日食斛米家給五年貧罄後乞至一家門前已得飯復乞於其後門此家語云汝已就前門食那得復從後門來其人答曰實不知君家有兩門腹大飢不可忍後門有三畦薤一畦大蒜因啖之兩畦便大悶極臥地須㬰大吐吐一物似籠因出地漸小主人持飯出不復食遂撮飯著所吐物上即消成水此病尋差東坡物類相感志孕婦腹內鍾鳴有一貧士于常賣處買得一藥方册子其間有一方能治婦人腹內鍾鳴用鼠窟前畚土研羅為末每服二錢麝香湯調其疾立愈髀瘡兒出異苑曰晋時長山趙宣母妊身如常而髀上癢搔之成瘡兒從瘡出母子平安太平御覽人靣瘡江左有商人左膊上有瘡如人靣亦無他苦商人戲滴酒口中其靣亦赤色以物食之亦能食食多則覺膊內肉脹起或不食之則一臂痺有善醫者教其厯試諸藥金石草木之類悉試之無苦至貝母其瘡乃聚眉閉口商人喜曰此藥可治也因以小葦筒啓其口灌之數日成痂遂愈然不知何疾也本事方啖物不知飽江南逆旅中一老婦啖物不知飽徐德占過逆旅老婦訴以飢其子耻之對德占以蒸餅啖之盡二竹簣約百餅猶稱飢不已日飯一石米隨則利之飢復如故京兆醴泉主簿蔡繩豫友人也亦得飢疾每飢立須啖物稍遲則頓仆悶絶懷中嘗置餅餌雖對貴官遇饑則便齕啖繩有美行博學有文為時聞人終以此不幸無人識其疾每為之哀傷筆談腸癢疾傅舍人忽得腸癢之疾至劇時往往對衆失笑吃吃不止此疾古人所未有遁齊閒覽王氏異疾汾州王氏得病右脅有聲如蝦蟇常欲手按之不則聲聲相接羣醫弗能辨聞晉陽山人趙巒善診巒曰此因驚氣入於臟腑不治而成疾故常作聲王氏曰因水邉行次有大蝦蟆躍髙數尺驀作一聲氏忽驚呌便覺右脅牽痛自後作聲尚似蝦蟇也巒乃與六神丹服之來日取下青涎類蝦蟆之衣遂差巒言診王氏脉右關脉伏結積病也故止作積病治用六神丹㵼之而愈名醫録瘵飢蟲從政郎陳撲富沙人母髙氏年六十餘得飢疾每作時如蟲齧心即急索食食罷乃解如是三四年畜一猫極愛之常置於旁猫呌則取魚肉和飯以飼一日猫適呌命取鹿脯自嚼而啖猫至于再覺一物上觸喉間引手探得之如拇指大墜于地頭尖匾類塌沙魚身如蝦殼長八寸漸大侔兩指其中盈實剖之腸肚亦與魚同有八子胎生蠕蠕若小鰍人皆莫能識為何物蓋聞脯香而出髙氏疾即愈小兒魃病千金論凡小兒有魃病者是娠婦被惡神導其腹中令兒病也魃小鬼也其病證微微下利寒熱往來毫毛鬢髮髫鬡不恱者是也宜服龍膽湯凡婦人先有小兒未能行而母更有娠使兒飲此乳亦作魃也令兒黃瘦骨立髮落壯熱也保生方足靣竒方趙先生字子固母劉氏年幾八十左足靣一瘡下連大指上連外踝以至膁骨每歲輒數發發必兼旬纍月昏暮癢甚搔爬移時出血如泉呻吟痛楚殆不可忍夜分即漸已明日復然每一更藥則瘡轉大而劇百試不驗如是二十餘年淳熙甲辰仲冬之末先生為太府丞一夕母病大作相對悲泣無計困極就睡夢四神僧默坐一室旁有長榻先生亦坐因而發嘆一僧問其故光生答之以實僧曰可服牛黃金虎丹又一僧云朱砂亦好既覺頗驚異試取藥半粒强服之良久腹大痛舉家且悔俄而下礧磈物如鐵石者數升是夕瘡但微癢不痛而無血數日成痂自此遂愈朱砂之說竟不復試先生因圖僧像如所夢者而記其事金虎丹方出和劑本治中風痰涎湧塞所用牛黃龍腦膩粉金箔之類皆非老人所宜服今乃取竒效意此疾積熱臟腑而發于皮膚歲久根深未易蕩滌故假凉劑以攻之不可以常疾論也神僧之夢蓋誠孝所感百一選方産後腸癢針線袋主婦人産後腸中癢不可忍以袋安所臥褥下無令知之本草甑氣薰靣腫張德俊云頃年和倅餘杭人將赴官因蒸降真木犀香自開甑靣仆甑靣上為熱氣所薰靣即浮腫口眼皆為之閉更數醫不能治最後一醫云古無此證請以意療之於是取僧寺久用炊布燒灰存性隨傅隨消不半月而愈蓋以炊布受湯上氣多反用以出湯毒亦猶以鹽水取鹹味爾醫者之智亦可喜百一方蛟龍病古有患者飲食如故發則如癲靣色青黃小腹脹滿狀如妊孕醫者診其脉與證皆異而難明主療忽有一山叟曰聞開皇六年灞橋有人患此病蓋因三月八日邉水食芹菜得之有識者曰此蛟龍病也為龍遊于芹菜之上不幸食之而病也遂以寒食餳每劑五合服之數劑吐出一物雖小但似蛟龍狀而有兩頭其病者依而治之獲愈名醫録疑病何解元陳留人也一日㑹飲于趙修武宅酒至數杯忽見盞底有似一小蛇咽入口亦不覺有物但每每思而疑之日久覺心痛自思小蛇長大食其五臟明年又因舊㑹趙宅恰才執杯又見小蛇乃放下盞細看時趙宅屋梁上掛一張弓却是弓梢影在盞中因此解疑其心疾遂無乃致疑而成病也同上産婦腹中癢箭簳及鏃主婦人産後腹中癢安所臥席下勿令婦人知本草食鱠吐蝦蟆永徽中崔爽者每食生魚三斗乃足於後飢作鱠未成爽忍飢不禁遂吐一物如蝦蟆自此之後不復能食鱠矣宣室志瘡破雀飛金州防禦使崔堯封有親外甥李言吉者左目上臉忽癢而生一小瘡漸大長如鴨卵其根如弦恆壓其目不能開堯封每患之他日飲之酒令大醉遂剖去之言吉不知覺也贅既破中有黃雀鳴噪而去聞竒録蛇在皮中華他别傳曰琅琊有女子右股上有瘡癢而不痛愈而復作他曰當得稻糠色犬一頭繫馬頸走出五十里斷頭向癢乃從之須臾有蛇在皮中動以鐡錐橫貫引出長三尺許七日便愈東漢注又獨異志所載與此相類怪石鏡在日南國之西南有石鏡方數百里光明瑩徹可鑒五臟六腑亦名仙人鏡國人若有疾輒照其形遂知起病某臟採藥餌之無不差者冷疾直閣將軍房伯玉患冷疾夏月常復衣張嗣伯為之診曰卿熱須以水發之非冬月不可至十一月令二人夾捉伯玉解衣在石上取冷水從頭澆之盡二十斛伯玉口噤家人哭請止不可又盡水百斛伯王始能動見背上彭彭有氣俄而起伯玉曰熱不可忍乞冷飲嗣伯以水與之一飲一斗遂差史記人漸縮世有竒疾者吕縉叔以制誥知潁州忽得疾但縮小臨終僅如小兒古人不曾有此疾終無人識視直如曲有一人家妾視直物如曲弓弦界尺之類視之皆如鈎醫僧奉真親見之二說筆談寒熱注病又有婦人長病經年世謂之寒熱注病冬月中華他令坐石槽中平旦用冷水汲灌云當滿百始七十灌冷戰欲死他令滿數至八十灌熱氣乃蒸出囂囂然髙二三尺滿百灌他乃使燃火溫牀厚覆衣良久汗洽出著粉燥便愈刳腹視脾又有人病腹中攻痛十餘日鬢髮墮落華他曰是脾半腐可刳腹治也使飲藥令臥破腹就視脾果半腐壞以刀斷之割去惡肉以膏傅之即差魏太祖聞而異之召他常在左右太祖苦頭風每作心亂目眩他針鬲隨手而愈大怒病差又有一郡守病華他以其為人甚怒則差乃多受其貨而不加功無何弃去留書罵之守果大怒令人追殺守子知之囑令勿逐瞋恚吐黑血數升而愈三說魏志蒸之得汗晉書曰張苖雅好醫術善消息診處陳廪丘得病連服藥發汗汗不出衆醫云發汗不出者死自思可蒸之如中風法溫氣于外迎之必得汗也復以問苖云曾有人疲極汗出臥簟中得冷病苦憎寒諸醫與散四日凡八過發汗汗不出苖乃燒地布桃葉于上蒸之即得大汗便於被下傅粉身極燥乃起即愈廪丘如其言果差視胎已死魏志曰甘陵相夫人有娠腹痛不安方得六月他視脉曰胎已死矣使人手摸知所在在右則女在左則男人云在左于是為湯下之果下男形則愈死枕愈病齊書曰徐嗣伯常有傴人患滯冷積年不差嗣伯為診之曰尸注也當得死人枕煮服之乃愈於是往古冢中取枕枕已一邉腐闕服之即差後秣陵人張景年十五腹脹而黃衆醫不能療以問嗣伯此石蛔爾極難療當得死人枕煮服之依語煮枕以湯投之得大利並蛔蟲頭堅如石者五升病即差後沈僧翼患眼痛又多見鬼物以問嗣伯嗣伯曰邪氣入肝可覔死人枕煮服之服竟可埋枕於故處如其言又愈王晏問之曰三病不同而皆用死人枕而俱差何也答曰尸注者鬼氣伏而未起故令人沉滯得死人枕促之魂氣飛越不得復附體故尸注可差石蛔者久蛔也醫療既癖蛔蟲轉堅世間藥不能遣所以須鬼物驅之然後可散故令煮死人枕也夫邪氣入肝故使眼痛而見魍魎應須邪物以鈎之故用死人枕也氣因枕去故復埋于塜間也太平御覽病悲思州監軍病悲思郝允告其子曰法當甚悸即愈時通守李宋卿御史嚴甚監軍內所憚也允與其子請于宋卿一造問責其過失監軍皇怖汗出疾乃已邵氏聞見録榖獨氣殿中丞姚程腰脊痛不可俯仰郝曰榖獨氣也當食發怒四肢受病傳于大小絡中痛而無傷法不當用藥以藥攻之則益痛須一年能偃仰二年能坐三年則愈矣後三年果愈同上兒生腎縮思村王氏之子生七日兩腎縮一醫云硫黃茱茰研大蒜塗其腹仍以菵草蛇牀子薰之遂愈蓋初生受寒氣而然也瑣碎録飲水得疾有黃門奉使交廣回周顧謂曰此人腹中有蛟龍上驚問黃門曰卿有疾否曰臣馳馬大庾嶺時當大熱困且渴遂飲水覺腹中堅痞如石周遂以消石及雄黃煮服之立吐一物長數寸大如指視之鱗甲具投之水中俄頃長數尺復以苦酒沃之如故以器覆之明日已生一龍矣上甚訝之明皇雜録誤吞金䥊張成中漢上人有女七八歲因將母金䥊子一隻剔齒含在口中不覺咽下胸膈疼不可忍憂惶無措忽銀匠來見某有藥可療歸取藥至米飲抄三錢令服來早大便取下後問之乃羊脛炭一物為末爾名醫録羊脛炭亦治誤吞錢妙飛絲入眼飛絲入人眼令人睛漲白突出痛不可忍即以新筆兩三管濡好墨運睛上則飛絲纒筆而出即安蛇蟲獸咬犬傷白芷治蛇齧臨川有人以弄蛇貨藥為業一日方作場為蝮所齧即時隕絶一臂之大如股少頃遍身皮脹作黃黑色遂死有道人方旁觀出言曰此人死矣我有一藥能療但恐毒氣益深或不可治諸君能相與證明方敢為出力衆咸竦踊勸之乃求錢二十文以往才食頃奔而至命汲新水解裹中藥調一升以杖抉傷者口灌入之藥盡覺臍中搰搰然黃水自其口出腥穢迫人四體應手消縮良久復故其人已能起與未傷時無異遍拜觀者且鄭重謝道人道人曰此藥不難得亦甚易辦吾不惜傳諸人乃香白芷一物也法當以麥門冬湯調服適事急不暇姑以水代之吾今活一人可行矣拂袖而去郭邵州㳓得其方嘗有鄱陽一卒夜直更舍為蛇齧腹明旦赤腫欲裂以此飲之即愈夷堅志被毒蛇傷有人被毒蛇傷良久已昏困有老僧以酒調藥二錢灌之遂蘇及以藥滓塗咬處良久復嚾二錢其苦皆去問之乃五靈脂一兩雄黃半兩為末爾有中其毒者用之無不驗本草衍義辟蛇毒南海地多蛇而廣府治尤甚某侍郎為帥聞雄黃能禁制此毒乃買數百兩分貯絹囊掛於寢室四隅經月餘日卧榻外常有黑汁從上滴下臭且臊使人穿承塵窺之則巨蠎橫其上死腐矣于是盡令撤去障蔽死者長丈許大如柱旁又得十數條皆蟠蚪成窠穴他屋所驅放者合數百自是官舍為清類編蛇蟲所傷凡蛇傷蟲咬倉卒無藥去處以大藍汁一碗雄黃末二錢調均㸃在所傷處併令細細服其汁神驗如無藍以靛花青黛代之山林日用法每欲出時用雄黃一桐子大火上燒烟起以薰腳棚草屨之類及袍袖間即百毒不敢侵害邪祟逺避集驗方同上治蚯蚓咬浙西軍將張韶為蚯蚓所咬其形如大風眉鬚皆落每聞蚯蚓鳴於體有僧教以濃作鹽湯浸身數遍差蜘蛛齧蜘蛛齧者雄黃末傅之朝野僉載猫傷猫兒傷研薄荷末塗之百一選方馬咬被馬咬者燒鞭梢灰塗之蓋取其相服也蜈蚣咬蜈蚣咬取蜘蛛一枚咬處安當自飲毒蜘蛛死痛未止更著生者孫真人惡蛇螫趙延禧云遭惡蛇所螫處貼蛇皮便於其上文之引去毒氣即止壁鏡咬壁鏡咬醋磨大黃塗之又壁鏡毒人必死用白􅈨治之太平廣記用桑柴灰汁三度沸取調白􅈨為膏金瘡口即善兼治蛇毒蠶咬蠶咬人毒入肉取苧汁塗之今以苧近蠶則蠶不生也本草治諸獸傷馬咬用獨顆栗子燒灰貼鼠咬用麝香吐調塗或用猫毛燒灰裛之猫咬用薄荷汁塗狗咬傷涎入瘡令人昏悶者浸椒水調菵草末塗猪咬松脂鎔作餅子貼又屋溜中泥塗春末夏初狂犬咬人即令狂過百日乃得免當終身禁食犬肉若食蠶蛹此毒亦發定不可救宜忌之右先去却惡血灸瘡中十壯明日以後日灸一壯百日乃止忌酒每七日搗韭汁飲一二盞猘犬所傷沈約宋書曰張收嘗為猘犬所傷醫云宜食蝦蟆膾收甚難之醫含笑先嘗收因此乃食瘡亦即愈犬傷犬傷人量所傷大小爛嚼杏仁沃破處以帛繫定至差無苦本草衍義又遇惡犬以左手起自寅吹一口氣輪至戍掐之犬即退伏瑣碎録虎犬咬虎犬咬人摻􅈨納瘡中裹之止痛立愈蠆螫魏志曰彭城夫人夜之厠蠆螫其手呻吟無賴華他令溫湯漬手數易湯常令暖其旦則愈太平御覽蝎螫􅈨石一兩醋半升煎之投􅈨末於醋中浸螫處井底泥傅亦愈蠼螋妖蟲蠼螋妖蟲也隱於墻壁間尿射人之影令人遍體生瘡如湯火所傷治法用烏雞翅毛燒灰油調傅以雞者百蟲所畏故能治之瑣碎録云有人苦此用雞子大頭剜小竅取白塗四畔愈湯火金瘡大黃療湯火瘡建昌士人黃襲字昭度云有鄉人為賈泊舟潯陽月下髣佛見二人對語曰昨日金山修供甚盛吾往赴之飲食皆血腥不可近吾怒庖者不謹漬其手鼎中今已潰爛矣其一曰彼固有罪子責之亦太過曰吾比悔之顧無所及其一曰何難之有吾有藥可治但搗生大黃以米醋調傅瘡上非惟愈痛又且滅瘢兹方甚良第無由使聞之爾賈人適欲之金山聞其語意冥冥之中假手以告遂造寺中詢之乃是夜有設水陸者庖人揮刀誤傷指血落食中恍惚之際若有人掣其手入鑊內痛楚徹骨號呼欲死賈人依神言療之二日愈夷堅志醋泥塗火燒瘡北夢瑣言記火燒瘡方云孫光憲家人作煎餅一婢抱孩子擁爐不覺落火爐上遽以醋泥塗之至曉不痛亦無瘢㾗定知俗說亦不厭多聞良方湯火瘡劉寄奴為末先以糯米漿雞翎掃傷著處後摻藥末在上並不痛亦無㾗大凡湯著先以鹽末摻之護肉不壞然後用藥傅之至妙本事方湯火瘡禁用冷凡被湯火燒者初謹勿以冷物及井下泥尿泥及蜜淋塌之其熱氣得冷則却深摶至骨爛入筋也所以人中湯火後苦攣縮者良由此也巢氏病源治湯火呪俚巫多能持呪語而蹈湯火者元仲弟得其訣為人拯治無不立差呪云龍樹王如來授吾行持北方壬癸禁火大法龍樹王如來吾是北方壬癸水收斬天下火星辰千里火星辰必降急急如律令呪畢即握真武印吹之即用少許冷水洗雖火燒手足成瘡亦可療類編斂金瘡口斂金瘡口止疼痛用劉寄奴一味為末摻金瘡口裏宋髙祖劉裕微時伐狄見大蛇長數丈射之傷明日復至聞有杵臼聲往覘之見青衣童子數人於榛中搗藥問其故答曰我王為劉寄奴所射合藥傅之帝曰吾神何不殺答曰寄奴王者不死不可殺帝叱之皆散收藥而返每遇金瘡傅之良驗寄奴髙祖小字也本事方治金瘡周崈班緣捕海寇被寇以提刀斫傷血出不止分明筋如斷骨如折用花蕊石掩之血不止痛亦不定有兵士李髙言某在軍中被人中傷欲死見統領與藥一貼名紫金散掩之血止痛定明日瘡靨如鐡遂安又無瘢㾗後告統領求此方只用紫藤香瓷瓦鎌刮下石碾碾細傅之救却萬千人也名醫録云紫藤香即降之最佳者又溫州有匠人造屋失腳墜地地上有鏟頭𥪡柱傍腳痃被傷血如湧出村中無藥有僧道光於門扇上撮得塳塵掩定血止痛定兩日便靨堅問道光塳塵如何治得金瘡曰古人用門桯塵者此也火氣入腳生瘡有婦人因冬間向火兩股上遂成瘡其汁淋漓人無識者後見一人云此皆因火氣入內生此但用黃柏皮為末摻之立愈果如其言後又再作適無黃柏用薄荷煎塗之立愈漆澆成瘡往年蕪湖二漆牙相爭其一人以漆一桶自頭澆其一人患瘡幾死有人教以鐵店磨鐡槽中泥塗之即愈以蟹黃塗之亦愈瑣碎録田舍試驗之法藕皮散血起自庖人牽牛逐水近出野老麵店蒜虀乃是下蛇之藥路旁地菘而為金瘡所祕本草治箭鏃不出孫真人云治箭鏃在咽喉胸膈及針刺不出以螻蛄搗取汁滴上三五度箭頭自出食忌鼠盜忌食夜藏飲食於器中覆之不密鼠欲盜食不可得環器而走淚墮器中食之者得黃疾通身如蠟針藥難治食胡羊肉不可食松子淡食鹽傷筋醋傷骨淡飯吃了肥木腯多言損氣多記損心多怒傷精多笑傷神飲食不可露天凡飲食不可放在露天恐飛絲墮飲食中食之令人咽喉生泡急以白􅈨巴豆燒灰吹入口內或急擦即差瑣碎録雜忌茅屋漏水墮諸脯肉上食之成癥結及暴肉作脯不肯乾者祭神肉無故自動蜘蛛及行蜂落食肉上凡食無故色變脯臘入火灸不動不得火而自動者皆能殺人不可食之夜臥當耳勿有孔吹即耳聾逺行疲乏而來勿入房成五勞旦起勿開目洗靣令人目澀失明父淚母淚不得墮子目中即精破生翳修真祕訣勿過食某見數老人飲食至少其說亦有理內侍張茂則每食不過粗飯一盞許濃膩之物絶不向口老而安寧年八十餘卒茂每勸人必曰旦暮少食無大飽王晳龍圗造食物必至精細食不盡一器食包子不過一二枚爾年入十卒臨老尤康强精神不衰王為豫言食取補氣不飢則已飽生衆疾至用藥物消化尤傷和也劉元袐監食物尤薄僅飽即止亦年八十而卒劉監尤喜飲酒每飲酒更不食物啖少果實而已循州蘇侍郎每見某即勸令節食言食少則臟氣流通而少疾蘇公貶瘴鄉纍年近六十而傳聞亦康健無疾蓋得此力也蘇公飲酒而不飲藥每與客食未飽公已捨匕筯張太史明道雜記食鱉不可食莧方書言食鱉不可食莧溫革郎中因併啖之自此苦腹痛每作時幾不知人疑鱉莧所致而未審乃以二物令小蒼頭食之遂得病與革類而委頓尤劇未幾遂死舁其尸置馬廄未斂也忽小鱉無數自九竅湧出散走廄中惟遇馬溺者輒化為水革聞自臨視掊聚衆鱉以馬溺灌之皆即化為水于是革飲馬溺遂差或云白馬溺尤良溫革字叔皮瑣碎録食蟹反惡陳正卿云頃年與一承局同航船承局者為舟中人言嘗為同官差往昌國見白蟹不論錢因買百錢得數十枚痛飲大嚼且食紅柿至夜忽大吐繼之以血昏不省人病垂殆同邸有知其故者憂之忽一道人云唯木香可解但深夜無此藥偶有木香餅子一帖試用之病人口已噤遂調藥灌即漸漸蘇省吐定而愈百一選方銅器不可蓋食銅器蓋食器上汗滴食中令人發惡瘡內疽食性忌之也炊湯不宜洗靣炊湯經宿洗靣令人無顔色洗體令人成癬未經宿者洗靣令人亦然食驢鱉漏肉之戒食驢肉喫荆芥茶殺人食鱉肉同莧菜殺人茅舍漏滴在肉上食之殺人此三等尤宜戒之三說本草食勿多飽多臥食謹勿多多則生病飽勿多臥臥則心蕩心蕩多失性食多生病則藥不行集異說發暴浙中人因食瓜匏多要發吐㵼霍亂謂之發暴以致於有不救者為何瓜匏種之在土不久值時暖易長易成使人食之則發暴若同香葇共食則可免香葇今香薷也今人所謂香葇和食瓜子是矣名醫録飲食忌凡人食欲少而數不欲頓而多食不欲急急則損脾法當熟嚼令細冷食不用熱水潄口熱食不用冷水潄口食必先食熱然後食冷醉飲過度酒有大毒大熱大寒凝海唯酒不冰其至熱也飲之昏亂易人本性其至毒也若解風寒宣血脉消邪氣引藥勢不過於酒也若醉飲過度盆傾斗量毒氣攻心穿腸腐脅此喪生之源也修真祕訣黃帝雜忌法一日之忌暮無飽食一月之忌晦無大醉一歲之忌暮無逺行終身之忌暮無燃燭行房鹹傷筋醋傷骨飽傷肺饑傷氣久視傷血久臥傷氣久立傷骨久坐傷肉久行傷筋凡向北勿安牀勿靣北坐夜臥勿覆其頭人魘勿令燃燈喚之定死無疑正月寅日燒白髮吉凡寅日翦手甲午日翦足甲又燒白髮吉戎幕雜談飲食禁食黃顙魚不可服荆芥吳人魏幾道志在妻家啖黃魚羮罷採荆芥和茶而飲少焉足底竒癢上徹心肺跣足行沙中馳宕如狂足皮皆破欲裂急求解毒藥餌之幾兩日乃止食蜜不可食鮓韶州月華寺側民家設僧供新蜜方熟羣僧飽食之有某院長老兩人還至半道遇村墟賣鮓不能忍饞買食盡半斤是夕皆死食河豚不可服風藥李􅜜郎中過常州王子雲縉為郡招之晨餐辦河豚為饌李以故不食遣歸餉妻妻方平明服藥不以為慮啜之甚美即時口鼻流血而絶李未終席訃音至矣二說夷堅志飲食宜緩王介玉頃嘗道旁食有一老人進言飲食須用緩蓋脾喜溫不可以冷熱犯之唯緩食冷熱之物至脾皆溫矣又因論飲食大冷熱則傷隂陽之氣晃氏夜話隂地流泉不可飲隂地流泉二月八月行塗之間勿飲之令人夏發瘧瘴又損腳令軟五月六月勿飲澤中停水食著魚鱉精令人病鱉瘕也本草食禁荆芥一名假蘇本草謂性溫不然實微凉吾竄嶠嶺久數見食黃顙魚偶犯荆芥者必立死甚于鈎吻毒矣物性相反有可畏如是世人於食禁殆不可不知百衲居士鐵圍山叢談禽獸蟲魚肉異不可食禽獸蟲魚之屬或有感沴氣所生形色變異者皆為毒物謹勿食之謂物有形質變異者如獸有岐尾蟹有獨螯羊一角雞四足是也物有形色變異者如白鳥𤣥首烏雞白首白馬青蹄白馬黑頭是也有形色無異其肉變怪者如落地不沾灰塵經宿肉體尚暖曝炙不燥入水自動之類是也有皮肉無異腸臟變改者如肝色青黯腎氣紫黑魚無腸膽牛肝葉孤之類是也有一物常食性善與他物相反過口而害人者如鮠魚同鹿肉食之殺人羊肉同鱠酪食之害人羊肝得生椒破人臟猪肉得胡荽爛人臍是也有一物常食性平與他物相感入腹成動物者如鱠生同酥乳食之變諸蟲鱉肉與莧菜食之還生鱉牛肉同猪肉食之成寸白蟲猪羊肉以桑楮柴煮灸食之亦成寸白也東虢婁居中食治通說勿食生鮮旋殺物命以應急需既虧愛物之仁又失養口體之正且肉未停冷動性猶存鱠生之屬損人尤甚昔有食魚鱠而生病者用藥下之已變蟲形而能動有鱠縷尚存故可驗也有食鱉肉而成疾者用藥下之已成動物而能行有類鱉狀故可驗也諸肉膾而食之生蟲成病者甚多一切微細物命旋烹不熟食之害人固不可測為癥為瘕為痼疾為竒病此不可不知亦不可忽者也食治四時不食金匱要略方曰春不食肝夏不食心秋不食肺冬不食腎四季不食脾謂畜獸五臟能益人五臟春時木旺肝氣盛脾氣敗故不食肝食之則肝氣愈盛脾氣愈敗因成脾病則難治也或春月肝經受病明有虛證亦宜食肝以補之或春月肝氣太盛即宜食肺以抑之又云肝病禁辛心病禁鹹脾病禁酸肺病禁苦腎病禁甘五味遞相尅制故禁之也或肝氣太盛因而生病亦宜辛味以制之更在心智變通不可全執定論他臟倣此食治飽勿便睡偶食物飽甚雖覺體倦無輒就寢可運動徐行約百餘步然後解帶鬆衣伸腰端坐兩手按摩心腹交義來往約一二十過復以兩手自心脅間按擦向下約十數過令人腹氣通不致壅塞過飽食物隨手消化也生物食之無益食物可生噉者唯有果核時新初市無貴先嘗貴在實成氣足以走趂市利之物多未成熟故也時果鮮味易于可口無喜其甘酸至于意足而後已棗栗之屬經火熟者稍多食雖無妨亦忌于飽飯之後菜品中以蘿蔔下麵茵蔯和羮皆生用為宜萵苣嫩苖蕪菁肥根苦藚落蘇雖可生噉皆不益腸胃不若淹爼煮羮以為麵飯之佐也百榖之屬固不可生食一切動物皆然或鱠魚如絲抹肉成縷沃醋食之已失食養之正有將蛤蜊螃蟹析殼乘活而噉者肉味致用豈有是理既輕殘物命還輕忽自已之性命也生食果菜自有所損此又損之彌甚以好生之德衛生之經併失之故也食治食無求飽論語云不多食又云食無求飽謂食物無務于多貴在能節所以保冲和而順頥養也若貪生務飽淤塞難消徒積暗傷以召疾患蓋食物飽甚耗氣非一或食不下而上湧嘔吐以耗靈源或飲不消而作痰咯唾以耗神水大便頻數而泄耗榖氣之化生􅘞便利滑而獨耗源泉之浸潤致于精清冷而下漏汗淋漓而外泄莫不由食物而過傷滋味太厚如能節滿意之食省爽口之味常不至於飽甚者即䪺䪺必無傷物物皆為益糟粕變化早晚溲便按時華精和凝上下津液含蓄神藏內守榮衛外護邪毒不能犯疾沴無由作故知聖人之立言垂教足以為養生之大經也東虢婁居中食治通說􅘞與溲同用飲食以時飲食以時饑飽得中水榖化冲氣和融精血以生榮衛以行腑臟調平神志安寧正氣充實於內元真通㑹於外內外邪沴莫之能干一切疾患無從而作也食飲以宜食飲之宜舉其大略當候以饑而後食食不厭熟嚼仍候焦渴而引飲飲不厭細呷無待饑甚而後食食不可太飽或覺微渴而省飲飲不欲太頻漿不欲甘酸肉無貪肥脆食不厭精細飲不厭溫熱飯無令少於麵菜常令稱於肉肉不厭軟暖菜不可生茹五味無令勝榖味肉味無令勝食氣滋味欲淡而和食時當謹其度故得食飲常美津液常甘身輕而不倦神清而少睡胸腑通暢而少噫胃脘寬紓而不脹省解帶摩腹之勞免食藥耗氣之失皆目前近效也同上粥能暢胃生津液張文濳粥記贈潘邠老張安道每晨起食粥一大碗空腹胃虛榖氣便作所補不細又極柔膩與腸腑相得最為飲食之良妙齊和尚說山中僧每將旦一粥甚繫利害如或不食則終日覺臟腑燥渴蓋能暢胃氣生津液也今勸人每日食粥以為養生之要必大笑大抵養生性命求安樂亦無深逺難知之事正在寢食之閒耳或者讀之果笑文潜之說然豫觀史記陽虛侯相趙章病太倉公診其脉曰法五日死後十日乃死所以過期者其人嗜粥故中臟實故過期師言曰安榖者過期不安榖者不及期由是觀之則文濳之言又似有證後又見東坡一帖云夜飢甚吳子野勸食白粥云能推陳致新利膈養胃僧家五更食粥良有以也粥既美快粥後一覺尤不可說五味致疾五味養形過則致病故多食鹹則脉凝澀而變多食苦則皮槁而髮拔多食酸則肉胝皺而唇揭多食甘則骨痛而髮落多食辛則筋急而爪枯本事方飲酒面青赤飲酒者肝氣微則面青心氣微則面赤魚無腮不可食養生方云魚無腮不可食食之令人五月發癩巢氏病源醫說卷七
